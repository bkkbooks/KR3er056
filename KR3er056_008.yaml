每用少許塗毒正頂勿著好肉藥干醋蜜潤化其毒爆出黑血毒水即時鬆解疔瘡加鐵鏽黃細研塗頂經宿根出替針丸膿成不得穿破者可咬頭出膿潰後無內攻之患白丁香滷砂另研沒藥另研乳香研各一錢糯米四十粒用礦灰如拳大貯碗內量入井水化待熱氣將息以米排灰中良久米如水晶取出候用上各為末和勻以米粒研丸綠豆大用一粒安毒頭上將拔毒膏貼於外膿自出又方膿成不潰巴豆肉一粒不去油油鹽豆豉十四粒含去皮令軟同研爛入真麝香少許捏小餅安頭上如有孔不大潰出膿捻作小麥樣用紙燃送入痛少時膿大出肉色黯不得去用巴豆肉炒黑搗成膏塗之又用鵝口繭一個燒灰酒調服頭破又牛蒡子一粒酒吞下可破巴油膏解一切瘡毒及腐化瘀肉最能推陳致新巴豆去殼炒焦研如膏香油少許共研勻點些少於腫處瘀肉自化亦取收斂乳沒生肌散治諸般瘡瘍癰疽毒凡一切新久諸瘡生肌收口軟石膏紅色者尤佳炭火煅紅待冷去灰土取研細一兩龍骨三錢乳香沒藥俱出汗研末血竭赤石脂各一錢輕粉五分上各研極細末和勻重研入瓷罐塞緊勿出氣瘡毒洗淨挹乾摻上外貼膏藥或護紙烏龍膏治癰疽發背疔毒瘡瘍一切無名腫毒䲸嗊頭癤毒跌撲損傷流注諸毒惡瘡凡已破潰不能生肌收口悉宜貼之抽膿拔毒去腐生肌及臁瘡凍瘡湯火灸瘡杖傷腳裂楊梅毒久爛不收者悉效及內臟諸癰並宜為丸蛤粉為衣酒下熱毒水下赤白帶當歸湯咳嗽喉疾綿裹含咽一切頭風赤眼梔子湯下仍貼太陽穴跌打傷陳皮湯下膝痛鹽湯下仍治婦人經閉血塊貼臍腹虎犬傷金瘡瘰癧梅毒鹽湯洗淨貼上當歸赤芍藥官桂大黃生地黃白芷玄參各一兩銼細芝麻油二斤浸藥三日入鍋煎至藥焦以苧布濾去渣淨油再熬熱滾桃柳槐三枝紮緊不住手絞轉看青煙起入水飛丹十二兩夏增冬減陸續傾入油不住攪轉滴水中成珠不拈手為度掇起安定缸上攪噴水三口扇令煙盡薄綿濾入缽內待冷攪入乳香沒藥末各五錢數年不壞萬靈膏治風寒濕氣跌撲損傷風毒腳氣遍身疼痛挫氣閃肭筋骨痠疼及血風膿窠裙邊臁瘡手足一切諸瘡毒立效木鱉去殼二十個蓖麻去殼百粒威靈仙當歸川芎赤芍防風荊芥羌活獨活生地黃白芷黃芩黃連黃柏薑黃各二錢蛇蛻一條麻油冬七兩夏五兩秋六兩浸藥一日煎藥焦濾去渣油入鍋煎滾下黃蠟二兩次入嫩松香二斤老松添油桃柳枝攪化滴水成珠不拈手預備水半缸稀麻布一幅鋪綿少許二人扯定將膏傾於布上濾入水中二人對扯黃色入缽陸續置小器中微火燉攤油紙或布如風氣閃挫搗炒薑蔥擦患處次貼膏藥泄瀉腹痛貼臍上朱竭膏貼諸瘡尤效血竭銀硃輕粉乳香沒藥各二錢上各研細末和勻以前萬靈膏四兩以手蘸水將諸末拌扯紅色散毒膏治一切癰疽發背諸般腫毒熱癤䲸嗊頭毒周身諸毒初起貼之即消有膿者咬頭出膿去腐消腫抽膿拔毒膿盡亦能收口前膏木鱉至蛇蛻再加金銀花皂角刺川山甲切碎麻油黃蠟松香煎法相同略不拈手即取起扯黃每斤用真銅青二兩米醋少許研化真蟾酥二錢酒少許研二味拌扯入膏內用隨大小捏薄捺布上貼如小者油紙攤神異膏治癰疽瘡瘍腫毒一切諸毒甚效露蜂房有子者一兩勿用新鮮者蛇蛻鹽水洗焙半兩飛丹拾二兩真麻油二斤先用黃耆玄參杏仁各一兩入油煎至黑色方入蜂蛇男發一團再煎一時不住以柳枝攪將稀麻布一方鋪綿少許幔缽口濾去渣淨油入鍋徐下飛丹柳枝攪滴水捻不沾為度疔瘡經曰膏粱之變足生大疔此證因於肥甘厚味煎爆熱毒醇酒房室以致邪穢蘊蓄而成此患亦有誤食死牛馬肉及夏月烹調肉食疱人汗滴肉中或造豆腐者汗滴或人家水缸中飯糝墮於缸底數日泛起水煮飲食人偶食此糝水缸置有須貫眾免此患多發頭面額眉唇吻四肢臂膝初生雖腫而形小頭凹赤黃紫黑常無定色或如黃泡中有黑水但如小瘡按之內硬或麻或癢先寒後熱心胸煩悶頭疼拘急嘔吐眩運神思昏憒遍身麻木四肢沉重甚則心悸眼花等證是其候也急取生豆嚼之不腥生礬嚼之不澀為的是無疑速宜調治瘡毒致害莫此為甚慢疔七日急疔三日而死人不早覺者因形小而無大痛故常忽之初起不覺復犯腥酒房室者速死此證雖有多種為治則一倉卒無藥則取蒜灸不痛去蒜明灸數十壯不痛用肥針箸炭火燒赤烙之如焦炭取痛為度四邊用針刺令出血更看瘡邊有紅絲如瘡在唇口入於喉生手者入於心生足者入於腹即死細尋紅絲盡處針刺出毒血以蟾酥少許酒研化塗入尤宜瘡頭用銀簪腳撥破入酒化蟾酥得四圍腫起或有細瘡名護場易治不起難治內服加減敗毒散及漏蘆湯取微汗隨服追疔奪命湯兼真人活命飲萬病紫金錠及諸方法急治藥力少緩毒攻心患人眼黑如見火光必不可救矣主方追疔奪命湯羌活何首烏黃連各一錢甘草節一錢殭蠶一錢北細辛防風各八分金銀花青皮各七分草河車即金線重樓赤芍各六分澤蘭五分蟬蛻四分加紫花地丁藕節各一錢尤可上銼首服倍金銀花一兩澤蘭一兩蔥頭三個生薑五片同搗爛好酒鏃熱泡之去渣熱服不飲酒者用水酒各一半或水煎生薑十片熱服出汗病減後再加大黃三錢弱人減半同煎熱服利數次去餘毒若有膿加何首烏白芷梢在腳加木瓜檳榔要通利加大黃梔子黑醜青皮木香聖功丸一切癰疽疔毒發背初起小兒痘瘡黑陷喉閉蠱毒破傷風等證血竭二錢蟾酥真者一錢雄黃硃砂冰片乳香沒藥各五分輕粉三分真麝香二分上為末用人乳研化蟾酥為丸如黃豆大每服一丸嚼化好酒嚥下神仙解毒丸妙方見前八寶散疔如白泡輕黃黑根紫脹痛頭疼寒熱煩嘔指冷狂躁胸滿危急將死服戒穀味牛黃