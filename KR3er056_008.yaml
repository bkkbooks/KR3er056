發經曰耳為腎之外候又曰腎通竅於耳亦因大怒動厥陰肝經風熱燥火瘡生耳輪作熱痛癢用柴胡清肝之類兼小柴胡湯次服加味地黃丸耳內生毒皆由手少陽足少陰二經風熱耳證有五日聤耳曰濕耳常出黃膿水曰風耳常出紅膿曰纏耳出白膿曰耳疳生瘡臭穢曰震耳耳內虛鳴時出清水證雖有五其源則一又有耳蕈耳痔閉塞不通用黃連消毒飲活命飲治之有為耳癰用活命飲加升麻桔梗蔓荊子有大痛為疔者先以經絲草俗名天荷葉延紅絲到處生石砌邊搗汁滴入失治則頭腫極大而死主方若耳後一寸三分生疽急服解毒之藥遲多不救柴胡梔子丹皮芍藥當歸蔓荊子川芎生地龍膽草上銼水煎食後服面瘍附痄腮面瘡之發見於眉頤腮頰鼻髭地角諸瘍皆屬上焦鬱火諸經積熱風濕壅結陰陽相滯而生宜萬病解毒丹之類焮腫赤痛先服加減敗毒散發汗次用真人活命飲加黃芩黃連梔子玄參桔梗木通之類主方治口唇頰車髮鬢腫痛鼻額連頭痛犀角七錢五分升麻五錢白芷二錢五分防風黃芩各三錢半白附子川芎各二錢半甘草一錢五分羌活三錢上作一服水五盞煎至三盞去滓分作三服一日一服熱減制輕劑服之痄腮證屬陽明胃經或因風熱所乘或因積熱而致內熱腫痛外用敷方內服祛風清火之藥主方治風熱上攻面目腫痛牙關緊急白芷升麻各二錢半當歸一錢五分甘草一錢蒼朮八分葛根七分草豆蔻柴胡黃柏藁本羌活各四分蔓荊子殭蠶各三分麻黃七分上水煎服敷方靛青蚯蚓泥水研井底泥隨取一味敷患處穿腮證由憂愁思慮驚恐悲傷或過熱毒藥物初生下連頸項隱痛內有小核漸大牙齦腫痛寒熱間作穿潰腐爛淋漓不已或左或右牙關不開飲食難進始宜鵝翎蘸生桐油探吐多去痰熱切忌刀針已破切勿入風多致不救主方宜接服活命飲黃連黃柏黃芩梔子玄參桔梗柴胡甘草等分升麻減半上水煎服頸癰證因怒郁驚惶積憤而成屬手少陽三焦經初覺宜隔蒜灸多壯內服活命飲加玄參桔梗之類壯者攻下老弱補托神勞多怒頸項腫硬用八珍湯加柴胡香附勞心過度宜服補中益氣湯喉癰癰發嗌中憂憤積熱所致屬任脈及手太陽少陰宜清熱攻毒用真人活命飲黃連消毒散紫金錠壯人攻下若過時失治穿潰咽嗌者死對口證由熱毒上攻屬足太陽膀胱之經甚者類腦癰治輕者取鮮白茄蒂七個鮮何首烏對稱准水鍾半煎服如出膿再一服收口如無鮮者乾者亦可夾疽夾喉兩旁而生屬手少陰足太陰足厥陰火熱蘊毒上攻而發宜加減敗毒散及黃連消毒散見腦癰活命飲加玄參桔梗黃連潰內者危脅疽證由心肝二經火盛虛中有熱而發於兩脅下名發脅屬手足厥陰經初宜神效栝蔞散方見乳癰柴胡清肝湯方見鬢疽或活命飲加柴胡漬後宜清熱托裡滋腎水有熱當歸龍薈丸方見脅痛脅下至腰及遍身紅紫宜砭出惡血內服防風通聖散方見中風紫金錠塗服簡便方雞糞搗入鹽少許醋和敷患處腫消痛止膿成有效手疽附手發背丫刺指疽天蛇頭穿掌疽腕癰代指手發背兩手背發癰無頭漫腫乃三陽風熱鬱滯宜活命飲加黃芩梔子桔梗升麻寒加桂枝熱加薑黃水酒煎服或紫金錠奪命丹老弱者大補之丫刺虎口內結毒焮腫又名合骨疽屬陽明大腸風熱積毒始宜隔蒜灸內服真人活命飲加桂枝薑黃桔梗升麻煎服外以玉樞丹水磨塗之指疽證發大指頭亦名指發如粟漸大青紫黃黑麻木作癢或大痛徹心屬手太陰經外以玉樞丹濃敷內服更用發汗攻下諸方次托裡補益悉如前法此證切勿怠緩若攻心嘔吐不食齒縫出血者不治指變黑色急宜截去可生若黑至臂必死別指猶可拔毒散泥蜂窩壁間乳香上為末米醋調頻塗痛止又方蜈蚣乾者燒煙燻又方雞子清浸指痛止天蛇頭指頭結毒焮赤腫痛膿潰裂開形如蛇頭故以為名屬手厥陰心包經絡積熱宜服活命飲加柴胡羌活桔梗黃連消毒飲玉樞丹之類敷方雄黃蜈蚣全蠍各一錢為末摻入瘡抹油帛包紮干痛油潤穿掌疽手心赤腫偏者名曰穿邊屬手厥陰心胞絡經積熱初宜隔蒜灸法內服活命飲加桂枝薑黃實人宜斟酌表裡而汗下之次托裡補益大同小異腕癰手屈處焮腫治法同前更以玉樞丹加蟾酥少許塗之代指患於指甲內冷藥溻潰為快蓋爪者筋之餘筋賴血養血熱毒成流注於指端故指赤腫成膿證類指疽然無蘊毒不致傷人治代指麻黃煎汁入芒硝熱浸之又甘草煎濃汁浸之又酸漿水入鹽熱浸冷再換又烏梅肉蒸爛醋研浸英蒼散治手指結毒及天蛇頭蒲公英解諸毒神效路邊田畔開黃花如菊蒼耳草共為末酒服更以米醋濃煎浸之效或蒲公英同金銀花藤煎酒服又蒲公英鮮者搗汁酒服渣盫患處足瘍附脫疸腳氣瘡甲疽代指足發背足跟疽手足裂足部之證屬三陽經濕熱或三陰經精血虧損微赤而腫膿出而清難治若赤腫焮痛而潰膿者屬濕熱易治若色黯不腫不痛不潰膿煩熱作渴小便澀短者陰氣敗絕之惡候初宜蒜灸內服活命飲次服托裡次補中益氣湯六味地黃丸色黯不痛者著肉用桑枝灸內服十全大補八味地黃丸之類脫疽足大趾漬而自脫難治如色變赤黑者死宜急截去余指易治初起以萬病解毒丹醋磨厚塗未成者宜蒜灸次托裡消毒用引經藥或敗毒散加銀花牛膝白芷大黃或活命飲腳氣瘡因腎虛風濕所搏氣血壅滯毒在膚腠不得宣通腳上生瘡若風毒不散遷延日久黃水淋漓氣血虧傷難治主方風濕腫潰漏蘆五加皮槐皮白蘞甘草各七錢半蒺藜子二兩水煎無風處淋洗敷腳瘡氈灰紅棗燒灰竹蛀屑黃丹枯礬韶粉上各等分研勻摻之甲疽指甲內潰爛因於濕熱或剪傷或履窄勿涼藥敷敷方綠礬鐵器內炭火封煅溶化令汁干取赤者研五錢蘆薈一錢五分麝香三分上研細和勻制一絹袋盛藥套指上線扎定日摻自愈腳指四邊腫爛以前礬末一錢入乳香末三分敷愈又方牡蠣頭生研極細每服二錢靛花研酒調下仍敷患處又方烏梅或白梅取肉蒸爛裹或燒灰調敷代指指頭腫爛爪甲結膿用烏梅核中仁為末米醋調膏另以朴硝泡湯洗漬指於前膏內或以豬油調蚯蚓糞塗足發背足面生疽屬足厥陰陽明二經之會由濕熱乘虛下注活命飲加木瓜肉桂牛膝先蒜灸次托裡再用十全之類用羊糞瓦上炙乾煙盡羅末麻油調敷癢加輕粉痛加麝少許敷外以山茶葉或冬青葉裹之絹條才定足跟疽屬太陽經乃陰陽二蹺發源之所由臟腑積熱所致忌毒藥敷外宜蒜灸內服活命飲加牛膝肉桂或紫金錠之類陰虛服補陰諸丸煎服婦人足跟足趾腫痛足心發熱腫處潰膿皆宜八珍湯六味丸內熱逍遙散之類敷方白朮為細末先以鹽湯洗淨乾摻上一日一換效治腿肚上瘡水出作癢用貫眾煎湯洗後用百藥煎末唾調敷手足裂乃手足皴澀皮膚裂開疼痛不能見風膏方瀝青四兩白色黃蠟八錢乳香二錢另研末上用鐵器先熬麻油一兩煎熟次下瀝青即下黃蠟以麻布濾入水中扯拽黃色揉入乳末瓷器收貯每用以藥火上烘軟塗之外貼紙其縫自合又方手足裂痛用清油五錢慢火煎沸入黃蠟一塊再煎溶入水粉五倍末各少許熬紫色為度以熱水洗手足軟用藥敷以紙貼痛止又腳縫濕爛用枯礬三錢黃丹五分為末糝又指縫搔癢成瘡血出不止用多年糞桶箍燒灰敷之又腳裂爛以蒸熟藕研成膏敷之又腳裂縫以五倍子為末同牛骨髓填縫內即愈冬月腳跟裂大開出血用白芨要明亮堅勿枯燥者研細末水調如糊先以裂熱湯洗淨抿藥外用紙蓋裹腳過夜愈冬月施人大有利益通論以上諸毒凡諸般腫毒初見焮赤腫痛高大速起屬陽證易治惡寒發熱表證宜加減敗毒散發汗消解煩躁口渴里證宜黃連內疏湯攻下大便無表裡證惟作大痛邪在經絡先宜真人活命飲解毒定痛次托裡養榮湯調和臟腑若微赤腫痛平塌不起屬陰經難治急宜十宣散托裡散之類溫補助陽外治可灸可圍可洗惟不可針或攻散或穿潰托裡排膿生肌收口諸方諸法悉於總論採用其諸癰疽瘡瘍治法亦大同小異但宜各證加引經藥如患在上入升上之品在下兼降下之味潰後溫補氣血寒熱虛實隨證參酌可獲十全之功矣惡瘡附人面瘡翻花瘡經曰諸痛癢瘡瘍皆屬心火諸濕腫滿皆屬脾土心主血脾主肉血熱肉濕濕熱相搏潰散肌膚浸淫不休不可定名故曰惡瘡然亦有辯焉如氣血鬱於皮膚腠理可以表而散者如疥癬瘍疹之類是也汗之瘡即已若氣血鬱於肌肉之分外連皮膚作寒發熱而生膿或七情所招或膏粱所致皆宜內托不宜發汗汗之則發痓證故瘡成於皮膚之間則因其輕而揚之故汗之用殺蟲潤燥藥敷之若瘡成於肌肉之內當因其重而減之瀉經絡之熱清涼氣血外以化膿生肌膏熁之瘡在頭巔則升而取之用酒製寒涼藥更以風藥升而上之外以殺蟲解熱藥敷之明此三者其於治瘍思過半矣主方連翹當歸栝蔞根生地荊芥黃芩赤芍麥冬牛蒡子瞿麥木通梔子防風川芎甘草各等分為粗末每四錢水煎服敷方一切惡瘡白礬一錢乳香七分輕粉三分沒藥三分上研勻敷洗方一切惡瘡貫眾川芎茵陳地骨皮荊芥獨活防風萹蓄當歸甘草上水煎洗地丁散惡瘡腫痛地丁當歸大黃赤芍金銀花甘草減半上用水煎服人面瘡多生於膝上或臂間狀如人面眼鼻口俱全此為冤業所致內服十六味流氣飲苦參丸外用貝母末敷之次用生肌散翻花瘡瘡潰從中翻出胬肉如蛇頭狀大小不一證由肝經血燥所致宜內服清肝養血之藥次八珍湯十全大補湯加麥冬五味之類丹毒人身忽然變赤如丹乃血熱肌虛風邪所搏而成宜防風通聖散之類治之主方一切丹毒薄荷連翹鬱金黃芩黃連梔子大黃甘草糯米各等分為末每服三錢蜜湯調服敷方丹毒痛甚車前草益母草地膽草共搗爛塗患處又方赤小豆研末羊角燒灰上研勻雞子清調敷又方治丹毒大蒜搗如泥厚塗患處干即易又單方水苔慎火草浮萍豆葉生地黃隨取一味搗敷患處灶心土靛青大黃蚯蚓泥隨取一味研末雞子清調塗楊梅瘡此瘡乃濕熱邪毒所成或共處者患此傳染或同飲食坑廁圊桶或於淫室熏惹穢氣或患下疳便毒而起治當察其表裡虛實先鬚髮散表邪如防風通聖散加減敗毒散濕熱羌活蒼朮湯次清裡熱內疏黃連湯之類隨證連服數帖大勢略緩次服主方解毒次調和氣血最不宜妄求速效誤服輕粉粉霜之藥反收熱毒沉凝骨髓日久毒發頭面周身潰爛不已痛苦萬狀悔之不及致成終身痼疾初患者後有羊酒方可用主方當歸尾川芎赤芍生地升麻葛根黃芩各一錢黃連金銀花黃柏連翹各八分防風八分羌活甘草各五分蟬蛻二個大黃二錢上劑煎成入芒硝一錢服大便已通減去硝黃又方防風荊芥連翹白芷梢地骨皮當歸尾川芎上部倍用木通下部倍用黃陣赤芍藥五加皮黃芩梔子白蘚皮金銀花木瓜薏苡下身多用苦參皂角刺蟬蛻殭蠶黃柏白蒺藜甘草各四兩土茯苓三斤痛加羌活獨活虛加人參茯苓去梔子上銼作五十帖每日二帖水煎服忌牛肉燒酒鹽煎炒食之生癬又方治一切楊梅瘡不俱始終虛實金銀花黃連連翹各一錢當歸生地防風木通薏苡各八分白蘚皮白朮皂角刺各七分甘草四分上劑加燈心二十枚用仙遺糧二兩即土茯苓石桕捶碎煎汁二碗入眾藥煎服土茯苓二汁再煎眾藥渣服茯苓餅遠近頑癬搔爛不痊並治防風人參五加皮白蘚皮當歸丁皮久無真者丁香代之木瓜皂角刺海桐皮川芎金銀花甘草乳香出汗研沒藥出汗研各一錢上為末對和麵作餅蒸熟拌乳香沒藥末嚼食白湯送下西聖復煎丸治瘡後腫塊經年破爛諸藥不愈乳香孩兒茶沒藥丁香各一兩阿魏白花蛇血竭各四錢各為末白麵一斤炒熟蜂蜜六兩煉熟香油四兩煎熟棗水煮乾去皮核上為一處搗千餘下丸如彈大每服二丸土茯苓煎汁化服一日三次拔毒糕土茯苓去皮為末一斤白蜜一斤糯米粉一升上和勻蒸糕食土茯苓汁送下忌飲茶湯羊酒方治楊梅瘡初覺即宜服此大黃麻黃天熱減半蟬蛻各一兩羊肉斤許煮汁三飯碗聽用同好酒三碗煎藥至三碗先以羊肉同飯吃完次服藥汁完厚蓋臥頭至足出大汗欲瀉至空地連解連移勿令氣復入肛門內外毒盡出無後患玉脂膏治楊梅瘡愈後發鵝掌風手上白皮層起牛油香油桕油黃蠟各五錢同熬化待冷銀珠五錢官粉一錢麝香二分同研油藥和勻火拷掌熱擦再烘頻擦又方治楊梅瘡不論久近及癰毒鵝掌風亦須內服解毒方灶心土二錢水銀一錢枯礬三分百草霜一分白蘚皮末七分香油少許上四味研至不見星入蘚油和勻無風處擦手足心藥完吃蔥湯二碗厚蓋臥出汗三日一擦三次愈點藥銀硃輕粉杏仁雄黃各等分上研細末豬膽調搽或摻膏藥上貼加冰片尤妙導水丸治便毒下疳楊梅毒大小便閉濕熱為甚大黃二兩黃芩二兩黑醜炒滑石研各四兩上為末水丸或糊丸每服二錢臨臥湯下簡便方官粉二錢豆腐八兩以官粉摻入腐重湯煮食又方土茯苓新鮮白者佳石桕捶碎煎湯代茶湯任意飲之灸法楊梅瘡初發數個逐個灸三五壯愈隔蒜灸亦可下疳人之前陰屬足厥陰肝經多因鬱怒日久抑遏不舒致成此患或淫家交接至傷或硬衣擦損而起陰頭破爛不速愈延及玉莖名曰蛀梗治法相同切宜防微杜漸有腐去玉莖塊塊累累全失本形數年而斃者脈多尺部洪數先服加減敗毒散次龍膽瀉肝湯方見懸癰小柴胡湯之類腫痛甚者宜清肝火除濕熱小便赤澀利小便如不澀而自汗者不可利若利之榮衛枯竭無以制火瘡益甚主方柴胡一錢五分黃柏赤芍藥赤茯苓膽草各九分蒼朮知母黃連荊芥連翹木通各七分防風獨活各六分甘草梢三分上加燈心二十枝水煎空心服發便毒加大黃熱甚加梔子滑石去蒼朮寒熱往來加黃芩澤瀉二便不利宜服八正散方見淋門涼血解毒丸先服敗毒散次主方未全可再製此丸服苦參八兩黃連四兩連翹防風石膏各兩半牛蒡子生地白芷大黃各一兩上為末荊芥煎汁打糊丸如桐子大每服百丸空心白湯送下久不愈宜服六味地黃丸敷方雞肫內黃皮不見水取淨火炙研細末一錢孩兒茶另研八分珍珠另研三分冰片二分上研勻米泔淨洗敷又方枯礬雄黃珍珠黃柏另研鉛粉煅各等分上為極細末米泔洗拭乾豬膽汁調搽又方抱腿雞子殼略炒研末孩兒茶研細等分上研勻細末茶洗淨濕者乾摻乾者豬膽汁調搽玄霜散下疳蛀梗莖爛亦能長全及諸瘡毒臁瘡久不愈者可收斂舌傷乳沒湯含止痛敷此藥黑鉛五錢銅杓溶化入水銀二錢五分攪勻傾出研不見星入軟石膏火煅三錢五分真輕粉二錢五分明硼砂一錢珍珠另研極細五分冰片三分上共研勻入瓷瓶內用時蔥椒艾煎湯入壇先熏至溫洗淨敷藥乾者豬膽潤濕摻上洗方黃連黃柏當歸白芷羌活防風荊芥苦參等分加烏梅肉五個銅錢五十文水煎入皮硝明礬先熏後洗一日五次又方黃連瓦松花椒蔥根川萆薢艾葉等分上用水煎湯青布洗拭癢加硝礬少時重頓簡便方六一散加輕粉冰片研勻濕者乾摻乾者豬膽汁調搽又用亂髮洗淨燒灰敷又用雞肫皮炙研細末敷一人莖腫不消一潰而腫痛發熱便澀一小兒腫痛各煎小柴胡湯方見傷寒吞當歸龍薈丸方見脅痛而安便毒騎馬癰魚口血疝名四實一生於兩腿合縫之間屬衝任為病見於厥陰肝經之旁絡皆鬱怒蘊熱血聚成毒有因勞役而致者或不遂交感精離不泄或強固敗精留結而致或先下疳而繼生常有接發楊梅瘡者微覺前羊酒方可用初宜發散即行疏利而兼解毒一服已瀉不必再服次清濕熱疏肝火如不散先托裡次調養氣血主方大黃三錢虛人減用殭蠶二錢當歸尾赤芍藥金銀花白芷梢各一錢芒硝一錢木鱉子三個穿山甲三片炒研天粉一錢上用好酒二碗煎至一碗入大黃芒硝滾一沸連罐露一宿五更溫服厚蓋臥出汗通利一二次愈治便毒山甲三片土炒木鱉三個切碎牡蠣煅大黃三分金銀花黃連黃柏黃芩連翹各一錢半黃蠟二錢好酒煎入蠟空心服又方便毒初起可消大黃皂角刺金銀花防風當歸尾甘草節栝蔞仁各等分上用水酒各半煎空心服仍頻提掣頂中發又方三方皆可消散殭蠶槐花各三錢上為末酒下欲疏利加大黃又方龍膽草大黃栝蔞仁桃仁各一錢木鱉三個上用水酒濃煎露一宿溫服又方代赭石另研梔子大黃各一錢當歸五分上用水煎調乳香沒藥末各一錢服又方毒將成膿大黃連翹各五錢枳實三錢厚朴甘草各二錢桃仁二十一粒上分三帖酒煎服又方勞役而成射干三寸生薑三片水煎空心服未利加大黃煎服灸法用核桃殼半個以人糞填滿合毒上殼外艾炷灸至消為度一人腫痛服疏利藥不消亦不潰用人參黃耆當歸白朮柴胡白芷甘草皂角刺並八珍湯而愈一人潰而腫不消脈浮澀以豆豉餅灸內服十全大補湯而愈腎臟風證由風濕所襲濕熱汗潤致陰囊抓癢或腎水虧虛火炎血燥隱處瘙癢成瘡致黃水浸淫此方亦治腳汗擦腳底鋪鞋中及腳指縫爛敷方枯礬一兩牡蠣煅黃丹炒各五錢為末夜擦數遍臁瘡按外臁屬足三陽內臁屬足三陰此瘡皆由濕熱下注瘀血凝滯或寒濕裙邊血風傷手細瘡而始不守禁忌恣啖熱毒朝傷暮損遷延日久濕淤生熱濕熱相蒸漸成斯患亦有跌磕破損而成惟鍋口割傷者竟為終身之患皆由行動勞傷氣從下流難於收斂外用膏藥摻藥內服當歸拈痛湯如氣血虛宜補托之藥更忌熱毒發氣之物膏方阿魏一錢五分少酒研化黃丹二錢兒茶龍骨各一錢半乳香海螵硝水煮曬各二錢赤石脂血竭各一錢半水銀一錢鉛製輕粉二錢沒藥出汗研細二錢上各研極細末加冰片三分研勻聽用麻油二兩五錢銅杓熬老柳棍覺轉化入黃白蠟各五錢次入嫩松香二兩熬化綿濾碗內坐水中過夜將前藥調勻以薄油紙二層中夾膏藥如瘡口大四邊折轉膏上簪腳密透眼瘡用洗方或蔥椒煎米泔洗冷挹干先摻玄霜散更生肌散護之外縛膏藥每日導轉隔紙膏黃耆末五錢輕粉乳香沒藥銀硃各一錢血竭五分銅青二分上各研細末和勻香油調膏薄油紙如前法又方隨瘡口大裁好綿紙十二張四角小紙捻釘住聽用香油二兩銅杓熬下川椒四十九粒煎黑取起次下槐枝長一寸四十九煎焦黑取起次下黃蠟一兩輕粉二分枯礬五分煮前紙令透勿焦取起用槐枝蔥椒煎湯洗瘡暖透拭乾以膏紙貼外以油單紙掩護絹帛縛定一日揭下近瘡一張盡十二日愈又方松香三錢乳香二錢各為末香油調敷患處外用筍箬密刺孔縛之或冬青葉縛每日導轉又方黃柏末一兩輕粉三錢豬膽汁調敷濕者乾摻又方五倍子末一兩香油一兩百草霜一錢熬滾下黃蠟一兩化勻調前末為隔紙膏貼又方川椒末枯礬百草霜研勻調桐油敷蔥椒煎米泔水洗又方灶心土黃丹輕粉黃柏末乳香沒藥俱研末等分上研勻清油調膏薄油紙甘草水煮夾膏透眼貼患處每日導轉頻勿傷動守禁忌加赤石脂妙又方爐甘石火煅至黃色淬入黃連黃柏汁內曬燥研細末一兩白占五錢研象牙末三錢上研勻香油調敷簡便方陳小粉研芝麻炒研細茶研末用香油調勻攤紙貼外縛油紙一日一換藥包裹天泡瘡此瘡濕熱為本風邪為標脈浮緩發熱拘急加減敗毒散發散諸邪脈沉實二便秘澀防風通聖散疏通表裡為末敷瘡亦效敷方滑石黃柏各二錢上為末先以皂角刺挑破靛青調搽又大黃末一兩海金沙半兩上為末以新汲水調搽患處簡便方靛青滑石末蚯蚓泥井底泥隨取一味敷疥瘡經曰諸痛癢瘡瘍皆屬心火雖然亦由五臟蘊積熱毒兼血虛風濕而發疥有五種曰干濕蟲砂膿是也乾者枯槁燥癢濕者濕熱多水蟲者有蟲傳人砂者細而癢甚膿者脹滿膿窠治宜先服發汗疏風涼血解毒清臟腑熱毒之藥釜底抽薪次用敷藥宜用防風通聖散方見中風減硝黃枯朮加黃連黃柏金銀花苦參煎服敷方水銀硫黃雄黃各一錢蛇床子末大楓子取肉杏仁去皮各三錢同楓搗如泥川椒末檳榔末樟冰各錢半枯礬一兩上先以銀硫礬雄加信五釐研至不見星再添礬研次入楓杏研次入諸末研勻桕油二兩缽中燉半烊掇起調諸藥勻抓破擦又方諸般疥瘡荊芥二兩苦杖皮一兩白芷苦參各五錢大黃檳榔黃柏各三錢為末入枯礬末二兩硫黃五錢以醃豬油搗勻擦膿窠瘡輕粉枯礬硫黃各二錢用雞子一個香油一兩煎蛋焦取油調前三末搽又方枯礬一兩硫黃七錢五倍子末川椒末各五錢人言二分上為細末用香油二兩依前煎蛋油調搽諸瘡蟲蛇床子末楓子肉各五錢水銀二錢白錫枯礬各一錢上將錫入銅杓溶化水銀和勻加礬研細楓子搗如泥和豬油或桕油同前藥研勻擦疥瘡經年不愈威靈仙蔓荊子何首烏荊芥穗苦參等分上為細末每服二錢食前溫酒調下或湯一日三服忌熱毒等物洗方防風荊芥馬鞭草野菊花苦參等分川椒一撮上加蔥水煎湯化入明礬朴硝日洗數次癬瘡癬有五種曰濕頑風馬牛是也皆因血分燥熱以致風毒克於皮膚浮淺於疥多挾風濕熱毒而成亦有日久生蟲致多年不愈者宜內外用藥或防風通聖散減硝黃加浮萍皂角刺服之有效外用擦藥主方浮萍當歸川芎赤芍麻黃天熱減半荊芥防風甘草各二錢淡豆豉六十粒上加蔥白二根水煎服取汗出敷方雄黃一錢斑蝥十個蛇床子末寒水石金毛狗脊輕粉硫黃朴硝各五分上各研細末和勻香油調搽淫者干敷又方白蘞一兩川槿皮五錢雄黃三錢上為細末以無根水調飯上蒸赤色為度癬不可抓破搽藥七日勿洗又方枯礬四錢樟腦二錢上為細末以醋調抓傷擦簡便方黑棗一枚巴豆肉三粒搗勻擦又蒜搗碎煮水洗浴拭乾再用生桐油搽上火烘乾愈為度漆瘡近新漆器或漆汙身感其氣則面身腫熱痛癢或謂木形人患漆毒主方甘草滑石各三錢連翹錢半水煎成調雄黃青黛服簡便方鐵店磨刀水盆底垢腳塗或杉木屑煎湯洗效或蟹殼炙研末水調塗或面身俱患甘草煎湯浴安
