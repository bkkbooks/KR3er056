body:
  text: 卷之八外科總論經曰膏粱之變足生大疔受如持虛膏粱厚味熱毒內積其變多生大疽其受毒部分則毒從虛處受之大疔大疽也以其根深在內也又曰榮氣不從逆於肉理乃生癰腫夫瘡瘍之證初成之時當察經之傳變病之表裡人之虛實受之淺深而攻補之如腫病熱渴大便閉結邪在裡也疏通之腫焮赤痛寒熱頭疼邪在表也發散之焮腫痛甚者邪在經絡也和解之微腫微痛而不作膿者氣血虛也補托之漫腫不痛或不作膿或膿成不潰者氣血虛甚也峻補之色黯而微覺腫痛或膿成不出或腐肉不潰者陽氣虛寒也溫補之若泥於未潰而概用敗毒之藥復損脾胃不惟腫者亦不能成膿而潰者也難收斂七惡之候蜂起多致不救此其大略而已論陰陽癰疽之證有二十餘種最切要者分別陰陽是也發於陽者屬六腑為表為火為實發於陰者屬五臟為里為郁為虛故陽發則大而高起皮薄色赤發有椒眼數十輕按即痛形大而淺為癰故陰發則平而內作皮厚色淡腫硬不起狀如頑膚重按隱木而痛形小而深為疽又有陽中之陰似熱非熱雖腫而實虛若赤而不躁雖痛而無膿即浮而復隱外盛而內腐其人多肥肉緊而內虛有陰中之陽似冷非冷不腫而實赤微而躁有膿而痛形雖不盛而內實煩悶其人多瘦肉緩而內實有陽變為陰者病發於陽而極熱則當順氣勻血因有赤腫發熱便閉躁渴之熱證脈洪數而實雖嚴冬惟當暫用苦寒之藥以瀉熱毒如過用寒涼或誤草藥性冷則氣滯血凝而危急用溫熱藥使氣行血和乃可成膿有陰變為陽者病發於陰而極冷則當內用平補兼以宣氣滋血助陽健脾進食或不腫不赤皮寒肢冷瀉利腸鳴飲食不入不時嘔逆等冷證脈微弱而遲雖盛暑亦當暫用辛溫之藥以助陽氣倘又誤涼藥急用大熱之劑回陽不回者死蓋陽者氣也陰者血也陰不足陽有餘血澀氣滯榮衛不行而邪熱相搏則患成數日後漸宜溫和氣血使陽動而陰隨氣運而血行則出膿而收斂若專於清涼氣血凝結則血死血死則肌死而斃矣論虛實寒熱作痛皮膚壯熱口渴煩躁飲食如常大便秘硬小便赤澀膿出稠黏膿盡收斂為實證易治氣血虛弱者塌而不起雖腫不赤而軟慢肌寒肢冷自汗色脫食少懶言小便自利大便滑泄不起不腐膿少而清極難收斂切忌攻伐專宜溫補此虛寒證難治小按即痛者膿淺為實重按乃痛者膿深為虛按之不復起者無膿乃清水也按之即復者有膿也膿出反痛者虛也宜補有膿多者亦氣血虛而不能禁固也有腫高而軟者此膀胱經絡從背起也豈可概以為熱而用涼藥潰後脈澀遲緩者易愈細而沉時直者裡虛若痛尚未痊脈洪滑粗散者難治以正虛邪實也發熱而渴脈虛而大乃真氣虛邪氣盛不治凡腫堅硬而無光澤皮厚瘡頭如粟脈洪大按之澀此精氣已絕不治如未穿破毒攻臟腑一毫熱藥不可用若已破潰臟腑既傷飲食少進一毫冷藥不可用此亦言其常也變者又宜斟酌如毒成膿管寸長深滿膿血膠黏易治臭穢清水血敗氣衰陽絕陰盛不治論感受夫人之一身本於五臟五臟皆本於胃氣邪氣鬱於胃中胃氣盛而體實則邪氣相搏而流注於經絡澀於所滯血脈會聚結而為癰胃氣弱而體虛則邪氣盛而宿於經絡阻於所行血脈凝留結而為疽故曰外如粟內如榖外如錢內著拳雖因榮衛不調經絡凝滯致病之由非止於此究其源有五一天行時氣二七情氣鬱三體虛外感四蘊熱搏於風冷五食膏粱厚味腥膻熱毒又云一天行二疲弱氣滯三怒氣四腎經虛五服法酒服丹藥食炙爆物及大怒鬱憤盡力房勞精虛氣耗皆能致發背搭手腦疽大疔懸癰腳發乳癰諸般腫毒之證論治法經曰汗之則瘡已所謂疏泄榮衛之邪此大法也故初感脈浮數焮腫赤痛加減敗毒散發散之脈沉實煩熱躁渴腫硬痛深大便秘邪在裡宜下之黃連湯之類疏通之仙方活命飲外無焮腫內無便秘邪在經絡也宜調和榮衛托裡養榮湯白芷升麻湯腫高焮痛脈浮宜托裡藥治內托復煎散大痛或不痛焮腫不作膿者邪氣凝結也宜解散之內服仙方活命飲煩躁飲冷焮痛脈數者邪在上也宜清利之清涼飲金銀花散惡瘡久而不潰氣實兼寒邪也宜宣而補之十宣散也如發熱汗多大渴便閉譫語者結陽證也宜下之黃連內疏湯破棺丹是也不作膿而不潰者虛也大補之補中益氣或十全大補湯腫痛飲冷發熱睡語者火也宜清降之清心湯即防風通聖散加黃連不作膿或不潰及不斂陽氣虛也托補之托裡消毒散微腫微痛不作膿及漫腫不痛膿成不潰俱宜大補色黯加助陽藥亦宜補之有陰證而又誤涼藥急宜大熱藥回陽姜附湯三建湯之類首先宜服乳香綠豆粉救心護膜初病作嘔毒攻心胞絡救其心神安寧雖有重病不死世有輕病反死者因透膜而元氣泄也故救心護膜為第一義如按之上下不熱不軟都牽強者尚未有膿急消之凡按之軟實有膿而不潰宜急破之不然則內潰日久難於收斂若未有膿切不可針破五善七惡動息自寧飲食知味一大小便調二膿潰腫消水鮮不臭三神彩精明語聲清亮四體氣和平五善也大渴發熱泄瀉或閉一黃耆竹葉湯氣血俱虛八珍湯加黃耆麥冬五味山藥或八味丸方㕮咀煎服膿血既泄腫痛尤甚膿色敗臭二人參黃耆湯或十全大補湯加麥冬五味目視不正黑睛緊小白睛青赤瞳子上視三六味丸加山梔麥冬五味如未效八珍湯加山梔麥冬五味子喘粗短氣恍惚嗜臥四六君子加薑棗如未效補中益氣湯加山藥山萸五味赤茯苓十全大補湯加山藥山萸五味之類肩背不便四肢沉重五補中益氣加山萸山藥五味如未效十全大補加山萸山藥五味子不能服藥飲食不下舌不知味六六君子加木香砂仁如未效加附子聲嘶色敗唇鼻青赤面目四肢浮腫七惡也補中益氣加姜棗未效六君子加炮姜甚者加附子或十全加附子炮姜若腹痛泄瀉咳逆昏潰救里溫中湯後用六君子加附子薑桂若潰後寒熱作渴怔忡驚悸寤寐不寧牙關緊急自汗脈洪大按之如無或身熱惡衣欲投於水或厚衣仍寒或手足逆冷腰背反張頸項勁強急用參苓歸朮附子救之五善見三則吉七惡見四則危實證見惡候可治虛證見惡候不可治內消經曰汗之則瘡已又曰發表不遠熱故瘡瘍初感必以消散為最勝內服發汗之劑外用蒜灸之法靡不奏功惟當審經絡處所形脈虛實深淺大小而兼引經之藥如腦背腰項臀腨皆太陽經宜黃連羌活脊背連脅處為近少陽宜敗毒散形實脈實者宜漏蘆湯五利大黃湯等疏利之氣虛參耆為主血虛參歸為主佐以消毒加以引經而行補瀉惟少陽一經與氣血虛同法治凡栝蔞射干山甲蟾酥連翹地丁牛蒡子金銀花木鱉之類皆內消之藥托裡凡癰疽血氣虛者則邪氣入深而散漫不能突起亦難潰膿或潰後膿少或膿清稀或堅硬不軟或根腳雖紅而膿不開大者皆氣血兩虛必用內托以補藥為君活血驅邪為臣辛香行滯為佐加溫藥以御虛寒亦有一二日便覺脈沉細而煩悶臟腑弱而皮寒恍惚不寧外證深沉者即當用托裡諸方採擇兼溫熱之劑從治之膿蝕瘡瘍穿破膿血潰出則重者亦覺輕可甚不得已乃用刀針若勢緩證輕以藥餌破之後有替針丸之類皆可用以咬頭出膿定痛經曰諸痛癢瘡瘍皆屬心火後有止痛諸方痛甚者必宜苦寒藥為主虛弱者補中益氣湯加苦寒藥量輕重用血熱者四物湯加牛蒡黃芩連翹在下加黃柏肥人加羌防荊芷大便秘加大黃諸藥中兼乳香沒藥痛可定矣惡肉去惡肉者腐肉也必宜去之推陳致新壯人自去老弱必取之不去則腐爛筋膜結成多骨有致大潰而死者用大補氣血藥收斂或可用手法去之或用雄黃輕粉敷之蠹肉努出或用遠志末酒調塗之又法息肉突出烏頭半兩醋三碗浸三周時洗之日夜三四次諸瘡胬肉如蛇突出數寸硫黃末敷之即落宿膿潰久蠹肉不腐亦用硫黃輕粉敷之四圍仍有腫焮處用毫針燒赤刺之約一米深紅腫即縮生肌潰後收斂遲速在氣血之盛衰也然龍竭乳沒赤石脂煅寒水石象皮水銀輕粉之類雖可收斂必宜內服參耆當歸白朮白芷之類以助之如色赤血熱不收四物加山梔連翹色白宜補托或潰後而根腳赤暈反開展不收宜大補十宣散去樸桂倍參耆當歸加金銀花白芷連翹犀角栝蔞根夏秋加三黃羌活破後不潰瘡口堅硬者風也蠹肉不腐者雄黃輕粉研勻敷之如癰疽腐爛及諸瘡毒滑石一兩雄黃五錢研細先洗淨敷上外以綿紙蓋覆未收再用生肌散之類避忌患諸毒者宜慎風寒謹口腹適起居減言動藥餌精潔飲食以時雖小愈尤宜絕戒房室犯之必不合口存細孔如簪腳津津水出而成漏累月經年不收多變小便澀數消渴消中等證致津液枯涸肌肉瘦削諸患而死可不慎歟又有發背之證腥穢尤其常有小蜈蚣潛入則大病大潰必至於死切宜置臥榻於室之中榻下縛雄雞數只得免此害凡血氣聞香則行得臭則逆且香氣入脾而醒脾進食患人臥處宜香氣忌穢氣食肉經曰膏粱之變足生大疔此言富貴人也日食厚味以助其陽不能走空竅以行陽道反行陰道則脾土濕氣大勝子能令母實則心火大熾火土既盛腎水虧傷濕熱上行必出於太陽膀胱之經為腦疽為發背等諸最重之證故患時不宜再食厚味以助宿積之蘊熱也若貧家則不然無過氣鬱而成蓋諸榖補陰諸肉補陽素不得榖肉之養再泥以諸毒戒肉何所賴以補益乎故不可一途而論也一貧士患發背無力買人參補藥日食肉餛飩而愈作渴附預防瘡瘍之證必因膏粱厚味或恚怒鬱結致毒火蘊蓄漸覺心煩躁熱口作大渴引飲不休食已即飢乃欲發癰疽之候當急服清火解毒之藥而預防之可免斯患如患後因膿水泄其津液亦至口渴不已無問初重潰後作渴竹葉黃耆湯脈數無力口乾補中益氣湯便秘清涼飲尺脈洪大按之無力用加減八味丸若口燥舌黃渴欲飲水此丸尤妙渴與口乾不同若用丹藥鎮墜禍不旋踵惟截嫩桑枝同五味子煎湯飲可以救陽水灸法隔蒜灸豆豉餅灸淨土灸瘡瘍用灸有回生之功一切癰毒發背初起赤熱腫痛可拔引鬱結滯氣及攻散沉凝留血必能取效老弱元氣虛寒者不灸必至敗亡先以濕紙覆其上立視紙先干處即癰頭也取蒜炙獨蒜猶佳切片如三文錢厚安瘡頭上用大艾炷灸之三壯換蒜痛者灸至不痛不痛灸至痛一二日十灸十愈二四日灸六七愈五六日灸三四愈十數日灸無功若有十數頭蒜研成餅聚艾灸之亦愈如瘡大日夜灸若有椒眼一二十逐眼灸之用蒜並淡豆豉乳香搗作餅灸尤效初起中有一黃粟米頭用獨蒜切去兩頭安瘡上灸十四壯多至四十九壯一人背疽逾月益甚艾加瘡上早灸至晚百五十壯知痛明日鑷去黑痂敷藥服藥即安如無蒜用豆豉搗作餅如俱無用淨土以眾人唾或加蔥汁或嗽口水和捏作餅大小依瘡厚一二分痛則加厚不大熱減薄一壯一換灸四十九壯以驗為度明灸明灸者著肉灸也患人勿畏痛楚而失之能耐一時之痛免多日之大痛苦也人年四十以上患發背等毒急宜早治為治之要莫過灼艾之功勝於用藥使毒氣外泄而有行散之力使熱氣內攻而有消逐之能則凝血滯氣由此而解矣若處鄉居僻境深山窮谷及遊宦行商舟車驛邸無醫藥之處尤宜行此灸法其效甚捷明灸之法亦施於陰毒頑木不痛惡瘡在陽證瘡瘍腫毒隔蒜可也最勝者獨蒜大顆切片三分厚次赤皮蒜搗爛作餅或切片古有豆豉椒薑鹽蔥相和搗爛捻餅灸法其硫黃灸豆豉餅灸淨土灸皆良法也取其便而用之初起攻散已潰接補陽氣如瘡不開大肉不敗壞瘡口易斂皆一灸之神力也灸後依次採取方法隨證而治之庶幾可云十全矣桑枝灸法發背不起或瘀肉不潰乃陽氣虛用桑枝燃火吹息稍近肉取其火氣灸患處片時日三五次助腫潰若已腐潰新肉生遲宜四畔灸之瘰癧流注臁瘡惡瘡久不愈者亦宜此法未潰解毒止痛消瘀已潰補氣散餘毒生肌肉陽證初起用此即出毒水內消日久用之雖潰亦淺大有神功勿以平易而賤忽之騎竹馬灸法治一切癰疽腫毒按諸項灸法皆好惟此尤能消患於未形諸師首取惜乎近世少用是不知其妙也其法令患人以肘憑几案豎臂腕腰直用篾一條自臂腕中曲紋盡處男左女右貼臂肉量起直至中指尖不連指甲用竹槓一條患人脫衣騎定身正直前行二人扛起令腳不著地使二人扶定勿令仰覆將量臂腕篾從竹槓坐處尾骶骨盡邊直豎竹槓上貼脊背量至篾盡為則用墨點記此只是取中非灸穴也另用薄篾量病人中指中節相去兩橫紋尖為則截為一寸就前所點記處兩邊各量開指篾盡處乃是灸處兩穴各灸五壯或七壯不可多灸不問癰生何處及乳癰並用此法灸之無不愈者如疽發身左灸左發身右灸右甚者左右皆灸蓋此二穴心脈所過經曰諸痛癢瘡瘍皆屬心火又云心主血心氣滯則血不行故逆於肉理而生癰灸此使心火調暢血脈流通即能奏效起死回生神燈照疽法雄黃硃砂血竭沒藥各一錢麝香等分共研摻綿紙十四條作燃潤麻油點照瘡毒離半寸自外而內周圍照藥氣熏毒令熱先三條起漸消用敷藥車前草豨薟草五龍草金銀花俱鮮者同搗細加陳年小粉飛鹽少許又搗如糊頻敷中留頭早可散遲略潰諸草缺鮮者取根或乾者為末加陳醋調內兼服敗毒散護心散活命飲十宣散尤效忌涼藥灸漏凡瘡瘍日久成漏者非止一端有因生於虛軟卑下之處其氣脈下行而難於收口或氣血虧傷遷延不收或患瘡毒未平復因犯房室成漏小孔出水不已漸成不救之患用大附子一個重一兩者氣足為末津唾調作餅如漏孔大三文錢厚用艾炷於餅上灸內服大劑十全大補湯助之至孔合為度如無附子用淡豆豉搗作薄餅灸或猶在穿潰時難於生肌疽毒根深水從內出用硫黃為末和入白麵以大蒜搗捻成餅如孔大厚三分艾灸勿令痛要令大熱至二十一壯每壯一換隔五日用翠云錠信效錠子以些許用入瘡口歹肉去好肉生次上生肌散內服大補托之藥針法瘡瘍用針為貴有肉已潰膿不出必宜針之惟審淺深若皮薄針深恐傷良肉肉厚針淺膿毒不出如先見血後見膿綿紙條捻塞口若附骨疽氣毒流注及其經久不消內潰者用針開之若治咽喉宜用三稜針及癰焮痛而四畔赤腫如灼用瓷鋒砭破皂角刺亦可毒破膿出重者即輕切勿見風癰若皮薄而多有椒眼蜂窠之狀膿血不出者用針橫直裂之凡瘡不起可托不膿可補膿成不出及時針之但不宜早如在虛處近筋骨未可針若畏痛而不針則誤矣恐傷良肉則惑矣瘡發於肉薄之處腫高寸許針入二分發背高三四寸針入寸許附骨疽同況患處肉已腐何痛之有怯弱人及附骨疽不破遷延日久膿變臭水而透內膜必致大潰而死火烙針法如附骨疽氣毒流注及其經久不消內潰不痛宜火針開之鐵箸一焙極為快意烙後膿水流通名曰熟瘡此法必用於日久頑木不痛者如用尖針恐口再合必如箸大頭圓長六七寸一樣兩枚捻時蘸香油於炭火上燒紅於瘡頭近下烙宜斜入向軟處一烙不透再烙必得膿水流出不假按抑須用真綿紙作捻折轉如索樣隨深淺入瘡口余紙分開瘡外貼膏藥焙直入恐透膜宜斜入之吸法諸毒初感用苦竹長一二寸用頭節妙削去青皮似紙薄為佳其大小隨瘡斟酌當毒瘡初發時用白蒺藜蒼朮厚朴烏桕皮各五錢銼片用水一碗藥與竹筒同煮以藥將干為度乘竹筒熱以手按之於患處須待其筒自黏在瘡上不必手按須臾用前藥分兩再煮候前竹筒冷以手拔去再將熱者如前法其膿自吸入筒中而瘡愈矣蔥熨法治瘡瘍腫毒癰疽及流注結核鶴膝風附骨疽等及婦人乳癰若先已用灼艾等法而余腫猶未消或輕者未經艾灼皆宜用此法以蔥連白頭根鬚搗爛炒熱勿畏痛楚須布包著實熨之必用二包輪轉炒熨痛者熨至不痛硬者熨揉至軟為度大抵此法必用於微覺之時且熨且揉必至於散而後已最有大功若跌撲傷損瘀血凝滯亦用此法更以南星草烏為末拌入爛蔥內熱熨尤為神效蔥與生薑搗炒布包熨傷寒結胸及男婦老幼一切食積氣滯胸膈滿脹痞悶大有功力頃刻見效溻漬法凡瘡腫諸毒無出氣血凝滯而然所謂熱則行冷則凝又云熱則流通寒則凝結必使熱氣攻之使腠理疏通經絡融暢誠至理也古人有此方焉其法以藥濃煎成汁如瘡在四肢則溻漬之在腰腹者則淋洗之下部者則蕩浴之仍以淨布蘸汁多淋患處冷則再熱日用十餘次夜亦不息乃效藥方見後圍法發表不遠熱敷圍亦發之意又云熱則行冷則凝不可一於寒涼當隨陰陽寒熱各適其宜如果極熱陽證清涼可用大都寒兼之若非極熱必從溫治如大涼非特氣血凝滯致令腠理閉塞而毒攻內矣如圍藥時但宜斂其根腳必不可當頭敷遏所謂避其來銳是也砭法治背癰等證及小兒丹毒腫赤遊走不定用細瓷器打碎取有鋒鋩者一塊以竹箸劈開頭寸許夾住瓷鋒用線扎定以兩指輕撮箸梢將鋒鋩對患處懸寸許再用箸擊之鋩刺其毒血出自愈若如是而痊者不可怠緩不然毒入心胞多致不救按心屬火毒亦火同氣相求故獨攻心刺法諸毒宜刺此穴在手大指內側去爪甲如韭葉刺三分許以手自按至刺處血出則消若重者及成膿者須再灸患處諸方法主方加減敗毒散治癰疽疔腫發背乳癰等證憎寒壯熱其狀似傷寒一二日至五日連進二三服重者輕輕者散諸毒首服羌活獨活柴胡前胡桔梗茯苓枳殼川芎金銀花連翹防風荊芥甘草節薄荷等分加生薑三片連須蔥頭三個水煎熱服厚蓋取汗出透徹可散毒在上食後在下食前諸藥皆然冬加麻黃升麻熱甚加黃芩連翹大便秘加大黃芒硝追風通聖散治癰疽發背腦疽流注腫毒壞病死肌弭患於未萌之前拔毒於既成之後順氣勻血扶植胃本並折傷疝氣血疝腳氣諸般瘡毒腫痛腰疼痰飲皆治當歸尾何首烏忌鐵木通去皮節赤芍藥白芷小茴香烏藥枳殼甘草等分水酒各一鍾照前煎服壯人去當歸腦疽發背去木通有痰加半夏風痰加桔梗生薑流注加川獨活傷寒變流注尚有熱邪加蘇葉升麻葛根頭痛加川芎發背已久涼藥太過去木通加厚朴陳皮甚者加白豆蔻腸癰宜十宣散與此間服加金銀花藤腫毒堅硬不穿加川芎獨活麻黃蔥頭出汗即穿折傷去木通加川芎陳皮經年腰痛加川萆薢玄胡索酒煎腳氣木瓜檳榔山果水煎濕痰流注遍身拘急喘咳腫硬不赤南星半夏真人活命飲治一切癰疽發背疔瘡腫毒不問陰陽虛實善惡赤腫大痛或不痛然當服於未潰之先與初潰之際毒已大潰勿服發痛惡毒甚者須一日夜服二三劑可消金銀花三錢穿山甲三大片火炙研細當歸尾陳皮各一錢半天花粉甘草節赤芍藥乳香另研白芷各一錢貝母防風各七錢沒藥另研皂角刺各五分好酒二鍾煎成充化乳香沒藥上身食後服下身食前服渣再煎多飲酒蓋汗出為度在背倍皂角刺胸加栝蔞仁腹倍白芷手足倍金銀花老弱病後加參耆疔瘡加紫花地丁發背惡毒初起每帖調化牛黃二分服大效托裡消毒飲一切癰疽六七日服此未成即消已成即潰能壯氣血固脾胃使毒氣不內攻膿易出肌易生膿未盡切忌生肌藥收口早必復內攻金銀花三錢黃耆鹽水炒天粉各二錢防風當歸川芎皂角刺穿山甲炒研厚朴姜炒桔梗白芷各二錢陳皮三錢水酒煎服一方用參苓朮翹去枳樸粉風托裡十宣散治癰疽疔瘡發背未成膿猶可散已成速潰膿出切勿手擠惡肉自去不必用針此藥用於前藥之後八九日間人參黃耆蜜炒當歸酒各一錢川芎防風桔梗白芷厚朴薄桂甘草生各一錢上為細末每服三錢黃酒調下不飲酒木香湯調下煎亦可癰疽腫毒倍白芷不腫痛倍官桂不食加砂仁香附痛甚加乳香沒藥水不幹知母貝母不破皂刺咳陳皮杏仁生薑大便秘大黃枳殼小便澀麥冬車前木通燈心十六味流氣飲流注因一切恚怒氣結腫硬作痛或胸膈痞滿風寒濕毒血氣不和結成腫塊肉色不變或漫腫無頭婦人乳中結核恐成乳癌人參桔梗當歸官桂甘草炙黃耆炙厚朴防風紫蘇芍藥烏藥枳殼檳榔木香川芎白芷各五分水煎食遠服五香連翹湯諸瘡初覺一二日便厥逆咽喉閉塞發寒熱些小寒熱不可輕用連翹升麻獨活甘草炙桑寄生木通黃耆各等分大便秘加大黃上為末每五錢水煎沉香木香丁香乳香為末麝調服取利當歸黃耆湯瘡瘍臟腑已行如痛不可忍宜和榮衛當歸黃耆生地地骨皮川芎芍藥等分熱加黃芩不臥加梔子嘔乃濕氣侵胃加白朮水煎服內疏黃連湯瘡毒腫熱作嘔大便秘煩躁飲冷心煩脈實邪在臟宜服此疏通之黃連梔子當歸芍藥木香檳榔黃芩薄荷桔梗連翹大黃甘草各一錢上水煎服黃耆竹葉湯癰疽氣血虛胃火盛而作渴乾嘔淡竹葉生地各二錢麥門冬當歸川芎黃芩芍藥人參半夏軟石膏煅黃耆加甘草各一錢水煎服內托復煎散腫焮於外根盤不深形證在表脈浮痛在皮肉此因邪甚宜急服救里防風地骨皮黃耆芍藥黃芩白朮人參茯苓當歸防風甘草各五錢桂二錢上咀先將蒼朮半斤水五升煎四升去蒼朮入前藥煎至四盞作四次終日服完又煎蒼渣復煎前藥未效再半料大便秘煩熱再少服黃連湯奪命丹惡瘡腦疽發背等諸熱毒大黃牡蠣各一兩研乳香五錢沒藥五錢上分二服加生薑好酒一碗熬數沸去渣調入乳沒露一宿空心溫服護心散一日至三日連進數服內托不透膜雖甚無妨透膜者死真綠豆粉一兩明乳香半兩慢火瓦上出汗研末上研每服三錢濃煎甘草汁調下時時細呷要藥在心膈若毒衝心嘔逆宜多服或因受寒嘔另用溫藥止嘔陰毒冷證及老弱非因丹石致病三日外皆不宜服人參養榮湯潰瘍發熱倦怠黃瘦少食氣血不足不能收口黃耆天粉陳皮當歸皂角刺厚朴穿山甲桔梗防風熟地黃五味子桂心遠志肉甘草煮剝各等分上加薑棗水煎服定痛托裡散定諸腫毒瘡痛聖藥當歸白芍各五分肉桂乳香沒藥俱出汗研各一錢粟殼去蒂二錢上水煎服內托黃耆湯潰瘍作痛少睡口乾人參白朮茯苓當歸川芎白芍生地甘草黃耆麥冬遠志官桂各等分上加薑棗水煎服乳香定痛散乳香沒藥各二錢寒水石煅滑石各四錢冰片一分上為細末諸痛不可忍者敷上患處寒熱痛皆止獨聖散諸癰疽發背因氣滯血凝或因鬱怒所致服此非膏粱人香附子打碎去毛生薑汁醃一宿曬焙上為末每三錢白湯送下若非鬱怒切不可服服反增甚千金托裡散一切癰疽發背疔瘡黃耆一兩半川芎白芷芍藥官桂甘草節人參各一兩厚朴防風桔梗連翹各二兩當歸五錢木香乳香沒藥各二錢上為末每服三錢酒一大盞煎二三沸和渣熱服托裡消毒散胃氣虛弱或因克伐不能潰散服此無膿可消有膿即潰去腐生新人參黃耆鹽水拌炒當歸酒拌白芍酒炒白茯苓川芎白朮炒各一錢金銀花白芷各七分甘草炙五分連翹五分水煎服高腫焮痛加黃連漫腫微痛去銀花連翹倍參術頭痛加羌活川芎渴煩大便秘去參朮耆歸加大黃針頭散一切頑瘡瘀肉不化癧根不消潰久成管兼托裡藥赤石脂白丁香沉香各二錢黃丹飛人言各一錢輕粉麝香各五分蜈蚣一條炙上末搽瘀肉等瘡口小或腐管用蠟和成條紝之托裡養榮湯瘰癧流注