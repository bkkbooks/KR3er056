body:
  text: 卷之七婦科總論夫天地造端乎夫婦乾坤配合於陰陽雖清濁動靜之不同而成象效法之有類原茲婦人之病如風寒暑濕燥火六氣之外侵喜怒憂思悲恐驚七情之內擾與夫飲食勞役諸患悉與男子同法治理其不同者三焉一婦人氣習偏僻執滯難移情志抑遏不舒心思鬱結不暢丹溪所謂婦人之病因於郁者十常八九富貴貧賤皆有之何也蓋貪戀慈愛妒嫉憂忌八者之中一有所染則蒂固根深堅牢不破是以有郁也故多胸滿痞膈脅脹腹膨諸證醫難豁然快效此性質之不同也二婦人常多諱疾之弊雖問之未必盡吐若豪貴之婦深居奧室之中覆護幃幔之內不可望色聞聲則治病之法闕其二焉黃帝曰凡治病察其形氣色澤形氣相得謂之可治色澤已孚謂之易已形氣相失謂之難治色夭不澤謂之難已又曰診病之道觀人勇怯骨肉皮膚能知其虛實以為診法若婦人脈病不相應既不見其形醫惟據脈供藥或未得其病情欲究感受根源不免瑣屑繁問逮為醫學不精故耳往往得藥反不深加敬信可謂最難此治療之不同也三婦人之病多於男子者經脈愆期淋帶崩漏孕育胎産乳陰諸患及妊娠所挾之證此為病之不同也故診視用藥之際難於調理古人云寧醫十男子莫醫一婦人斯言誠然也脈經曰寸口脈微而澀微則衛氣不足其息短其形燥澀則榮氣不足其形逆榮衛俱虛言語乏力微弱而澀少年無子中年絶産六脈沉弦細澀急數皆病脈婦人之病氣多血少而成治法以理氣養血為主主方香附子打細行氣生用內熱童便鬱氣醋炒三錢當歸二錢地黃有熱用生補血用熟白芍藥涼血用生補血酒炒各一錢半川芎一錢水煎空心服調和氣血加烏藥砂仁丸服亦可胸膈鬱悶不寬減地黃加陳皮茯苓枳殼蘇梗蒼朮甚者加木香砂仁厚朴蘿蔔子氣滯加烏藥三稜蓬朮腹痛加赤芍藥胃脘痛加玄胡五靈脂草豆蔻食不消山楂神麯麥芽痰加陳皮半夏茯苓貝母風加防風羌活風濕痛秦艽遍身痛蒼朮羌活酒芩嘔吐陳皮半夏茯苓藿香生薑炒黃連胃虛加白朮熱嘔黃連姜炒血虛頭眩體倦懶言動加人參黃耆白朮炙草自汗黃耆盜汗加酸棗仁炒研浮小麥有熱心煩加梔子黃連陰虛內熱手足心熱口燥咽乾加麥冬知母地骨皮黃柏鹽水炒骨蒸勞熱胡黃連銀柴胡青蒿鱉甲醋炙打細口渴麥冬五味子天花粉烏梅煩渴喜冷石膏知母心氣虛丹參人參神不安茯神遠志麥冬棗仁柏子仁金與銀同煎調硃砂水飛服不寐黃連酸棗仁炒香熟研炙甘草虛弱干嗽減香附川芎加天麥冬百部百合冬花紫菀上焦風熱黃芩黃連梔子玄參薄荷風痰眩運加天麻荊芥秦艽羌活子宮閉冷不孕乾薑肉桂蘄艾醋煮赤白帶下臭椿根皮牡蠣火煅醋淬赤石脂烏梅血積成塊加三稜蓬朮官桂乾漆炒蘇木紅花丸服艾附女珍丸治婦人氣盛血衰經期不準或前或後紫淡多少赤白帶下崩漏淋瀝面黃肌瘦四肢無力倦怠嗜臥精神短少目暗耳鳴頭眩懶言五心煩熱咽乾口燥夜寐不安等證並皆治之香附五兩分四份一童便一米醋一人乳一鹽酒浸蘄艾醋煮當歸各二兩川芎白芍熟地黃酒蒸黃芩條各兩半阿膠酒蒸臭椿根皮各一兩上為末搗地黃阿膠酒蒸和勻加醋糊丸如桐子大每百丸空心米湯下八珍益母丸治氣血兩虛脾胃並弱飲食少思四肢無力月經違期或先期而至或腰疼腹脹愆期不收赤白帶下身作寒熱服之罔不獲效一月之後即可受胎虛甚者用藥一斤必能對期受孕益母草四兩不見鐵器止用上半截帶葉者人參去蘆白朮土炒茯苓去皮各兩半炙甘草去皮一兩當歸酒洗白芍藥醋炒川芎熟地酒洗各二兩上為末蜂蜜和丸如彈子大空心蜜湯下一丸或丸如小豆大每服七十丸脾胃虛寒者加砂仁一兩姜炒胸滿加山楂肉一兩多氣鬱加香附子二兩童便制丹參散補新血破瘀血安生胎下死胎止崩帶調經脈逐産後惡血治冷熱勞腰脊痛骨節煩疼與四物湯同功丹參酒洗淨切上為末每服二錢空心溫酒調下艾附暖宮丸治經水不調小腹時痛赤白帶下子宮虛寒香附一斤四兩醋浸四兩酒浸四兩童便浸四兩人乳浸如無人乳鹽酒浸夏一日春秋二日冬三日曬乾當歸二兩蘄艾四兩醋煮川芎白芍酒炒熟地黃薑製玄胡各二兩甘草八錢上為末醋糊和丸如桐子大每服百丸空心米湯下或酒下全元百補丸婦女勞傷氣血陰陽不和乍寒乍熱心腹疼痛少食乏力香附一斤四製法如前當歸六兩川芎熟地各四兩茯苓玄胡索各二兩白朮四兩甘草炙一兩益母草葉八兩端五日採佳上為末蜜丸桐子大每七十丸空心砂仁湯下醋湯酒滾水任下四物益母丸婦人經水不調小腹有塊久服痊愈且有孕當歸熟地各四兩益母草勿見鐵香附子制各半斤白芍藥炒川芎吳萸各二兩為末蜜丸彈子大每一丸空心酒下作小丸服亦可十全大補湯治氣血兩虛肢體無力脾胃怯弱飲食少思一切虛羸之證並效四君子四物湯加黃耆肉桂方見虛損調經附經閉岐伯曰女子二七而天癸至任脈通太衝脈盛月事以時下則有子蓋任主胞胎通以陰道之泰也沖為血海盛則氣血俱盛也婦人稟陰柔之體以血為主陰血充足腎氣全盛衝任周流如月之虧盈應期行止而有常度日調遇交合則有子矣否則三五錯綜皆所謂不調也不調則百病變生甚至不治孕暇言乎經曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治況心屬陽而主血脾裹血以行氣若月經不通未必不由心事不足思慮傷脾適有勞役穀氣不輸肺金失養腎水無滋經血津液日以枯涸以致三五不調漸至閉絶虛損內熱骨蒸勞瘵之證作則卒難於治也有稟賦薄弱自幼尫羸多病或飲食不節起居不常性情急暴素多忿怒或生而明敏性質聰慧用心太過精神耗損或行經時手掬水漿口食生冷留阻敗血或婦人有犯房室血去不淨皆致後期小腹作痛經未行而先疼既來而斷續漸成崩漏淋瀝之證孕育不成或憂愁鬱結纍月經年不能發越稍不治理致氣滯血凝蓋陽氣之虛實寒熱升降通塞而陰血悉隨之以消長行止也為癥瘕癖塊血枯經閉變患無涯豈勝枚舉無非經愆之所致矣婦人乏孕多服種子肇娠之餌而不專於調經是不揣其本而齊其末也調經之要莫先於益血滋陰益血之道必先補心健脾所謂寧其心則血生實其脾則血足又曰養心則血生健脾則氣布二者胥和則氣暢血行而調經之要斯其至矣蓋婦人調理急務莫甚於此能經前無閉阻腹痛之患經後無遷延斷續之尤亦無遲速之愆期不致紫淡之異色何患胎孕之不受哉凡欲孕之脈宜六部和而帶滑忌微弱遲澀微則無精弱為榮虛遲是陰中寒澀乃血不流而經閉或三月一來此謂居經少年脈微氣血兩虛治宜補血為主主方當歸二錢白芍藥生地各一錢半川芎一錢吳茱萸七分上水煎服加吳茱萸者恐芍藥酸寒地黃涼滯素有熱者去之或但以芍藥酒炒生地薑製則無害於脾胃也經水不及期而來者血虛有熱也加黃連條芩香附醋炒各一錢黃柏知母炒各五分蘄艾醋煮甘草各三分水煎成化入阿膠一錢服經水過期不行或腹痛者血少有寒或氣滯也去生地加熟地香附蓬朮蘇木各一錢木通八分肉桂五分桃仁去皮尖十個研紅花三分肥人多痰色淡加蒼朮制南星半夏制陳皮海石貝母各八分瘦人多火加黃芩白朮過期倍當歸芍藥少佐桃仁紅花經水閉絶不通者血枯也倍當歸加桃仁紅花牛膝熱加黃芩寒加肉桂經阻發腫者瘀血入脾也加丹皮乾薑香附厚朴玄胡枳殼木香經阻腹脅有塊者加砂仁木香小茴香枳實厚朴玄胡香附牛膝過期色淡挾虛有痰宜活血化痰本方倍當歸合二陳加蒼朮過期紫黑成塊者氣鬱血滯也加桃仁紅花青皮玄胡丹皮香附蓬朮將來腹痛者氣滯血實也加香附桃仁紅花青皮玄胡索牡丹皮木香五靈脂痛甚者加蓬朮烏藥酒煮大黃有熱加柴胡黃芩經後作痛者氣血兩虛也倍當歸合四君子湯寒加黃耆乾薑肉桂肥胖體盛月經不通或三月一行者由痰多軀脂滿礙合二陳湯加南星枳實蒼朮白朮黃連香附瘦弱體虛月經不調不能成孕乃陰虛少血倍當歸加熟地丹參兼補氣加人參白朮黃耆茯苓經水過多日久不止將成血崩加白朮條芩白茯苓山梔地榆香附童便炒蒲黃荊芥並炒焦黑水煎化入阿膠一錢不止磨入京墨茅草根汁久不止發腫滿者脾敗血虛也加茯苓白朮砂仁大腹皮陳皮木香厚朴蘇子炒研豬苓木通香附子蘿蔔子炒研經行著怒氣心腹腰脅痛乃瘀血也加桃仁紅花玄胡索蓬朮青皮錯經妄行出於口鼻乃火載血上氣之亂也加條芩山梔丹皮犀角阿膠麥冬黃連大薊鬱金焦荊芥焦蒲黃山茶花水煎成和入藕節汁童便茅根汁甚者加薑汁二匙從治磨京墨發灰服經行身痛麻痹寒熱頭疼乃觸經感冒也加羌活白芷蒼朮防風紫蘇香附調經至寶湯理赤白帶下崩漏淋瀝惡寒發熱口渴腹痛小腹急疼五心煩熱久不成孕當歸三錢白芍藥酒炒熟地黃川芎各二錢人參吳茱萸炒丹皮半夏制阿膠各一錢麥冬一錢五分肉桂五分加薑棗煎服大補調經湯治婦人氣血虛損血海虛寒經水不調或心腹作痛帶下淋瀝面黃肢瘦頭眩肌羸虛證悉皆療之當歸熟地黃白芍藥川芎各二錢香附制白朮茯苓黃耆蜜炒阿膠各一錢人參砂仁吳茱萸炒陳皮小茴香玄胡各五分肉桂炙草各三分薑棗煎服婦寶調經湯治經期不準或前或後紫淡不同多少不等當歸二錢熟地黃白芍藥川芎各一錢半香附一錢二分大腹皮吳萸紫金皮肉蓯蓉洗淨條芩各一錢甘草五分薑棗煎經時服丹桂散治氣血虛損內則經閉不行外則肢髓羸瘦潮熱漸成骨蒸丹皮桂心蓬莪朮京三稜玄胡炒各八分當歸酒洗錢半陳皮去白赤芍藥甘草各五分乾漆炒沒藥紅花蘇木各四分鬼箭三分烏藥一錢上水盞半煎八分不拘時服理氣調榮湯治室女氣血不和致生諸病香附醋炒當歸各二錢川芎白芍酒炒生地各一錢半烏藥陳皮砂仁研細茯苓各一錢甘草三分薑棗煎空心服作丸亦可調經八物丸養血調經除赤白帶久服如期自然成孕白朮熟地黃酒蒸當歸各二兩川芎鹽湯浸切白芍各兩半白茯苓條芩酒炒陳皮鹽水拌炒玄胡索丹皮各一兩上為末蜜丸如桐子大每服百丸空心淡鹽湯下寒月酒下鎮經湯經水先期而來過多不止蓋因腎損陰虛不能鎮守待時相火助行故也當歸錢半白芍藥生地黃黃柏各七分阿膠條黃芩知母甘草川芎各五分香附子制黃連姜各八分白芷三分上水盞半煎七分空心服活血通經散氣虛留滯瘀血不行過期斷續時作腹痛漸至閉絶白芷肉桂各一兩半劉寄奴取穗赤芍各五兩凌霄花蘇木紅花牛膝土者尤可甘草香附各二兩木通桃仁各一兩上為末每服三錢空心熱好酒下午晚再服未效紅花酒下樗白固經丸經水過多不止及赤白帶下崩漏淋瀝龜板炙臭椿根皮黃芩條各一兩白芍藥七錢香附醋炒黃柏各二錢半上為末醋糊丸桐子大每服七十丸空心烏梅或醋湯下經閉婦女經閉之證始因憂愁怒氣鬱結不舒抑遏成火致成五心煩熱咽乾口渴大便祕結小便短赤諸證經水參前或一月兩至妄行去多皆火逼之也血既去多又因內熱耗涸遂至二三月一行即閉之漸也則寒熱煩躁盜汗咳嗽飲食進少不食雖嘈食已難化胸膈痞悶等證乃至腹中結塊或動或痛似孕非孕乃血枯經閉俗謂乾血勞是也此際神丹莫療大培陰血寧心理脾不致陰陽失度氣血乖離望生十一再與香附桂枝三稜蓬朮砂仁豆蔻蘿蔔子烏藥玄胡桃仁紅花強逼其行是速其死也脈必細數急澀主方當歸三錢芍藥生地各二錢白朮白茯苓麥冬牡丹皮地骨皮丹參穀芽各一錢陳皮五分上加蓮子七枚姜一片棗一枚水煎早晚服肺虛加沙參天門冬痰中見血加側柏葉及止血藥夜熱加知母柴胡梢煩躁口渴加炒山梔倍麥冬脅下脹疼加青皮川芎胸膈滿悶加黃連姜炒枳實桔梗去麥門冬地骨盜汗加黃連黃耆去柴胡桔梗大便悶結加桃仁倍當歸咳嗽不已加栝蔞阿膠沙參頭眩頭痛加天麻川芎小水不利加木通茯苓煩渴不利加滑石倍麥冬之類隨證加減簡便方桃仁七個去皮研如泥大黃末七分斑蝥三個糯米炒上為末酒糊丸桐子大每服七丸酒下血枯經閉四物湯送下或單桃仁搗為丸服廣嗣易曰天地絪縕萬物化醇男女媾精萬物化生又曰陰陽合德而剛柔有體正所謂獨陽不生獨陰不成是也蓋人之夫婦猶天地然天地之道陰陽和而萬物育夫婦之道陰陽和而男女生苟或父精母血一有不及而謂有胎孕者未之見也是故欲求子者必先審其婦之月經調否經者常也如月月應期而來按期而止無易常也故曰月經經或不調先後頻閉紫淡多少而致赤白帶下崩漏淋瀝兼以夜熱諸證斷不成孕雖得成孕半産墮胎坐蓐不育或兒致疾苦常有之矣此所以論經血之病也更有三因之雜證必宜調之若六淫外侵七情內擾及不內外因則起居作勞飲食失節諸證尤當療於經血之前如氣體不充榮衛虛弱則風冷乘虛而干之或受於經絡或循於腸腹或致脾胃不和則不能司消運之令飲食必減生化之道有虧則四臟百骸失養故榮衛凝滯肌膚黃燥面不光澤或兼大腸氣虛則為泄瀉不利若流入關元致絶子嗣隨有所傷臟腑悉能致疾此舉一外感風冷而言也其如暑濕燥火內傷諸患皆類此而推之矣經曰婦人三十六病皆因六邪外傷七情內郁加以勞役等因是故衝任之脈為十二經之會海故婦人之病皆見於少陰太陽之經而致焉能先愈其病將攝順理則榮衛充足腠理固密何六邪之襲乎氣血和暢性靜神怡何七情之擾乎若此則陰陽沖葉而經調經既調而服以肇妊之丸引以種子之法則自然受孕無惑矣及夫男子之病亦當詳審如或精氣不足子嗣難成有腎虛精滑精少精清或臨事痿弱或盜汗精遺便濁腰憊好色陰虛等證皆致精髓虧損更有男子不誠實謹守妄作外淫又不足言也欲求嗣者必至夫婦無病一一謹節血盈精足何難誕育乎如服藥必宜久久滋培不可斷續致腎氣充足精髓盈滿子生藥止主方男服五方肉蓯蓉一個重斤許實者酒洗竹刀刮去浮鱗淨曬乾八兩餘同五味子搗成膏擦藥末曬磨細五味子遼者紫色肥潤去梗淨六兩懷地黃極大者酒煮蒸熟搗膏山茱萸肉人參明大枸杞子甘州佳鹿角膠懷山藥菟絲餅制當歸身各四兩巴戟肉遠志肉茯神杜仲姜炒牛膝益智仁覆盆子蛇床子淘取堅實者酒浸各二兩鹿茸一對法煮附子一枚制熟上依法制成除蓉味膠茸地外共為細末入蓉味地膏擦勻重曬磨末次制茸將鹿膠酒蒸化膠茸和添煉蜜和丸如桐子大每服九十丸空心鹽酒或鹽湯送下金水生時日三服精不固加蓮蕊芡實龍骨牡蠣法制巨勝子丸又名延壽丹左尺脈微而弱陽虛不舉宜服胡麻逐粒揀酒拌九蒸九曬白茯苓何首烏拌黑豆九蒸九曬牛膝熟地四兩生地肉蓯蓉酒洗菟絲子制餅天門冬枸杞子天雄制柏子仁酸棗仁破故紙北五味巴戟天韭子山藥楮實子川續斷各一兩芡實肉覆盆子川椒去目及合口者胡蘆巴蓮蕊各五錢南木香二錢五分上為末煉蜜丸如桐子大每服七十丸空心酒下食物壓之滋陰大補丸腎脈微弱陰陽兩虛與虎潛丸方見虛損相間服之所謂補陰和陽生益精血潤澤肌膚強筋骨性不寒不熱有效牛膝山藥各一兩半杜仲薑汁炒斷絲巴戟去心肉蓯蓉酒洗去甲眼乾搗入茴香炒白茯苓五味子遠志甘草湯泡透取肉枸杞子各五錢熟地黃二兩上為細末煉蜜和紅棗肉丸如梧桐子大每服七十丸空心酒下或淡鹽湯送下五子衍宗丸男子服此藥添精補髓疏利腎氣不問下焦虛實寒熱服之自能平祕獨稱古今第一名方有世服此藥子孫蕃衍遂成村落之說故名衍宗甘州枸杞子菟絲子各八兩酒煮搗作餅曬乾北五味子車前子各二兩微炒研覆盆子四兩酒洗淨上為末煉蜜和丸如桐子大空心服九十丸臨臥服五十丸白沸湯送下修合日春取丙丁巳午夏取戊己辰戌丑未秋取壬癸亥子冬取甲乙寅卯補陰丸左尺脈浮洪大虛此藥固精元滋陰降火壯水益腎黃柏知母俱鹽酒炒各半斤熟地黃三兩白芍藥炒川牛膝炒陳皮瑣陽當歸各兩半龜板酥炙四兩虎脛骨兩半冬加乾薑五錢為末酒煮羊肉爛搗和丸桐子大每五十丸空心鹽酒下或鹽湯送下主方女服十方杜仲姜炒桂心防風秦艽厚朴各五錢人參一兩白茯苓細辛白薇沙參牛膝乾薑炮半夏制各一兩五錢附子一個麵裹煨去皮臍上為末煉蜜丸如桐子大每服五十丸空心米湯或酒下覺有孕止服墨香丸婦人久無孕育月經不調及數月墮胎半産甚效香附米一斤分四制酒醋童便米泔各浸一周時曬乾用蘄艾去梗四兩好醋數碗煮乾搗成餅曬燥上品青煙墨一兩煅煙盡醋淬研細入藥當歸川芎人參熟地黃酒拌飯上蒸白茯苓木香各一兩上為末糊丸如桐子大每服六十丸空心溫酒或醋湯下滋血暖宮丸一名百子附歸丸陰陽不和氣血不足服此藥無不孕者香附十二兩如前四制當歸酒洗川芎白芍藥酒炒熟地黃酒洗真阿膠酒蒸化和入艾葉醋煮曬乾各二兩白朮二兩澤蘭葉二兩甘草酒炒一兩上為末醋糊丸桐子大每服百丸空心醋點湯下食物壓之濟陰丸婦人血虛挾火子宮乾澀不能攝精久無子服此滋陰養血有孕當歸熟地黃生地黃川芎芍藥各二兩香附八兩法制人參八錢肉桂七錢黃芩一兩上為末蜜丸桐子大食前米湯或酒下五十丸妙應丸婦人氣虛痰盛滿溢子宮不能受精肥胖婦人無子服此效人參黃耆蜜炙白朮土炒地黃酒洗陳皮去白半夏制當歸酒洗茯苓蒼朮米泔水浸酒炒各一兩滑石炙草各七錢上為末糊丸桐子大每服五十丸空心薑湯下加味養榮丸此藥能助婦人速孕且無小産之患熟地當歸酒洗白朮各三兩白芍藥川芎黃芩炒各兩半人參茯苓香附子陳皮去白麥門冬知母各一兩阿膠蒸化和七錢炙甘草五錢黑豆四十九粒炒去殼上為末煉蜜丸如桐子大每服八十丸食前溫酒或鹽湯下忌食諸血勝金丸婦人久虛無子及胎前産後一切病患此藥能安胎催生妊娠臨月服數丸産時痛減亢治積年麻痹半身不遂赤白帶崩淋月閉婦人諸病新久皆效男子下虛無力並治之當歸酒洗芍藥川芎人參白朮炒白茯苓白芷炙甘草白薇酒洗牡丹皮玄胡索桂心妊後微炒藁本沒藥一兩除石脂沒藥二味另研外余皆一處磨羅香附子醋浸三日炒曬乾為末十五兩上末煉蜜和丸如彈子大瓷瓶藏空心溫酒化下受孕及産後三日一丸醋湯下猶妙加赤石脂俱各一兩續嗣降生丹凡婦人稟受氣弱胎臟虛寒服必孕當歸酒洗桂心烏藥天台者秦艽杜仲炒斷絲吳茱萸龍骨益智仁茯神各一兩防風石菖蒲去毛細辛桔梗半夏制川牛膝酒浸白芍各五錢乾薑一兩五錢半生半煨川椒一兩去目附子一枚臍開竅入硃砂末一錢濕紙裹煨牡蠣大者童便浸四十九日五日一換取出用硫黃半兩為末酒浸塗遍皮紙包醋浸濕鹽泥固厚待乾炭火煅紅以二兩研細入藥上為末留附子內硃砂為衣酒調米粉糊和丸如桐子大每服三十丸漸加至七十丸空心淡醋湯或酒鹽湯任下芡實粥健脾土生萬物精氣神皆盛多子神效老服愈健芡實一升淨白粱米三合蓮肉泡去皮心薏苡仁鮮者山藥末各一合共為末和白糖四兩研勻每日早調數盞服以代早粥壬子丸此藥要壬日修合白芨白蘞吳茱萸白茯神各一兩牛膝細辛菖蒲白附子桂心各五錢厚朴人參當歸各四兩乳香二兩沒藥三兩上為末蜜丸豆大每服十丸空心溫酒下交感黃帝曰婦人有徹老不生男女何也曰因多房事損動臟腑或天癸不通子宮挾寒或男子事狂陽弱精少清寒不能射又不既濟而相接此所以不生也或有正生産斷六七年數歲不生何也亦由女人有上數疾勞損身體以致經脈不調雖有亦微弱難以容納陽精也且夫婦之道交合以時生子必壯聰慧永壽古人有圖擇生男之月而王隱君謂春取甲乙日夏丙丁秋庚辛冬壬癸四季月後各十八日取戊己為旺相日及天月二德諸吉日論時則取婦人經行適當三十時訣云三十時辰兩日半二十八九君須算落紅滿地是佳期金水過時空霍亂霍亂之時枉費工樹頭樹底覓殘紅但解花開能結子何愁丹桂不成叢此云婦人月經方止金水初生時子宮正開乃受精結胎之候妙合太和之際宜以人事副之庶不失造化之理也過此佳期則子宮閉而不受胎矣然婦人經水耒時有兩日半淨者有三五七日淨者惟以敗血去盡新血初生但以潔白布帛拭之如鮮紅者未盡也淺淡者太過也看新血如金色者正當時也交合無不成孕更宜淨後一三五日成男雙日成女宜子時後得遇天月二德及諸吉辰不近穢汙擇淨潔之處則有福德善慧靈光托化得子必神氣清秀聰慧勝人又云男子施精向左女子屈左足而左側臥成男胎成之後不宜連續交合最宜安靜調養乃保彌月而誕生福壽之子嗣矣或曰女子受孕此常道也何苦是之難乎曰大矣哉人之有生也其陰陽造化之妙乎夫陰陽生生不息之德其在於物則本乎乾坤其在於人則根乎精血是故雖有道體之妙而實遇修用之機自其常而觀之則愚夫愚婦無不知也自其變而言之雖博綜之士亦有所不能焉是故體則陰陽精血用則陰陽配合也精血盈足配合中時此其常也及其變也當忝所以變之理達人君子可不於有變之際而加意焉子嗣之求研究聖賢之蘊以贊化育之機者也世之人知所以用則螽斯兆於此矣錫祚永之胤終大地之功豈小補云俗有男子精氣未足女子經脈未通而成合羊扇之體男子有成勞怯女子多成崩淋雖不能如古人男子三十女子二十為父母者必待男成冠納室女及笄于歸自成孕育分娩無虞蕃衍胤嗣更何病之有哉婦人不孕不可概謂子宮虛寒冷閉而通用溫熱之藥有體瘦而多氣鬱全是內火煎熬陰血津液枯涸但宜滋陰養血兼以清熱乃效若全用溫熱之藥則陰血愈虧非惟無孕變生他病禍不旋踵矣脈法沉澀氣鬱洪數內火微遲虛寒微弱細澀氣血兩虛少年無孕中年絶産六脈相停滑而和乃成孕主方男服秋石四兩鹿角霜四兩人參枸杞子甘州山茱萸肉麥冬天門冬杜仲姜炒斷絲生地黃熟地黃酒蒸各二兩上為末老米粉作糊丸桐子大每服五十丸空心白湯下一月後候女子月經過金水正生時男子空心服車前子湯半盞夜交合得孕隨時更以前方參酌修合兼服主方女服香附子一斤四制春秋三夏二冬七日曬乾為末篩去頭末取中末半斤用當歸酒浸白朮土炒各三兩川芎白芍藥熟地黃生地黃阿膠丹皮黃芩炒益母草柴胡臭椿根白皮各二兩上末醋糊丸桐子大每六十丸空心淡醋湯下乾物壓之妊娠附轉男驗胎法驗男女半産惡阻漏胎鬼胎妊娠藥忌妊娠食忌帝曰人有重身九月而喑此何為也岐伯對曰胞之絡脈絶也胳絡者繫於腎少陰之脈貫腎系舌本故不能言當十月而復十月胎産胞絡復通不治而語音自出也又曰婦人重身毒之奈何岐伯對曰有故無殞亦無殞也衰其大半而已蓋妊婦有疾不可不投藥也必在醫者審度疾勢輕重量度藥性高下處以中庸不必多品視其疾勢已衰藥宜止服則病去母安子亦無損復何懼於攻治哉夫妊娠受孕之始其說見於古書一月名始胎二月名始膏三月名始胚血不流行形象始化未有定儀見物而變母宜見賢良貴人欲男操弓矢玩美玉觀孔雀四月始受水精以成血脈五月始受火精以成其氣六月始受金精以成其筋七月始受木精以成其骨八月始受土精以成其膚九月始受石精以成其毛髮十月五臟六腑關節人神皆備古人胎教之法寢不側坐不偏立不蹕不食邪味動止端嚴情性和悅常處靜室多聽美言聆人講讀詩書陳禮說樂耳不聽淫聲目不視惡色如此則生子形容端正才力過人忠孝賢達智慧聰明此所謂因外象而內感也最宜淨房幃兒不受淫人之毒無危惡之痘疹尤免半産墮胎之憂不慮臨盆橫逆之害母受驚恐兒有胎驚諸證母食熱毒兒成胎熱㾩賴瘡瘍母受風冷兒致胎寒嘔泄諸尤兒生月內諸患皆母懷娠之失調也孕婦若發動喜怒憂悲感風寒暑濕及多沐浴掬冷水妄作勞輕舉動受胎之後身體不安而腰痠腹痛甚至下墜及身熱倦怠少食吐嘔胸膈滿悶至於行動少力等證皆由氣血兩虧無所榮養而使然也有懷孕而仍行經者名盛胎血盛故也有逾月不産十二三至二十四五月生者亦有之由氣血不足故也惟宜服大補氣血藥有貴人多在十一二月生主方白朮黃芩條當歸香附醋炒生地各二錢川芎白芍藥各一錢上水煎服胎痛加紫蘇胎動砂仁一錢調服胎漏加牡蠣醋煅一錢桑寄生一錢房室動加阿膠一錢服安胎飲妊娠胎氣不安腰腹微痛飲食少進白朮條芩當歸各一錢半白芍藥酒炒熟地各一錢人參川芎陳皮各五分砂仁甘草紫蘇各三分上水煎服下血加阿膠甚加艾葉腹痛倍芍藥腰痛杜仲枸杞保胎丸三月胎墮氣血不足中衝脈傷宜戒怒少勞節飲食香附子四製法見前當歸身條芩無熱減半白朮熟地各四兩川芎白芍藥艾葉醋煮阿膠酒蒸川續斷益母草陳皮砂仁各一兩有熱減半上為末煮棗肉和丸桐子大每二錢米湯下白朮散妊娠四肢浮腫或面目遍身俱浮名子腫白朮一兩大腹皮白茯苓生薑皮陳皮上末每二錢米湯調下未安加木通條芩檳榔木香足腫加青木香蒼朮消痰利氣湯四肢不能轉側痰氣喘促飲食不進腹脹甚者陳皮貝母茯苓各一錢半杏仁荊芥各一錢紫蘇枳殼桑皮鮮者尤妙澤瀉各八分先服二帖痰消喘定去貝母荊芥枳殼杏仁加荊芥子倍茯苓下身安去荊芥子澤瀉加白朮條芩當歸川芎芍藥有熱加梔子連皮炒為末米湯下竹葉湯妊婦煩悶不安名子煩當歸茯神麥冬各錢半防風黃芩梔子加竹葉二十片煎未安加人參生地犀角甘草去防風梔子加蓮肉煎服澤瀉散喘急胸滿小水不利名子滿澤瀉赤茯苓木通各一錢枳殼桑皮檳榔陳皮各八分加生薑三片煎服不食加白朮腹皮紫蘇桑皮煎車前散妊婦小便頻澀作痛下焦有熱名子淋當歸枳殼梔子各八分車前子研赤苓各一錢木通五分赤芍五分石葦炙去毛陳皮檳榔川芎各四分甘草三分加燈心煎服未安加澤瀉石蓮肉地膚淡竹葉萹蓄瞿麥又地膚草四兩水煎或搗汁服可治諸淋或鮮地黃搗汁入蜜二匙服羚角散忽然冒悶不省人事四肢角弓反張痰壅盛名子癇羚羊角銼當歸川芎酸棗仁炒研茯神各一錢五加皮防風薏苡仁杏仁各五分木香甘草各三分加姜煎服瀉肝飲人事不省目直上視譫語罵詈狂叫關脈洪數貝母三錢白芍藥茯苓各一錢半黃連天麻橘紅龍膽草梔子各一錢青皮八分上水煎成調青黛五分服紫蘇飲妊娠胎元不和上湊心腹脹滿疼痛名子懸香附當歸各一錢紫蘇大腹皮陳皮各八分白芍藥川芎各五分甘草三分水煎服藿香正氣散可服又紫蘇橘紅麥冬等分為末每服四錢加枇杷葉竹茹一錢五分煎當歸湯胎動衝心悶躁口渴上衝下築唇口青黑手足厥冷當歸人參阿膠各二錢甘草一錢蔥白帶根一握連煎二劑四聖散妊娠不能飲食衝心欲死遍身疼痛白朮黃芩白芍各一兩砂仁五錢上分四帖水煎服轉男凡妊娠未滿三月形象未著男女宜用方術轉女成男多驗特録法取明雄黃一塊重兩餘者用絳囊盛之佩於孕婦身左更以弓弦同貯佩之或萱花同佩名宜男草又常張弓弦於其父側懸弧以視母又鉞戈斧斤密置於床席之下勿令人知當誦詩書之聲又孕婦著夫衣冠於井中左顧井內影三日封並半月方開生男驗胎法三個月足用白大川芎一個研末三錢空心溫酒或艾湯調下微動是胎不動者血阻也驗男女胎動時頭向左動者是男頭向右動者是女診左尺脈洪盛是男右尺脈沉實是女五月作偶遣妊婦面南行忽呼之左回者男右回者女半産夫半産墮胎之患每至三月而落蓋妊娠三月名始胚至此則血不流行形象始化未有定儀易於傷墮皆由氣血不充肌體薄弱有稟賦而致者有勞損而致者胎元雖成而無以滋養之故也或因七情火熾逼血妄行或因行動跌磕致傷而墮皆宜隨證用藥調理最宜安靜為貴蓋胎元說見胎前僅得臍帶系母腰腎名紫河車蒂甚微甚脆有孕婦氣血充足胎元安穩飲食起居如常忽然小産實非産也乃少年男婦不諳事理惟恣情欲裀褥妄為致婦蜷腰曲腹忽斷此蒂瞬息母死胎亡若此甚多深可痛憫主方三個月服人參黃耆白朮條芩各二錢當歸身一錢熟地川芎白芍各七分陳皮五分黃連升麻柴胡各三分糯米八十一粒水煎服為丸亦可磐石散因瘦而血虛有熱肥而氣虛不實少食體羸而致墮胎者此方平和氣血補益脾胃有熱倍芩減砂仁無熱反之人參黃耆當歸川續斷熟地各一錢白朮二錢川芎白芍各八分糯米一撮炙甘草五分黃芩一錢砂仁五分上水鍾半煎七分食遠服二三四月間日服丸亦可惡阻謂孕婦嘔吐噁心氣逆胸滿不能飲食四肢倦怠主方橘紅半夏制茯苓木瓜麥冬各二錢人參一錢藿香五分加竹茹一團枇杷葉三大片去毛生薑水煎服安胃飲妊娠惡阻不食半夏薑汁浸透香油拌炒不傷胎藿香白茯苓陳皮神麯白朮香附炒當歸白芍藥砂仁等分薑棗水煎烏附湯孕婦噁心阻食養胃調和元氣烏藥香附白朮陳皮人參等分炙甘草減半上加生薑三片水煎服時另以薑汁入糯米炒一撮泡湯送或加丁香砂仁蘇梗飲治血熱氣逆嘔噦異常湯藥難進蘇梗五錢山楂芍藥各二錢茯苓一錢二分黃連鹽酒炒木瓜各錢半橘紅一錢水煎徐徐熱服未止去蘇梗山楂芍藥茯苓黃連加麥冬人參竹茹各一錢枇杷葉三片真藿香五分即安參橘散妊娠胃虛惡阻嘔吐飲食少進益胃和中人參橘皮白朮茯苓麥芽各一錢炙草五分生薑二錢竹茹一團粳米一撮上水煎服未止加製半夏安妊進食湯治不食胎氣衝心遍身疼痛欲死黃芩條實白芍藥白朮各一兩砂仁五錢上分四劑水煎服次服藿香正氣散易産漏胎婦人懷孕胞內惟有水水涵兒身胞兒臍帶系母左腎即猶果蒂在枝賴母之元氣生長胞之外皆是血養若母因憂悲怒郁以動其血或飲食辛熱老酒厚味其鮮豬肉尤忌諸失血證食之即甚經曰形役則陽亢或因作勞所致或跌撲振擊胎元致傷衝任之脈先則微下後略有傷動則源源而來有至八九個月血大行僅存胞兒視之如無孕者能服參歸大補之藥將理得宜仍得分娩無虞母子皆安有不得藥餌飲食補益致胎干難産母子俱損者亦有之有逐月血微下謂之記月有少壯者懷孕而復行經名曰盛胎有過月不産十八九二十三四月而産者惟宜大補氣血可也主方當歸川芎白芍酒炒熟地阿膠山藥條芩白朮砂仁香附童便制艾葉等分糯米一撮水煎服不止加蒲黃荊芥俱炒焦地榆之類有八九月兒哭者因母仰身承高取物致兒口含臍帶脫出故也仍曲身令兒含之即安或煎黃連湯啜之胎不安之故非有觸犯不外虛熱二字虛者氣血之虛熱者非五志之火則欲念之火亦致不安當加制相火之藥治之鬼胎婦人鬼胎之說非實有鬼交而成胎也皆本婦自心所現之境也凡人晝之所思即為夜之所見亦猶男子之夢遺因女子血盛思欲所致或虛而有欲念者則相火無時不起故淫津血液流入子官結聚成塊者也遂至腹中脹滿儼若胎形因而精神氣血相感亦能轉動世俗謂之鬼胎也古良醫治一女因抵暮入廟見黃衣神忽然心動是夜夢神與交腹大似孕母告其由醫以破血墮胎藥進之下如蝌蚪魚目者二升許而安噫非神之感女乃女感於神智者明之妊娠藥忌雄黃雌黃水銀鉛粉麝香朴硝芫花大戟牛黃巴豆野葛牛膝薏苡皂角藜蘆槐子瞿麥附子烏頭天雄蜈蚣斑蝥水蛭虻蟲螻蛄蠐螬蝟皮蟬蛻蛇蛻蟹甲半夏南星牽牛代赭大黃滑石木鱉紅花蘇木三稜蓬朮甘遂乾漆桃仁官桂丹皮妊娠食忌螃蟹兔肉蝦羊肝羊眼犬肉鱉肉鱔魚田雞雀驢馬肉菌茨菰無鱗魚燒酒薑椒蒜辣煎爆熱毒忌鵝肉𧋌鯉鴨子糯米雞子桑椹同食孕婦喜食桃梅李杏楊梅酸醋之類經曰心出血肝納血肝味酸血養胎肝虛而求外之酸味以補之耳亦不宜過多恐肝木盛剋制脾土也亦有過食酸物聚痰而成子癇者胎前附論胎元論自産論收遲胎前十要盤腸産詩云誕彌厥月先生如達惟彌滿其月雖首産亦如羊子之易夫孕婦生育之難易母子性命之安危全賴人事調護之其最者至八九個月極宜保養氣血安和臟腑謹慎起居嚴避風寒不妄作勞加餐飲食棲止適宜身心悅逸乃得胎元穩足尤宜禁戒房幃自然十月彌滿此生生之道得也設若孕婦氣血不充形體尫羸而復無藥餌之補益飲食之滋養反致勞役不息怒忿憂愁諸法乖違必至危殆而生矣凡能依十法調理可保萬無一失明者細心體行論胎元夫胎元之形不可不知兒在母腹胞衣之中惟水涵兒形團身胞內男頭向左女頭向右兩手抱耳兩膝抵頷胞外血護兒之臍帶連胞系母左腎即命門也名紫河車蒂正産者即猶果熟自落半産者因氣血兩虛猶樹木無力花果脫落觸損胎墮者即此喻也至若房室放縱蒂斷腎傷及未當産而強收致損母子猶摘生果而枝折也論自産鄉居無穩婆處皆當自産先以浴盆內置草扶産婦坐於上背後令人抱之候時至則兒自然出矣無收早過時壞兒之咎古書催生之藥必待臨盆坐草始服此正合古意穩婆之設亦無不可但全藉為主宰反致遲速之愆蓋兒産時至十月足腹中痛陳兒如夢覺轉頭向下母腹漸收兒能拆胞自出頭對産門隨水而下産婦用力一逼兒胞齊落惟令穩婆接取此最宜之法也世多不明此理産婦初覺腹痛即喚穩婆或彼有富貴家欲産行止倉忙但云取湯試之詒謂産門已開幾乎悶壞即令産婦坐上圊桶産婦無知用力努掙兒如未覺隨力亂出橫生逆産由此故耳或穩婆手入掐斷其蒂而強收之致産婦痛苦萬狀重則傷命輕則臥病纍月豈若自然生者無大痛苦數日即安動作如故上帝好生本不傷人人之矯拂者自取之耳論收遲世俗皆謂收遲致兒悶死死胎難下母子俱亡其故何也由産婦諸人不知生産自然母子無恙因藉穩婆為主彼倘來遲兒本欲出不知自然之理家衆倣徨反教産婦寧耐按捺産門不令兒出以致悶死諸人驚駭産婦神魂已離死胎難下危亡必矣凡欲産之婦預當說明此理如初産尤宜詳告所謂天生天化者也但宜安心守至胞破水下穩婆未至先以圊桶滌淨納襯草紙一二百不能接取恐傷兒頭産婦坐其上後人抱靠任兒自出倘胞衣不下婦將自發含嚼一噦而下預備小腳箱紙絮作窩將兒胞急取起放於內上以紙絮蓋覆勿掩兒口天寒下置微火自不能斷臍洗浴候穩婆至可也胎前十要一胎前宜絶房室情欲一動氣血皆燔臟腑皆為之不寧胎息因之而弗安且誤損其胎多致傷生說見小産産母能清淨斷欲子無㾩癩頭瘡熱毒諸患懷孕即能戒必無危惡痘疹二飲食忌煎炒炙爆姜椒雞魚蝦蟹海鮮羊肉豬首醇酒辛辣一切熱毒之物兒無眼赤便祕瘡瘍胎熱胎毒諸患並妊娠忌三起居行動切宜謹慎忌登高涉險仰身攀物尤不宜跌撲響聲驚恐如母敲響一下兒必一驚跳致兒胎驚諸疾最為嬰兒重病四避風寒孕婦傷寒治理最難發表攻裡如芒硝大黃桂枝之類用則妨胎不用病劇誠為掣肘邪入大熱多致胎下雖強存之後多不育五七情五志皆能動火逼血妄行致半産胎漏故安胎必用條黃芩等清涼之藥蓋血熱行冷凝也如首産者必有恐怖之憂宜預說天然之理生育自然容易以安其心不致慌懼六孕婦最宜安靜經曰神靜則陰生血足養胎易産形役則陽亢陽火行血耗涸一切女工皆當暫止常令挺身舒步行止自由七節飲食得谷則昌絶谷則亡人生全賴穀味運化精微生養氣血勿因不甘美而不節養致飢飽失時胎元不長氣血不足必為難産之徵八不宜無故占卜如小有不安只宜安靜調養如問卜師巫必云禳解災咎則宰殺牲命妄費資財或備辦不周家人聒噪反致産婦疑惑憂懼以成大病大害九預擇老練寧耐穩婆擬定安靜誠謹媼婦臨時毋得錯雜違誤將十月腹痛或胎元轉動名曰弄胎俗名轉換未為産時若無母姑輩老成經歷者少年不諳事理誤喚穩婆彼或恐後日他喚惟圖一時之利詒謂當産而嘗試之如摘生果之喻小則致病大則傷生十將欲生産之候急備藥餌飲食酒醋童便薑糖之類置辦器具炭火諸物房中切宜安靜産婦可進如意厚味但忌糯粉滯膩難化之物惟徐步舒身正立令人緩覆胸腹兩旁多耐痛陳直候胞破水下方可坐蓐盤腸産臨産腸先出胎後下宜先安産婦心切勿驚慌用淨盆或漆器盛之取黃耆或枳殼煎湯浸或溫水養之産畢令婦仰臥以米醋半碗和溫水七分哈噀婦面每一噀腸一收至完或搗萆麻子四十九粒塗頂心收盡即去之或以大紙捻香油點吹滅煙燻入鼻即收或半夏末或皂角末搐鼻取嚏若干難收用香油五斤盆盛頓溫坐一時潤之可收主方達生散大腹皮洗白朮白芍藥當歸各七分人參陳皮紫蘇各五分甘草四分加黃楊腦蔥三葉春加川芎防風夏加黃芩五味子秋加澤瀉冬加砂仁胸滿加枳殼砂仁胎動加金銀湯野苧根多怒加柴胡芩連少食加神麯砂仁渴加麥門冬葛根有痰加貝母半夏薑製九個月多服之束胎散順氣滑胎易産香附二兩枳殼三兩甘草炙一兩半上為末每二錢空心白湯下催生散直至臨盆坐草見胞水破服之滑石百草霜白芷各研細末等分和勻每服二錢童便老酒調勻入醋一匙白湯送下佛手散將臨盆時服早多服尤佳當歸川芎益母草各五錢上水二鍾煎頓服縮地湯治胎動必欲下者服之即安砂仁一兩研細懷地黃二兩酒炒上水酒各二碗煎一碗分二次服金銀湯治胎動作痛欲下者效金銀共兩許煎湯調砂仁末服獨聖散妊娠有所傷觸激動胎元腹痛下血極效安胎易産砂仁帶殼炒令黃剝取仁為末熱酒調服不飲酒米湯下此一味乃妊娠之聖藥簡便方胎産百病益母草煎服妊娠轉胞不得小便秋葵子梔子滑石各五錢木通三錢水煎服外以前藥為末蔥汁調膏堆臍中即通前藥分二次大便不通大黃枳實黃芩白芍厚朴等分煎服即通胎逆喘急黃芩條香附等分上為末每服二錢空心白湯下傷寒護胎法灶心土研末靛青井底泥調勻塗臍腹頻加厚産後附初産十要産後狂言夜臥不安産後不語惡露下少丹溪云産後如有雜證相仍以末治之惟以大補氣血為主雖然先生一代之良師一言之下後人亦當圓融若惡露去盡腹中不疼手按臍至小腹亦無梗礙亦無風寒頭疼發熱傷食胸滿等證惟是氣血兩虛大補宜矣如神氣清爽飲食可進猶有腹中梗痛敗血未盡宜服行血之藥黑神散之類如感風寒頭疼骨痛畏寒拘急即當服散邪藥故必穿衣而起正氣虛時腿足微露風寒易侵古方用茯苓補心湯常不能速效亦當傷寒沖和湯之類取微汗易愈如傷飲食胸膈脹悶加山楂麥芽神麯之類産後忌芍藥恐酸寒伐發生之氣如白芍藥酒炒産後止腹痛之妙品赤芍藥加用産後行敗血之良藥可不用乎初産十要産婦坐靠床中一人頻覆臍腹庶令惡露易下大略一晝夜後敗血下盡方才睡倒乃安二房中伏侍宜老媼曾有經歷者行步輕緩語言低悄百凡謹慎細心安妥忌少婦幼婢輕舉妄動多言高聲致産婦動怒變生不測三床前置炭火爐頻燒乾漆渣破漆器漆消敗血常令嗅其氣味不令惡血上逆四宜備醋一碗頻令婦嗅知醋味則無事不知醋味乃耳中聞如烹茶聲乃血運之候預以鐵器燒炭內令紅仍置醋半壺以韭菜一握揉浸醋內連作時提起頂發掐住人中急取赤鐵投醋壺內蓋定口令熱氣從壺嘴出對鼻孔熏取炭火醋沃熏面肅靜則神復而蘇若驚慌叫哭則不復矣急灸關元臍下三寸氣海臍下二寸五頻與砂糖湯行惡血兼與薑湯天熱與緑豆湯心煩與白蜜調湯腹中兒枕痛與山楂湯六預備清魂散治血運益母返魂丹治百疾保生錠鎮心神黑神散治胞衣不下惡露不行腹痛及兒枕痛用童便煮酒調下七冬月床前多置火爐禦寒房中固密勿有小隙入風起身便溺腿足勿露虛時寒邪易入難治多致危殆八夏月床前勿置火爐不可搖扇冒風臥房樓上者尤熱多致血崩傷人必當預移樓下床下多置水盆九月內勿令洗浴每見少婦欲淨因浴作勞致病危篤夏月七日後可浴十産婦頻與熱粥湯漸與薄粥切戒腥酒各方風俗有産即食蛋二枚煮湯者有食煮豬血一碗者多致傷食為病皆不宜尤不宜為産婦宰殺牲命及宴客則母安子壽産後數日間必探其血盡腹軟不痛為安否此即服行血藥多因失看十數日忽然崩下不救次傷食冒寒次恃健勞早且産中成病治亦難效多成痼疾更勿多飲酒引敗血流入遂道及四肢關節永久疼痛古云産婦致患微若秋毫成病重如山嶽地藏經云殺生致母子不安俗云産亡者受血湖地獄此獄殺業重者受之婦女預釋其疑主方惡露下少腹痛當歸尾赤芍藥益母草澤蘭葉玄胡索焦姜熟地黃山楂各一錢蒲黃七分官桂五分甘草三分上加薑棗煎成用黑豆炒焦淋入好酒一杯去豆用酒並童便和服血不下加蘇木紅花丹皮桃仁香附五靈脂荊芥之類敗血去盡腹不痛加補藥血去多不止者去歸尾玄胡赤芍蒲黃官桂加參耆生地阿膠梔子炒烏梅荊芥炒地榆作血崩治另以當歸五錢荊芥炒二錢山楂一兩煎服無他患黑神散産後惡露不盡胎死難産胞衣不下敗血攻心腹痛黑豆半升炒熟熟地黃當歸尾肉桂各二兩乾薑炒焦三兩甘草二兩赤芍藥蒲黃生二兩為末每服二錢童便煮酒下血盡止服益母丸胎前産後百疾皆治益母草端午日採取葉陰乾八兩搗末蜜丸彈大每服三丸臨産白湯童便酒化下加四物湯各二兩尤效搗絞汁煉膏服更佳烏玄湯治惡露不下腹痛乍寒乍熱不時作運何首烏二兩玄胡索一兩荊芥五錢上煎汁二碗重滾熱用橘紅一兩置碗中熱汁泡入蓋少時去橘紅取汁服血行痛止清魂散産後血運昏迷去瘀血生新血川芎二錢澤蘭葉荊芥各四錢人參一錢甘草八分共為末每二錢酒下奪命丸血寒凝滯胞衣不下丹皮八錢當歸尾黑附子乾漆炒各五錢上為末用大黃為末八錢醋煮成膏加雞子白搗勻和丸桐子大酒吞五十丸即下歸膝湯治胞衣不下服此即下歸尾二錢牛膝木通滑石各五錢冬葵子研三錢半水煎服八味理中湯産後氣血俱虛汗出嘔吐白朮一兩炙甘草七錢人參茯苓乾薑炒滑石麥芽神麯各五錢為末米糊丸桐子大每五十丸食前薑湯下返元湯惡露上逆神昏不省二便不通脈洪當歸五錢川芎三錢五靈脂桃仁各錢半大黃二錢芍藥一錢肉桂六分人參五分上水煎加童便砂糖酒服保生錠産後鎮養心神更以山楂一兩當歸五錢荊芥炒二錢水煎服辰砂上好水飛當歸川芎等分為末蜜和印定金銀煎湯化下歸竭丸産後血積腹中成塊單用五靈脂為末每服二錢酒下亦效當歸血竭蓬朮煨白芍酒炒二兩五靈脂四兩上為末醋糊丸如梧桐子大每服六十丸空心酒送下神昏氣促自汗人參二錢核桃肉麥門冬各五錢上水煎服元氣脫血上逆人參五錢蘇木一兩上童便煎服血運荊芥炒五錢童便煎服氣虛加當歸人參血虛川芎各二錢胞衣不下最宜産時婦自發嚼一嘔而下稍遲敗血入胞矣砂仁五錢炒研當歸尾五錢水煎服血未盡悶亂欲絶紅花一兩酒二鍾烏梅湯二匙和服惡血未盡腹痛當歸赤芍各二錢肉桂一錢姜三片水煎服産後隨處作痛當歸玄胡為末血竭沒藥另研等分共末每二錢酒下玉門不斂陰戶突出硫黃二錢菟絲子吳茱萸蛇床子各一錢水煎洗簡便方子宮不合藿香荊芥臭椿根皮煎湯熏洗難産數日不下體俱冷椒橙葉煎湯一盆小凳令産婦坐盆中熏洗良久腿腹熱氣溫血行而産胞衣不下黑豆一合炒熟入醋煮六七沸去豆用醋三次以熱手摩婦小腹下又取夫單衣蓋井上又澤蘭葉浸酒中鐵錘燒熱焠飲産後百病血不下用血竭沒藥為末每二錢童便酒下血不止百草霜二錢童便酒下或桑白皮煎湯入薑汁二匙飲一月血水不幹竹紙綿皮紙各七張燒灰荊芥一握炒焦半夏五分水酒煎服子腸不收枳殼訶子五倍子白礬煎湯熏洗或頭頂心灸數壯收産後狂言産婦妄見鬼祟因驚恐動其心神致敗血衝心昏憒狂亂或因去血過多心無所養敗血上干於心造命丹效夜臥不安乾荷葉生地黃牡丹皮等分煎調生蒲黃服即安或芎歸益母煎調水飛硃砂服或幼科驚門牛黃造命丹尤效産後不語蓋聲言出於心心主血血去心虛故也宜芎歸益母麥冬遠志茯神人參加紅花少許同金與銀煎成調硃砂服造命丹可服或用白礬末一錢熱湯調下惡露下少欲知敗血有無但看腹中痛否腹軟不痛去盡矣痛之微甚驗血多少如小腹痛劇服主方及黑神散外用綿衣裹手烘熱揉痛處若失治忽然血崩昏運而絶矣崩中婦人崩中最為沉疴年少之婦女火熾血熱幃幕恣情或經未盡而犯交感或鬱怒氣逆手掬冷水或飲食生冷皆致敗血留阻遇勞役陽亢七情火炎敗血妄行紅紫不同或紫黑成塊致成斯疾大都涼血固澀升氣養榮可愈中年以上及高年婺婦多屬憂愁過度怒氣傷肝肝傷不能藏血以致錯經妄行先後愆期或欲來而先痛既來而斷續或年近七七天癸當止而不止皆由鬱火不能發越攻衝臟腑逼血妄下或反倍常皆為血山崩漏之證此氣血兩虛難以速愈必涼血止血散鬱火和肝氣隨兼大補氣血庶可奏功主方當歸頭白芍生地川芎黃芩條地榆梔子黃連黃柏各錢半水煎服未止去當歸加炒黑荊芥涼血地黃湯婦人陰虛不能制火火激其血妄行不止生地當歸頭條黃芩荊芥炒各一錢黃柏知母藁本川芎黃連甘草各五分升麻柴胡防風蔓荊各三分水煎服未止加蒲黃炒黑玄參阿膠醋炒香附固源湯血崩日久不止條芩錢半臭椿根皮二錢灶心土當歸頭熟地黃白芍藥地榆川芎各一錢艾葉荊芥炒各五分加烏梅煎服參耆湯治血崩虛甚者人參黃耆麥冬各三錢五味子七分杜仲熟地黃山茱萸各二錢枸杞子三錢川續斷一錢荊芥炒八分阿膠二錢上河水煎三次一日服一赤八烏丸治血崩甚者血竭京墨火煅發灰百草霜蓮蓬殼黃絹敗棕俱燒灰蒲黃梔子俱炒黑共為末蜜丸緑豆大每服百丸米湯送下或米湯調服亦可簡便方止血崩棉花子仁炒黃條芩甘草等分為末每二錢空心酒下又京墨煅煙盡研為末二錢酒下又柿餅燒灰二錢白湯下又乾漆燒煙盡三錢五靈脂五分為末二錢酒下或貫衆燒灰服又乾黑驢屎研入壇中燒煙崩婦坐上熏止或槐子燒研服又龍骨研當歸香附制各一兩棕灰五錢為末每四錢空心米湯下又烏梅肉炒研末二錢酒下或棕燒灰加枯礬末酒下又蒼耳草燒灰三錢酒下或槐花地榆炒研酒下或煎服或荊芥穗香油燈上燒焦研末童便酒下或烏金木耳炒存性研末三錢阿膠炒研末二錢烏梅湯調服赤白帶下經曰濕痰流下滲入膀胱經為帶此言肥人也瘦人由內火煎熬津液而成然而婦人女子帶下之證又多由脾胃濕熱所致白多為氣虛赤多為血熱患久則漸次虛寒面黃體瘦肌膚憔悴形容枯槁行動懶怯多因帶證而致焉何則但因感此者外無病患之形內無痛楚之苦隱而不覺歲月遷延脈訣云崩中日久成白帶漏下多時骨木枯是以氣血漸損形體漸羸而變成大病者多矣調理之要治標必以止塞為主肥人兼消痰瘦人兼清火少佐升提固斂治本必理氣和血次健脾滲濕六君子五苓姜炒黃連大補氣血多不以為急患之既久脾胃虛弱至於月經不調甚者淋癧崩漏遂成危疾難為攻治矣方藥合宜庶可獲效如日久不止者專以補氣血為主先以主方治之次服十全大補湯去桂加醋炒芍藥牡蠣粉禹餘糧補中益氣湯見脾胃主方當歸川芎赤芍熟地艾葉茯苓牡丹皮臭椿根皮香附醋炒山藥各一錢升麻三分上加烏梅兩個水煎另用牡蠣火煅醋淬龍骨赤石脂各七分研成末調服或作丸服亦可固真丸帶久不止腹痛眼昏溜火陽明伏火此丸大瀉寒濕乾薑炮一兩柴胡白石脂另研白龍骨另研當歸各五錢白芍酒炒黃柏酒炒白朮各二錢上為末醋糊丸桐子大每服百丸空心醋湯下以乾物壓之不令熱藥犯胃斂帶丸帶久氣血兩虛面黃肌瘦無力身熱飲食無味四肢倦怠當歸川芎茯苓白朮香附醋炒山藥臭椿根皮杜仲薑汁酒炒牡蠣火煅醋淬鹿角霜另研破故紙酒炒白芍酒炒人參各等分上為末烏梅肉蒸搗和入加醋糊丸如桐子大每服百丸空心米湯下虛加黃耆地黃熱加地骨皮青黛痰加陳皮半夏南星小便澀加車前子瘦人加黃柏胸滿去人參加砂仁腹痛去參加玄胡小茴香冬加炮姜久加升麻柴胡收帶丸赤白帶因濕痰腹痛燥中宮之濕提陷下之氣蒼朮白朮白茯苓陳皮鹽水去白當歸白芍酒炒熟地半夏薑製椿根皮各一兩牡丹皮黃柏酒炒甘草炙防風各五錢升麻三錢上為末酒糊丸桐子大每服百丸米湯下簡便方止白帶石灰風化一兩白茯苓二兩為末水丸每三十丸白湯下亦止水瀉又赤白帶下蕎麥麵雞子清為丸每服五十丸白湯送下又香附子醋煮臭椿根皮去粗皮等分為末醋糊丸桐子大百丸空心醋湯下淋瀝是證頻有穢血點滴淋漓不淨非若崩中頓而多也甚至經年纍月不能起身懨懨倦臥飲食雖進面色痿黃無力行動四肢困乏俗名血癱有因於女子未笄早嫁甚而天癸未至衝任未盛血海未充竟以合羊扇後月水雖降顛倒錯亂孕育不成最可憫惜主方當歸川芎白芍熟地丹參艾葉醋煮牡丹皮阿膠沖化服臭椿皮地榆等分加烏梅肉一個水煎服七灰散治婦女崩漏淋瀝蓮蓬殼益母草旱蓮草粟殼蟹殼棕毛藕節七味燒灰等分每服三錢醋湯調下崩中方可互用簡便方淋瀝黃芩條沉水者為末每服三錢燒稱錘淬酒下又崩淋棕灰烏梅肉乾薑炒焦等分俱為末每二錢烏梅湯下又烏梅肉炒研末二錢或棕灰枯礬為末或蒼耳草燒灰三錢或荊芥燈上燒焦為末或槐角地榆為末並用酒或童便下畏寒婦人稟陰柔之體畏寒常甚於男子此概言之也婦人尤多感寒之由故特另條以明之如乳子則不時開懷解衣進風如夜臥兒在身側肩臂常露或兒便溺即時起身因此感冒風寒但婦人畏寒有兩種若霄壤不侔最宜詳察一外感風寒惡寒則頭疼骨痛拘急腰膝痠軟噁心此言暴感也宜從傷寒門用發表取汗藥或微惡寒朝涼夜熱皮膚熱內不甚雖纍月如是脈浮而緊宜服發表藥一帖取微汗一陽虛生外寒陰虛內熱五心煩熱口乾舌燥夜臥不安干嗽紅痰漸至午後陰分微微惡寒晡時手足心熱黃昏漸加皮膚不甚重按骨里蒸蒸大熱脈必細數急澀此宜主方治之二者差誤系人之死生最宜斟酌主方當歸白芍藥懷生地麥門冬地骨皮知母牡丹皮等分水煎服氣鬱加香附童便炒撫芎連翹口渴加天花粉五味子嗽加天門冬紫菀冬花熱甚加銀柴胡連青蒿鱉甲有痰加貝母陳皮茯苓甘草啓脾湯寡婦室女思欲不遂脾傷食少寒熱似瘧面黃時紅當歸白朮各一錢半香附制鬱金玄胡柴胡梢川芎人參各一錢甘草梢青皮各五分上水煎服痃癖是證氣結而成痃者腹之左右各有一條大者如臂小者如指亦名弦氣癖者肋之兩旁有塊作痛二者遇風冷怒氣則發脈多沉澀治法須久服丸藥消之兼積聚門治主方當歸檳榔蓬朮三稜芫花醋炒桃仁五靈脂木香沒藥另研肉桂各三錢阿魏一錢麝香五分上為末入沒藥麝香阿魏醋研化入飯丸桐子大每服十丸淡醋湯下癥瘕是證由七情時動飲食失節寒溫不調氣血凝滯而成故癥者臟腑氣結有形可徵也瘕者痛處無定浮假可移也發則氣壅腹痛相引兩脅煩悶滯於經絡月水不通亦當丸藥治之主方當歸川芎乾漆炒煙盡木香芫花醋炒肉桂赤芍藥琥珀各五錢大黃牛膝各三錢桃仁一兩麝香五分上為末或丸每服一錢空心熱好酒送下流氣散臟腑虛弱氣血不調或兼外邪成形作痛攻注上下當歸延胡索川芎烏藥肉桂桃仁木香赤芍藥枳殼蓬朮青皮等分為末二錢酒下小腹痛婦人小腹為衝任之脈血之海忽感嚴凝之寒客於脈絡則氣血留滯激搏而痛得溫暖則氣血和通而痛止內服溫散之藥外炒鹽尉或燒熱物尉之脈多沉緊如臨經時腹痛調經門撿方治主方玄胡索五靈脂吳茱萸湯泡肉桂木香茴香陳皮各一兩白豆蔻五錢上為末每服一錢空心酒下心腹痛婦人患此皆由臟腑虧虛及氣滯不暢兼以七情動於中六淫襲於外邪氣干之故痛作隨氣升降衝上則心膈疼攻下則臍腹痛皆邪正相搏而使然也內服藥外得暖氣則痛止脈沉緊實主方延胡索烏藥香附肉桂當歸川芎木香另磨桃仁各八分赤芍一錢五分姜三片棗一枚煎服轉脬便閉是證孕婦因胞胎所壓或承高取物以致尿脬轉而小便不通或由膀胱有熱或忍小便久之故小腹急痛兼小便不通門治主方木通寒水石秋葵子車前子石葦等分上研細水煎服見效即止或秋葵子車前子亂髮燒灰為末每服兩錢茶下或五苓散取鮮車前草搗汁調服或紫菀為末蔥湯下一法用鹽炒熱包尉小腹自通遺尿失禁是證屬心腎氣虛傳送失度如婦人産理不順致傷膀胱亦無時而出或因脬寒臟冷而致宜詳察之先用補中益氣湯合六味地黃丸方煎服主方次服白龍骨赤石脂牡蠣火煅醋淬益智各一兩枯礬訶子煨去核砂仁各五錢上為末每服二錢米湯調丸服亦可鹿茸丸婦人久虛小便稠濁滑泄不禁鹿茸一對川椒桂心附子制牡蠣制石斛肉蓯蓉雞肫內黃皮沉香各一兩上為末酒糊丸每三十丸酒下陰挺附陰冷陰腫陰癢婦人隱處之疾雖夫婦未必盡吐肯告醫索藥乎故醫書多不論寧知陰中之患有致傷生者醫書可獨遺哉蓋陰挺之證因於鬱怒傷肝積久不舒肝氣亢極致陰中突出長數寸痛癢水濕牽引腰股小便澀短先服龍膽瀉肝湯或當歸龍薈丸方見脅痛次兼主方及補中益氣湯歸脾湯加柴胡青皮川芎茯苓山梔黃柏之類又有陰中如茄墜出直身則收入俗名子袋前方加升麻柴胡藁本有多怒思淫者出赤筋大痛蓋陰戶屬肝經肝主筋故也主方當歸芍藥熟地黃川芎桂心白薇凌霄花澤蘭葉牡丹皮蒼朮甘草等分上咀每七錢水煎服更用金毛狗脊五倍子黃連魚腥草枯礬各一兩分四帖每加水楊柳根一握煎湯用有嘴瓶盛再以竹管去節引熱氣入陰內熏待溫頻洗突出作癢者用臭椿根皮荊芥穗藿香各等分煎湯熏洗至收前方未效加柴胡青皮龍膽草陰冷證因衝任虛損風冷客之故陰中冷襲不受胎孕久不治則面黃肌瘦腹痛吐清水等冷證作矣主方五加皮乾薑肉桂杜仲薑汁炒蛇床子丹參天門冬熟地黃鍾乳粉研地骨皮各二兩上銼生絹袋藥懸壇心貯黃酒滿浸三日蒸熟早晚溫飲洗方用硫黃枯礬等分煎湯頻洗未安制桂附八味丸服陰腫陰戶腫痛由正氣不足風邪客之不去乘於陰與氣血相搏氣血痞滯腠理壅閉不得泄越而為腫矣主方石菖蒲當歸各一兩吳茱萸炒秦艽各五錢上咀每五錢加蔥白五寸水煎空心服用枳殼銼炒包尉冷再炒尉腫處洗方艾葉防風大戟煎洗或加麻黃蛇床烏梅去大戟煎洗又甘菊苗或馬鞭草煎洗或小麥五倍子蔥白煎湯化入礬硝洗或白礬五錢大黃一錢甘草五分為末薄綿裹納入日三換陰癢始因濕熱生蟲蝕於陰中痛癢不已有寡婦室女思想不息濕火淫津日久而成或房室太過毒火壅積為癰潰爛致傷人者亦可用陰挺洗方主方黃耆黃芩大黃各一兩赤芍藥玄參丹參山茱萸蛇床子各五錢上為末每服二錢空心酒下洗方癢不可忍花椒吳茱萸各一兩蛇床子藜蘆各五錢陳茶葉一撮水煎入煨鹽二兩加明礬朴硝尤好熏洗次用杏仁炒研加雄黃礬入麝香少許稀絹包烘熱納陰中陰中生蟲用熟牛肝或豬肝切三寸炙熱納陰中引蟲出盡又肝拌平胃散貫衆末納或桃葉搗綿裹納一日換五次陰中出血百草霜研葫蘆搗汁和納或發灰青布灰和敷陰瘡濕熱所致蛇蛻一條炙枯礬黃丹萹蓄藁本各一兩硫黃荊芥蛇床子各五錢為末香油調搽濕者乾摻先用荊芥蛇床子煎湯熏洗後敷乳岩附乳癰吹乳乳汁不通乳閉婦人情思拂逆久含鬱怒無由散越致肝木氣盛乳房屬肝發於此也始有小核如豆漸漸長大經年纍月發則大痛腫潰故如巖穴之狀血膿赤水淋漓甚穿內臟終致不救宜如小棋子時先服十六味流氣飲方見外科次服主方有穿潰者姑與解毒托裡散外用去腐生肌藥治之未破已破兼服蠟礬丸主方貝母栝蔞仁青皮柴胡赤芍當歸撫芎木通等分水煎服痛加乳香沒藥乳癰由暴感鬱怒氣滯血凝而成先宜忍痛用熱手或手裹綿衣烘熱重揉次用蔥尉蒜灸淋洗諸法見外科必宜速散為妙婦人因苦痛延挨遂成大患主方栝蔞仁研金銀花貝母各二錢天花粉皂角刺當歸尾穿山甲研白芷梢甘草節各一錢酒煎服甚加乳香神效栝蔞散乳癰未成即消已成化水瘰癧諸毒皆效方見腸癰又方栝蔞二個搗炒研末酒下效或蛇蛻一錢燒甘草末五分酒送下香油調敷蔥尉法蔥搗炒熱作餅罨患處上用銅杓微火尉汗出腫消敷方蒲公英春生路邊黃花如菊後結絨球莖至三寸搗絞汁和酒飲渣敷又馬鞭草酒擂絞加捶碎姜一塊熱服一二碗渣敷患處又五月五日粽箬燒灰酒調二服安吹乳亦宜蔥尉揉散吹乳因兒吮乳母子睡熟兒口熱氣吹腫痛名外吹孕婦乳腫病名內吹亦宜前方及栝蔞散治之或黍子一合好酒下又鹿角一兩炭火煅研細分兩次用無灰酒滾熱飲盡汗出安乳汁不通初覺急宜揉散及搗蔥作餅尉結核成餅即為乳癰主方天花粉柴胡桔梗瞿麥木通各錢半連翹赤芍藥白芷青皮各七分甘草五分上加通草二錢做花者水煎服頻用油木梳烘尉乳房乳閉新産之婦乳頭陷者筆管捺之呼出汁不通宜主方主方漏蘆木通穿山甲炙研天花粉王不留行當歸各二錢皂角五分上加通草三錢用豬前蹄足五寸同煮至蹄熟食蹄與汁或為末用蹄汁調下又芝麻半升炒研胡桃肉四兩另研皂角五錢穿山甲炒殭蠶炒各四兩肉果麵包煨熟三錢上共為末每服三錢溫酒送下一日五服又豬前足通蔥草做花切下者煮食蹄汁又赤小豆煮汁飲又肥胖婦人因痰氣壅盛乳閉滯塞消痰藥加漏蘆之類又天花粉研末二錢酒下或飲萵苣湯並食炒菜子同穿山甲研服乳頭裂痛苧麻根搗敷補遺胎産諸方乳岩夏枯草蒲公英干各二兩金銀花漏蘆各兩半貝母橘葉菊花鼠糞尖者連翹白芷紫花地丁山慈菰炙甘草栝蔞茜根陳皮各一兩乳香沒藥各研七錢上為末用夏枯五斤公英二斤搗絞汁煎濃為丸每二錢食遠湯下日淺半料乳癧潰爛經年者鼠糞尖者土楝子經霜者忌川楝露蜂房各三錢俱煅過取淨末和勻分三次酒下間兩日一服完即愈乳癖白芷鼠糞各一錢為末好酒下至醉外用白芨末水調敷胎痛少血四物湯加香附童便浸共為末每服三錢紫蘇湯調下火逼胎動四物湯加條黃芩黃連逆上氣急加香附房事胎動四物阿膠蘄艾白朮條芩煎服動而痛當歸六錢川芎四錢煎服難産胞干滑石水飛一兩白蜜香油各半杯慢火略熬調石頓服煎調一兩摩塗臍腹上下未産更以榆白皮秋葵子蔥煎調豬油牛乳油蜜服交骨不開難産當歸川芎各五錢生育婦人發燒三錢龜板炙研五錢煎服或十全大補湯服難産多日欲死人參五錢當歸一兩炮姜二錢水煎服夏月難産益元五苓和服子死腹中唇紅舌黑子死唇黑舌紅母死俱紅並生俱黑同死平胃散一大帖煎一鍾入芒硝三錢服再煎大帖入硝洗腹胎下又肉桂三錢研末麝香五分作一服酒下或百草霜灶心土白芷等分研末童便酒下或蔥白二七莖煎服加童便酒更好催生驗方魚膘四錢切以針刺燈上炙脆研柘枝一兩一葉一刺五月開白花蠶食者真白芷一錢半百草霜山家者一錢研千里馬男左足舊草鞋燒灰二錢上以柘芷水酒各一鍾煎一鍾去渣入膘煮化調二末服産不快順雲母水飛五錢用溫酒調服即生胞不下芒硝三錢酒服催生魚膠燈上燒焦一錢或香油炒三錢研服敗筆頭燒灰溶蠟丸服貝母一錢去心研末秋葵子七十粒炒研末鳳仙花子炒研路旁草鞋鼻燒灰二錢乳香出汗研末一錢白蒺藜貝母等分為末三錢灶心土為末二錢隨取一味酒下或米湯下弩牙燒赤淬酒飲鑿柄蓬頭燒灰或槐子七枚或細艾炷灸右足小指尖三壯或萆麻肉搗貼腳心産下即去或赤小豆煮汁服橫生益母草六兩童便酒煎服天寒難下五積散加牛膝葵子蛇蛻煎服觸犯禁忌硃砂符燒灰酒下産後氣脫人參五錢乾薑二錢肉桂二錢煎服虛甚倍參加制附一錢産後虛喘人參五錢附子五分煎服有漸加參至三兩附三錢效産後喘汗用參耆不效宜補心腎棗仁一兩懷生地白芍麥冬五味枸杞牛膝杜仲當歸身阿膠牡蠣龍眼肉至數十劑全安種子丹海鹽都諫陳海洋公五十無子服此連舉五子五女何首烏八兩仙茅川者四兩牛膝酒浸白茯苓人乳砂鍋煮蒸赤茯苓牛乳同法生地黃酒浸蒸搗枸杞甘州紅細人參堅明當歸身酒浸杜仲薑汁拌鹽酒炒去絲遠志甘草汁浸剝肉柏子仁去油山茱萸肉菟絲子煮餅破故紙鹽酒炒香大胡麻酒蒸九次核桃仁松子仁俱另研各一兩上各為末稱配入地黃重曬磨加二仁煉蜜丸桐子大每百丸空心酒下夏鹽湯制首烏八月採赤白各半極大如龜蛇形尤佳竹刀刮去皮切片米泔水浸一宿濾曬三次木臼搗末肇妊丸調經養血順氣健脾男子預宜脾健腎足精滿氣充香附一斤四分鹽酒童便搗光人乳米醋各浸三日曬乾當歸酒浸熟地酒蒸薑汁拌川芎白芍藥酒炒各四兩白朮土炒澤蘭葉陳皮各二兩黃柏酒炒甘草酒炒阿膠酒蒸化各一兩上為末磨地入膠酒糊丸每服百丸空心米湯下男忌六錯一甲子庚申本命朔望二奔走作勞力疲氣乏三醉酒病後憂怒驚恐四交接頻數起早睡遲五神聖座近星月風雷六大寒大熱大飽大飢女忌五迷一經愆多病帶下崩淋二皮粗肉燥口大氣雄三勞弱羸怯瘢風暗疾四肥胖太瘦多産少食五形質不全陰妒不良巧奪天機之妙孕嗣人倫大端得人不傳失人非人而傳失巧但敬授慎默廣為善事耶
