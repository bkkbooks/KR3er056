金瘡杖瘡竹木刺湯火經曰有所墜墮惡血留內腹中脹滿不得前後先飲利藥導之如落馬跌磕從高墜墮打撲傷損內肭挫折杖瘡腫焮大痛不破損出血先宜主方行去瘀血若金刃傷皮破血出過多但宜活血和血止痛次兼調氣養血補益胃氣切忌大行血之藥跌撲損傷骨折出臼急用白礬沖湯布蘸尉傷處痛止即時整理稍遲則肉腫血凝痛甚矣切須仔細辨認曲直或宜輕手揣摸揉捺更要相度左右骨宜正宜斜交接平正看骨縫形勢捺歸臼或宜數人重手拔捺端正當近本骨平復用苧繩扎或杉木板片綁三五日淋洗換藥切勿見風不救如手臂骨出向左右拔向右左拔如腦骨碎剪去發輕手搓揉平正不破用烏龍散敷圍破者風流散填塗外用油紙或綿紙包凡入骨後用烏龍散圍腫處留破處用風流散填凡無藥處但挑開口解小便入咽之即生主方大黃枳殼各二錢當歸尾厚朴陳皮甘草梢紅花蘇木木通各一錢水鍾半煎數沸濾服不通加芒硝一錢已通去大黃瘀血不下加桃仁肉桂黑醜劉寄奴土牛膝之類輕者無瘀血及去血多或老幼減黃殼蘇硝等加玄胡索赤芍丹皮澤蘭骨碎補之類定痛以真乳香沒藥研細調入藥服次兼歸芎白芷木香之類弱人加參耆切忌生冷草藥飲酒無灰者食牛肉痛甚烏龍散跌撲骨碎出臼先煎蔥湯洗整骨端正用軟絹或皮紙攤貼外木片縛蟲獸傷亦貼留破口以風流散塗穿山甲炒黃丁皮無真者用丁香各六兩土當歸即土獨活二兩百草霜另研枇杷葉去毛各五錢上為細末薑汁水或生地黃汁同薑汁調貼風流散治損傷皮肉血出不止及破腦傷風用藥填敷血竭二錢半乳香同燈心研沒藥各五錢降香節四錢歸尾三錢龍骨五花者紅花各二錢蘇木一錢燈心一把上各為細末和勻每用少許乾摻傷處血不止多摻血藥乾結外用清油調塗淋洗方傷重用此煎洗然後上藥荊芥穗土當歸各三錢大蔥數株同生姜搗爛煎湯熱洗患處小紅丸皮破骨出筋斷損後傷肢節攣縮多服養筋骨氣血骨碎補薑製土當歸川烏炮楊白皮芍藥各六錢川芎蓬朮煨各三錢肉桂細辛各四錢乾薑炮丁香各二錢續斷一錢附子三錢半制乳香另研沒藥研各五分為末醋糊丸緑豆大硃砂衣三十丸酒下簡便方墜打痛腫歸尾大黃等分為末每三錢酒下又大黃杏仁當歸赤芍川芎酒煎服以緑豆粉炒酒醋調敷又立止痛無痕砂糖蔥白搗敷板縛或半夏末水調敷又白蒺藜或益母草或沒藥為末酒下瘀血老茄種為末酒下惡血攻心乾荷葉燒灰三錢酒下日三服無藥只飲酒瘀血亦下外蔥搗炒敷尉斗尉或小粉炒黑蔥汁醋調敷或蔥蜜搗敷骨斷白芨末三錢酒下即續外用骨碎補為末黃米粥調敷跌打傷沒藥研末三錢酒下或胡桃肉酒下外麥麩熱酒醋和敷又薑汁四兩香油四兩順攪勻以無灰酒熱調下飲至醉金瘡一切刀斧所傷也主方作膏黃柏黃芩當歸赤芍藥黃連黃耆牡丹皮地骨皮生地黃桑皮各錢半甘草白芷馬藜梢用葉燒過各一錢木鱉子三個去殼筋斷加杜仲續斷各二錢上用桐油二兩煎藥焦濾去渣油仍入鍋燒熱下白嫩松香一兩黃蠟一兩慢火煎頻用柳條攪勻傾水內扯白另研乳香沒藥末黃丹真者泡飛研各七錢手揉和膏納入鉢水養蓋好七日換水凡刀斧傷量大小取膏填傷孔中白紙護之疼止一日一換五日生肌收口加龍骨末五分入膏損傷只用油紙攤貼止血散刀斧傷出血不止或加石灰風化澱粉各一兩去無名倍子龍骨三錢無名異一兩乳香沒藥各二錢五倍子二兩半生半炒白礬一兩半生半枯各研細和勻摻傷處不作膿不怕風定痛生肌長肌散治金瘡止血定痛生肉收口內以本婦衣帶二寸燒灰酒服乳香沒藥三七象皮龍骨飛丹兒茶軟石膏煅飛各研極細等分和勻摻簡便方出箭頭花蕊石煅七次研細撒傷處四周箭頭自出一捻金金櫻葉嫩苧頭各二兩桑葉一兩搗敷或端午閉日研末備用刀斧傷降真香五倍子銅末等分研勻敷又桑葉炕干為末更搗汁調敷桑汁調石灰亦可又石灰入臘月牛膽陰乾研敷頭碎亦效或石灰飛面敷又夏枯草嚼爛敷或白芨末或雞肫內黃皮焙研敷血不止三七嚼花蕊石研五倍子研野苧葉搗隨用傷未透膜乳香沒藥各一錢研細以小便熱酒各半盞調服外用敷藥傷重氣存蔥白搗炒熱遍敷傷處冷則再換痛止止痛劉寄奴為末糯米湯調敷凡傷處急用炒鹽摻不爛杖瘡飲童便或衆人尿則血不攻心切忌房室犯之難斂主方歸尾赤芍生地白芷防風荊芥羌活連翹黃連黃芩黃柏梔子枳殼車前子甘草等分水煎服潤肌湯治杖瘡日久不斂人參白朮茯苓當歸白芍熟地香附陳皮貝母白芷各八分甘草三分水煎服寒熱加柴胡骨皮口乾麥冬五味子膿清黃耆膿多川芎斂遲肉桂消腫寧痛膏濾淨豬油二兩下鍋燒熱熬化黃蠟一兩攪入後藥乳香沒藥兒茶雄黃各三錢輕粉一錢官粉一兩各研細和入油勻收鉢內用油紙攤貼去腐抽膿定痛長肉洗方防風荊芥苦參當歸煎湯洗簡便方杖不破者瓷鋒出血用豆腐切片鋪傷處散血定痛竹木刺治竹木針入肉用生薑橘皮鹽等分研如膏塗自出桂臘丸肉桂為末以黃蠟溶化和桂末作丸豆大一丸置刺處濕紙厚蓋火炙蠟化去紙蠟連刺出或松香如上法敷又土牛膝搗塗或羊糞水調塗或象牙末津調塗或萆麻子研爛絹襯傷處敷或白梅塗看刺頭出指甲拔湯火燒泡者切戒冷水火毒入內難救宜鹽鹽滷敷塗安主方生地當歸芍藥劉寄奴黃連黃柏黃芩木通梔子赤茯苓甘草等分上加燈心水煎服二便清利為愈次宜四物加白芷等服凝露散治湯泡火燒香油調鵝毛頻搽水出乾摻結靨愈白芨一兩黃連黃柏黃芩大黃各二兩共為末簡便方軟石膏煅赤石脂研細大黃末等分香油調搽濕乾摻又黃柏末豬膽汁調搽或枯白螺螄殼火煅研香油搽又火丹草搗敷或扁柏末雞子調或秋葵花搗浸油敷又桐油二分水一分攪勻塗或苦杖根為末油調或槐子或皮炒研香油調敷煙燻垂死白蘿蔔搗汁灌之蘇骨物鯁蓋骨物鯁刺不下若復從上出則為順治法之妙莫甚於湧吐或指絞或鵝毛蘸桐油或燈油攪令吐哽物隨出宜急為之遲則喉腫食消不能吐矣有因循纍日不食至不救者如鸕鷀豺獺治魚骨鯁梳灰治發鯁磁石下鐵貍虎狗涎化諸骨理宜類推將小盞盛滿水或湯以左手大食小三指豎起屈中名二指駕水在上向東橫左足豎右足作丁字右手豎食指屈餘四指空書上九字於水面又二篆書蓋面向東吸氣一口吹入水中令患人口飲水即化如幼兒不能飲水食白飴糖黏骨即下或吐魚骨韭白嚼令軟用細線系口中吞至鯁處引之骨出又水一盞默以左眼睛於水中書龍字服不過兩盞小兒書與飲又砂仁甘草為末棉裹含徐咽津久隨痰出或萱草根搗汁吞下又獺爪爬喉下或獺骨含口中自下或金鳳花子或根搗絞汁服又皂莢末吹鼻得嚏哽出或口念鸕鷀七遍水咽下又本魚骨頂頭上咳聲出或左右手反復擲骨背後立出又魚骨肚肉刺痛煎吳茱萸湯飲或飲好米醋半杯諸骨哽威靈仙煎汁入砂糖服或野苧根搗丸雞骨雞湯下魚骨魚湯下又將狗後腳提起涎出飲少許或胡荽略擂拌醋連渣咽又霜梅肉搗指大綿裹冷茶下扯住線頭嘔出麥芒梗鵝倒提口涎飲消篾刺爛竹籬棍急流水煎飲錢梗生茨菰搗汁飲或荸薺汁或艾汁或百部四兩煎酒飲效錢金銀物胡粉一兩搗硝石少許作二服在腹中服此亦消又取薤黃曬令萎黃煮熟勿切食一大束即下又誤吞針瓷器一塊呵之即出又多食豬羊肥肉汁自瀉出一兒誤吞釣鉤刺喉得鉤線在外用數珠子穿線上逐個送入喉中以珠抵釣頂脫其尖一掣而鉤上出巧法也一吞錢哽喉以白紙卷實如箸以刀橫亂割其端作鬅鬆狀別取一箸縛針鉤於端令不可脫先下咽輕提輕抑覺鉤入錢眼次以紙卷納入咽中與鉤尖相抵一掣而出五絶自縊溺水壓墜鬼魘産死氣已絶皆可救蘇及諸暴絶並以半夏末或皂莢末捻入鼻取嚏或蔥韭白心刺入鼻數寸掐人中提頂發及大指甲下離一韭葉許各灸數壯更灸臍下自縊急抱起緩解下切勿割斷繩用手裹衣抵住糞門婦人並塞陰戶氣泄不救放下安臥一人以腳踏兩肩手緊挽其發勿縱一人搓正頸喉摩動胸腹一人將臂腿徐屈伸之四人各執蘆管吹耳鼻更掩其口待眼開氣舒即以薑湯粥飲灌之諸絶心下溫者可生溺水撈救得合復安大凳上垂其頭腹下仰臥活人或復牛背上刀斡開口橫放箸一隻令水出腳高起數寸用皂莢末綿裹塞糞門內以鹽擦臍中水出盡取燥壁土杵細鋪地上溺人仰臥埋其身以艾灸臍中冬月急換暖衣用灶內無火熱灰埋蓋其身四人吹耳鼻薑汁灌墜壓磚木石壓從高墜下氣絶者斡開口令人撒尿口內得咽即生取淡豆豉數兩水酒煎服血攻心乾荷葉燒灰童便調下三錢日三服或熱好酒灌將連根韭搗炒縛傷處尉斗火尉魘寐不宜上前叫喚但痛咬腳跟足拇指多唾其面有燈則存無燈勿點半夏皂莢末吹鼻取向東桃柳枝煎湯灌或灶心土研二錢井水下次用蘆管吹耳鼻鬼擊客忤等一切卒死用菖蒲根或韭冬用根搗汁灌口鼻中或干菖蒲研末吹鼻水調下更取井底泥塗身目令人垂頭井中喚姓名或腹痛如刀刺艾煮汁灌吐蟲物灸足大指甲後十四壯凍死急換活人暖衣用大米或灶灰炒熱囊尉心上冷再換熱酒薑湯粥湯頻灌以氈單或草荐裹緊二人輕手滾捍肢溫即活切勿見火蘇合香丸薑湯酒調灌妙中熱移陰處熱土堆臍衆人尿熱土同大蒜研水灌詳見暑門胎産血運救療極宜肅靜喧叫則死詳見産後
