body:
  text: 卷之四虛損附脫陽經曰男子盡八八而精絶女子盡七七而經閉夫人之陰氣止供三十年運用難成而易虧可以縱欲耶又曰年四十而陰氣自半起居衰矣又曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體苦勞汗出於脾又曰久視傷血損心久臥傷氣損肺久坐傷肉損脾久立傷骨損腎久行傷筋損肝若夫七情五臟之火飛越男女聲色之欲過淫是虛損之所由也難經曰感寒則損陽陽虛則陰盛凡損自上而下一損損肺皮聚而毛落二損損心血脈虛少不榮臟腑婦人則月水不通三損損胃飲食不為肌膚治宜以辛甘淡過於胃則不可治矣感熱則損陰陰虛則陽盛故損自下而上一損損腎骨痿不能起床二損損肝筋緩不能自收持三損損脾飲食不能消克又曰心肺損而色憊腎肝損而形痿又曰損其肺者益其氣損其心者補其榮血損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精蓋虛損之證多由色欲過度喜怒不節起居不時飲食恣意有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土而胃氣散解不能滋榮百脈灌溉臟腑衛護周身而病成矣故百脈煩痛腰腳痠軟胸滿氣短心煩不安耳鳴目眩口乾盜汗嗽痰失血遺精白濁飧泄肌瘦食少無味睡中驚悸乍寒乍熱倦怠嗜臥女子經閉皆虛損之候也脈洪數火熾芤澀失血滑大痰多浮長嗽甚最忌寸部細數急澀而溢出本位者難治此證宜防微杜漸若病成不可全賴藥力極當斷房室絶怒氣薄滋味戒殺生清心滌慮默養可安忌食鮮豬肉諸動火發氣物主方人參白朮茯苓當歸生地麥冬白芍各一錢甘草五分加姜一片棗一枚水煎服日晡寒熱骨蒸夜甚加知母地骨皮不退加銀柴胡胡黃連青蒿鱉甲醋炙研細人中白人中黃隨輕重暫用不退加焦三分或桃柳腦汗多加黃耆酸棗仁炒研嗽加五味冬花天冬百部百合紫菀桑皮杏仁痰多貝母橘紅天粉栝蔞神不安遠志茯神柏子仁硃砂水飛調服遺精蓮蕊芡實龍骨牡蠣醋煅保和湯治嗽痰肺痿諸證知母貝母天冬麥冬冬花蕊各二錢天粉苡仁五味子當歸生地桔梗各一錢甘草五分上加生薑一片煎化入阿膠一錢飴糖數匙服嗽甚加紫菀百合潤肺栝蔞仁杏仁火盛芩連薄荷梔子竹茹失血蒲黃炒黑茜根藕節小薊喘加真蘇子桑皮橘紅沉香補中益氣湯補氣養血理脾助胃升陽益陰扶元固本黃耆白朮各一錢半人參當歸陳皮各一錢炙草五分柴胡三分升麻二分上加姜一棗一水煎空心服隨證加減調中益氣湯理氣血兩虛前方減白朮當歸加蒼朮五分木香二分人參固本丸補養心腎滋填精血聖藥選料誠制有痰二地薑製生地黃熟地黃天門冬麥冬各二兩人參五味子各一兩上依法為末蜜丸桐子大每服七十丸空心溫酒或鹽湯下六味地黃丸五臟齊損六腑致虛陽盛陰虧水不制火煎熬肺金嗽痰失血盜汗骨蒸煩渴形悴腰膝痠軟遺精便濁等證熟地懷大八兩山茱萸肉山藥懷各四兩牡丹皮白茯苓澤瀉各三兩上為末煉蜜和搗千下丸桐子大每百丸空心淡鹽湯送下桂附八味丸治命門火衰夜多便溺陽事痿弱火不生土等證前方加附子一個依製藥法肉桂去皮一兩丸服法同知柏八味丸陰虛火動腎水不足五心煩熱口燥咽乾溺赤前方加黃柏鹽水炒褐色四兩知母鹽炒二兩丸服法同加味地黃丸男婦陰虛火動手足心熱口乾唇燥夜臥不安遺精白濁咳嗽失血痰涎壅盛面黃肌瘦骨蒸勞熱等證六味加黃柏制四兩當歸白芍知母生麥冬各三兩五味子二兩法同培元大補丸虛損勞傷頭運目眩耳鳴體倦嗜臥懶言一切氣虛無力證悉治常服補精駐顏益腎填髓強筋骨養榮衛人參白朮茯神茯苓天冬麥冬生地熟地遠志牛膝杜仲蓯蓉黃柏鹽酒炒知母鹽酒炒當歸山藥等分為末蜜丸桐子大每百丸酒下補陰丸濟陰養血補腎益精強腰膝壯筋骨黃柏知母俱鹽酒炒熟地蒸各三兩龜板酥炙四兩白芍當歸牛膝各二兩虎脛骨制鎖陽酒炙陳皮各兩半上為細末煉蜜和丸如桐子大每服百丸空心溫好酒或淡鹽湯送下加味虎潛丸諸虛不足腰腿痠疼行動無力壯元陽滋腎水前方加人參黃耆杜仲枸杞山藥菟絲餅各兩半故紙七錢減陳芍天王補心丸古方寧心保神益血固精壯力強志令人不忘清三焦化痰涎祛煩熱除驚悸療咽乾口燥育養心氣人參熟地天冬麥冬茯苓茯神石菖蒲遠志丹參玄參酸棗仁柏子仁當歸五味子杜仲百部桔梗甘草等分上製成為末蜜丸龍眼大每一丸臨睡燈心黑棗泡湯化下仙傳斑龍丸壯精神除百病養氣血補虛損奇效衰弱常服延年遐壽昔蜀中道人酣歌酒肆曰尾閭不禁滄海竭九轉金丹都慢說惟有斑龍頂上珠能補玉堂關下血真人仲源索方傳世鹿角膠鹿角霜菟絲餅柏子仁熟地各八兩白茯苓破故紙各四兩為末將膠用酒二碗蒸化添酒糊和丸桐子大百丸鹽湯下斑龍二至丸前方減菟絲柏仁熟地故紙加黃柏知母首烏當歸生地補天丸治氣血虛敗百髓羸憊臟腑虧傷精神疲竭等證紫河車一具法見前製藥法常服配十全大補湯藥料十數兩為末另將河車煮爛搗膏和末焙磨乾者切同藥研蜜丸每三錢酒下有病者隨證配藥四君子湯補元氣益脾胃人參白朮茯苓各一錢甘草炙五分加薑棗水煎服六君子湯補元健脾消痰理氣即四君加陳皮半夏八珍湯補氣養血四君子合四物歸芎芍地十全大補湯大補氣血實腠溫經八珍湯加黃耆一錢肉桂五分脫陽此由斫喪過度腎水虧竭相火獨熾不能攝精易於傾泄或吐瀉大病後或傷寒證新瘥交接狂縱忽致脫絶其證四肢厥冷小腹急痛外腎吊縮短氣不續冷汗神昏急宜搗薑蔥炒尉臍腹煎獨參湯或五積散或理中湯方見中寒更以薑汁好酒熱灌依中寒門灸法勞瘵附傳尸經曰有所勞倦形氣衰少榖氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱又曰陰氣者靜則神藏躁則消亡又曰神靜則陰生形役則陽亢陰虛生內熱陽虛生外寒夫虛勞者五勞七傷六極是也五勞者心勞則悸惕善忘口舌生瘡肝勞則面黑目昏精神不守脾勞則舌本若直不得咽唾肺勞則短氣面浮不聞香臭腎勞則背難俯仰餘瀝莖痛囊濕生瘡小腹滿急七傷者大飽傷脾脾傷善噫倦臥面黃大怒傷肝肝傷失血目暗不明強力舉重久坐濕地傷腎腎傷少精腰脊強痛厥逆下冷形寒飲冷傷肺肺傷少氣咳嗽鼻鳴憂愁思慮傷心心傷苦驚怔忡健忘風濕寒暑傷形形傷則髮膚枯槁恐懼不節傷志志傷則恍惚不樂六極者氣極令人內虛五臟不足不欲多言血極令人無顏色眉發落墜筋極令人數轉筋指爪甲痛苦倦不能立久骨極令人瘦削齒痛手足煩疼立不欲行肌極令人羸疲無澤不生肌肉精極令人少氣翕翕然內虛感病之始必因形體虛弱勞損心神七情六欲妄動陽火房勞斫喪致耗真陰或風寒瘧痢咳嗽痰飲日久變成漸至朝涼夜熱盜汗遺精咯吐膿血煩躁咽乾病機不可勝言無出陰虛陽盛火邪燔灼最宜絶欲藏言澄心靜慮內觀自養乃得陽伏陰生若至音啞肉削女子血枯經閉盧扁莫療凡脈洪大者猶可治細數急澀者難調宜滋陰抑陽壯水制火養血益氣和胃健脾藥忌寒涼食戒生冷主方當歸白芍生地天冬麥冬黃柏鹽炒知母生白朮陳皮等分甘草減半加薑棗煎入竹瀝童便各半盞薑汁二匙服夜熱加骨皮秦艽晝熱加丹皮血痰加天冬紫菀阿膠肺火玄參片芩枇杷葉石膏腎虛山萸枸杞胸滿加枳殼桔梗腰痛膝軟加牛膝杜仲破故紙石斛山藥泄瀉加蓮肉扁豆山藥苡仁小便不利石蓮車前滑石咽痛甘草桔梗山豆根音不出訶子浸軟蜜煮噙加減法與虛損參用抑陽丸虛勞初甚形肉未脫最宜退熱為急務雖有泄瀉等證皆由熱致熱除瀉止若病者遷延藥力怠緩其熱晝夜煎熬故血涸水枯津液干竭真陰頓絶內熱愈熾何異烈焰肺金受害尤劇痰涎壅盛喉音漸啞肌肉瘦削必不起矣熱退止服人中黃人中白研細鱉甲童便或醋炙研極細青蒿秋冬用子當歸各二兩麥門冬地骨皮各兩半上為末豬膽十個取汁和水疊丸緑豆大每服百丸白湯送下日三服鱉甲同龜甲煎膠入豬膽和丸尤妙黃耆益損湯男婦童男女諸虛不足五勞七勞骨蒸盜汗咽乾痰嗽咯吐血絲寒熱頰赤神昏不食服熱藥煩躁沖滿寒藥膈塞腹痛黃耆人參石斛白朮當歸茯苓川芎白芍熟地山藥丹皮麥冬各六分木香另磨肉桂甘草各二分五味子五粒上咀水盞半姜三片棗一枚小麥五十粒烏梅一個煎七分服鱉甲散虛勞客熱肌肉消瘦煩熱心悸盜汗食少多渴嗽血鱉甲黃耆青蒿淨葉知母秦艽紫菀地骨皮銀柴胡懷生地赤芍藥桔梗甘草等分上加枇杷葉三片去毛水煎服虛加人參天門冬五味茯苓太平丸治陰虛咳嗽吐嘔咯血骨蒸虛勞諸證白湯調服亦可天門冬麥門冬知母貝母冬花杏仁各二兩生地黃熟地黃當歸黃連阿膠各兩半蒲黃炒黑京墨火煅桔梗薄荷各一兩麝香不用亦可為末蜜和丸龍眼大噙化服犀角丸治骨蒸勞熱等證效犀角屑鱉甲打枳殼黃連各一兩龍膽草貝母升麻各三錢烏梅肉三兩秦艽二兩軟柴胡一兩五錢上末烏梅蒸搗入豬膽汁二合煉蜜和搗丸桐子大每服三十丸不時米湯下忌豬肉莧坎離膏治勞瘵發熱陰虛火動咳嗽吐衄咳咯血喘急盜汗黃柏炒知母各四兩生地黃熟地黃天冬麥冬各二兩杏仁淨研七錢胡桃肉去衣蜂蜜各四兩先將柏知童便八碗添側柏葉二兩煎四碗去渣次將二冬地入汁添水二碗煎二碗將衆渣搗細水二碗煎一碗共三碗杏桃搗如泥同蜜入汁慢火熬成膏瓷器盛貯坐水內一日出火毒每服數匙扁柏湯下生津止嗽膏雪梨汁十鍾藕汁鮮地黃汁茅根汁各五鍾麥門冬汁蘿蔔汁各二鍾半濾淨入新砂鍋煎減半入白蜜八兩飴糖四兩薑汁少許有血加扁柏入童便搗韭汁茜根汁各半鍾熬膏每半鍾溫服簡便方除骨蒸祛鬼氣童便五碗青蒿汁五碗砂鍋煎至三碗濾淨慢火熬至二碗入豬膽汁三枚煎至半碗許入甘草末搗千下丸如桐子大每五十丸空心米湯下又童便二鍾無灰酒一鍾新瓷器盛入豬腰子一對重湯煮過夜五更腰汁同食多乃效煮雞子亦可又胡黃連末一錢蜜湯下或羚羊角末一錢溫水下又生地黃汁一斤蜜四兩熬稠頻服或苦參末一兩芒硝三錢蜜丸湯下虛勞不眠酸棗仁一兩炒研水二盞絞汁地黃汁一合米二合煮粥食傳尸此證父子兄弟夫妻患病傳染相延數世甚至滅門者實有勞蟲出死入生群書繪形逐世變易計九種弱人切宜防避萬病解毒玉樞丹方見蠱毒治傳尸勞每用一錠雞鳴時磨服俟下惡物或有形或如亂髮紅絲亦是也次進飲食未下明早再服下為度又棐子百枚空心食殺蟲又尸蟲雄黃一兩水飛松香一兩溶化和丸蓮子大平旦吞一丸七日蟲盡出蘇合香丸用石榴皮桃柳梅桑枝青蒿鬼臼赤箭煎湯服又桃仁百二十粒泡去皮搗為丸平旦水服完飲酒至醉未下再服忌肉百日尸蟲骨蒸百部一斤酒炒青蒿子八兩為末蜜丸每百丸早晚米湯下瀉減服音聲經曰內奪而厥則為喑俳皆腎虛也俳者廢也蓋心為音聲之主肺為聲音之門腎為音聲之根舌乃心之苗故心絶者舌不能轉而為言也然而又有暴感風邪咽閉者有因爭兢叫傷者有因歌唱損氣者風寒暑濕燥火並可干於音聲皆為易治惟酒色過度腎臟虧傷不能納氣歸元氣奔咽嗌嗽痰喘脹諸病雜揉致氣乏失音者俗名啞勞是也神人莫療脈浮緊為風寒洪大為火滑為痰微弱氣虛惟細數急澀危候主方桔梗甘草茯苓陳皮石菖蒲木通訶子煨取皮各等分加燈