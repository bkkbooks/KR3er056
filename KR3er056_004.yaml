菀阿膠黃耆茯苓人參各一錢桔梗麥冬冬花薄荷各七分甘草五分五味十二粒姜一片水煎沖膠服往來寒熱柴胡黃芩痰多加橘紅製半夏血虛加當歸白芍咽乾而渴另用生薑五錢人參二錢甘草三錢大棗三枚分煎涎多不渴用桂枝五錢甘草二錢大棗六枚皂角二條炙去皮弦分二服水煎保肺飲肺痿咳嗽胸中隱痛辟辟燥咳人參麥冬薏苡仁百部黃耆桑皮五味子當歸芍藥酒炒片黃芩百合等分加姜煎服癲狂經曰癲疾厥狂久逆之所生也又曰陽氣太上甚則狂癲陽盡在上而陰氣從下下虛上實故癲狂也又曰重陰者癲重陽者狂又曰陰陽復爭則欲登高而歌棄衣而走又曰狂病始發少臥不飢自高賢也自辨智也自尊貴也語言善惡不避親疏神明之亂也夫感病之由得於大怒大恐大喜及不得志或有所失或得於驚驚則能動人之神心為神之舍神去則舍空津液流入則變為痰迷心竅痰鬱成火火性炎上故登高大言或屈無所伸怒不能泄肝木膽火炎上於心心火奔騰神舍失守久逆而成也脈實大堅滑者生弦急而虛者死治宜降火清痰鎮心安神兼服滾痰丸豁痰丸並見痰門造命丹小兒驚門主方黃連黃芩梔子炒連翹茯神遠志棗仁炒研石菖蒲當歸生地黃川芎等分甘草減半加燈心竹葉水煎調辰砂服虛加人參白朮實熱大便祕加大黃或防風通聖散方見風門痰多加橘紅南星半夏天麻白附海石栝蔞竹瀝去遠志棗仁當歸生地清心湯治心受熱邪狂言叫罵動履失常黃連黃芩薄荷連翹梔子甘草大黃芒硝各等分上水盞半竹葉十個煎八分溫服抱膽丸男婦一切癲狂風癇婦人産後驚心室女經行驚氣硃砂二兩飛研乳香研末水銀黑鉛各一兩先將鉛銚內溶化下水銀攪勻研細入朱乳木用米粥和丸緑豆大每服一錢井水送下得睡愈牛黃瀉心散治心經邪熱狂言妄語禁捉不定牛黃冰片各一錢硃砂水飛二錢大黃生末一兩研勻每服三錢薑湯和水調下蔚金丸癲狂多年不愈痰迷心竅驚擾忿怒得之蔚金蜀地香者六兩明礬三兩上為細末薄糊丸桐子大每五十丸白湯下簡便方陽狂火熾作渴用鉛溶化下水銀等分攪勻研細每服三分水一碗調勻服狂甚時與水飲之可安此證宜察致病之由當如其願有喜甚致狂者以恐怖抑之雪梨消痰清火多食大益忌鮮豬羊肉厚味酒動火發氣物癇證經曰神不得守謂神亂也按此病皆由驚動其神使臟氣不平鬱而生涎閉塞諸經痰涎壅積變熱生風癲屬於心癇屬五臟故有五種馬癇作馬嘶鳴應心羊癇作羊咩聲應脾雞癇猶雞撲翅應胃豬癇若豬叫狀應腎牛癇似牛吼喘應肺發則昏運倒僕口眼相引目睛上視手足搐搦腰背強直隨吐涎沫皆由痰火時潮平復則蘇雖因痰鬱膈間更屬肝經風火先宜治痰次疏肝火脈浮陽癇沉為陰癇滑大易治微細難痊凡氣血虛者早服補藥晚服諸方主方茯神南星制橘紅栝蔞枳實桔梗梔子半夏黃芩各一錢甘草三分加生薑三片水煎成磨入木香五分辰砂一錢竹瀝半杯薑汁三匙調服清心抑膽湯平肝解鬱清火化痰定眩運養血氣當歸白芍酒炒白朮茯苓陳皮半夏黃連石菖蒲枳實香附炒各一錢麥冬川芎人參遠志各七分甘草四分加生薑三片竹茹一團水煎服牛黃安神丸鎮養心神消痰清火養血五癇宜常服當歸人參茯苓酸棗仁生地黃黃連酒炒橘紅膽南星牛黃珍珠琥珀各二錢硃砂水飛天竺黃各五錢上諸藥為末次以牛珍珀砂竺各研極細和勻蜜丸緑豆大每服百丸臨睡燈心龍眼湯下金銀煎湯尤妙追風祛痰丸治諸癇與前安神丸兼服無不效天麻煨白附子麵包煨防風殭蠶各一兩全蠍洗淨微炒枯礬木香各五錢半夏六兩湯泡七次為末一半用皂角搗浸漿出和作曲一半薑汁作曲預製共為末薑汁打稀糊丸緑豆大硃砂衣每百丸臨睡薑湯下火加黃連姜炒一兩薄荷湯下胃虛白朮簡便方南星粉團九泡蒸九曬為末薑汁糊丸桐子大麥冬湯下又荊芥穗研末白礬研各一兩糊丸黍米大硃砂為衣每服一錢臨睡薑湯下又代赭石一兩火煅醋淬明礬二兩各研末勻糊丸緑豆大每三十丸白湯送下邪祟經曰邪氣盛則實外邪精氣奪則虛又曰人憂愁思慮則傷心又曰驚而奪汗出於心世俗謂沖斥邪惡為病有諸奇怪之狀及妄聞見妄言作誠因其人元氣耗損心血虧傷而致蓋心者神明之舍經曰心藏神為君主之官神明出焉心君失職則十二官各失其守故視聽言動皆不得其正矣又有曠野靜僻山谷幽陰魑魅魍魎迷惑乎人及人家男婦似有鬼附者當知必非精神完固氣血充足之人也脈經以乍疏乍數乍大乍小邪祟之脈治宜驅邪辟惡安神鎮心主方菖蒲一寸九節鬼箭桃奴臘月樹上干小桃當歸川芎人參茯神麥冬遠志蒼朮各一錢甘草三分上加生薑七片金銀同煎調辰砂雄黃各一錢磨木香五分調服蘇合香丸宜服方見中寒玉樞丹宜服可燒方見蠱毒燒檀速諸香蒼朮白芷秦承祖灸鬼法一切驚狂譫妄沖斥邪祟以患人捉定先縛兩臂次細繩並縛兩大指用大艾炷置於中兩指甲及兩指角肉四處著火灸七壯一處不著火不效及灸人中臍中百壯簡便方五尸邪惡卒中掐人中提頂發半夏皂角末搐鼻取嚏或灶心土為末吹入鼻或灶突煤薑汁酒調灌燒諸香多人圍繞蘇醒方可移動以雞蛋一枚取白與吞搖頓令下又桃奴小干桃桃蠹為末酒下或搗菖蒲汁灌或多取桃仁桃枝煎汁灌女子邪交雄黃一兩研細松香二兩溶化桃枝攪勻丸如彈大焚嗅令女坐焙籠中被圍留頭面身下燒丸熏之邪斷夢遺精滑經曰精者身之本生氣之源髓之化也又曰陰平陽祕精神乃治陰陽離決精神乃竭蓋精之藏攝在腎精之主宰在心心為君火腎為相火相奉君命故病在腎而責在心心藏神神動精泄病機有五曰夢交火熾神虛宜養心藥斂曰滑脫腎虛不攝宜滋補腎氣曰滿溢少壯鰥曠宜靜默精化精能化氣曰情想妄言視聽宜攝意降心曰濕熱傷熱流通宜滲濕清火大都制相火壯腎水寧心神固精髓不易法也尺脈洪數失精便濁心脈短小主夢遺主方黃連生地遠志茯神棗仁芡實柏子仁石蓮肉黃柏鹽炒麥門冬蓮蕊各一錢上加燈心二十枝水煎成調硃砂飛龍骨研各一錢服王荊公妙香散安神定心固精茯苓茯神各二兩遠志益智仁龍骨研各一兩甘草硃砂飛各五錢上為末入龍朱研勻每服二錢臨睡溫酒調下金鎖丹腎虛精滑心神不安黃柏鹽水炒知母炒各一兩牡蠣火煅醋淬赤石脂龍骨三味另研蓮蕊芡實茯苓遠志山萸肉各三錢硃砂二錢上為末山藥末調糊丸桐子大朱衣每服六十丸空心酒下固精丸扶元益腎祕精人參白朮茯苓熟地山藥鎖陽牡蠣煅蛤粉煨黃柏知母俱酒炒杜仲金櫻子椿根皮臭破故紙酒炒各一兩上末蜜丸桐子大朱衣每五十丸空心酒下十全大補湯或補中益氣湯方見虛損加山萸五味山藥之類治氣血虛遺精簡便方泄精蓮子心為末一錢入硃砂二分空心白湯下又嫩烏藥益智仁硃砂各一兩留半為衣山藥糊丸桐子大每百丸早鹽湯下又韭子炒研末酒糊丸每二錢鹽湯下或旱蓮草焙研末米湯下遺精盜汗臥床中側身縮腳唾調五倍子末填臍內帛束一手扎陰囊便濁附交腸經曰諸轉反戾水液渾濁皆屬於熱又曰脾胃濕熱下流滲入膀胱故便溲白或赤而渾濁蓋緣思慮過節房欲無度致心腎氣虛君相不能管攝陰陽不能降升上下乖睽清濁混淆傷氣分者白傷血分者赤又有肥人因濕痰流注稠黏如糊宜燥脾土弱人因傷精漩白光彩如膏宜益下元少年患者溺時痛似刀割管口精濁干凝多緣欲事中阻淫火不泄治宜分利清火為主赤兼清心調氣白兼補腎培元兩尺脈洪數便濁主方便濁大痛赤茯苓澤瀉豬苓木通黃柏鹽炒瞿麥車前子淡竹葉萹蓄各八分滑石研細錢半甘草三分上加燈心二十枝水煎空心服火盛加梔子條黃芩車前草搗絞汁分清飲治赤白濁益智川萆薢赤者石菖蒲車前子赤茯苓豬苓澤瀉白朮枳殼陳皮各八分升麻甘草梢各三分上加燈心水酒各半煎空心服首帖加麻黃八分減升麻如熱甚作痛加炒黃柏二錢煎成調青黛七分滑石末二錢去枳陳智不通加木通淡竹葉萹蓄石葦等變虛寒加炮薑肉桂三分日久服涼藥過多真元耗損腎虛有寒頻數無度光彩如膏益智萆薢菖蒲烏藥茯苓等分水煎入鹽一分空心服珍珠粉丸治白濁遺精黃柏鹽炒為末蛤粉煅另研各四兩珍珠五錢水飛如無用真青黛水丸桐子大每二錢燈心湯下水陸二仙丹治赤白濁及遺精芡實肉研末金櫻子刮刺去子搗絞汁熬膏和芡丸每服二錢空心白湯下白龍丸治白濁滑精龍骨牡蠣煅各一兩鹿角霜二兩為末山藥末調糊丸桐子大五十丸空心酒下妙靈丸治赤白濁遺精白茯苓菟絲子煮餅龍骨煅各五錢益智仁石蓮肉桑螵蛸各三錢半上末山藥末調糊丸桐子大每服五十丸空心人參棗仁湯下白湯亦可清心蓮子飲赤濁淋瀝澀痛遺精口苦咽乾渴婦人帶下方見淋門二陳湯方見痰門肥人濕痰下流加白朮一錢升麻柴胡各五分濕痰兼氣血虛加蒼白朮參歸地黃梔柏牛膝六味地黃丸方見虛損瘦人虛熱便濁加芍知麥柏參朮草膝萹蓄六一散方見暑門濁痛每三錢車前草搗汁調勻燈心湯送下簡便方白濁遺精白鹽入瓷罐蓋煅通紅地上放冷每兩入茯苓山藥末各一兩棗肉和蜜丸如梧桐子大每服三十丸空心棗湯下又茯苓二兩豬苓一兩水一碗煮乾去豬用茯苓為末臘丸彈大每丸嚼細燈心棗湯下或韭子研末酒下或陳皮冬瓜仁研末米湯下交腸乃大便出尿小便出糞凡人小腸下口名闌門七飛門之一由此分別清濁氣不循故道則失其守也主方澤瀉豬苓白朮黃連阿膠滑石各一錢官桂木香磨各五分加燈心水煎化膠服簡便方破幞頭或漆帽燒灰米湯下便癃附大小便閉經曰胞移熱於膀胱則癃溺血膀胱不利為癃又曰足三焦者太陽之別也並太陽之脈入絡膀胱約下焦實則閉癃虛則遺溺蓋腎主水膀胱儲之陰陽升降榮衛流行則水竇開合有常若二經氣虛水不制火或客熱乘之致君相不攝陰陽不調熱閉下焦故水道澀察熱微甚用藥寒涼當寒因熱用必伏其所主而先其所因始則大同終多小異虛而熱乘壯水制火氣虛補氣血虛補血兼濕痰則滲濕清痰緣氣結則導氣升結數證先宜吐法大吐升提其氣則水自降譬如滴水之器上竅通而下竅之水出矣又有鬱怒日久木克脾虛土不制水漬入肌膚腫脹急痛水道絶矣漸見毛孔水出者不治婦人多患須初覺時猛宜健脾疏肝脈多澀數左尺脈實清熱調氣主方熱結黃柏牛膝滑石研木通豬苓澤瀉麥門冬車前子瞿麥萹蓄各八分甘草梢三分加燈心二十枝水煎空心服未通加地膚子萆薢石蓮子秋葵子海金砂枳殼老人氣血虛不通加四物湯黃芩減利水藥清肺飲肺乏生化之源口渴便閉熱在氣分豬苓通草各二錢赤茯苓錢半澤瀉一錢燈心五分木通萹蓄瞿麥各七分水煎成調入真琥珀末五分車前末一錢服坎離丸不渴而小便閉熱在血分黃柏知母俱鹽炒各二兩肉桂二錢為末蜜丸桐子大每百丸空心淡鹽湯下頓足藥行小便利莖中痛以六一散燈心湯服有惡物下助元湯便閉因氣血兩虛人參當歸生地赤苓豬苓澤瀉黃柏鹽炒知母牛膝梔子枳殼各八分升麻二分甘草三分加燈心二十枝水煎空心服益陽湯便閉無熱證屬虛寒甚因涼藥過多加附子肉桂當歸赤苓白朮枳殼牛膝石蓮子澤瀉各八分甘草梢三分加姜一片燈心二十枝水煎五苓散分理陰陽清利水道通小便止泄瀉澤瀉二兩半茯苓白朮豬苓各兩半肉桂六