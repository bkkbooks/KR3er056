body:
  text: 卷之五頭痛頭風附眉稜痛難經曰手三陽之脈受風寒伏留不去則厥頭痛蓋厥者逆也逆壅而沖其頭故作痛如痛引腦齒陷於泥丸宮者名真頭痛手足厥冷至節旦發夕死非藥可治夫頭痛之證內成者因氣血痰飲七情抑鬱外感者因風寒暑濕諸邪致傷然屬風火居多以人之頂惟風火二氣易升故也矧面為五臟精華頭為六陽會首宜疏風散邪兼清火養血此其大略也尤當分別六經及氣血寒熱濕痰新久為要凡太陽巔頂痛連額項惡風陽明頭目痛連齒頰身熱少陽頭角偏痛連耳寒熱往來太陰體重有痰腹滿少陰足寒氣逆為厥頭痛厥陰頂痛厥冷或吐痰沫有頭痛耳鳴九竅不利氣虛也眼目昏花晝寧夜劇血虛也痛而多痰頭目眩運痰厥也痛而心煩體麻足熱濕熱也有犯大寒內至骨髓髓以腦為主腦逆為痛寒也目頰浮腫躁熱大痛熱也新發為實經年為虛如頭痛惡寒身熱屬傷寒從本門治又頭風之證偏正皆屬風熱伏留男子迎風露宿婦人頭不包裹者多患此日久不愈邪乘空竅乃致喪明偏左屬風及血虛偏右屬痰與氣虛治療方法頭痛同類經曰寸口脈中手短者頭痛脈經曰陽弦頭痛凡寸口緊急或短或浮或弦皆為頭痛脈浮滑風痰易治短澀難痊主方川芎一錢五分羌活白芷防風藁本各一錢升麻細辛甘草各三分加細茶一撮蔥頭三個水二鍾煎時以覆被覆頭通連藥罐口令熱氣熏頭痛處汗出煎至八分熱服再煎再熏服完厚包頭臥汗出痛止巔頂痛倍藁本加酒炒升麻柴胡火加酒芩痰加橘半冬加麻黃夏加石膏太陽倍羌活加蒼朮惡風寒麻黃獨活陽明倍白芷升麻自汗發熱惡寒葛根石膏少陽加柴胡酒芩太陰加半夏蒼朮南星脈沉理中湯寒門少陰倍細辛厥冷脈沉細麻黃附子細辛湯為主方見傷寒厥陰連項痛欲入太陰亦倍羌蒼厥冷脈沉緩吳萸湯主之氣虛人參黃耆血虛當歸川芎兩虛調中益氣湯方見虛損加川芎蔓荊細辛神效痰厥半夏白朮天麻湯因濕可吐濕熱空清膏有宿痰先以川芎茶調散吐之再服川芎薄荷辛涼之藥犯大寒厥頭痛羌活附子湯火極大痛便閉大承氣下大黃酒煮方見傷寒肥人二陳加蒼白朮瘦人四物酒芩防風勞苦及下虛痛甚此相火自下衝上補中益氣湯方見虛損加芎歸甚者知柏蔓荊細辛頭面壅腫有熱涼膈散火門去硝黃加桔梗荊芥薄荷風熱上攻天麻蔓荊臺芎酒芩細辛羌活附子湯治冬月犯寒及風邪入腦痛甚連齒亦名腦風麻黃附子炮防風白芷殭蠶羌活蒼朮各七分佛耳草無嗽不用黃耆各五分甘草升麻各三分水煎服川芎茶調散治諸風上攻偏正頭風頭痛鼻塞聲重薄荷葉二兩川芎荊芥防風各一兩白芷羌活甘草各兩半細辛二錢半上為細末每服二錢食後茶湯調下如聖餅治風寒伏留陽經痰飲氣逆頭痛防風半夏天麻各五錢南星川烏炮川芎乾薑甘草各一兩上末蒸餅糊和作餅如錢每五餅同荊芥末嚼細茶湯下九仙丹男婦八般頭風一切頭痛川烏炮石膏水飛白芷川芎草烏南星半夏各五錢細辛全蠍各二錢半上末韭汁丸桐子大每五十丸茶下空清膏偏正頭痛久不愈及風熱目痛腦疼等證羌活防風黃連甘草各兩半柴胡七錢川芎五錢枯芩兩半酒炒一半上末每三錢茶清調如膏抹口內臨臥白湯下頭痛甚加細辛三錢痰厥痛加半夏偏頭痛倍羌防芎上清散頭痛連眉骨眼痛不可忍川芎鬱金芍藥荊芥芒硝各五錢乳香沒藥俱另研薄荷各一錢冰片五分上為細末每用三分搐鼻內半術天麻湯痰厥頭痛欲裂眼黑昏運噁心如風雲中身重冷不臥橘紅半夏麥芽各七分半白朮神麯各五分蒼朮人參黃耆天麻茯苓澤瀉乾薑黃柏各三分上加生薑三片水煎一服安簡便方決明子為末水調貼太陽穴或作枕血虛痛當歸二兩好酒煎服新沐感風川芎四錢天麻一錢為末蜜和嚼茶下久痛栝蒂末吹鼻清水出安風吹項背腦痛婦人胎產頭痛白芷泡研末蜜和細嚼茶下風熱頭痛川芎白芷石膏等分為末每四錢茶下頭項痛蒸大豆一升枕愈再蒸止痛太陽丹大南星川芎等分為末連須蔥白搗餅貼太陽痛處痰厥痛烏梅十個鹽二錢水煎服吐痰愈卒痛殭蠶末二錢湯下諸頭痛蒼耳川芎當歸等分為末每服三錢臨臥茶下冷痛艾葉揉軟用帛夾包痛處以熨斗火熨暖熱痛止熱痛大黃末朴硝等分研勻井底泥和作餅貼太陽及痛處痛不可忍玄胡索七枚豬牙皂角二條青黛二錢為末水調數分令患人臥竹管送入男左女右鼻中藥至喉小酸坐起門牙咬一錢涎出盛盆安眉稜痛屬風熱與痰痛連頭額作風痰治素多怒者疏肝火理風痰見光明痛甚屬肝虛目不能開晝靜夜劇導痰湯加細茶主方羌活防風川芎酒芩白芷各一錢荊芥薄荷各八分細辛升麻甘草各三分蔥茶煎服濕痰蒼白朮二陳南星火加梔子連翹多怒柴胡膽草血虛當歸生地赤芍肝虛阿膠橘葉風寒川草烏俱童便制項強經曰諸頸項強皆屬於濕蓋頸項強直不能回顧不得轉動者乃風濕之邪干於足太陽經或痰熱客於經絡或致微痛脈數而實右手為甚治宜驅風散邪利氣舒筋有痰熱寒濕相干者隨證治之主方陳皮半夏茯苓各一錢半木瓜三錢羌活酒芩各一錢紅花甘草各五分上水煎服兼有外邪加烏藥蒼朮各二錢甚者加乳香沒藥治項強鮮木瓜一個取蓋去穰入乳香沒藥末各五錢扎定飯上蒸多次研成膏每服五錢地黃汁和酒下或乾者酒煮搗入乳沒服身體痛夫周身骨節之痛種種不同有濕鬱周身作痛者有食滯而身痛者有痰凝經絡作塊而痛者有諸骨節疼酸或寒或熱者有好酒濕熱鬱滯而痛至於臂項腫疼發熱嘔吐上焦不能清利者皆日常醞釀致生痰涎飲沫隨氣上行浮壅於肺咳嗽發動稠膿者為痰留聚於脾溢流口角不禁者為涎停積於胃嘔吐出清稀者為飲飲脈多沉濡而弦痰脈多浮大而滑鬱滯脈多沉伏痛甚脈沉而緊治宜散郁行氣滲濕疏風清痰去熱痛止之後調補氣血主方蒼朮羌活酒芩秦艽威靈仙當歸防風薑黃甘草水煎服未安服後方當歸拈痛湯治風寒濕三氣雜至合而為痹遍身走注肩臂背腰腿膝周身作痛甚者及風濕諸證脛足水濕膿瘡潰爛蒼朮白朮酒芩羌活豬苓澤瀉當歸茵陳鈴兒酒炒知母各六分人參不用亦效苦參酒炒升麻葛根防風炙草各四分水煎上痛食後服下痛空心服痛甚加乳香上身痛倍升麻下身痛加牛膝腿足加木栝苡仁臂痛桂枝威靈仙丸治濕痰風痛威靈酒炒桂枝羌活各三兩南星黃柏酒炒蒼朮各二兩神麯川芎各一兩防己白芷桃仁紅花龍膽草各五錢上為末神麯糊丸如桐子大每百丸白湯下舒筋散治風濕血刺身體疼痛四肢拘攣當歸玄胡索辣桂各等分為末每二錢酒下痰滯二陳湯加肉桂勞倦身疼十全大補湯加陳皮半夏清痰寧痛丸治酒客多飲致痰涎飲積致痛兼服拈痛湯效橘紅茯苓半夏貝母天麻白朮膽星白附子栝蔞仁酒芩等分上共為末水法丸綠豆大每服二錢白湯下竹瀝薑汁為丸尤妙痰飲稀涎散吐肩臂痛經曰寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣若背脹而痛捶打稍愈者乃痰滯氣凝故捶散而行之少愈背痛連腰脊者皆屬太陽經之風寒也脈有促而急者有弦緊者左候左右候右肩背痛治當散風瀉火行氣左屬血與風右屬氣與痰主方羌活獨活各一錢藁本防風甘草各五分川芎荊芥各三分姜一片蔥一莖水煎服火加酒連虛加人參蒼朮復煎散風濕合作腦後痛惡寒頸項肩脊筋骨強痛腿膝痠痛蒼朮羌活各一錢白朮澤瀉升麻柴胡藁本黃柏紅花各五分另煎蒼朮汁二鍾煎眾藥再煎如前烏藥順氣散治肩背痛方見中風凡周身腿膝臂膊等處痛甚者用綿絮包暖以火烘令極熱微汗出痛可止或以薑蔥湯淋洗或用薑蔥熨法法見傷寒內以乳香研細充熱酒服尤佳心痛附膻中痛經曰真心痛者寒邪傷其君主手足甲青至節甚則旦發夕死厥心痛者乃寒邪客於心胞絡也蓋諸心痛證皆少陰厥陰之氣上衝也有熱厥心痛者身熱足寒痛甚則煩躁而吐額上汗出脈浮洪大有火實心痛者因氣而食卒然發痛大便燥秘小便短赤久則注悶心胸高起口渴思冷飲按之愈痛時作時止不能飲食多屬久病急宜下之服寧痛湯有寒厥心痛者手足厥逆身冷汗出便溺清長大便利而不渴氣微力弱急宜溫之服朮附湯方見寒門凡寒痛者綿綿無增減喜手按近溫暖飲熱薑湯則痛少安多屬新感有恚怒憂鬱飲食勞役或生冷厚味不能消散結而為積遇食還發名積心痛及其臟寒吐蛔亦致心痛謂九種者曰飲食風冷熱悸蟲注曰去來痛是也世之心痛皆胃脘痛胃受病不運行雖多日不食亦不死痛初止便食必復痛甚脈短而數痛甚則伏沉細而遲者生浮大弦長者死病人喜熱湯暖氣宜熱藥如口渴喜冷飲宜涼藥主方蒼朮陳皮香附撫芎玄胡索五靈脂各一錢甘草五分草蔻十粒研細水煎服傷肉食加山楂麵食神麯穀味麥芽水果草果有塊加三稜蓬朮如吃熱薑湯炒鹽熨痛減加良薑乾薑炮官桂藿香木香砂仁清火寧痛湯治心胃痛甚不可忍者口渴思飲大便不通忽大痛或暫止胸膈間如有塊築塞升上手按愈痛此因怒氣鬱悶成火致痛婦人多患之必以大便通利方止經曰痛隨利減脹以利寬梔子姜炒三錢黃連吳萸汁炒枳實厚朴檳榔各二錢五靈脂蓬朮玄胡索大黃各一錢木香另研五分甘草三分上水煎服未通去木香甘草倍大黃以大便通為度實人或再加黃芩赤芍藥金鈴子沒藥草果荔枝核燒焦滑石之類煎成入芒硝一錢枳實大黃湯治大痛大便不通口渴等證枳實大黃檳榔厚朴各二錢木香另研五分水煎溫服加味七氣湯治七情或風濕致痛半夏制一錢五分肉桂玄胡各一錢二分人參乳香各五分甘草三分加姜一片棗一枚水煎服落盞湯治急心痛陳皮香附良薑吳茱萸石菖蒲各一錢煎成先以香油五點入盞內調勻服卻痛散治冷痛川烏炮二錢肉桂石菖蒲當歸木香胡椒各錢半靈脂蒲黃各一錢水煎入鹽醋少許服行血定痛丸治素喜食熱物死血留於胃痛玄胡兩半滑石紅花官桂紅曲各五錢桃仁三十粒上為末蒸餅糊丸綠豆大每服四十丸薑湯下白朮半夏丸治氣血痰熱心痛白朮五錢半夏砂仁白芍當歸各三錢桃仁黃連神麯炒陳皮各二錢吳茱萸錢半殭蠶甘草各一錢上為末蒸餅糊和丸綠豆大每服五十丸薑湯下朮附湯寒痛客忤屍注蘇合香丸二方並見中寒簡便方治心痛梔子炒黑乾薑炒焦等分為末水法丸綠豆大白湯下又方治火痛梔子炒焦煎服或為末薑湯調粥糊丸白湯下加草蔻亦可又方治熱痛梔子川芎煎服或梔子合二陳湯加蒼朮服凡服梔子藥愈後復發者仍用梔子不效另入玄明粉一錢或芒硝服又熱痛大便不通服三花神佑丸方見痰門又方治冷痛良薑官桂各一錢為末湯下又玄胡索胡椒各一錢為末溫酒下又方治婦人血刺痛玄胡索為末每服二錢酒湯任下或桃仁去皮尖研如泥飯丸服又方治蟲痛面上白斑唇紅痛後能食上半月頭向上易治先用肉汁或蜜引蟲頭向上服取蟲丸安蟲散方見蟲門又楝樹根皮煎服加烏梅川椒尤好又白熟艾一碗水三碗煎服有蟲吐出諸心痛玄胡索一兩炙草二錢水煎分三服或明礬石榴皮末各五分白湯下又灶心土末一錢冷痛酒下熱痛水調又東引桃枝酒煎服又檳榔二錢陳皮一兩為末每二錢蜜湯送下又桃仁七枚研水調服又嫩槐枝水煎服又萱草根一寸醋磨服又枯礬蜜調服又久痛小蒜醋煮頓服膻中兩乳之中痛屬憂思久耗心血遇憂即發主方當歸錢半白芍一錢二分棗仁丹參各三錢陳皮一錢貝母茯苓各二錢甘草三分脈數加酒炒黃連一錢脾痛經曰心痛脾疼陰寒之設凡病胸膈心腹疼痛動輟飲食勞倦七情致傷則脾氣為之鬱滯或犯寒暑濕熱及食積痰氣脾受之而作痛非心痛也主方木香丁香檀香香附烏藥莪朮官桂片姜乾薑白豆蔻砂仁炙草等分上為末每服二錢紫蘇湯調下化食丸治飲啖生冷水果油膩難化之物留積胃脘作痛厚朴草果砂仁山楂麥芽神麯乾薑陳皮良薑等分炙草減半上為末每服三錢空心熱淡鹽湯送下胃苓湯方見泄瀉治脾虛積黃而痛如內傷不食而痛補中益氣湯方見虛損加草豆蔻熱加梔子實熱痛枳實大黃湯方見心痛大安丸方見飲食治胃不和食不化脹痛或以本方煎服簡便方治脾疼用烏藥陳皮紫蘇煎服又吳茱萸一兩桃仁一兩和炒令茱萸焦去萸用桃仁研末分三服用蔥白三莖煨熱煮酒調下又良薑為末一錢米湯下又生薑川椒丁香研末鹽湯下又川椒二十五粒漿水浸一宿鹽湯送下胃脘痛經曰木鬱之發民病胃脘當心而痛夫胃為脾之腑陽先於陰故臟未病而腑先病也甚而致於脅下如刀刺之痛已連及於臟矣胃之下口名曰賁門與心相連俗謂心痛雖曰五運勝復之氣未有不由清痰食積鬱於中宮七情九氣觸於內腑而成者致病之由多因縱恣口腹喜好辛酸熱辣煎爆酒腥生冷溷淆朝傷暮損日積月深痰積血液妨礙升降故酸噯嘈雜嘔噦噎膈翻胃之漸也寸口脈沉而遲關上小緊而數初治暫用辛溫疏散後當養正兼以除邪主方氣鬱痰火撫芎乾薑炮蒼朮梔子姜炒焦陳皮半夏薑製茯苓各一錢草豆蔻研碎甘草各五分生薑五片水煎正痛時服痛止半日方可飲食即食復作痛寒痛去梔加木香砂仁痛不止加靈脂玄胡痛甚加乳香沒藥草豆蔻丸治客寒犯胃作痛及心脾胞絡諸痛或濕熱鬱滯寒熱痛草豆蔻麵包煨去皮一錢四分益智陳皮殭蠶延胡索黃耆吳萸各八分甘草三分炙草當歸青皮神麯薑黃各四分澤瀉一錢小便數減半桃仁七個去皮尖另研柴胡四分詳脅痛加減半夏制四分上除桃仁另研余為末蒸餅糊丸綠豆大每服三十丸空心白湯送下熱厥痛金鈴子散大實痛三花神佑丸方見痰門腹痛附絞腸沙帝曰願聞人之五臟卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛夫腹痛之證多因勞役過甚飲食失節中氣不足寒氣乘虛而客之故卒然而作大痛經曰得炅則止炅者以熱治寒治之正也然腹痛有部分臟位有高下感受不同為病非一故痛有九種曰寒熱食血濕痰蟲虛實是也凡痛綿綿無減增以熱手暖氣按之飲熱薑湯之類得暫止脈沉遲者虛寒也時痛時止腹滿堅實按之愈痛口渴大便秘結脈洪數者實熱也痛甚欲大便利後痛減脈沉實者食積也痛有常處而不動移從心下至腹遍滿而痛若小便不利宜通小便若小便利者屬蓄血脈澀者瘀血或死血也居處卑濕多飲停蓄為涎肥人氣虛脾濕生痰小便不利或得辛辣熱湯少可脈濡滑者濕痰也痛定能食時作時止面白唇紅或肚上青筋腫聚往來無休止嘔吐清水脈乍大乍小者蟲也脈宜沉細忌浮大主方蒼朮香附撫芎茯苓白芍各一錢陳皮厚朴神麯半夏枳實各七分甘草三分上生薑三片水煎服寒痛加良薑乾薑炮肉桂藿香木香砂仁吳萸厚朴不止加玄胡茴香甚者加乳香沒藥各五分研細調入服寒極手足冷加附子去良薑吳萸甚則用理中湯之類方見寒門熱痛加梔子炒滑石黃連炒白芍煨不止加玄胡甚者加木香砂仁茴香乳香從治食痛加厚朴山楂麥芽木香砂仁官桂乾薑濕痛小便不利加豬苓澤瀉痰痛加南星痛甚防乾霍亂戒米湯一口即死活血湯治瘀血作痛烏藥赤芍藥當歸尾桃仁牡丹皮玄胡各一錢枳殼一錢撫芎紅花官桂木香各五分加姜煎服桂枝大黃湯治腹滿痛躁渴經曰痛隨利減脹以利寬白芍六錢桂枝生薑各三錢甘草二錢大黃一錢薑棗煎服芍甘湯治諸腹痛效白芍三錢甘草一錢上加生薑五片水煎服熱痛加黃芩草蔻湯治臍腹虛寒疼痛澤瀉一錢木香三分神麯四分半夏制枳實麩炒草豆蔻黃耆益智仁甘草炙各五分青皮陳皮各六分川歸茯苓各七分上咀加生薑三片黑棗一枚水煎服厚朴溫中湯治胃虛腹滿疼痛厚朴薑製陳皮各一錢茯苓草豆蔻木香甘草各五分乾薑三分上咀水盞半姜五片煎八分不拘時熱服黃芩芍藥湯治腹痛脈洪大口渴因火者黃芩芍藥甘草等分上銼加生薑水煎服溫經湯治虛寒腹痛良薑香附陳皮厚朴當歸茴香益智砂仁木香官桂玄胡等分水煎服檳梅湯治蟲痛檳榔枳實香附木香砂仁厚朴乾薑肉桂川楝子楝根皮等分甘草減半川椒二十粒烏梅二個上姜一片水煎服未止加黃連承氣湯方見傷寒加檳榔木香治實熱痛簡便方治諸腹痛小麥稈燒灰去火毒將麻布包煮汁服立止又方白砂糖一兩酒三碗煮服又菖蒲根二寸捶碎吳萸同煎熱服又官桂一兩水二碗煎八分服未止再服無桂用生薑又木瓜三片桑葉七片大棗三枚水煎服或胡椒二十一粒擂熱酒服川椒亦可又方熱痛梔子十四枚豆豉七合水二大腕先煮豆豉至碗半絞去渣納梔子煎至八分去渣分二服或明礬末淡湯泡服絞腸砂由外感內傷痛極欲死先用鹽一兩百沸湯冷水各一碗調化令飲盡得吐瀉痛止陰沙手足冷身有紅點油燈火燒陽沙肢溫針刺十指爪甲邊出血蘸溫水重搭膝腕有紫點針刺出血安脅痛經曰肝病兩脅痛引少腹善怒何謂也曰厥陰肝經之脈自足而上環陰器抵少腹又上貫肝膈布脅肋故兩脅下痛引少腹蓋脅痛之證當分左右治之左屬肝主血有瘀血為病右屬肺主氣有滯氣為病而脾亦繫於右其經濕勝故痰飲流注右脅作痛所以通論則左屬肝火瘀血右屬氣鬱濕痰雖然若左右脈弦者乃鬱怒動肝火肝木熾盛則制己所勝之經脾也侮所不勝之經肺也肝木乘之右亦痛矣如七情氣結飲食失節冷熱不調常有鬱怒者兩脅俱痛皆宜疏肝木為主或有濕痰流注顛仆傷形所挾之證不可執一脈沉澀氣滯弦澀順洪大逆主方左右脅痛柴胡青皮白芍川芎枳殼炒各錢半香附當歸各一錢龍膽草木香砂仁各五分加姜水煎服氣急加桑皮紫蘇脹加腹皮草果陳皮蘿蔔子左痛加黃連吳萸炒桃仁各一錢紅花五分香附砂仁甘草右痛加陳皮半夏各一錢檳榔肉桂各五分去芍芎當歸龍膽當歸龍薈丸通治脅痛因氣成火者神效當歸龍膽草梔子仁大者黃連大黃酒蒸蘆薈青黛各五錢青皮木香二錢五分麝香五分柴胡五分上為末研入蘆薈黛麝用神麯糊丸桐子大每服三十丸熱濃薑湯下豁痰丸治素有痰飲而致右脅痛陳皮貝母茯苓栝蔞仁枳實白芥子半夏青皮梔子各一錢木香甘草各四分加姜水煎枳殼煮散治悲哀煩惱有傷肝氣致兩脅皆痛筋脈拘急腰腳重滯股脅彎痛四肢不舉防風川芎細辛枳殼炒桔梗各一錢甘草炙五分葛根八分上咀水二盞姜三片煎八分食遠溫服左金丸瀉肝火行濕為熱甚之反佐黃連六錢吳茱萸一錢上為末湯浸蒸餅丸綠豆大每服三十丸滾薑湯送下木通散治男婦脅肋苦痛木通青皮川楝子取肉一兩用巴豆去殼半兩同炒黃去巴不用蘿蔔子炒莪朮木香滑石各半兩上為細末蔥白湯調下每服三錢或煎服即愈甚者只二服異香散治腹脅痞悶莪朮三稜益智甘草各一錢青皮陳皮各五分石蓮肉厚朴薑製三分上咀水盞半姜三片棗二枚煎七分溫服氣針丸治久積風壅心胸築痛兩脅似有針刺疼痛不可忍六脈沉伏按之不可近此藥屢試神效常服疏肝氣止痛木香檳榔青皮陳皮大黃各四兩牽牛半生半炒熟取頭末半斤上為細末煉蜜丸桐子大每服三十丸薑湯送下左痛不動移乃死血宜活血湯方見腹痛因傷勞虛痛久不止宜補中益氣湯方見虛損熨法薑蔥炒熱包熨或蔥或艾或韭或蒜皆可熨灸法治卒脅痛以蠟繩橫度兩乳中間屈繩從乳橫以趨痛脅下灸繩盡處三十壯為度外貼法芥菜子水研敷或吳茱萸醋研敷腰痛經曰太陽所致為腰痛巨陽虛則腰背頭項疼是動則項如拔夾脊痛腰似折髀不可以曲蓋腰者腎之府為一身之大關節所恃以轉移闔闢者也且諸脈皆貫於腎而絡於腰脊腎氣一虛腰必痛矣內經推足三陰三陽皆令人腰脊痛書敘五種三因致痛曰陽氣不足曰風痹寒濕曰腎虛勞役曰墜墮險地曰寢臥卑濕五也如六淫氣浸皆屬外因用力舉重因於墜墮惡血留滯閃肭挫氣房勞疲力耗竭精氣及腎著腰痛腰冷如水身重不渴如帶五千錢因作勞汗出衣里冷濕久久得之臀腰傴僂腰重引季脅痛屬不內外因失志傷腎鬱怒傷肝憂思傷脾皆致腰痛其證虛羸不足面色黧黑兩耳熱痛精氣不固齒疼齦腫失志所為也腹急脅脹目視䀮䀮所祈不得意淫於外宗筋弛縱及為白淫鬱怒所為也肌肉濡漬痹而不仁飲食不化腸胃脹滿閉墜腰脅憂思所為也皆屬內因感受雖有種種無出腎虛一門脈沉而弦澀血滑痰治雖祛邪必以補腎為主主方杜仲姜炒斷絲破故紙鹽酒炒牛膝當歸生地白芍黃柏知母俱鹽炒熟地各一錢茴香鹽炒肉桂各二分懷山藥七分棗二枚煎成入鹽一分服多食胡桃肉飲好酒送藥痛甚加玄胡另磨沉香研乳香砂仁末服去白芍藥生地虛加人參黃耆龜膠枸杞山萸之類煨腎散治腎虛日夜悠悠痛不已與主方兼用杜仲姜炒二錢破故紙鹽酒炒一錢上研細先以豬腰子一個切七片鹽醃拭淨將仲紙入茴香末鹽少許摻挾濕紙包煨酒下青娥丸治腎虛腰痛杜仲四兩破故紙二兩一方加牛膝熟地黃尤可上為末胡桃肉四十九個搗細入山藥糊和丸如桐子大每服七八十丸酒下補腎丸治腎虛腰痛熟地當歸杜仲各錢半白芍破故紙枸杞子黃柏酒炒川楝肉茴香鹽酒炒川芎各七分桃仁一錢炒上為末蜜丸桐子大每服七十丸鹽湯下腎著丸治腎虛為病身重腰冷如冰不渴小便自利飲食如故腰下重痛如帶五千錢滲濕湯亦可服白朮茯苓各四兩乾薑甘草炙各一兩上咀每四錢空心煎服川芎肉桂湯治冬月因感寒濕腰痛兼行瘀血羌活錢半柴胡肉桂桃仁當歸尾蒼朮甘草炙川芎各八分獨活神麯防風防己酒各三分上酒三盞煎至一盞食前暖室溫服牛膝酒治腎受風毒攻刺腰痛不可忍者牛膝地骨皮五味子薏苡仁川芎羌活甘草炙各一兩海桐皮生地黃二兩上咀用綿包藥入無灰酒裝入壇內浸春五夏三秋七冬十日每服一盞一日三四次常令酒氣不絕摩腰膏治寒濕腰痛附子一兩天南星川烏各二錢半肉桂一錢雄黃樟腦丁香各一錢半麝香五分上為末蜜丸龍眼大每用二丸薑汁化開頓熱塗腰間綿紙覆外烘熱綿衣縛定內火熱三日一次風濕寒熱痛宜當歸拈痛湯方見身痛瘀血夜痛甚四物湯加桃仁紅花閃挫痛當歸玄胡肉桂為末每二錢酒下大便秘三花神佑丸方見痰門痛甚者經曰腰痛不可俯仰腎將憊矣宜參耆配補腎藥大劑服忌寒涼藥簡便方治腰痛用大胡桃二個炮焦取肉燒酒送下又方治風冷寒濕痛川烏一兩為末鹽酒調敷痛處綿紙軟帛束之又方治卒痛杜仲一兩制次以韭白七莖鹽花椒薑醋醬作羹食又方腰腫痛檳榔末一錢酒下又鱉甲炙為末酒下又方腰痛無力風栗子每早吃十枚再以豬腰子煮粥食又白蒺藜為末蜜丸桐子大每服七八十丸一日三服又杜仲一兩川萆薢二兩為末每三錢酒調下又紅曲一錢炒研酒下或炒鹽熨或橘核炒去殼茴香酒下眼科經曰諸脈者皆屬於目目得血睛能視又曰肝氣通於脈肝和則目能辨五色而明矣其五輪者應五行八廓者象八卦凡患者煎熯腥酒房室怒郁憂思久視等因而成癢而不痛為風眼紅腫刺痛為熱眼腫軟酸澀為氣眼視物不明為虛眼風與熱並赤腫淚出風與氣搏癢澀昏沉血熱交聚致紅縷偷針之類氣血不至成雀目盲瘴之形眥紅胬肉心熱黑珠星障肝火眼眶赤爛脾胃濕熱瞳人不明腎水枯竭一眼忽痛乃犯飛絲瞳子散大食毒熱甚痛癢大作火熾生風拳毛倒睫脾受肝克所謂散熱為治目之要行血為療眼之綱此皆論其標也治本之理補益脾胃育養心神脾者諸陰之首心者眾脈之宗脾虛則五臟之精氣皆失心虛則百骸之榮養皆虧脈洪火盛當察何部澀為血少浮風濡濕五輪歌血輪四眥屬心經氣輪白肺黑風輪肉輪上下瞼脾胃水輪屬腎主瞳人八廓歌水榖脾胃關泉心會陰屬腎胞陽門命門傳道肺腸清淨膽津液膀胱養化林肝木主方初起痛癢當歸尾川芎赤芍生地黃防風羌活黃芩黃連石膏冬不用梔子各一錢荊芥七分薄荷七分甘草五分加燈心二十枝水煎食後服次加木通菊花痛甚大便實或秘加酒煮大黃一錢煎成化入芒硝五分未安再服怒動肝火加柴胡龍膽草去薄荷小便短赤加滑石鬱火加連翹有星障加木賊蒺藜蟬蛻多淚加蔓荊子痛止去黃連黃芩梔子歸尾石膏加當歸菊花決明子密蒙花知母榖精草目不痛惟是黑睛上有障翳凝結不退宜養血祛風去障藥多宜酒炒加白芷八分細辛三分服藥時先嚼白豆蔻二粒辛溫退之去涼藥凡痛止障退腫消止是隱澀難開視物不明藥宜養血為主兼養心神滋腎水理脾胃更宜瞑目靜養如時行暴發風熱火眼腫痛難開頭面俱腫怕日羞明防風通聖散方見中風明目丸生精補血益腎養肝退翳止淚除澀明目生地酒浸熟地酒蒸黃柏鹽炒知母鹽炒牛膝酒浸枸杞各二兩蒺藜羌活防風石斛枳殼菊花各一兩上末蜜為丸每百丸空心鹽酒下或鹽湯臨睡白湯下久服明目兼補陰益腎六味地黃丸方見虛損加當歸白芍枸杞子菊花五味子共為末蜜丸如前服法滲濕清脾散治常患上下眼眶赤爛屬脾胃濕熱石膏一錢蒼朮白芷白芍黃芩黃連梔子羌活防風枳殼各八分荊芥甘草各五分滑石水飛三錢上水煎成調入滑石末食遠服蟬花無比散治大人小兒遠年近日一切風眼氣眼攻注昏暗瞼生風粟或痛或癢漸生翳膜或久患頭風牽搐兩目漸漸細小眼眶赤爛並皆治之若常服祛風退翳除障明目蒼朮防風芍藥茯苓甘草各三兩蛇蛻炒一兩羌活當歸石決明鹽水煮一時川芎各二兩蟬蛻去頭翅一兩白蒺藜炒去刺八錢上為末每服二錢臨臥時飲湯下或酒亦可當歸養榮湯治睛珠痛甚血少枯澀當歸川芎芍藥防風熟地黃白芷羌活等分上水二盞煎至一盞食後熱服明目羊肝丸治肝虛風熱冷淚赤澀內外障眼黃連三兩家菊花石決明煅熟地黃龍膽草麥門冬當歸枸杞子牛膝防風羌活黃柏人參柴胡青鹽各八錢肉桂四錢羯羊肝一具烙干為末生搗亦可上為末煉蜜丸梧桐子大每服七十丸溫水下養肝散治肝虛目痛冷淚不止畏明夏枯草七兩香附子三兩俱童便浸透曬乾同為末每三錢茶下明目第一方古諸賢有目疾皆用此省看書減思慮專內視簡外視晨興遲夜眠早洗方黃連五錢切煎上鋪稀絹濾汁洗眼日三遍或用黃連五分切拌人乳蒸點又黃連黃柏黃芩梔子防風連翹白芷當歸尾苦參五倍子荊芥薄荷朴硝等分為末薄荷湯丸芡實大每一丸滾水泡化頻洗妙又方眼胞赤爛五倍子黃連荊芥防風各一錢五分苦參四錢銅青五分薄荷湯丸龍眼大每一丸湯泡化頻洗又白鹽一錢每早擦牙以鹽津洗面眼閉一時吹方治一切火眼內障黃丹芒硝各一兩雄黃三錢沒藥五分上研末吹鼻中先含溫水一口左目吹左右目吹右如兩目痛俱吹久患者勿吹拳毛倒睫木鱉子去殼搗爛用綿紙包捻成細條塞鼻中左病塞左右病塞右一日三次其毛自起簡便方治風弦冷淚癢澀有蟲用肥簪腳插入母姜拔出點眼眥角又方治諸眼疾春月嫩桑條曬乾淨器燒成白灰用三錢滾水一大碗泡打轉澄出清汁重湯頓溫洗又方治久患目疾用決明子炒研末每服一錢白湯下又方治目翳及諸物入目用男左女右手指甲洗淨用木賊草磨下細末刀刮亦可以燈草頭打濕蘸其末點翳上數次即去天絲入眼忽然一眼大痛急用鉛粉或京墨濃挑入眼略閉復開令人撮起上眼胞看粉白墨黑細珠即是天絲聚成者用光肥銀或骨簪腳撥出如未盡再入墨取儘自安灰塵入眼睜眼看水自出或舐濕自手背睜眼挹出鼻證臭淵俗名腦漏經曰鼻者肺之外候又曰膽邪移熱於腦令人辛頞鼻淵蓋肺開竅於鼻肺氣清順鼻氣通利而知香臭肺受風火之邪怫鬱於經則津液壅沸故鼻氣不得宣調或流濁涕稠水不止名鼻淵證俗為腦漏是也此火極反兼水化之象夫五行之理微則當其本化甚則兼其鬼賊故經曰亢則害承乃制也凡鼻之為病如生瘡乾結痛癢鼽衄至於鼻痔鼻息鼻癰鼻齄等諸證皆屬於火也惟傷風鼻塞流清涕者為寒若鼻中熱氣濁涕有痰亦為熱矣脈右寸浮洪而數治當清肺火有風邪兼疏散主方鼻竅不利片芩梔子防風桔梗枳殼桑皮石膏玄參荊芥木通等分甘草減半枇杷葉三片刷去毛蜜炙水煎服又防風通聖散因熱宜服寒天減硝黃等味辛荑湯治肺氣不利頭目昏眩鼻塞聲重鼻淵涕水辛荑川芎白芷防風羌活荊芥藁本薄荷木通各一兩細辛升麻甘草炙各三錢上咀每服五錢水二盞煎一盞食遠溫服麗澤通氣散治鼻不聞香臭黃耆八分蒼朮羌活獨活防風升麻各六分葛根六分炙甘草四分麻黃冬月可加川椒白芷各二分上咀作一服姜三片棗二枚蔥白三寸水二盞煎食遠溫服芎藭散治