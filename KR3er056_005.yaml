厭內經謂之吸門咽以候氣通肺屬金輕清不容喉以納食通胃屬土無物不受會厭管乎其中以司開合能閉其咽以進食倉卒誤投滴粒嗽出乃止咽中惟呼吸行焉故為人身之槖籥緊關卒然漿水不入語言不出命懸須臾喉痹即今之乳蛾咽喉一十八證謂單蛾雙蛾纏喉風之類名狀不同其源則一相火是也多感於酒腥辛辣厚味七情痰火發則通連頸項頭面腫脹古書治法刺破出血今屢見因刺有傷人者莫如探吐痰涎萬無一失脈宜浮洪忌微伏尤有傷寒少陰咽痛及陰證下虛痛不能分別先依主方主方桔梗四錢甘草三錢荊芥錢半玄參一錢水煎服臥床慢嚥詳脈證屬熱漸加牛蒡連翹天粉殭蠶射干山根薄荷芩連梔柏防風升麻生地當歸擇用大便秘大黃小便澀木通清心利嗌湯咽喉腫痛痰涎壅盛桔梗黃連黃芩薄荷荊芥防風梔子各錢半甘草玄參連翹各一錢大黃芒硝牛蒡子各七分上作一劑水煎食後服兼用碧雪方見舌證透天水一切風熱喉痹口舌生瘡頭目不清痰涎壅盛黃連薄荷葉檳榔蒲黃荊芥穗甘草黃柏各末五分冰片三分柿霜五錢無用白糖蜜和丸不時噙化玉雪散咽喉腫痛單雙乳蛾一十八證皆效殭蠶堅亮者洗一錢山豆根廣西者取皮研五分雄黃飛玄明粉如無用焰硝淡者硼砂明亮者各三分研極細入冰片二分勻先以箸捺下舌蘆管吹入患處閉口一時口噤吹入鼻加薄荷甘桔末蜜丸噙亦佳稀涎散乳蛾喉腫面浮目閉口噤食絕皂莢末豬牙者尤佳明礬研各一錢白湯調灌牙緊灌入鼻未吐以鵝毛蘸生桐油或燈窩油口內攪即吐一人托額一人用指口內引出痰涎盆許即刻痛止腫消聲出食進未痊愈再吐或只白礬或油亦可發吐或土牛膝根一名鼓槌草俗名夫娘子紅梗大葉壯節生子刺衣搗汁入白礬灌或馬藍頭春苗可食秋小紫花如菊搗絞汁入香油少許灌或膽礬五分湯調得吐愈或飲鹽湯二碗吐亦可簡便方治喉痹真山豆根水浸透含咽汁急喉痹巴豆去殼紙打油作燃點火吹滅以煙燻入鼻涎出牙開又皂角炙去皮子為末箸頭蘸點患處以米醋調敷項下自破血出即安又雪梨搗絞汁飲效走馬喉痹桔梗二兩水煎分二服喉痹並毒氣生薑汁和蜜共一碗熬六分日服三五次纏喉風生白礬末二錢水調下或韭菜搗細敷項上或蘿蔔汁和皂角末服吐痰或硼砂噙化面證帝曰首面與身形也屬骨連筋同血合於氣耳天寒則冽地凌則冰其卒寒或手足懈惰然其面不衣何也岐伯曰十二經脈三百六十五絡其氣血皆上於面而走空竅其精陽氣上走於目而為晴其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面而皮厚肉堅故大寒甚熱不能勝之也又曰頭者諸陽之會也然諸陽脈皆上於頭而面之寒熱由足陽明胃經之虛實本經多血多氣木實則風熱上行或面鼻紅紫風刺癮疹兼而作焉其面之浮腫有二者之別腫屬肝風胃火為實風火上炎紅腫而熱按之作痛此邪氣有餘脈必急躁緊實當用防風通聖散之類方見中風散而瀉之浮屬脾土肺金為虛脾傷勞役肺氣失度或時作喘此正氣不足脈必虛浮無力當用利水實脾湯之類方見濕證導而利之主方面生瘡疹防風一錢連翹黃連酒芩桔梗川芎白芷梔子炒各七分薄荷升麻各五分甘草三分水煎服加竹瀝尤佳頭面瘡加芍地玄荊之類便實大黃升麻附子湯治面作寒畏風冷升麻葛根附子炮黃耆白芷各七分人參草豆蔻益智仁炙草各三分上加蔥白三莖水煎服犀角黃連湯治面作熱燥赤犀角黃連白芍酒芩白芷炙草川芎各五分薄荷荊芥各三分升麻葛根各錢半水煎服膏粱之士面熱生瘡加大黃芒硝連翹去芷芎葛研末調服美容膏治面生黑䵟雀斑單用密陀僧研末人乳敷亦妙防風零陵藁本各二兩白芨白附子白蘞天粉綠豆粉殭蠶白芷各一兩甘松三奈茅香各五錢肥皂去皮弦共為末蜜和搗勻擦或白茯苓白芨白附白蘞為末密陀僧澱粉白石脂另研等分人乳調敷過夜簡便方面瘡毒黃連黃柏為末入鉛粉油調敷指爪傷面生薑自然汁調輕粉敷無痕面䵟殭蠶白芷細辛等分為末人乳和丸芡實大洗面化塗粉刺菟絲子浸數日搗絞汁塗或白礬末酒調搽面上卒得紫黑丹如疹至遍身殺人急用鹿角燒灰香油調搽面目身上赤斑作癢腫羖羊角燒灰研細雞子清調搽鬚髮經曰腎之合骨也其榮發也多食甘則骨痛而發落又曰女子七歲腎氣實齒更髮長五七陽明脈衰面始焦發始墮丈夫八歲腎氣實髮長齒更五八腎氣衰發墮齒槁又曰發髭黃赤者多熱多氣白者少血少氣黑者多血少氣美眉者太陽多血通髯極須者少陰多血美須者陽明多血此其時然也蓋足少陽膽之經其榮在須足少陰腎之經其華在發故氣血充盛發須黑而美若氣血衰弱鬚髮白而落鮮能挽復於既衰之後可以保護於未敗之前人年三十外常服補腎滋陰之餌不致枯槁也主方六子丸菟絲子酒煮金鈴子覆盆子五味子枸杞子蛇床子各一兩牛膝何首烏酒浸熟地黃酒蒸地骨皮各三兩木瓜川茴香舶上者鹽炒各二兩上除地另搗余為末入地重曬磨酒糊和丸桐子大每服七十丸空心米湯下新衣不汙加參苓術各二兩尤效忌白蘿蔔七寶美髯丹一名七珍至寶丹與神仙六子丸相間久服補功無以加何首烏赤白各一斤酒洗竹刀刮去皮同牛膝黑豆蒸破故紙鹽酒炒香菟絲子依製藥法煮餅牛膝去蘆各八兩拌黑豆三升用酒浸一日甑內蒸熟去豆用首烏膝搗如泥當歸身酒浸曬焙乾四兩赤茯苓用牛乳白茯苓用人乳各五碗砂鍋煮半乾曬燥各一斤枸杞子甘州者曬燥四兩上為細末煉蜜和勻搗千下丸如彈大每服一丸日三服早溫酒午後薑湯臨睡鹽湯初服七日小便多或雜色是臟腑病出二七唇紅津生有腹痛勿懼乃搜病根去三七身輕乳潤一月百病皆出七七血長精添火瀉水溢久服強健康寧烏須方京省通行此方可用不壞須製得法可黑一月五倍子四川大者打碎撿淨鍋內炒黑色軟爛有白煙起用濕潤青布裹踏石壓成餅曬燥研末聽用紅銅花取細銅絲炭火燒赤淬醋內再燒淬至化盡去醋曬乾研用時焙末二錢銅末四分皂礬明礬各三分沒石子研末食鹽各二分硇砂淨一分和勻以燒酒或煎濃茶用瓷杯調如稀糊坐湯中煮至杯內綠氣生面上為好先將皂角湯洗須淨拭乾用濕皮紙托定刡柄挑藥塗須紙包過夜次早溫水洗胡桃油捻之連染二夜黑矣三青膏生胡桃皮生酸石榴皮生柿子皮先將榴皮去子入丁香滿稱過分兩後將桃柿皮與榴丁等分曬研末牛乳調盛鉛瓶中封口埋馬糞內三七日取塗須簡便方發白返黑烏芝麻酒拌九蒸九曬為末棗肉丸服發落不生麻子一升炒黑壓油搽頭或鮮半夏搗擦髮油汙衣早梳畢以雞子清塗頸刡發新衣不汙癭瘤經曰堅者削之留者攻之結者散之郁者達之發者奪之泄者折之夫人之氣血循環一身必使周流常無留滯之患倘喜怒失節憂思過度之類致氣滯血凝而成此疾屬足陽明與任脈二經氣凝於上血不下流故多著頸項腹脅皮寬之處日久血氣寢衰不能攻擊矣癭有五曰肉筋血氣石瘤有六曰骨脂肉筋血石二證惟氣癭可消脂瘤可破餘證皆不宜強治屢見膿血潰漏無已竟致難救服藥內消必咸以軟堅斷厚味戒房室主方海藻膽草海蛤煅通草昆布枯礬松蘿各三兩半夏貝母各七錢上末入麥面一兩每二錢酒下日三服秘傳木香散治一切癭瘤結核豬醃子七個燈盞火烘乾為細末海螵蛸南木香青木香神麯麥芽孩兒茶各五錢雄黃辰砂各二錢上為末每服三錢臨睡酒調下即臥勿言語惱怒房室累驗簡便方消瘤黃連海藻等分為末置掌中時舐之津嚥下又鮮南星搗爛或乾者為末醋研如膏先以小針密刺布攤貼又久服蠟礬丸效方見外科或昆布一錢研綿裹醋浸常含咽汁海藻昆布嫩者酒浸或醋拌家常作小菜久食消癭瘤結核結核經曰瘤氣結核皆屬於熱蓋由氣鬱成火結滯堅硬如果之核不須潰發氣散自消結於頸項臂脅多在皮裡膜外濕痰流注七情過傷皆致斯患婦女常感者因富貴貧賤多有郁也若臥枕動悲苦忿怒乃成項中不散則變瘰癧腋下不消則為馬刀必宜早治日積月累而得服藥亦須久長最忌鮮豬肉熱毒物主方項腋結核橘紅南星半夏並薑製枳實桔梗羌活防風前胡柴胡連翹赤芍藥黃連蓬朮蔓荊子木通甘草等分上加生薑五片燈心三十枚水煎去枕臥床患處向下慢哈細嚥散結丸治結核久不消兼用圍方見痰門橘紅鹽水拌赤茯苓大黃酒煮連翹各一兩黃芩酒炒山梔炒各八錢半夏曲桔梗栝蔞仁牡蠣煅童便淬玄參天粉殭蠶洗各七錢甘草節四錢上為末水疊丸蘿蔔子大每服二錢臥床白湯下滾痰丸方見痰門每服五分臨睡蔥鹽湯下常服三分睡時拌蜜噙簡便方殭蠶炒大黃酒浸青黛膽星各等分為末蜜丸噙化又蓖麻子七個去殼研爛紙卷插入雞子內紙封固水浸濕煨熟去紙殼只食雞子每早晚一枚十日效或射干磨酒服效
