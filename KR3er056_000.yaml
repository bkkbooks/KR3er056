body:
  text: 跋嘗按軒岐之理通乎性命入乎聖神自秦越人既往剖胸探心幻不可追而方書始汗牛充棟於世然以生人表裡之缺陷止假草木之英金石之屑欲以摶捖造物補泄五行此其玄機妙解蓋亦難言之矣古今來惟素問難經諸篇為法門指南然非淺夫濁眼便能洞徹於是人持一説家持一篇莫不以生嘗試則曷以故取途紆回而逞臆汶暗也臺石先生承桂岩先生衣鉢淵源夙有紹明負菩提心居恆念窮陬寠人子偶罹疾苦盼藥餌不翅丹砂甘露而市阿堵者未嘗過而問焉乃攜壺中術利濟三吳兩浙間名噪甚於武原尤活人多復以不酌其徑省則惠不溥不壽之剞劂則澤不永五閲寒暑構成一編顏以簡明醫彀夫簡則不明明則不簡先生胡以兼收之也余知之矣先生從儒理解入從禪理參透故不即不離打破葛藤心胸了了見垣照膽罔不悉中肯綮每論一證先攻其受病之原次定其瘳治之法又次調其加減之宜俾人人通曉在在易給而沙界衆生開卷引睫七返大還現前具足公家思邈之傳不在是乎則謂此書即迷津之覺路苦海之慈航可也壽國壽民功德當作無量觀賜進士出身江西道監察御史奉敕巡按直隸督理長蘆監課河道驛傳轄山東河南開歸等處前四奉札巡視皇城蘆溝橋城工廣渠門通家眷侍生吳興施梁頓首撰
