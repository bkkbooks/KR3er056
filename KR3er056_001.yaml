body:
  text: 卷之一要言一十六則卻病延齡卻病之法惟治未病為上人能清心寡欲慎起居節飲食則病自不萌而齡可延矣凡人百病無出三因一曰外因風寒暑濕燥火天之六淫是也一曰內因喜怒憂思悲恐驚人之七情是也一曰不內外因起居失宜飲食失節房勞過度跌損金刃五尸鬼疰邪祟蠱毒山嵐瘴氣不伏水土等證是也舉外因六氣言風者天地鬱勃之氣經曰風為百病之長善行數變其變莫測輕則傷風咳嗽重則中風風痱諸證故云避風如避箭寒者天地嚴凝之氣經曰冬傷於寒春必病溫三時猶輕冬感為重即病者名傷寒伏於肌骨春月隨發生之氣為病謂之春溫次日晚發及熱病也暑者天地酷烈之氣經曰夏傷於暑秋必瘧痢夏月天之陽氣盡浮於地人之陽氣盡浮於表故多煩渴嗜冰水瓜果不知陽外陰內生冷停積濕熱相蒸而為痢腠理汗泄風寒襲之邪正相搏陰陽相併而為瘧冒暑奔馳病名中熱水閣蔭軒過於寒涼病名傷暑若臥於磚石泥地漆凳之類感受風寒濕氣秋深收斂腠理閉密邪伏難出歷節走注作疼而成痛風等證濕者天地陰潤之氣為害匪細東南地卑薄衣履坐臥濕從外入西北地高燥嗜乳酪面濕自內生燥者陽明燥金之氣經曰諸澀枯涸幹徑皺搗皆屬於燥蓋因風熱耗其血液而成在表則為皮膚裂屑手足幹徑甚而筋縮爪枯等證在裡則為大便祕結消渴引飲等證火者君相五志之火經曰諸熱躁擾狂罵氣逆衝上嚏嘔瘡瘍痛癢耳目諸證等皆屬於火腎經孤水奚能勝之且火日增而水日損東垣云火為元氣之賊此勝則彼負若上下往來熬真陰涸津液則為陰虛等證矣舉內因七情言經曰喜傷心蓋喜極則心火熾盛輕為口舌破爛瘡瘍斑疹重為顛狂等證經曰怒則氣上又曰大怒則火起於肝甚則嘔血蓋怒則陽氣逆上而肝木乘脾故為嘔血飧泄胸脅痞痛不食等證經曰憂則心氣乘之又曰憂愁不解則傷意夫憂氣鬱而生痰痰與氣搏升而不降多成噎膈等證經曰思則氣結蓋指其專篤沉滯者言如難思釋怨思報苦吟竭志男女懷思之類遂成怔忡諸證矣氣結為病為昏瞀為中滿痞塞為咽嗌不利不嗜飲食等證經曰悲則氣消蓋悲則心竅蘊結肺布葉舉而上焦不通榮衛不行熱氣在中故氣消又曰悲氣所至為陰縮筋攣肌痹脈痿男為便數溲血女為血崩孕婦胎漏目昏等證經曰恐則氣下陰氣無能上行則志氣恐懼日久則為矢志之證經曰驚則氣亂神無所歸棲靈之舍虛而為痰涎所聚有成顛癇諸證矣舉不內外因數事言起居者人身運動全賴精血經有七損八益五勞七傷六極之戒飲食者經曰飲食自倍腸胃乃傷生冷滯膩炙爆辛熱慎勿太過又曰諸肉補陽諸谷補陰陽盛則火熾痰壅津液燔爍陰盛則火熄水盈精血生長房欲者人身所寶精氣神至人祕固以鍊金丹大則成仙小則卻病多欲者如飛蛾赴火迷不自知但能撙節即期頤之基跌撲金刃數種多由不慎所值不立於巖牆可也苟知預為謹持精神內守外邪豈得侵哉故善治未病者巧出良醫之外功居美藥之先其於康寧永壽乎何有福壽真樂箕疇五福一曰壽以有壽乃能享諸福也然其四曰攸好德及六極之五曰惡六曰弱可見德為福壽之本若其剛惡而不肯好德柔弱而怠於修德則禍極隨之而絶福壽根源矣至衛生一節尤為修德中事也觀子之所慎疾及君子三戒等可見矣又黃帝問岐伯曰余聞上古之人春秋皆度百歲而動作不衰今人年半百而動作皆衰者時勢異耶人將失之耶岐伯對曰上古之人知道者法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而終其天年度百歲乃去今時之人不然以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也觀此則壽命修短全系精氣神之盈虧精血一敗神氣無所依附欲長壽而享諸福難矣其害以淫欲為最少壯宜節老年宜絶男女皆同蓋男二八精通八八精絶女二七天癸至七七天癸止交合施泄不可太早男三八女三七為佳古人少年遲婚中年後早絶欲多得上壽今人早婚縱欲水枯火亢精神垂盡仙丹莫療悔之晚矣達者當知精髓有限生之甚難耗之甚易如油滿燈明油盡燈滅若縱欲喪精假力藥餌棄真取僞棄內取外不亦愚乎請以貪儉二字醒之貪不久之名利而不貪長久之福壽儉易得之財物而不儉難得之精神顛倒極矣其次嗔怒憂愁皆能傷氣血爍元和致不測之疾噫人誠能制情忍性以惜福養壽雖南面王樂不與易詩所謂自求多福書所謂自作元命也將時時享勿藥之喜焉即偶違和而精氣神原固可一劑立瘳矣奉養高年養親不可不知醫高年尤為切要然醫特其輔耳其本在得親歡心親心多拂多違疾所由生常使親心喜悅非止盡孝亦以善治親之未病也其次當調適其飲食雖或貧乏亦必約己豐親勞力致養常盡心於目前勿姑俟於日後務令精潔不在肥腴生冷膩滯煎炒硬韌及烹飪失宜等皆忌又次當撿其起居行住坐臥皆令安樂棲息處宜高燥靜密無風冬暖夏涼衣服常須浣焙器皿常須拭潔玩物適情之類無弗迎合寒暑風雨霾霧黑早黃昏險途遠道皆勿令行一切瑣屑可惱事皆勿令聞如有意外災咎必先自己鎮靜安慰親心勿令驚怖有疾則擇延明醫勿泥卜筮受誤庸手湯藥必躬為閲治如法勿托他人老年嗜欲或有過當處須婉節之勿縱其情長其過恆以玄門衛生法告之若夫禪宗出世之旨則尤宜朝夕勸勉慫恿成就急乘易盡殘年了徹無上大事又豈區區奉養醫藥之比乎雖然為人父母亦當自愛曲體子心至老年尤宜知止知足懺悔前過勤行善事為齊歸計噫人生結果事時刻當警省勉之哉撫育幼齡附戒溺女歌經曰滋苗者必固其根伐下者必枯其上嬰兒一生之強弱安危其根全繫於父母可不慎歟懷妊十月能尊胎教則子多賢多壽痘輕疾少若父母縱欲不謹加以厚味膻腥煎炒姜椒諸熱毒物或服種子助陽熱藥致生子有驚風及惡痘胎毒諸證初生時如拭口斷臍洗浴等事悉宜如法乳母飲食起居極宜嚴慎如嗜厚味熱毒兒患積熱食生冷及感風寒兒飲冷乳吐瀉腹痛母恚怒致兒驚恐久停乳先略擠去前乳次與兒吮母多欲乳之氣味皆變有孕乳子令兒黃瘦小兒變蒸發熱乃是長筋骨堅腑臟生智慧常以數日而安但宜調護不必服藥小兒驚疾或因揉兒胸搖兒身誘兒笑語久戲不止使兒力疲頭眩氣喘腸痛或繼以哭多睡中驚甚至擲兒上下兒雖強笑實惶怖不堪駭其神志傷其腑臟有以無知幼兒打撲尤可痛恨當為大戒小兒乳食宜少不宜多衣服忌太暖初冬未甚寒只薄牽舊絮若早重裹新綿致火鑠肺金生風成痰致肺風痰喘驚搐等證啼哭未止及初止皆未可與乳食未及期不可茹葷雖期後不宜縱食大腥及生冷煎炒油膩甘甜閉氣硬物經曰多食肥令人內熱多食甘令人腹滿肚大是也脾氣弱者停積為吐瀉瘧痢疳蟲等證又忌嚼食喂兒易生疳積及蟲又小兒夜臥被下須著小單衣勿過熱臥宜露首近枕勿以被覆頭面又小兒常令見日色受和風間坐履地上皆能使堅筋骨實肌理若時刻不離裹抱悶閉密室反有損又兒額上常須以手撫拭脫衣則以手拭胸背斂毛孔防風又乳母抱母僮婢等皆須慎擇其人朴實謹厚者又小兒不特護其形體尤宜保其心性勿恣其欲縱其怒常教以仁厚端方勿導以機詐巧言等常教以好生施濟勿導以慘殺驕吝等勿以蟲鳥等籠縛為娛勿使聞淫歌鄙語三四歲便須謹防其習風勿姑息其幼以俟後七八歲小學時常以先輩名公善言善事及三教明顯要言時時語之使記憶稍長謹防其友伴損益能移換性情雕鑿真朴是為首戒然後讀書習禮法處處印證前聞俱於身心實有受用古云教婦初來教子嬰孩一生人品善惡高下全系幼時又豈特保護醫藥已乎戒溺女歌東越藥園道人撰乾坤六子女並重無偏倚人生子女同骨肉均一體皆是天所命胡為獨不舉我聞人溺水慘狀不可睨力掙不能免石人亦汗泚蓋念斯痛苦而忍加吾女痛苦親不顧女子默自茹莫謂女無知但口不能語性靈已具備貌與親宛似生我者何人父母天地比殺我者何人即我父母是借問何為然不過為貧耳貧窮本前定殺女不可抵親未成富翁女已作怨鬼女有女之福不待親分與女若命好時助親增福祉女或命薄時夭傷自遄己何如全我慈目前且完聚幼女衣食需相挨費幾許稍長學女工緑窗其蔬水嫁不責聘儀荊布亦非恥況殺自己女實殺他家婦他家也溺女汝婦在何處世間男人多無妻者屢屢殺女女益少天地喜不喜禽魚猶放生蟲蟻亦赦死我女反殺之殘忍一至此豈無有王法豈無有天理王法或可逃天理暗報汝現世及來世罪譴誰能避嗟哉溺女者不仁又不智請君聽此歌相傳相勸諭業醫須知古人延醫如求良將良將系衆之死生國之存亡醫系人之安危死生眷屬之悲歡聚散豈非天地間最重大事故故非其人不可信託是必其德仁厚其學淹通諳練而後能起疴回生奪災行之數而造天命慰人心焉然則業醫者當時刻兢兢業業以救人之德殺人之罪為警戒也明矣每臨病務以濟人自矢勿重財利若遇危難證當明告某方某藥勿詭言珍祕而索重價若病果易治勿故言難療致病家驚憂而妄勞如果難治勿故言易愈致病家虛喜而空費或有早晚可奏效而故以藥停阻之以勒重酬或前醫有成功而故捏詞誹謗之以自居功又或諸醫覆絶詒彼獨肩可挽如癆瘵僅存皮骨語言不能尚誘其厚饋乃不日旋斃之類又或盡心富家而忽慢貧家延請不往求藥不發此等種種不一總是重利鄙夫忍心害理之所為詎可以軀命付託乎且今醫不自揆淺陋氣傲心妒既不肯咨訪高明又不肯溫讀醫書暇則棋酒晏笑或算計財利此所謂學醫人費以人命為僥幸者也先輩云道未行謂無利益不學道既行謂應酬無暇不學尤不可犯此二語古之良醫不敢逞臆見而務博學又不敢泥俗諦而求諸閲歷又不執一二證驗而求圓變無窮之心悟至老手不釋卷虛心常廣咨詢誠以人命為重自存德行也雖然其責又在延醫者勿輕聽人言進用多誤全在鑑察精確人謀為主獨斷行之不可專憑卜筮嗟嗟醫人有胸無心病家有耳無眼人命其危矣哉臨病須知臨病時古有望聞問切四法切脈固為重望聞問尤居先當細察受病之源辨其所現之象望其色之榮枯聞其聲之勇怯問其飲食進否喜冷喜熱探其胸腹有無痛處便溺祕利驗其目睛鼻舌氣息蜷臥挺身向內向外次診脈理明表裡虛實寒熱陰陽有餘不足與外證相參合不合酌見病之淺深正變明辨病之同異真似追溯病前日如何又預料病後日如何急則治標緩則治本或當正治或當從治病劇者再候兩足太溪太衝衝陽之脈更驗服過某方某藥著意詳審盡得病情始擬方立案在患病者尤當以自己平日嗜好性情及受病原由詳細說與醫者倘諱疾忌醫則是助庸醫之謬掣明醫之肘而自貽其禍也又醫者固當熟透古方當神契物性蓋藥品有陰陽升降氣勝味勝等之不同須令洞徹詳明則取用時能不泥古而不悖古所謂藥不執方合宜則用古人方藥但陳大略原俟後人潤色蓋天時有寒燠之不同民居有燥濕之不同人身有老少強弱肥瘦黑白飲啖多寡之不同病情有內外虛實似虛而實似實而虛似寒而熱似熱而寒等之不同其間情態百變相機時措古所稱神聖工巧豈異人任哉又凡治法用藥有奇險駭俗者只要見得病真便可施用不必顧忌即如病有臨危原屬有餘失於攻下所致雖至幾微欲絶猶當攻下取效若久瀉久痢至於滑脫不禁則宜劫止而後調之如國家以刑治奸盜以兵卻虜寇不得已而用權權不離經非霸術也王道也乃有醫謬稱王道一味平補調停此可施與不足不可施於有餘施於有餘則邪氣得補而愈盛是速其斃也又有遇危難證如大黃附子迥若霄壤恐致殺人而惟用中和之方無大熱大寒救療而死其殺人一也病家無識喜其平穩卒受害而不覺悲夫雖然臨病妙用全系平日之識見學力明透精熟豈能徼幸襲取於朝夕哉制方定規醫有成法有活法成法師古不可悖活法因時不可拘古方切中人病自有定見品味及分兩皆按君臣佐使不可漫為增減其制丸散用服時候悉有肯綮蓋心肺居上屬陽治心肺藥必大丸調化或湯散或噙咽皆使易化必飯後臨睡服之欲其藥氣戀於心肺也腎肝居下屬陰治腎肝藥必細丸吞服以煉蜜酒糊黃蠟等為丸皆使遲化必早空心服更以乾物壓之欲藥氣令直達於腎肝也脾為中州藥須細丸或水疊或蒸餅糊或棗肉或飯丸服於半飢半飽巳時之分使藥氣正歸中州也如風火寒暑急證欲取功速者及走表四達者皆以湯散為主湯者蕩也取其蕩滌散者散也欲其疏散如虛損淹延之病不能一時奏效者主以丸丸者緩也令其從容培植各有定格常見時俗心肺丸方減數味加肝腎病之藥腎肝丸方減數味入心肺病之餌上下混淆皆不奏功虛費藥本為輕遷延病深為重若此者須分二方早晚各服為是病分寒熱病有寒有熱有似寒實熱似熱實寒者皆須細審經曰諸躁狂越驚惑悲笑屬於熱喘嘔吐酸暴注下迫諸禁鼓栗皆似寒實熱治以涼藥諸病上下所出水液澄徹清冷面青肢厥屬於寒面紅不熱躁渴不喜冷飲欲坐臥泥水井中皆似熱實寒治以熱藥心盛則生熱腎盛則生寒心虛則熱攻於內腎虛則寒動於中此熱清寒溫虛補實瀉也有初感熱病因過服寒劑及生冷之類遂變而為寒者有初感寒病因過服熱藥及薑椒之類變而為熱者不知用藥之法中病即止治之太過則病外添病矣如病家不知脈理欲辨寒熱但看病人畏熱惡火怕日色暖氣口渴思飲冷湯水大便閉結小便短赤心煩身躁多言聲響不寐仰身挺臥喜睡涼處皆屬熱證凡病人畏寒喜暖口不幹思飲熱湯大便利小便長口鼻氣冷懶言蜷臥皆屬寒證熱多屬實寒多屬虛仿此推之寒熱虛實皆可辨矣傷寒不藥諸病中惟傷寒關係最重然治之亦有捷要但乘其初起在肌表時蚤如法治之無弗愈者譬御盜於未入室之前自易驅除要在審辨的確所謂陰盛陽虛汗之則愈下之則死陽盛陰虛下之則愈汗之則死差毫釐謬千里不死於病而反死於醫藥不如不藥之為愈矣故曰傷寒不藥為中醫蓋或值旅邸舟次或山僻鄉村無明理醫家切勿妄服藥凡傷寒初起頭疼身痛怕寒拘急無汗為寒傷榮即宜絶戒腥酒穀味諸果飲食一切有形難化之物更宜卻勞斷怒氣房欲風寒安臥急取帶須蔥頭一握生薑五錢陳皮二三錢細茶葉一撮白梅一個紫蘇三錢水二大鐘砂鍋煮沸以被袱覆患者頭入藥確令熱氣先熏頭面汗出再乘熱飲一大鐘渣即煎接飲以厚被覆身裹頭烘足俟汗出至足為愈腿足無汗而身熱頭疼仍在者寒邪未盡也宜再發微汗如病初起頭疼身熱大汗出者屬風傷衛不必發汗恐有亡陽之害如自有微汗仍如前法再略取汗前法中去紫蘇蔥頭加黑棗三個煎服汗止為愈如起病時胸膈脹滿因傷谷肉諸物本日即與淡鹽湯熱飲三二碗以吐出飲食為度不得吐即以所傷之物燒灰薑湯調服如過數日者用薑蔥尉法見傷寒最忌腥酒米湯不飲一口必無餓死之理絶戒穀味易安如絞腸沙米湯一口殺人例也如口乾大渴但飲茶白湯燈心湯薑湯或至七八日熱極則加雪梨西瓜鮮菱嫩藕生蘿蔔惟搗取清汁啜之去渣凡調理不如法至數日後熱邪傳裡身大熱口大渴譫語煩躁狂言發斑大便閉或下利穢水揚手擲足揭去衣被唇焦舌白苔漸變黃黑或天氣暄熱內外熱極可將病人臥於涼地席上四圍多致水盆令病人手浸水中或更以青布一幅浸濕覆於胸前切宜避風必病人喜好方可為之若渴極欲水問其欲飲幾何但與之半勿多飲或和蘇葉薑汁砂糖滷梅之類亦佳勿強與水致水結胸之患又有大熱至六七日忽然作冷厚加蓋覆猶寒戰悚不定此名發戰乃正氣復而邪欲出之象急宜泡薑湯一大壺置病人胸前任意呼啜以助正氣少頃正勝邪散汗出而解矣如七八日外熱退或乍有潮熱二便通快胸膈清爽惟以清米湯飲之漸加稠湯進薄粥以少為貴若進腥酒立刻番復更慎房室尤有鄉村專務殺牲禱神所謂食歸衆口罪歸病人惜哉又陰證傷寒腹痛肢冷依中寒條多吃濃薑湯炒鹽尉用灸法治之脾胃為主雖有美饌靈藥必賴脾胃運化蓋脾胃一臟一腑屬土易曰至哉坤元土為萬物之母經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也蓋五臟各得受此精華為精為血分布脈絡灌溉周身皆仰賴脾胃司納穀味而成所以脾為倉廩之官胃為水穀之海胃主納受脾司運化胃不和則食不思脾不和則食不化故氣血津液百骸臟腑各失榮養百病滋起矣雖然胃常有餘脾常不足脾尤重焉故先哲云治諸病以健脾為先調一身以理脾為主從來補虛皆重腎經獨東垣云補腎不如補脾苟或飲食失節寒溫失調思慮過度四肢勞極皆傷脾之由也夫脾居坤靜之德而有乾健之運健則能食而形體壯盛傷則少食而肌肉消瘦故節食節勞以養脾也悅心平怒惜氣寡欲以養四臟也養四臟亦以助脾也母子剋制環相資養之功知此則養生之道思過半矣大黃芒硝謹按神農本草經大黃味苦寒無毒主調中化食破積除痰通利水穀腸胃結熱推陳致新安和五臟又按芒硝味辛苦寒主五臟積聚久熱破留血腹中痰實結搏通經脈利二便古今通治傷寒有餘熱證東垣賦云大黃定禍亂而致太平故名將軍如傷寒熱邪傳陽明之本陽邪傳入陰經陽毒火極等證用之則頃刻回生舍之則死不逾日如不能以脈理明辨者可以舌色驗之如舌乾燥苔唇焦口渴者先宜白虎湯重用錢塘硬石膏研末如小便短赤大便祕結大熱大渴不怕寒反怕熱揚手擲足揭去衣被大便下利蒼黑穢水名協熱自利臍內梗硬作痛乃腸中有燥屎則大黃可用矣渴極睛紅苔黃煩躁芒硝可用矣如舌苔黑色如芒刺芒硝大黃可倍用矣如舌燥雖有白苔大便下利清水身無大熱手足厥冷脈沉細名協寒自利硝黃不可用也如舌苔黑色而濕滑名臟結有陽證變陰者皆不可用也如痢疾初起或日數多猶有積滯不清後重窘迫非大黃不能通快如頭大痛目赤腫等證非酒煮大黃不除凡實證涼藥不效者可用數分專在用之中病誤則傷人失用尤殺人豈可畏如鴆毒一例不用乎今醫者逢迎病家不用大黃恐傷胃氣為談柄病家敬其謹慎王道屢有熱邪熾極寧袖手坐視其斃嗚呼痛哉余曾見小兒患痘大渴失用石膏胃爛潰穿胸背而死見痢疾大熱失用大黃腰後腎俞枯涸成窟而死失用硝黃所致如此甚多如明醫視病的確用之無不起死回生歷代名師治法方中多用今以硝黃奏奇功者豈勝枚舉姑舉一案例之附紀如鹽官沈觀察弟天谷公應試南都與選貢劉芑源公同日患痢沈憶宏曾語初感即用大黃等一劑獲瘳劉延醫不肯用沈亟往告醫用熟大黃丸一錢藥中仍加白朮山藥失於通導竟至不起又石膏者傷寒等證神藥醫有絶不用者惜哉人參附子謹按神農本草經人參味甘氣微寒無毒主補五臟安精神定魂魄止驚悸除邪氣明目開心益智附子味辛甘氣大熱有大毒主風寒咳逆邪氣溫中破堅積聚血瘕寒濕踒躄拘攣膝痛不能行步入補劑宜熟溫散寒氣宜生人參補臟腑元氣附子益臟腑真陽火衰陽弱非此不能回生如久病氣血虛憊一切虛損人參可用如命門火熄中氣日損一切虛寒附子可用先哲用補劑必加附子數分以壯參耆之功力追復散失之元陽參附之助豈小補哉凡有尫羸虛冷之象亟宜用矣倘有如瘧邪未散之類醫家常執正氣足而邪自避之語專用補法猶如閉門逐盜盜從何出且邪得補而愈盛反助其邪為害匪細此所謂損不足而益有餘如肺熱還傷肺參亦不可概用近醫遇富貴人輒慮其虛不問病之虛實一例從補亦致失誤此與當用不用者等於亡羊皆由不能洞矚病情故耳三法神功張子和治病不離汗吐下三法本療暴病而久病亦可以奏捷暴病者如傷寒冒邪者汗之及大頭瘟面腫脹並熱為寒包喘急難眠諸風濕證一汗可安癰毒初起經曰汗之則瘡已此皆邪隨汗解也如食積痰滯者吐之及喉風乳蛾而頭面頸項大腫點水不入音聲不出命懸須臾慎勿刺破破者多立斃惟一吐則腫消索食並乾霍亂絞腸沙類皆賴吐全經曰木鬱達之是也如里邪實熱者下之及頭目周身火熱熾盛皆可下之痢疾腹痛等證下之即暢經曰痛隨利減脹以利寬是也久病者如風寒久伏肌髓微熱惡風或纍月痎瘧諸寒濕腫脹皆可汗之年遠厲風大汗驅之如積月關格或小便癃閉等患或伏痰滯氣時痛時脹懨懨數年不能發越百藥無功一吐可愈如痢證始初失下大痛口渴肛門腫閉小便不通粒米不進氣息機微一下霍然至於氣結痰凝蓄血留積必以攻下推陳致新是也可見此三法之妙毋論暴病即久病亦甚神又毋論少壯即衰老亦多奏功今人能以此治暴病而不敢用諸久病又並遇暴病而謬慮虛弱疑畏不用以致病邪深入漸不可救雖然病屬有餘極至困篤用可立起病屬不足亦難行之最宜詳審氣不歸元經曰出入廢則神機化滅升降息則氣立孤危又曰一息不運則機緘窮一毫不續則霄壤判故人身一動一止至理寓焉一升一降存亡系焉經曰心出血肝納血肺出氣腎納氣蓋足少陰腎經為元氣之主司其經設有虧損不能藏其氣則氣無所依由別道而出如泄氣即今出屁古書轉屎氣是也因過食或氣滯得氣出即寬及小兒老人皆勿論然有少年因所斫喪過度所致泄不自知不能自禁其徵也其人必面容青慘形色憔悴誠虛損之漸患此者當自警之有男婦久病之後腎經虛乏真水涸竭氣不歸元而變成喘滿氣急痰實壅嗽呼吸短促不能安臥甚至抬肩擷肚等狀若多服降氣利膈定喘寬胸之藥強下其氣致氣無所歸反增大便下墜後重裡急頻至圊而不解有用補腎藥而愈者其始必因多欲傷精失意傷志則腎不得養不能藏攝其氣猶器敗不能藏物也其有男遺精女下帶而不可止及大小便頻多易出而不自禁者皆可例推入能寡欲節食起居有常則脾腎強固精能通運無氣之可漏力能完攝不使氣之妄行何病之有毋恣茶酒按本草有茶茗二名茶味甘苦微寒無毒早採細者氣清上升主瘻瘡清頭目去痰熱渴令人少睡茗味同晚採粗者重濁下降主下氣消宿食利小便通大腸宜熱飲如多飲少睡令人瘦去人脂茶茗賦云釋滯消壅一日之利暫佳瘠氣侵精終身之纍斯大蓋十二經補瀉溫涼之藥茶為腎經瀉品難經曰瀉南方補北方東垣云腎無實不可瀉生民以來七火常有餘一水常不足七藏神云腎藏精與志尤為元氣所藏瀉腎則精氣日損古無茶茶始於唐盛於宋然亦惟飽後乃飲空心但飲百沸白湯耳酒大熱有毒主殺百邪惡毒氣通血脈厚腸胃御風寒霧瘴養脾行藥力味辛者能散通導周身至極高之分味苦者能下甘者和中淡者利小便然大寒凝海惟酒不冰能熾心火傷肺金腐腸胃成癖積甚至成勞傷寒飲酒者死其在火酒及過於辛徑者為害尤甚況又為肝經補品豪飲則肝橫膽浮肝者將軍之官勇敢出焉故怒發無懼膽者中正之官故直許無隱取禍招尤職酒之故噫能養人亦能害人善葆者慎之哉炅氣愈痛帝曰願聞人之五臟卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛帝問種種不同之義岐伯曰寒氣客於脈外則脈寒脈寒則蹜蜷蹜蜷則脈絀急則外引小絡故卒然而痛得炅炅音拱暖氣也則痛立止所以諸痛得暖氣則止甚者火烘炒鹽尉炒薑蔥或炒麩糠灰砂皆可如臍中痛用面或布條作圈放臍上炒鹽填於中大艾炷灸之陰經中寒灸氣海關元感風寒濕氣四肢筋骨痛甚絮包火烘勞傷痛者同法癰毒初起蒜灸即散如腿足寒濕腫痛六月水邊熱砂堆擁腿足可愈若腹痛得炅不止者是寒氣與腹中炅氣相薄而滿熱氣留於小腸腸中痛疸熱焦渴則堅不得出故痛而便閉不通須涼藥治之面色黃赤為熱白為寒青黑為痛為蠱積總論制度諸藥法今人制藥勢不能悉依雷公矣然如地黃犯鐵男損榮女損衛久服令人腎消沉木香乳香沒藥豆蔻砂仁等取氣味不取形質世俗常配入藥中殊不知見火則辛香盡失惟存其熱性助火損血凡取香氣者皆宜另研末調入服如人參不去蘆反不效山茱萸固精核反滑精麥門冬清心其心反煩心酸棗仁安神而得睡生用則反不寐之類不勝枚舉必宜遵之又製藥專在取效不必膠泥古法如鹿茸虎骨龜板酥炙久無真酥焦極成末氣味何在宏變煮法世以阿膠炒珠同煎滾起黏於藥罐之口宏阿鹿龜膠必切片頓化作丸酒蒸和入如地黃胞衣等酒蒸煮搗膏和入雖不犯鐵春夏黴蛀至於炒枯研末者滋潤之性全無血少陰虛何賴無利而有害矣用藥必要求真如阿膠膃肭臍丁皮馬蘭花紫草之類難得其真莫如不用人參亮潤沙參玄參丹參苦參防風白芷桔梗秦艽藁本升麻緑膽草靈仙撫芎漏蘆茜根前胡柴胡軟苗性柔銀柴胡細潤續斷川地榆羌活獨活羌活內揀黃白色者是香者名土當歸無用羌胡黃連折有煙起大小薊並去蘆烏藥木通防己天粉豬苓澤瀉俱白良薑乾葛萆薢川赤薑黃並洗淨蔓荊決明牛蒡白芥槐角韭子蒿子紅豆草蔻黑醜白醜並細研薄荷澤蘭益母紫花青蒿蘄艾側柏草豨蘞柴蘇葉散邪子降氣梗下氣以上並取葉金銀花凌霄旋覆密蒙款冬花甘菊山茶葛花槐花紅花並取花枳殼枳實緑枳實麩炒橘皮廣東去白消痰下氣留白暖胃和中陳香櫞青皮並去穰桃仁杏仁泡去皮尖栝蔞仁柏子仁去殼研並去油益智草果郁李核並取仁肉桂海桐樗皮臭椿根去粗皮牡丹皮地骨皮五加白蘚皮桂枝並去骨薏苡仁神麯並炒蘿蔔子麥芽酸棗仁並炒研蒼朮炒白朮土炒並米泔浸荊芥香薷瞿麥劉寄奴夏枯草並取穗三稜蓬朮川芎天麻併火煨切山茱萸金櫻金鈴去核訶子煨剝去核石斛川射干貫衆石菖蒲並去根鬚茯苓白補赤利茯神去皮木並取雲南堅白者天門冬麥冬百部貝母蓮肉並去心胡麻青蘘葶藶地膚子蛇床子並揀淨桑寄生山豆根三七並廣西佳蒺藜蒼耳並炒擂去刺海藻昆布全蠍並洗去咸血竭蘆薈孩兒茶並取脆嫩黃耆桑皮並拌蜜炒藜蘆瓜蒂微炒研末骨碎補知母去毛赤芍延胡並酒洗遠志巴戟甘草黑豆煮汁泡透剝肉半夏南星湯泡七次萹蓄淡竹葉地丁並去根百合蓮蕊覆盆去蒂五靈脂荊芥蒲黃生用行血炒用止血皂刺辛夷並去枝茵陳鈴兒藿香枝梗者真厚朴紫厚姜炒黃柏黃厚補腎鹽炒杜仲去皮切薑汁炒斷絲有絲再炒檳榔雞心山藥懷慶者佳五味子遼肥潤紫黃連川者蒼黃多須心空性堅先煎數沸土者外光內實鬱金蟬肚枸杞子甘州麻黃去根節根止汗黃芩枯片瀉肺火條實瀉大腸火調經頭痛遍身痛酒炒海石研細連翹黑色閉口甘遂用一分研勿多當歸頭止血上行身養血中守梢破血下流全活血不走兜鈴用仁肉果麵裹煨熟斑蝥用一個制勿多甘草生則分身梢而瀉火炙健脾胃而和中解毒藥用節紫菀取茸白附子略泡木鱉一二個多發寒白芍藥生用瀉脾止腹痛後重酒炒補脾止瀉痢益血蘇木打細梔子研碎炒使君子肉色如栗車前子有殼粗大者真取鮮草搗絞汁入藥服更效白芨明亮牛膝去蘆酒浸紫草取茸久無真者山楂肉能消痰下氣核能消食健脾傷葷腥肉食者加用常山酒煮細辛北細而香竹茹去外青刮內青大黃錦紋滋潤者去大熱生用欲緩酒潤紙包煨煮又緩蟬蛻去土蕪荑微炒取仁青黛水淘去標去腳犀角劈直開如竹絲者真斜開者僞入藥磨或銼細末蜂房火炙吳茱萸湯泡京墨火煅煙盡研羚羊角明亮光澤照近稍有血色者佳枯憔燥裂不堪丁香去枝赤小豆廣東黑大豆細馬料豆沉香紫黑色上火成油珠者真黑緑色上火成炭灰者僞故紙炒鹽淡豆豉江西白扁豆研薑汁炒乳香沒藥新瓦上略炙出汗研細末調入藥服效粟殼取皮川椒去閉口目鱉甲童便或醋炙研枇杷葉刷去毛塗蜜炙皂莢炙去皮弦豬皮者佳芒硝化服殭蠶洗淨炒研大腹皮黑豆湯洗熊膽置水上一絲掛下真商陸治腫效必復可外敷石葦去毛乾漆炒煙盡蛤粉松江大厚殼煆牡蠣火煆醋淬三次研細木香形如枯骨咬之黏牙決明火煆龍骨五花者佳穿山甲炙黃研末大小茴香鹽水拌炒冰麝諸香氣藥皆忌見火製附子平正重一兩者灰火炮去皮臍或切開薑汁浸透用甘草黃連各二錢童便煮乾天雄大川烏小烏喙雙尖側子五名一種制香附搗光散寒理氣生用散郁醋炒如四制一米醋一童便一人乳一鹽酒浸透曬焙乾或同艾醋煮搗作餅曬制膽星南星白膩圓小者真粗黑臍凹扁大皆非以薑湯泡透研末拌入臘月牛膽掛至次冬又拌如此七年牛黃同功半夏曲湯泡七次為末九兩面一兩薑汁拌踏餅竹紙包掛久佳南星半夏薑礬甘草皂莢水浸透煮乾切曬用效制神麯面二十斤辣蓼草汁八合青蒿汁六合蒼耳汁四合赤小豆杏仁各二合研細和勻踏餅黴過曬藏制麥芽大麥水浸一周時濾竹籮內作窩上蓋濕草日曬水三遍芽出地黃末懷酒浸透入甑蒸或入瓶包固或蒸或重湯煮一日搗膏諸藥為末將地擦勻重曬磨末入蜜和丸如生地浸搗擦曬磨蓯蓉末取大者酒洗去鱗甲晾乾搗膏拌末曬重磨丸天門冬五味枸杞皆可用此法如炒涸滋潤之性地黃犯鐵俱無功制河車先用米泔水洗淨以銀簪腳挑去血筋好酒砂鍋煮至極爛重十五兩乾重一兩二錢首男胎預成藥末候煮乾搗擦勻曬重磨未有末新瓦焙乾切磨竹瀝法淡竹現砍者截斷打碎插新大口烏壇高尺許者內一新鉢掘地坑埋鉢口平地竹壇合上鉢口壇肩縫布條塞緊布外堆泥壇背上堆礱糠三斗點火煨三時後掃去灰泥並布瀝在新鉢內每瀝一杯夏入薑汁一分冬二分糠成灰即取出經宿味酸不堪制虎骨脛骨一對鋸八片好酒一斤砂鍋慢煮酒汁小半杯將骨上筋膜剝下搗膏骨切極薄片研末同膏汁入末加蜜丸制鹿茸茸截下劈八條如前煮將茸條搗膏同汁入藥加蜜用膠法鹿膠阿膠龜膠入煎藥切片藥煎成汁蒸化服入丸藥用酒少許蒸化同蜜和勻如蒸不化者僞膠也取麻仁新鮮麻子揀淨入小苧袋下百沸湯滾透懸過夜次早芽出傾碗內飯上蒸過曬燥操板二塊合磨碎播去殼巴豆霜取肉一兩研細草紙包打油盡霜重一錢用琉璃店鐵板打甚便菟絲餅菟絲子絹袋淘淨好酒浸二日砂鍋添酒煮皮搭絲出酒干石臼搗膏捏餅曬燥入藥形細性堅否此不成末煉血餘壯盛入亂髮米泔洗次豆腐漿洗黑亮入壇中封固外以鹽滷泥搪灰滲干先微火次炭火燒青煙盡取起待冷開玄明粉真來路硝切勿誤用皮店硝皮中出可入洗藥每斤用蘿蔔一斤切片鋪鍋底上放硝水煮化麻布絞去卜汁傾淨鉢去腳次早結成芒硝再煮或鋪豆腐上蒸一遍取硝濾干紙包掛當風火煉費力飛硃砂鮮紅光明牆壁砂研極細水攪輕者隨水飛過定下之粗者又研飛盡澄出清水曬燥重研二萬下揚之不墜乃佳珍珠雄黃滑石礞石石膏等同法青黛亦水中揚過澄出者用煆藥法蛇含石先微火煨數日次用銷銀罐或瓦上燒紅投米醋中淬之再燒再淬如此七次色紅可研為度未酥打碎燒淬煆代赭石法同前煆蘆甘石廣東舊坑點眼藥先煎黃連濃汁次以甘石入銷銀罐瓦蓋燒紅透投入黃連汁內如此三遍再燒投童便內一遍將酥化者洗下研水飛燒不化硬青石去之蒸藥法何首烏滿斤者佳雄赤雌白對用竹刀刮去皮切片拌細黑豆牛膝九蒸九曬大胡麻揀淨好酒浸透九蒸九曬草豨蘞草酒拌和蜜少許九蒸九曬煎膠法鹿角截斷龜板去肋鱉甲俱換水浸三日刷洗極淨打碎新砂鍋桑柴煎汁多次煨過夜汁濃黏為度汁濾入砂鍋慢火熬稠和藥欲成餅瓷碟曬乾煉膏法止嗽益金諸膏新砂鍋煎首汁濾渣煎二汁再煎三汁麻布絞去渣濾第三汁入鍋煎減半入二汁又減半下首汁熬入糖蜜慢火收稠傾碗中坐水內一周每半杯重湯頓溫服人中黃竹截斷兩頭留節外余寸許鑽一眼繫繩節上鑽一眼入甘草末裝滿竹釘楔緊竹筒外劈去青浸糞缸內繩懸縛四十九日劈開取甘草曬燥用若空筒浸久納汁即糞清糞制功同人中白僧房數十年夜壺入米醋滿瓦蓋口鐵絲扎定用鹽泥搪固礱糠火煨至醋乾炭火煆紅待冷打開刮取或長流水多浸刮用亦可圊桶底垢鑿取火煆或置屋上日曬雨露數月亦可用黃治一切熱毒白主養陰退陽皆能除傷寒大熱過經不解壞證退骨蒸勞熱神藥糞清解一切毒壇成埋久更佳童便說見火證煎丸服法煎藥大法每劑水二鍾煎八分渣用水鍾半煎七分如劑大再水一鍾煎半鍾劑輕水減小兒藥水量用之補湯須是熟利藥不嫌生熟者多水煎生者少水浸透數沸即濾服用桑柴火不緩烈取幾分者必准其數汁有餘則藥力未得盡出汁過少則藥味耗涸焦枯及傾番滾出皆無效必宜至親監督切勿專委僕婢若外有煎成磨調化入之藥並煎藥引極宜點檢服藥大法如細丸湯送大丸及末藥先以湯少許調勻添湯咽下服煎丸時候如頭目咽舌止嗽安神心肺上焦藥末藥大丸噙化及水疊細丸俱宜食後臨睡服煎藥少哈細咽喉項藥去枕臥床徐服令藥氣在上也如散郁寬胸快氣進食脾胃中膈藥水疊桐子大及黃米粉神麯糊丸宜半飢飽午飯前服藥居中也如腹病瀉痢膝股腿足腎肝下部藥宜蜜蠟酒醋糊丸空心食前頓服更以乾物壓或頓足使藥行於下也寒藥熱服熱藥溫服附子藥冷服如嘔證藥不能下者另搗生薑及陳皮數錢炒糯米百粒泡湯哈藥一口飲湯送之令人摩胸藥可咽下如醫留藥多劑倘病有變遷天時寒暄更改藥宜止服
