秦艽威靈仙痛甚加乳沒研細調服或小續命湯加川萆薢川楝子羌獨活木瓜服時調麝香少許後以五積散去麻黃酒煎服膝腫大痛旱蓮草摘斷黑者一握搗入糯飯一團酒菜一塊勻烘放膝上箬油紙布包火熨聞酒香數日愈未安再包或陳年糟炒熱包暖又無名異五錢地骨皮三錢乳香沒藥各研錢半麝一分研勻車前草汁入酒調敷惡寒經曰陽虛生外寒蓋陽氣不能外衛所以惡寒必背惡寒甚脈浮無力陽虛宜參耆之類甚者加附子三分病久而惡寒者亦宜解鬱蓋惡寒非寒明是熱證火極似水熱甚而反覺自冷實非寒也有用熱藥少愈者以辛能發散郁遏暫開耳又曰火熱內熾寒必蕩外故實非寒證以辯理並外證參酌擬定寒熱用藥主方寒邪內伏人參白朮乾薑炙草白茯苓半夏肉桂五味子陳皮薑棗煎熱月猶要厚綿衣加附子清涼飲惡寒而脈洪數兼目痛口渴心煩便秘屬熱黃連黃芩梔子連翹薄荷甘草上加燈心水煎服有夏月外棉衣脈洪數小便短赤大便秘結加大黃芒硝愈飲酒人惡寒黃耆二兩葛根一兩煎服汗出安惡熱經曰陰虛生內熱陽在外為陰之衛陰在內為陽之守房室過度斫損真陰陰氣既虛陽無所依遂致浮散於肌表之間雖有惡熱之狀誠陰虛證也脈必細數治宜滋陰主方當歸白芍藥生地黃知母麥門冬白朮白茯苓等分柴胡甘草減半薑棗煎服瘟疫附大頭瘟蝦蟆瘟帝曰有病瘟者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯對曰病名陰陽交交者死不治此陰陽交錯而氣血不循亂經妄走而熱所以不息謂服藥汗出熱不解脈躁不治又曰冬傷於寒春必病溫故溫疫當推運氣所發夫春溫夏熱秋涼冬寒乃四時正氣反此為不正之氣感受則病如冬月嚴寒若觸之即病為傷寒寒毒藏於肌膚春變為溫夏為熱病或冬有非時之暖感之為冬溫有眾人病一般者為天行時疫有一歲之內節氣不和寒暑乖候及有暴雨疾風霧露不散則民病瘟疫無論少長率皆相似故云瘟疫厲病所謂冬不藏精春必病溫君子固密不傷於寒智者自謹雖大風苛毒弗之能害是也其傳經治療與傷寒大同小異可以傷寒方法酌用發表宜辛平之劑不可麻黃熱藥脈法太陽大陽明弦長少陽弦數太陰細弦少陰沉細厥陰微緩主方敗毒散羌活獨活前胡柴胡川芎枳殼桔梗白茯苓人參減亦可各等分甘草減半加生薑煎或為末湯調服尤治傷寒風濕肢痛憎寒壯熱項強睛痛或嶺南瘴氣老幼疫癘或風痰腳氣等證日三服瘟疫頭疼骨痛屬太陽羌活沖和湯發熱口渴屬陽明柴葛解肌湯寒熱往來屬少陽小柴胡湯方並見傷寒六神通解散通治瘟疫蒼朮二錢麻黃夏用紫蘇黃芩石膏滑石各一錢甘草五分上咀加豆豉二十粒生薑七片蔥頭二個水煎服蓋被出汗活人心統方治瘟疫蒼朮麻黃黃芩乾葛川芎升麻甘草等分加薑蔥水煎服春加柴胡防風薄荷夏加石膏滑石黃連減麻黃秋加羌活前胡枳殼冬加乾薑官桂白芷細辛咽痛甘桔湯方見咽喉玉樞丹方見蠱門藿香正氣散見二卷末又人中黃飯丸每七十丸白湯下極熱者飲糞清效大頭瘟因天行邪氣客於三陽之經頭目俱腫而為病也太陽頭頂腦項赤腫宜荊防敗毒散加羌活藁本陽明鼻額面腫二目不開氣喘口乾普濟消毒飲內實防風通聖散間服少陽耳之上下前後頭角赤腫寒熱脅痛小柴胡加消毒藥頭面大腫發熱骨痛沖和湯冬麻黃湯汗出腫消蝦蟆瘟天行邪氣客於少陽頸項並腮俱腫大如蝦蟆樣故名宜用消風清熱之藥宜敗毒散倍羌活加酒炒黃芩大黃隨病加減不可峻用降藥內實雖用硝黃須細細呷之如有大熱狂證可用承氣湯白虎湯等治之或水漬法看輕重用普濟消毒飲子疫癘初覺憎寒壯熱頭面漸腫咽喉不利服之即愈黃連酒炒黃芩酒炒各五錢人參三錢無亦可陳皮去白甘草玄參各二錢馬勃連翹牛蒡子桔梗板藍根各一錢柴胡八分升麻殭蠶各七分上為末半用湯調臥床慢服半用蜜丸噙化如上法或加防風川芎薄荷當歸細辛水煎服如大便秘加酒煮大黃一錢或二錢以利之頭疼骨痛身熱宜先汗之二黃湯治大頭瘟黃連黃芩俱酒炒生甘草等分上為末每五錢水煎服慢呷未退加牛蒡芒硝加引經藥太陽羌活防風陽明石膏少陽柴胡渴加栝蔞根或口乾葛根身痛羌活防風芍藥水漬法治內外熱極法見傷寒簡便方治瘟疫瘟熱大渴欲飲水者蚯蚓泥擂新水飲之又方晚蠶沙擂水濾清汁飲又方向東桃枝葉煎湯浴席圍汗出又方以真降香燒辟邪小兒帶之又方赤小豆囊置井中三日取起向東立水吞男三十粒女二十粒舉家服之不染瘟疫瘟疫咒法並治邪病宜戒房室葷酒用棗一枚咒曰華表柱念七遍望天罡取氣一口吹棗上令病人嚼吃湯下此三字鬼之祖名也宣聖闢瘟丹孔氏六十餘代用之法以臘月二十四日五更初取井花水在乎旦第一汲盛淨器中量人口多少浸乳香至歲旦五更令溫暖從小至大每人以乳香湯飲之香一小豆塊吞下則一年不患時疫五瘟丹黃連黃柏黃芩山梔香附紫蘇甘草梢上七味生為末將大黃三倍煎汁熬膏和丸雞子大硃砂雄黃為衣金箔貼每用一丸取泉水七碗浸化可服七人前方乙庚年黃芩為君丁壬山梔丙辛黃柏戊癸黃連甲己甘草為君者加一倍也余減半雞子清飲治熱病五六日壯熱之甚狂言欲走雞子二枚取清芒硝研細軟石膏研細各二錢上先取新汲水調硝石末次下清攪勻分二服痼冷帝曰陰盛生內寒奈何曰厥氣上逆寒氣積於胸中而不散不散則溫氣去寒獨留則血凝血凝則脈不通其脈盛大以澀故中寒按諸病上下所出水液澄澈清冷癥瘕㿗疝堅痞腹滿急痛下利清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒蓋痼冷之證乃真陽耗散脾胃虧傷又啖生冷難化之物或受風寒陰濕經年累月日久乃成則脾胃因而漬積臟腑致成虛寒及有外邪觸犯內外邪相感忽然而作手足厥冷戰慄憎寒嘔吐涎沫臍腹絞痛或常得大便洞泄小便頻數飲食不化咳嗽㿗疝等證其脈沉而遲治宜溫養脾胃補益氣血助陽固本主方理中湯人參白朮乾薑炙甘草寒甚加附子或川烏生薑七片黑棗二枚水煎服未安加丁香木香砂仁白豆蔻胡椒肉桂茴香沉香蓽茇之類隨輕重用另研末調入服以上皆暖脾胃溫臟腑之品隨證加減用之氣血虛十全大補丸下元冷憊桂附八味丸二方見補益兜肚方治腹中寒積痼冷用之神效兼丹田神闕令人有子男婦可用有孕去之檀香排草各一兩沉香丁香各五錢馬蹄辛廣零陵白芷丁皮各六錢甘松附子乳香各二錢麝香五分上為末和揉艾綿鋪中用帛做成兜肚以線釘定勿令移動外又細夾兜肚及小腹初裹一夜日去之漸至二夜一去之漸至五夜一去方可常裹洗浴法治下元虛寒一切冷病腰腹冷痛崩漏帶下小腹癖積痛椒目川烏細辛乾薑官桂等分研末煎洗下部妙簡便方治一切冷氣胡椒三七粒擂酒服又方治下元虛冷胡椒破故紙炒共為末蜜丸空心酒下又方治心腹冷痛大菖蒲三寸細嚼酒下泄瀉經曰春傷於風夏必飧泄又曰濕勝則濡泄又曰暴注下迫皆屬於熱又曰諸病水液澄澈清冷皆屬於寒夫脾胃同濕土之化主腐熟水穀胃氣和平飲食入胃精氣則輸於脾土歸於肺經行於百脈而成榮衛若飲食過多起居不時傷其脾胃則不輸化上升精華之氣反至下降是為飧泄經謂清氣在下則生飧泄是也久則太陰傳於少陰而為痢疾矣治瀉大綱必分寒熱為要但以脈沉遲口不渴身倦少食腹溫溫常痛直出清水小便清白者屬寒脈沉數口渴聲響亮暴注下迫肛門熱痛腹忽大痛小便短赤者屬熱無藥可包暖臍腹一日不食安主方白朮茯苓車前子澤瀉芍藥煨陳皮炙甘草等分加生薑棗熱加燈心水煎服傷食加山楂神麯麥芽熱瀉加滑石黃連梔子寒加木香砂仁乾薑肉桂冬月再加益智香附丁香去車芍澤瀉燈心夏月香薷扁豆木通厚朴口渴葛根石膏小便短赤或不通豬苓木通滑石石蓮子濕加蒼朮半夏痰乍瀉乍止加半夏南星胸脹厚朴枳實香砂口渴引飲人參五味麥冬葛根升麻少許烏梅一個胃氣下陷人參黃耆升麻柴胡久瀉滑脫不禁肉果麵煨訶子肉粟殼木香乾薑各五分五更瀉加肉果茴香破故紙炒脾虛加人參山藥苡仁扁豆蓮肉暑瀉六一散夏秋濕熱大行暴注水瀉加炒黃連蒼朮升麻木通胃苓湯治男婦暑濕停飲泄瀉不伏水土等證蒼朮制厚朴制陳皮甘草減半白朮茯苓豬苓澤瀉各等分上咀加薑棗水煎服本方加黃連扁豆香薷去蒼朮陳皮甘草名薷苓湯治夏月欲成痢者青六丸治三焦濕熱泄瀉兼治產後腹痛自利亦治血痢六一散六兩紅曲炒一兩上為末飯丸桐子大每七十丸白湯下溫六散治泄瀉嘔吐神效六一散六兩乾薑一兩上研勻每服三錢薑湯下溫脾散治大人小兒外受風寒內傷飲食腹痛泄瀉一服安香附四兩山楂三稜甘草各二兩甘松益智各一兩丁香三奈各五錢上為末每服二錢空心薑湯下小兒量服固腸丸治日久泄瀉痢後滑脫不禁白朮二兩人參訶子肉木香肉果麵包煨龍骨研山藥白茯苓赤石脂研各一兩肉桂炙草升麻各五錢上為末研入龍骨赤脂水法丸或神麯糊丸桐子大每百丸空心薑棗湯下脾虛加黃耆蓮肉芡實虛寒加附子乾薑丁香蓽茇腹脹加陳皮厚朴茴香去炙草不食加藿香白豆蔻食不消加砂仁山楂麥芽五更瀉加破故紙甚不止加粟殼沒石子臭椿根皮參苓白朮散治泄瀉因脾虛者及瀉後調補白朮二兩人參山藥茯苓薏苡仁扁豆砂仁桔梗蓮肉甘草炙各一兩上末每二錢白湯下老幼虛弱久瀉去桔梗加芡實配米粉白糖為末蒸糕大效桂苓甘露飲方見卷末治夏月水瀉口渴小便短赤加香薷簡便方止水瀉車前子炒研末一錢米湯下又生薑半夏棗子煎服又方生薑一塊打細同艾煎服又乾薑末一錢米湯調下又方黃連厚朴各二錢薑汁炒加生薑三片煎服又方吐瀉神昏手足冷南星末五錢薑棗煎服水瀉及男遺精女白帶風化石灰五錢茯苓一兩五錢上為末糊丸白湯下又方百年石灰一味丸服亦效又蠟礬丸方見外科止瀉效灸法百會頂心關元臍下三寸氣海臍下一寸痢疾經曰諸下痢皆屬於濕又曰下痢稠黏皆屬於火又曰下痢膿血滯下皆實熱證也受病之源雖云夏感酷熱過食生冷至秋陽氣始收金氣下降而成如冬月患者亦多莫不因於飲食致傷留積腸胃濕蒸熱瘀干於氣分則白干於血分則赤及如塵腐屋漏豆汁魚腦色裡急後重窘迫不通腹中絞痛者皆屬實熱不俱日數必以苦寒藥治之醫家畏縮遷延甚至所下純血兼紫血塊雖見日色暖氣人來近皆畏為熱漸至肛門紅腫大便不通小便短赤大渴舌苔引飲不止腹中大痛飲食不進至於腰脊兩旁腎涸成窟舌黑皺卷前陰乾縮肛門火逼干吊如孔積全不下茶湯過多穢水直出有醫認為大孔如竹筒誤用人參附子殺人者悲痛之極初則煩躁至此神昏細察病情真確此際仍可以主方服之如得臟腑猶未煎熬腐壞者十救七八一服積下頃刻回生脈滑而沉細身涼易安脈洪而弦數身熱難治又有寒涼太過而成大孔如竹筒者宜固澀之必因日久而成元氣下陷虛坐努責宜養血升提有失於通導多成休息痢經年累月有致不起者治法調氣則後重自除和血則便膿自愈忌腥酒易安主方不拘日數大黃壯人五錢一服可安弱人二三錢小兒一錢至五分量用黃連黃芩條各二錢芍藥二錢當歸枳殼檳榔各一錢桂二分為寒藥之嚮導水一鍾半煎數沸去渣化入芒硝一錢虛人五分磨入木香七分調滑石水飛一錢空心熱服未暢加黑醜一錢車前草搗汁半杯尤妙或以大黃芒硝木香滑石另丸藥汁吞服香連化滯湯痢已通暢積未盡宜服黃連黃芩條當歸白芍各一錢檳榔木香另磨枳實厚朴陳皮青皮各八分滑石一錢五分甘草五分上銼水煎成調木香滑石空心熱服小便短赤加石蓮車前香薷不食加砂仁神麯麥芽血痢加生地桃仁腹痛加赤芍倍白芍甘草腹脹痛加三稜蓬朮血不止加地榆如積通痛止頻頻空解名虛坐努責倍當芍加升麻積盡不實加白朮茯苓山藥砂仁香連丸治赤白休息諸痢已通後皆可服黃連仍同萸炒至萸焦去萸用連川黃連四兩切斷吳茱萸二兩煎汁一碗煮黃連乾炒木香八錢上為末醋糊和丸綠豆大每服百丸空心米湯下去木香加白芍二兩名戊己丸駐車丸治冷熱不調下痢無問新久赤白日夜無度腹痛後重黃連六兩酒炒阿膠蛤粉炒成珠當歸酒洗乾薑炒各三兩上為細末醋煮米糊為丸如桐子大每服五十丸加至七十丸空心米飲送下一方就用阿膠醋熬化調和為丸真人養臟湯治痢積已通日久不止大孔如竹筒滑脫不禁人參白朮當歸白芍酒炒肉果麵裹煨罌粟殼訶子肉各一錢木香另磨七分肉桂甘草炙各四分次服加升麻小便澀加茯苓不止龍骨赤石脂烏梅樗根皮臭椿虛寒焦薑砂仁丁香白朮調中丸治脾胃不和心下堅滿脅腹脹痛噫宿腐氣霍亂吐瀉完穀不化久痢赤白膿血相雜多日羸瘦不食白朮神麯炒四錢人參茯苓豬苓澤瀉各三錢木香二錢官桂一錢五分甘草炙乾薑炮各一錢上為末麵糊丸如桐子大每服五七十丸空心淡薑湯下外炙膏治一切虛寒久痢赤白或時腹痛腸滑不禁用此法木香附子炮蛇床子吳茱萸胡椒川烏各等分上為細末每三錢和麵二錢用生薑汁調作餅貼臍中上以油紙掩定復以衣服帛蓋之以熨斗盛火熨之痢止為度烏梅丸治夏秋腹痛泄瀉後重將欲成痢疾或痢已通後猶有餘積腹中鳴痛胸滿腹脹心疼痔血等證神效烏梅取肉一斤半夏研生薑切各五兩食鹽二兩同入臼搗勻入壇包固春五夏三秋七冬十日取出曬燥神麯麥芽各二兩半木香檳榔陳皮青皮枳殼三稜蓬朮各一兩上為細末水丸如桐子大每服百丸空心薑湯下六一散方見暑門燈心湯調多服效痢前渴雪梨妙後渴烏梅湯簡便方痢初起腹大痛後重不通用大黃五錢好酒一鍾浸半日煎數沸濾服渣水煎未通再服已通再以條黃芩白芍煎服又久滑不禁痢後不止日夜無度粟殼蜜炒厚朴姜炒等分為末每服二錢米湯下又方不止臭椿根白皮略炒上為末糊丸如桐子大每五十丸米湯下又方血痢黃連三錢烏梅五個水煎服又黃連一錢乾薑五分煎服又艾葉醋煎服或加生薑止瀉痢心腹痛五痔血又柏葉四兩芍藥兩半為末每二錢水煎服又木耳燒灰二錢水服或薑醋煮食又枳實末二錢米湯下小兒尤效又生薑細茶煎服又甜菜絞汁服又止血生肌人畜傷敷之又馬齒莧煮粥食又紫蘇四錢防風二錢煎汁調白蜜四兩服又雞子醋煮食三方止久滑痢石榴搗汁飲或以皮曬研末棗肉丸服又五倍子枯礬研丸服又訶子十二個取肉六個煨熱六個生用研末赤痢生甘草白炙草煎湯下又方日久津液枯四肢冷用冬瓜一枚以黃泥五寸煨熟去土絞汁服又方如痢大渴雪梨數個去皮心吃搗汁頓溫飲尤妙又蔥一握切和米煮食又蒜搗爛貼兩足心亦可又百草霜二錢研米湯下又赤小豆煮粥食亦可又方治噤口痢石蓮子去殼取肉微炒研末二錢陳米湯下又石蓮末香連丸各一錢同服又木鱉子研雄黃少許貼臍中又山藥銼碎一半砂鍋煮一半生同為末每三錢米湯下又人參二錢黃連一錢石菖蒲八分石蓮肉二錢上銼碎煎終日慢服一口下即食又取向東壁土炒陳皮共為末每服一錢薑棗湯下又紅槿花陰乾為末先用麵餅二個末摻上食先湯灌開胃口瘧疾經曰夏傷於暑秋必痎瘧痎老也俗名三日瘧夏熱已甚秋陽復收兩熱相攻故為瘧帝曰瘧先寒而後熱者何也岐伯對曰夏傷於大暑其汗大出腠理開發因遇夏氣悽愴之小寒藏於脈理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧云云內經論瘧極詳皆謂風寒暑濕之邪客於臟腑致陰陽上下交爭虛實更作陰陽相併相移也後人始論七情勞役食積痰飲皆成瘧所謂無汗要有汗發散邪為主帶補有汗要無汗扶正氣為主帶散發散邪則升葛芎蒼柴胡之類扶正氣謂小柴桂枝湯白虎桂枝湯之類猶傷寒有汗用桂枝疏邪實表之義又謂傷之淺者近而暴傷之重者遠而緩為痎瘧也瘧脈自弦弦數多熱弦遲多寒弦緊發汗弦遲宜溫瘧不宜截早欲速愈則邪氣閉塞而成他證為害匪細有變水腫鼓脹諸毒等證惟夏秋連日發邪瘧四五次可截如二三日發及陰瘧必先發汗散邪勢輕常山藥截亦可主方蒼朮川芎白芷羌活防風葛根柴胡等分甘草減半加薑棗煎服無汗加紫蘇細辛荊芥穗蔥頭有汗加桂枝檳榔白芍白朮土炒茯苓去蒼朮連日發及午前加黃芩間日及下午夜間加當歸白芍各八分紅花升麻各三分有痰加陳皮半夏有食及不食脹痛加山楂神麯麥芽青皮陳皮草果砂仁暑月加香薷扁豆兼服六一散口大渴加石膏知母麥冬痞悶加枳實桔梗寒不熱加乾薑官桂良薑白朮去麻黃葛根柴胡蒼朮寒甚加附子濕瘧因雨濕身體重痛嘔脹加豬苓澤瀉白朮茯苓陳皮半夏去葛根柴胡服一二帖後服清脾飲加豬苓澤瀉分理陰陽瘧自止若不止惟處暑前一日一發於日間者三四發之後行截藥若處暑後間日或三日一發於夜間者先依方服二三帖天寒加麻黃必令汗出趲至日間再宜主方加當歸芍藥生地知母少加升麻紅花酒洗提至二日至一日漸漸輕可如汗多少食身倦無