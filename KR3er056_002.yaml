body:
  text: 卷之二中風附四肢不舉口眼喎斜諸類中風酒厥食厥預防中風經曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或疑作均為風也又曰風者百病之長也至其變化乃為他病也無常方然致有風氣也又曰諸風掉眩皆屬肝木所謂理中風大法有四一曰偏枯半身不遂也二曰風痱四肢不收也三曰風癔奄忽不知也四曰風痹諸痹類風也古名醫概以外中風邪立論定方謂人有勇怯氣有盛衰邪有微甚中有淺深分中腑中經可治中臟難痊中腑小續命湯解表中經大秦艽湯調養中臟三化湯攻裡後賢乃分西北地高土燥則真中風邪者有之東南地卑土濕皆濕生痰痰生熱熱生風也劉河間謂將息失宜君相五志七火妄動腎水虧虛不能制之熱氣拂鬱心神昏憒而卒倒也宜防風通聖散之類李東垣謂年逾四十陰氣半衰或因七情致傷其氣或肥厚者亦是形盛氣衰故耳宜補中益氣湯之類朱丹溪謂多屬濕痰有氣血虛者宜六君子湯之類以三先生之論悉屬內因主火主氣主濕痰為本則臟腑經絡榮衛氣血亦以諸邪致損故腠理不密外邪易侵則風為標矣以歷年試之有暴感盛怒肝木之風實甚而忽倒者其證喉無痰聲目瞑口合肢冷脈沉乃中氣也有卒中者多因處於順境恣幃幕之樂或年已五八後陰氣半衰而猶縱欲或年近八八精絕而不斷淫致水竭火騰銷爍真陰煎熬津液凝泣為痰隨氣升降四肢百骸無所不至更以厚味醇酒補助其陽陽實陰虛氣血日耗雖外之動作如常內之臟腑榮衛精髓竭矣驀然痰火上逼壅塞清道出入頓廢僵仆不省其證面赤汗流眼合口干喉中痰聲如鋸涎沫湧溢勢如釜沸隨呼吸而濺出唇吻並見種種惡候湯藥不受服牛黃丸更用陝西牛黃數分灌之無功不適時而斃若有生者則我未之見有老年惟因七情勞役氣血虧傷神明失守奄忽而作不省人事喉無痰壅但齁鼾之狀雖數日不醒進藥得宜可至痊愈不可驟進牛黃冰麝及大戟甘遂芫花損血耗氣忌利小便以奪津液先進清痰順氣之藥少兼疏風接服大秦艽湯之類應變而施可安脈經曰脈微而數中風使然滑而大者為痰沉而實者為氣浮遲吉急數凶治法宜提頂發掐人中以皂角末吹入鼻或生半夏末或北細辛末取噴嚏得嚏可治無嚏不治口噤者用細辛南星末泡烏梅搗擦牙自開或鹽梅或單用烏梅擦隨以生薑自然汁灌之次灌稀涎散吐痰痰盛者瓜蒂散虛老人參蘆煎湯吐口噤者鼻中灌之令患人覆身雞毛蘸生桐油或燈窩油絞口痰涎吐儘可蘇虛而不勝吐者用陳年石灰靛青調灌痰降或滾痰丸牛黃豁痰丸方見痰門調下痰降可治或灸百會關元氣海人中少蘇煎主方服隨證加減中氣證先以蘇合香丸方見中寒灌之口噤先以半丸擦齒次宜八味順氣散枳桔二陳湯烏藥順氣散蘇子降氣湯氣門選用審的因暴怒所致氣平自復不藥可安凡疑似難明先服攝生飲方見類中風痰熱盛者宜主方加黃連枳實主方順氣逐痰陳皮半夏白茯苓人參白朮烏藥南星天麻殭蠶白芷等分甘草減半上加生薑五片水煎成入竹瀝半小杯生薑自然汁五匙服加減方通連癱瘓見後參酌方者法之體法者方之用中腑者手足偏廢面顯五色惡風寒拘急先小續命湯一劑解表有汗及夏月去麻黃汗多加黃耆有熱去附子血虛加當歸次以主方加川芎香附羌活防風各八分細辛桂枝各三分減人參白朮殭蠶天麻忌牛黃冰麝能通關利竅反引邪深入中經者口眼喎斜舌強難言外無六經形證內無便溺阻澀主方加菖蒲遠志黃連枳實麥門冬無汗加羌防麻黃川芎蔥頭去人參白朮殭蠶天麻汗多加白芍桂枝黃耆去白芷天麻次服大秦艽湯中臟者邪極深也九竅不利二便秘澀痰聲如鋸先服三化湯利便兼服牛黃丸次主方加當歸川芎芍藥羌防枳實秦艽減烏梅白芷殭蠶天麻便秘有痰滾痰丸痰門左癱屬血與風血虛合四物湯死血加桃仁紅花風加羌活防風蒺藜火加芩連手不遂加黃芩酒炒桂枝足不遂加黃柏牛膝右瘓屬氣與痰氣滯加枳殼桔梗紫蘇子枇杷葉鬱金氣虛加黃耆參術痰盛加栝蔞貝母天粉海石白附白芥子皂莢天竺黃玄明粉之類風疾加白附全蠍實人用荊瀝火盛加芩連梔子血虛加四物自汗加黃耆白芍桂枝身體痛加羌活蒼朮酒芩頭痛加川芎細辛荊芥蔓荊子頂痛加藁本酒芩心虛加遠志石菖蒲驚悸加酸棗仁麥門冬茯神竹茹肥人栝蔞貝母黃連黃芩羌活防風荊芥靈仙薄桂少加附子瘦人合四物三黃俱酒炒嘔不止加藿香磨木香如風熱已清宜天門冬麥門冬當歸芍藥菊花枸杞鬱金淮生地五味子黃柏黃耆牛膝人乳之類悉以主方加減大便秘滾痰丸搜風順氣丸多服後服虎潛丸方見虛損及大補氣血滋培元本之藥小續命湯中腑不省人事手足戰掉語謇痰盛筋脈拘急不能屈伸痛難轉側半身不遂等證腳氣緩弱久病風人亦服防風三錢桂心黃芩杏仁芍藥甘草川芎麻黃人參各錢四分防己二錢附子七分上作二服水鍾半姜五片棗一枚煎服取微汗無汗惡寒麻黃杏仁防風各加一倍有汗惡風桂枝芍藥杏仁各加一倍身熱無汗不惡寒加知母石膏各錢四分減附子身熱有汗惡風加葛根一錢黃芩桂心各加一倍無汗身涼加乾薑一錢附子甘草各加一倍有汗無熱桂附草各加一倍汗多加黃耆如有雜證相仍隨宜加減大秦艽湯中經脈者外無六經表證內無便秘里證乃血弱不能養筋故手足不能運動舌強難言口眼喎斜宜養血舒筋秦艽石膏各一錢甘草川芎當歸芍藥羌活獨活防風黃芩白芷白朮生地熟地茯苓各七分細辛五分上加薑棗水煎服遇天陰姜七片春夏加知母一錢心下痞加枳實三化湯中臟九竅不利有表證先服小續命次此湯通便溺大黃枳實厚朴羌活各二錢五分上水煎服愈風湯通治諸風初覺不致倒僕治未病聖藥又中風內邪已除外邪未盡此方加減常服久則清濁自分榮衛自和羌活甘草防風當歸蔓荊子川芎細辛黃耆枳殼人參麻黃白芷甘菊薄荷枸杞子知母地骨皮獨活秦艽黃芩芍藥各三兩蒼朮生地各四兩肉桂一兩上銼每服一兩水二鍾生薑三片煎空心服渣再煎欲汗加麻黃一錢欲利加大黃一錢大寒後加半夏人參柴胡各三分穀雨後加石膏黃芩知母各三分季夏加防風白朮茯苓各三分大暑後加厚朴藿香各三分肉桂半分霜降後附子肉桂各半分當歸三分防風通聖散諸風潮搐手足瘛瘲邪熱暴甚肌肉蠕動遍身癍疹疙瘩頭痛目赤一切屬風屬火證神效小兒急驚痧喑滑石三錢防風一錢二分甘草一錢當歸石膏黃芩各八分桔梗八分麻黃夏減半芍藥連翹薄荷梔子川芎芒硝各四分白朮荊芥各三分上加生薑水煎服入硝熱盛便秘量虛實加大黃有汗去麻黃頭痛加羌活白芷蔥頭喘嗽加桑皮杏仁半夏桔梗冬花紫菀目腫赤瘴加羌活赤芍木賊蒺藜菊花決明蔓荊蟬蛻鼻濁涕每兩加薄荷黃連各一錢小便淋閉去麻黃倍滑石連翹加木通小兒急驚加大黃梔子茯神調辰砂服烏藥順氣散一切風氣攻注走痛手足癱瘓骨節拘攣麻木烏藥陳皮各二錢麻黃枳殼桔梗白芷川芎各一錢殭蠶乾薑炮各五分甘草炙三分上姜三片棗一枚水煎服中風一身麻木加人參白朮當歸麥冬先服此次進風藥久病去麻黃加羌活防風南星半夏遍身痛加當歸官桂乳香沒藥臂痛加桂枝蒼朮羌活防風腳膝腫痛加牛膝薏苡仁腰痛加杜仲故紙茴香手足冷痹加附子肉桂胸滿加蓬朮三稜搜風順氣丸治三十六種風七十二般氣腸胃積熱胸膈痞悶大便閉小便澀腸風痔漏肢節麻痛手足癱瘓語謇孕婦勿服大黃五兩酒蒸九次車前子二兩五錢酒浸檳榔牛膝山藥麻仁菟絲餅山茱萸郁李仁各二兩防風枳殼獨活各一兩上為末蜜丸桐子大每服三十丸早酒或米湯臨睡茶湯下瓜蒂散諸風痰壅膈食諸癇脹滿吐後服降火利氣清神藥瓜蒂炒研每服實人一錢虛老五分茶末二分半酸齏汁調下風癇加全蠍末五分腫脹加赤小豆宜晴天午前空心服不止用麝香少許白湯送下煮淡豆豉汁調尤佳稀涎散中風涎潮氣閉膈塞不通鬱結關格喉蛾諸痰證皂莢不蛀者炙去弦豬牙尤佳明礬等分研末每服一錢白湯調下不止陳皮薑湯史國公浸酒仙方癱瘓筋攣半身不遂乾溼腳氣濕滯經絡不宣諸氣木瓜五兩川萆薢白殭蠶續斷五靈脂牛膝天麻白芍烏藥威靈仙黃耆松節當歸虎骨打極細防風各一兩上用無灰酒一斗浸藥二七日緊封日足取藥曬乾研末每服二錢藥酒調下酒完米湯下豨薟丸中風不語口眼喎斜時吐涎沫四肢麻痹遍身痠軟豨薟草五月五日六月六日採葉陰乾煮酒入蜜少許拌勻甑內蒸過曬燥如此九次搗末蜜丸桐子大每服百丸空心酒或米湯下靈仙丸通十二經脈去宿垢微利不瀉口眼喎斜癘風頭風癜風皮膚瘙癢手足頑麻疥癬腰重陰腫婦人月閉諸證威靈仙洗淨焙乾上為末好酒拌潤入竹筒內塞口九蒸九曬煉蜜和丸如桐子大每服二十丸酒下朝服暮效外靈仙煎洗八味順氣散即四君子湯加陳皮青皮烏藥白芷水煎服神氣不清涼膈散加青黛藍根為末蜜丸彈大硃砂金箔為衣臨睡茶下風虛眩運四物湯四兩加秦艽羌活各半兩每服五錢水煎服四肢不收恍惚不言竹瀝生葛汁各二升生薑汁二合和分三服中風多熱痰盛常服竹瀝荊瀝薑汁減半和勻五合溫服簡便方癱瘓諸風取汗紫背浮萍七月半收攤竹篩內下著水盆曬乾研細末煉蜜和丸彈子大每服二丸細黑豆煎酒調下暖室蓋大汗出通治諸風蒼耳草端陽日採研末蜜丸桐子大每服二十丸日三服酒下若有風處如麻豆粒起此風毒出也針刺黃汗出愈中風癱瘓肢廢癘風麻黃去根節二斤河水五升煎汁去渣再熬膏入白芷桑皮蒼朮甘松浮萍各一兩川芎苦參各二兩為末和膏丸如彈子大每服一丸臨臥酒下取微汗隔二日服中風經年不愈青松一斤上細銼為末石臼搗細生絹袋以清酒一斗浸二宿火煨一宿初服半升加至一升汗出即止三十六種風菖蒲淨根薄切三斤絹袋盛懸壇內入酒一斗密封百日以熟黍米一升內壇中封十四日開出取淨酒溫飲風痓昏迷強直吐沫及產後痓黑豆炒焦投酒淬淋漬酒一碗入川獨活荊芥各三錢煎七分溫服未安再服中風腹中切痛食鹽少許炒燥含口中熱湯吞下得吐痰安口噤涎潮皂莢大者一條去皮豬膽炙研末一錢調灌不吐再服諸風及男子陰癢婦人帶下小兒客忤殭蠶為末一錢酒下水腫風疾腳軟筋攣膝痛大黃豆同甘草煮湯頻飲四肢不舉經曰足受血而能步手受血而能攝掌受血而能握動言視聽無非血養是證若膏粱之士感於中風之後兼以語謇流涎乃痰飲隨氣入於四肢無血以養故不能舉動也專宜治痰不須養血壯筋骨等藥有水竭火盈耗損營血宗筋失養而致宜養血滋陰有肥甘過享脾土太實所致宜三化承氣湯瀉令陽虛土平可安有脾虛不能為胃行其津液以達四肢故不舉當十全大補湯隨證加味可也主方膏粱風痰壅盛橘紅貝母膽星各二錢茯苓白附子天麻栝蔞仁去油白芥子海石研各一錢水二鍾生薑五片枇杷葉三大片去毛蜜炙煎八分入竹瀝一杯薑汁十匙食後服口眼喎斜舉世皆謂風邪中於臟腑痰飲留於經絡專用祛風豁痰之藥多不見效外用鱔血吊法尤為非理切戒治法當以清火養血為主或兼散郁行氣有風痰者兼而治之必宜頓服藥餌脈洪火炎澀為血少主方黃連黃芩梔子當歸芍藥川芎生地天麻秦艽木瓜等分上水煎溫服火盛加連翹石膏玄參便秘加大黃滋陰天門冬麥門冬知母黃柏甘菊枸杞五味牛膝石斛人乳利氣烏藥諸類中風經曰神傷于思慮則肉脫意傷於憂愁則肢廢魂傷於悲哀則筋攣魄傷於喜樂則皮槁志傷於盛怒則腰膝難以俯仰勿謂肢廢筋攣等概作風治更有五志過及六淫氣侵勞傷氣血房幃精脫凶喪暮夜邪惡沖觸及痓厥屍厥痰厥氣厥血厥等證皆至卒暴倒僕不省先宜掐人中取嚏艾灸等法見前急煎主方同蘇合香丸中風寒暑濕皆可服少蘇詳辨證名各依本門治理主方攝生飲諸卒中半夏薑湯泡南星濕紙包煨木香各二錢半蒼朮生甘草生北細辛石菖蒲各一錢上劑加生薑七片水煎磨入木香溫服調蘇合丸同灌尤佳痰盛加全蠍炙研二枚酒厥有因飲酒過多而致蓋酒之為物水形而火性故慓悍酷烈濕熱蘊積之久則為飲為痰滲以臟腑流於關節為半身不遂口眼喎斜更值醉甚亦至昏憒僵仆治宜解酒除濕主方葛根葛花尤佳陳皮各三錢砂仁白豆蔻豬芩澤瀉白茯苓人參白朮乾薑各一錢水煎服食厥因飲食倍常不能運化填塞胃氣升降不通卒然倒僕目瞑口噤亦似中風急宜多灌姜鹽湯探吐吐出痰食自蘇萬勿誤服祛風藥重傷胃氣斃可立待右關脈弦緩而浮胃風夏月胃風證乃傷食乘風而感亦此類也主方白朮二錢陳皮半夏白茯苓厚朴山楂各錢半人參木香磨砂仁研各一錢甘草五分上加薑棗水煎調入香砂服隨證加減預防中風膏粱之士肥甘醇酒皆能助火生痰痰生熱熱生風風火同陽性並上行致頭目眩運痰盛氣虛手足指節麻木軟弱面如蟲行口眼牽掣肌肉瞤動臂膊臀髀不仁語言顛錯胸膈迷悶神思不清口渴便秘小便赤少此皆中風階梯極當防微杜漸脈多弦滑虛軟無力左脈不足服四物湯方見婦科右脈不足服四君子湯方見虛損痰壅導痰湯方見痰門火盛防風通聖散次服愈風湯搜風順氣丸三方見前主方天麻荊芥白朮各二錢膽星半夏制甘草各五分水二鍾生薑二片黑棗二枚煎八分入竹瀝半杯薑汁五匙食遠服以此方加減配合為末竹瀝九分薑汁一分疊丸如綠豆大每服二錢食遠服日二三次忌鮮豬肉之類傷風經曰傷於風者上先受之又曰虛邪賊風陽先受之又曰清淨則肉腠閉拒雖有大風苛毒弗之能害蓋風為天地浩蕩之氣四時八風之變未嘗無也間有傷者不能法道清淨不得腠理固密表上陽虛所致一因也有挾虛痰熱其氣拂鬱風邪易於外束二因也有火乘肺金煎熬津液成痰痰火騰奔風自內生三因也感病者無出於此其脈浮而大者為風浮緩為傷風鼻塞浮滑而大為內熱生風治法表虛受風專宜發散勿致汗多亡陽有汗老實表散邪桂枝湯主方加桂芍之類內夾痰熱而傷風邪者參蘇飲之類痰壅火盛內熱生風者防風通聖散方見中風之類加減調之凡鼻塞聲重腦脹頭痛鼻流清涕畏風屬寒鼻中濁涕而熱氣時出咽乾咳嗽痰唾稠黏屬熱外之風邪疏散內之痰火未平芩連枳桔二陳湯方見痰飲之類清肺降火利氣消痰主方頭疼鼻塞蒼朮藁本羌活白芷川芎防風各七分細辛甘草炙各五分上加姜三片蔥頭三個水煎有汗表邪加桂枝白芍無汗惡風加紫蘇葛根參蘇飲傷風感冒發熱頭痛咳嗽涕稠疏邪清氣消痰除熱人參紫蘇葉葛根半夏前胡桔梗陳皮茯苓枳殼等分木香甘草減半上加薑棗水煎服咳嗽去參香加桑皮杏仁肺熱加黃芩川芎茶調散治傷風上攻頭目鼻塞聲重薄荷葉四兩川芎荊芥各二兩羌活白芷防風甘草各一兩細辛五錢上為末每服二錢食後茶湯調下中寒經曰冬三月此謂閉藏水冰地坼無擾乎陽早臥晚起必待日光夫中寒者卒中天地之寒氣也或冬月嚴凝之氣或三時暴客之寒手足厥冷臍腹絞痛戰悚昏迷唇青口噤面如刀刮引衣蜷臥不渴當分三陰治之中脘痛屬太陰理中湯臍腹痛屬少陰五積散小腹痛屬厥陰四逆湯倍附子加吳萸治之先用灸熨之法稍緩不救如腹不痛惟脈沉肢冷者俗謂陰證傷寒是也醫以房室受寒為論若患人因平素斫喪腎虛而成病時不犯必堅執不伏不肯服藥或以他證外治反樂從之藥亦怠緩不滿六日而死嗚呼遇此之候但依方調理勿以犯淫為論致病者疑惑有初感乍寒乍熱脈弦似瘧猶能行動失用附子溫散三四日手指漸冷而斃脈遲緊或沉細澀皆寒堅弦或沉細為中寒寒脈散者死有汗尺脈遲滯寒在下焦者死主方回陽救急湯人參白朮茯苓半夏薑製乾薑炮肉桂附子煨去皮臍甘草炙各一錢陳皮五分五味子九粒加姜煎服上方通治中寒證甚者倍附子乾嘔吐痰涎白沫加吳茱萸無脈加豬膽汁一匙瀉甚加黃耆升麻吐甚多加薑汁次兼官桂當歸溫血分蓋寒傷榮也倉卒無藥用布條纏作圈放臍上中安炒鹽上以大艾炷三個灸多壯腹痛止為度更灸氣海一穴臍下一寸五分二十壯丹田一穴臍下二寸關元一穴臍下三寸治臟結不可攻者及陰汗不止腹脹腸鳴面黑指甲青百餘壯量法病人屈中指中節兩折紋尖為一寸熨法用食鹽一斤炒熱布二層包熨腹臍痛處冷即換無鹽麥麩灰砂皆可一法用吳茱萸二升酒拌炒煮熱以絹袋盛或二三合煮滾入麩一升鹽一合炒包熨心腹及手足心氣通則止薑蔥熨方見傷寒一法用蔥一握束縛如餅切去根葉存白二寸許先以火烙一遍令通熱著病人臍上下以熨斗火熨之先以麝香硫黃安臍中尤妙更作三四餅壞則換手足溫微汗乃止內服主方蒸臍法麝香半夏末皂角末各三分安臍中上鋪鹽灸二七壯理中湯治太陰中脘痛自利不渴寒多腹痛瀉霍亂厥冷人參白朮乾薑甘草各二錢病輕減上加生薑煎服腎氣動者去朮加桂二錢吐多去朮加生薑三錢丁香五分利多加木香一錢小便澀加茯苓渴加朮寒加姜腹痛下利加附子炮二錢霍亂轉筋加煅石膏五錢枳實理中丸治寒實結胸加茯苓枳實為末蜜丸彈大白湯下五積散治少陰臍腹痛及感冒寒邪頭疼身痛拘急嘔吐不問外感風寒內傷生冷寒濕客於經絡腰背痠疼婦人經閉白芷當歸川芎陳皮厚朴蒼朮白芍枳殼桔梗半夏制各一錢乾薑茯苓官桂各五分甘草三分麻黃冬八分夏二分加生薑三片蔥頭三個煎服四逆湯治厥陰小腹痛太陰自利不渴陰證脈沉身痛先服輕劑附子一枚生去皮臍切作八片甘草炙六錢乾薑五錢分二劑水煎溫服取汗茱萸四逆湯治厥陰中寒小腹痛甚通脈四逆湯前方倍加甘草吳萸泡附子炮乾薑各二錢炙草錢半上加姜水煎服附子散中寒陰證唇青面黑身背強直四肢厥冷諸沉寒痼冷附子制熟二錢官桂當歸白朮乾薑半夏各七分姜五片棗二枚煎服蘇合香丸治中風中氣中寒卒倒口噤不省暴感寒毒臍腹絞痛肢冷吐瀉心痛痹疼鬼祟邪惡癆瘵傳屍疫癘穢氣嵐瘴蠱疰小兒急慢驚風每服男婦一丸小兒半丸生薑汁化開薑湯調下牙緊半丸擦牙開灌之如感冒風寒咳嗽痰喘薑蔥湯下產後泄瀉腹痛一切風寒怒氣胸滿等證防霧露酒服火病戒服香附白朮安息香如無以白豆蔻代檀香木香蓽茇犀角另銼末沉香訶子肉各二兩麝香乳香硃砂水飛重研蘇合油各一兩冰片五錢上各取真者另研細末次入麝冰油砂研勻加煉熟白蜜和每丸重二錢黃蠟厚封或入小瓶蠟封口勿令泄氣勿濕潤傷寒正名論初感論兩感六經形證治例陰陽似證陰陽毒腎傷寒汗吐下等可不可治法變證辨證大要察脈大要用藥大法傷寒方法經曰風寒客於人使人毫毛畢直皮膚閉而為熱又曰凡傷於寒則為病熱熱雖甚不死若兩感於寒而為病者必死傷寒者霜降後至春分前感寒即病之名也冬時寒伏於肌骨春時隨陽氣升發或復感寒邪發為溫病經曰冬傷於寒春為溫病是也三四月病名晚發鬱而至五六月為熱病夏月壯熱不惡寒為中暍頭疼脛冷腹滿為濕溫身熱足冷項強惡寒頭搖口噤身背反張為痓證春宜溫而反寒夏宜熱而反涼秋宜涼而反熱冬宜寒而反溫感之為病名時氣有沿家遍戶長幼病同者名疫癘不時有暴感風寒而病者名感冒又有冬溫溫毒寒疫風濕等同類一十四證凡身熱無汗屬寒邪可用主方發汗身熱有汗屬風與濕可依加減方止汗而愈有類傷寒四證如頭疼發熱身不痛氣口脈盛惡食欲吐者食積也不頭疼身痛惡寒或煩熱時頭痛不眠者虛煩也憎寒發熱不頭疼項強氣急胸滿脈滑大者寒痰也發熱憎寒嘔綠色水腿腳紅光腫痛甚而衝心作痛者腳氣也各有門類有惡寒拘急飲食作嘔甚則心煩眩暈氣急脈浮緊者腫毒疔癰也或內生肺癰腸癰之類依外科治有因跌損閃挫亦發熱者瘀血也婦人經脈不行及陰虛血少等證亦惡寒發熱拘急切宜分別如傷寒誤食傷人諸證誤作傷寒斷其穀食尤至傷人慎之論初感附小愈夫寒邪中人陽經受病太陽為首陰經受病少陰為先足少陰腎經與足太陽膀胱經相為表裡陰陽臟腑之配合也然寒之初感必入膀胱陽經而作熱若腎虛或因房勞遇寒則邪乘虛直入少陰作寒為陰證矣依中寒門如膀胱受邪寒主收引腠理閉塞其陽氣為遍身熱可即以發散藥服之腠理開汗出而邪解陽氣得泄身涼而愈若此時逡巡畏縮或藥下不中病則邪熱漸傳六經變態百狀治療最難但能防之於未然寧有深重之疾哉蓋風初感肺先受之必噴嚏鼻塞頭痛腦脹惡風等候乃風入之漸也此際能增益衣衾百凡戒謹豈有傷風之患乎如寒初感腠理閉之必足下微冷身上覺寒形體拘急臂膝頻欲舒挺為快乃寒入之漸也此際能斷穀食絕房幃包首裹足厚覆安臥惟飲熱薑蔥茶湯令有微汗出過宿自然平復豈有傷寒之患乎若已感冒寒邪初猶不覺仍前作勞強進飲食邪氣得腥酒穀味補助所謂邪得補而愈盛是也寒氣必然入里多至危怠更犯色欲必為陰證為兩感皆由失於防微杜漸也有小愈病加者何蓋此證多日不食必不餓死必宜待熱退方可飲食日數縱多亦待熱勢將平微與粥湯養其胃氣熱除漸與薄粥最忌腥酒又有因病時熱渴誤飲涼酒遂致危亡者經曰多食則復食肉則遺飲酒則劇復感風寒勞復皆難治犯淫自病名女勞復無病者病名陰陽易多死論兩感帝曰其兩感於寒者其脈應與其病形何如岐伯曰兩感於寒者一日太陽與少陰俱病則頭疼發熱口乾而煩滿二日陽明與太陰俱病則腹滿身熱不欲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死又云天之邪氣感則害人五臟以知內外兩感臟腑俱病欲解表則有里欲攻裡則有表表裡概不能一治故死感之淺者猶或可治宜沖和靈寶飲或大羌活湯治之次察形證如里證急者大柴胡湯或調胃承氣湯微攻之表證急者柴葛解肌湯或小柴胡湯微解之若下利身痛四肢厥冷脈沉邪傳陰經宜四逆湯或理中湯分輕重溫之六經形證治例足太陽膀胱經頭痛項強脊腰膝痛惡寒拘急身熱無汗為表實依主方得病微熱譫語小便不利熱結膀胱宜桂苓飲小便利而小腹急脹為蓄血證看大便黑口渴飲水不欲咽桃仁承氣湯下去黑血熱甚汗出至頸而還渴欲飲水小便不利必發黃宜茵陳五苓散五苓加茵汗後口渴鼻塞表未解煩躁目瞑必衄血成流病解不成流再微汗足陽明胃經目痛鼻乾不眠身熱微畏寒自汗舌乾脈微洪長屬陽明表證本病舌苔白滑葛根湯加柴胡黃芩不退生地芩連湯以後大渴舌黃苔屬經證如神白虎湯渴甚倍石膏加天粉黃連竹葉潮熱自汗揚手揭被大便秘轉矢氣臭屁也或自利穢水胸痞舌黃苔乃陽明標病大柴胡湯未效六乙順氣湯舌苔黑燥如芒刺重用大黃芒硝未效加用失用則死表未清里又劇大柴胡湯熱甚三黃石膏湯睛紅三黃巨勝湯足少陽膽經耳聾脅痛乾嘔口苦寒熱往來微畏寒汗少舌白苔脈浮弦者為少陽經病膽無出入之路在半表半裡禁汗吐下宜柴胡雙解飲和解以後身熱耳聾胸滿嘔渴舌黃苔自利脈弦為標病只宜小柴胡加黃連竹茹枳實二便秘少加大黃足太陰脾經腹滿咽乾舌黃苔手足溫身黃小便澀大便秘腹痛脈沉有力為本病宜桂枝大黃湯下以後頭汗至頸而還口渴小便赤大便實身目黃脈沉實為標病宜茵陳大黃湯如不渴嘔吐大便通利小便清長舌紅潤脈沉無力手足厥冷宜加味理中湯或先屬陽證因體虛下之太過虛邪傳入陰經寒證悉具理中湯溫補足少陰腎經口燥咽乾舌苔邊黃中黑大便秘或清水脈沉實有力此熱邪傳少陰本病調胃承氣湯微下之以後譫語便秘繞臍硬痛煩躁大渴脈反沉疾此熱邪傳入少陰標病宜大承氣湯急下之本經有熱邪傳入衝脈干於血分血熱妄行逆上則嘔血迫下則便血外證神昏譫語舌燥無苔如火炙豬腰子脈沉澀或洪數宜生地黃連阿膠湯或歸地養榮湯以上皆熱邪傳腎水涸為病非真陰證也本經惡寒厥逆蜷臥不渴吐瀉腹疼身重脈沉遲屬臟寒宜回陽救急湯溫補足厥陰肝經胸腹脹滿消渴飲水譫語煩躁便秘或下清水舌乾黃黑燥苔脈沉實有力此熱邪傳入厥陰本病宜六乙順氣湯下以後有前證手足反冷或乍溫乃熱深厥亦深非寒厥也脈沉實有力為標病大承氣湯急下之本經口吐涎沫四肢逆冷過乎肘膝不渴小腹痛脈沉遲此本經真陰證急宜回陽救急湯茱萸四逆湯溫之六經中惟少陰腎經疑似難明脈俱沉沉而有力為陽大黃芒硝攻下沉而無力為陰附子薑桂溫補一毫千里殺人反掌臨時細心並外證參酌陽證似陰陰證似陽等十二證古書皆各分條立論初學最難剖析宏極欲後人易解姑匯為二論雖然大同小異用藥寒熱輕重臨床細加詳察陰陽似證陽證似陰陽亢於內逼陰於外陽邪傳入陰經有陰經之名屬胃腑實熱陽厥當下熱邪傳裡失下熱深厥亦深也表寒裡熱身體厥冷反不欲衣寒在皮膚熱在骨髓陽盛拒陰身雖寒脈洪數火極似水亢則害承乃制上六證名異病同初起時身大熱頭項痛陽證也六七日後熱伏於裡陽邪陷入少陰經外證遍體雖寒反不欲衣手足厥冷不過肘膝或乍冷乍溫此因失用大黃攻下伏熱已深陰失其守而避在肌表亢陽侵於內為裡熱表寒之證雖有前證猶有口渴舌燥譫語昏亂不眠大便秘或利黑水小便赤爪甲紅六脈沉實有力可證也正氣猶實六乙順氣湯下之弱者如神白虎湯清之危者歸地養榮湯誤認為陰寒而用熱藥者立死陰證似陽陰伏於內逼陽於外陰盛格陽淫陰潛亢於裡孤陽飛越於上陰厥當溫內外皆陰無陽厥逆過乎肘膝表熱裡寒陰證亦有發熱者熱在皮膚寒在骨髓也陰極發躁陰躁宜熱藥溫之水極似火物極則反陰證脈弦乍寒乍熱誤作瘧治死者多矣切當知之上六證名異病同初起時身不熱頭不疼口不渴或乍寒乍熱手足常冷大便泄或陰寒凝結而大便秘小便清長陰證也三四日陰極煩躁面赤不熱欲坐泥水井中口微渴欲飲水不能入口或身熱反欲穿衣又熱脫衣又寒此因失用附子溫經伏寒已深陽失其守而浮於肌表淫陰僭於內為裡寒表熱之證雖有前證猶有惡寒蜷臥身難轉側昏沉多睡爪甲青黑六脈沉微無力可證也宜理中湯四逆湯回陽返本湯溫散寒邪使陽氣復而微汗出為愈誤認為陽熱而用涼藥者立斃太陽脈似少陰始得病頭疼身熱故為太陽證脈當浮今反沉似少陰脈多因裡虛久寒正氣衰微身必痛故宜救里使正氣內強逼邪外出用生附四逆湯雖曰溫里亦能汗出而解少陰證似太陽始得病脈沉細不頭疼故為少陰證當無熱今反有熱似太陽證猶有寒邪在表未傳入里腠理鬱閉為熱宜麻黃附子甘草湯熟附溫裡寒麻黃散表熱陰陽毒陽毒受惡毒之氣入於陽經或失汗下或熱病誤熱藥其證大熱咽疼發斑面赤譫語脈洪宜陽毒升麻湯青黛一物湯咽痛玄參升麻湯三黃巨勝湯甚至舌卷焦黑鼻孔如煤宜水漬法五日治七日不治陰毒受深重之寒伏於腎經致陰氣獨盛其證腹痛下利咽閉嘔逆唇青面黑手足厥冷身如被杖短氣難息六脈沉微宜服甘草湯真武湯兼蔥熨法熏法灸關元百壯三日後不可治腎傷寒少陰咽痛伏氣病三名一證也因冬月受寒伏於少陰腎經或太陽傳入或感暴寒多發於春本經循喉嚨挾舌本故咽痛後必下利屢有誤為火病服涼藥殺人先宜甘桔湯寒熱皆效加玄參服如覺惡寒拘急服參蘇飲倍甘桔取微汗安口瘡赤爛宜升麻六物湯之類汗吐下等可不可治法可汗失汗邪不出變生為諸病寒邪在表頭疼骨痛發熱惡寒脈浮一日至十三日或多日略有前證皆宜主方隨輕重發表少陰脈沉身痛麻黃附子細辛湯發汗切勿太過不可汗不宜汗而汗奪血竭津液因風暑濕自有汗勿再汗臍上下左右有動氣瘡家衄血咽閉口瘡瀉利清穀婦人經行小便淋澀皆宜小柴胡加減和解可下陽毒等證失下傷人熱邪在裡大渴舌苔大便秘繞臍硬痛協熱自利肢溫六乙順氣湯下結胸大陷胸湯不可下不當下而下邪入損真氣凡有表證無里證小便澀四肢冷咽閉嘔吐有汗臍上下左右有動氣犯此而有下證大柴胡湯微下虛老黃龍湯可吐痰食宜吐初病有食淡鹽湯吐氣滯有痰稀涎散吐不可吐無食痰傷胃氣傷風有汗四肢冷虛人皆忌可溫益火之源以消陰翳陰寒盛脈沉遲下利腹滿身痛發熱脈反沉陰毒呃逆四逆湯少陰寒嘔理中湯不可溫諸陽熱證似陰寒脈雖沉而數先頭痛大熱後肢冷禁溫可補邪出正虛脈弱氣虛汗多肢冷獨語鄭聲不眠不食皆宜補不可補餘邪未盡脈實頭痛身熱大渴舌苔便秘下利穢水腹滿可和解大勢已平無汗吐下證惟往來寒熱胸未清宜小柴胡湯未可和解表裡未盡表證未罷里證猶甚防風通聖散合六一散可水以水濟火但要病人自思水飲問欲幾何惟與其半飲之不可水不思而與水停心下強與則成水結胸陰證似陽雖思不能飲變證憹已見六經形證者皆不重贅結胸同類十一證大結胸不按而痛因頭疼惡寒表證未罷早用大黃等下藥致邪乘虛入里心下堅滿如石外用薑蔥熨法服大陷胸湯小結胸按之方痛心胸硬滿亦用熨法內服小陷胸湯熱結胸實熱結胸懊憹煩渴心下滿脈實宜三黃石膏湯寒結胸外無熱證而內脹結宜枳實理中丸方見中寒水結胸飲水過多汩汩有聲小半夏茯苓湯小便不利五苓散血結胸有衄血強止蓄於上焦胸滿漱水不欲咽犀角地黃湯支結支結者滿而濡心下妨悶也小柴胡湯加桂枝臟結狀如結胸舌上有胎濕滑飲食如故時時下利小柴胡倍姜更灸關元然素有痞連在臍旁痛引小腹控入陰筋者死氣結胸滿刺痛脈沉二陳湯方見痰門加枳實厚朴檳榔痰結胸痞不痛脈滑二陳湯加枳桔前貝痰火芩連粉茹痞滿按之不痛而硬有表枳桔湯最良欲下大柴胡湯嘔吐噦有物無聲曰吐此胃寒不能司納而自反屬太陽藿香正氣散方見二卷加羌活有物有聲曰嘔吐此寒熱交併於胃鬱郁不寧而上逆屬少陽小柴胡有聲無物曰嘔此胃火沖逆屬陽明表證經曰嘔多雖有陽明證不可下枳桔湯渴甚竹葉石膏湯無物無聲若嘔狀延頸開口名噦此大便秘桔膈上有寒火伏於中上下不得泄越所致以小柴胡湯加黃連竹茹二痙項強頭搖面赤口噤身反張是也屬太陽中風重感寒濕或發濕家汗及產後血虛宜如聖飲有汗名柔痓加桂枝白朮無汗名剛痓加麻黃蒼朮如腳攣咬牙皆裡熱承氣湯下譫語附鄭聲獨語經曰實則譫語虛則鄭聲譫語屬陽鄭聲屬陰譫亦有虛實實者胃中實熱乘心神識昏亂身熱躁渴脈洪便秘或旁流穢汁腸有燥屎三承氣湯量輕重用虛者誤汗亡陽或吐下後利不止脈沉微難治柴胡桂枝湯三陽合病譫語宜白虎湯大熱黃連解毒湯男子失汗成瘀血女人熱入血室桃仁承氣湯鄭聲者氣脫神竭也或一事言之不已獨語者如見鬼狀或睡中呢喃脈沉肢冷參附藥溫補或獨參湯發黃即癉病脾陰為濕熱所蒸則土色現外茵陳五苓散大便秘茵陳大黃湯初覺發黃瓜蒂為末口含水搐末三分入鼻出黃水愈吐血鼻衄便血溺血下利膿血陽邪在表失汗致熱毒蘊於經絡逼血妄行火炎氣逆則吐血犀角地黃湯加芩連煩躁目瞑必衄因汗不出得衄為汗也有表證葛根湯衄不止生地芩連湯茅花湯便膿血地榆散溺血延胡索散潮熱陽明旺於未申一日一發如潮汛應時此表欲解而里未和也必大便秘小承氣湯下譫語自汗大承氣湯下小便難大便溏小柴胡湯熱於寅卯屬少陽巳午屬太陽四肢拘急拘急者四肢屈伸不便蜷臥惡寒之貌乃諸陽本虧過汗所致宜芍藥甘草附子湯誤謂餘邪重發汗必死下利雜病下利當屬沉寒傷寒下利多緣協熱如手足冷脈沉無大熱屬陰寒用溫經藥理中湯如頭疼發熱至四五日熱邪傳裡口大渴頻下穢水經云火極反兼水化若五金火煉亦化如水也協熱自利旁流穢汁桃花湯為丸如繞臍硬痛舌乾有苔乃腸中燥屎未下六一順氣湯下熱除利止俗呼漏底誤用止瀉熱藥肉果之類殺人多矣太陽陽明合病下利先服葛根湯太陽少陽下利黃芩湯嘔甚加半夏生薑少陽陽明合病下利脈弦長者木邪剋土也名曰負負者死脈長不弦餘證皆屬熱承氣湯下自利而大渴白虎湯裡寒下脫桃花湯三陰下利先從陽經來者通脈四逆湯下利譫語直視舌白苔而滑厥逆無脈或脈反實者不治發斑熱則傷血血熱不散裡實表虛出於皮膚為斑輕如蚊跡重如錦紋或因失汗失下或過熱藥所致已發斑忌汗若汗更加斑爛也消斑青黛飲兼咽痛玄參升麻湯表證多防風通聖散去硝黃如大便利短氣肢冷斑青黑小建中湯甚者四逆湯短氣謂呼吸之氣不能接續也心腹脹滿短氣邪在裡為實大柴胡湯下心腹濡滿自汗短氣邪在表為虛宜桂枝湯無邪宜補喘喘者表裡不清邪盛所致也太陽無汗而喘宜主方麻黃湯陽明失下而喘承氣湯陰證喘理中湯四逆湯水停心下服五苓散煩躁心不安曰煩身不寧曰躁心熱則煩陽實陰虛為熱輕腎熱則躁陰實陽虛為熱重分虛實治太陽煩躁宜主方陽明內實煩躁承氣湯陽明經熱白虎湯煩躁消渴宜五苓散少陰煩躁脈沉肢冷自利屬寒又不欲衣欲水不能入口宜中寒主方吐利交作脈如湧泉者死結胸煩躁肢冷自利不得臥者死煩躁大渴點水入口即嘔不能咽宜竹葉石膏湯或大半夏湯加黃連天粉麥冬似瘧寒熱止作有時也太陽似瘧桂枝湯陽明似瘧柴葛解肌湯少陽小柴胡湯惡寒發熱日二三度面赤身癢主方加白朮微汗婦人經水適來熱入血室似瘧小柴胡懊憹鬱悶惱亂甚於煩躁也汗下之不當正氣內虛宜梔子豆豉湯微吐之胸滿硬大陷胸湯陽明有燥屎承氣湯咳嗽肺為邪所乘氣逆不下也水逆射肺而嗽大青龍湯主之水與裡寒相合而嗽真武湯溫之三陰嗽四逆散五味乾薑腹痛邪正相搏也如陽邪傳裡而痛止作不常辛劑和之小建中湯陰寒在內而作悠悠常痛熱劑溫之宜理中湯筋惕肉瞤經曰陽氣者精則養神柔則養筋發汗過極陽虛津涸筋肉失養所致宜真武湯救之及溫經益元湯調之陰陽易謂邪熱之氣變相換易也如傷寒男病新瘥與婦交而婦反病曰陽易婦病新瘥與男構而男即病曰陰易其證身重腹痛四肢不持百節解散宜逍遙湯竹皮湯失治男陰挺女舌出而死拂鬱陽氣蒸越面赤若醉汗不徹主方微汗便秘承氣湯蛔厥病人素有寒而妄發其汗或過汗致胃寒不食食即吐蛔靜煩上下無定蛔也宜理中湯烏梅丸兼黃連川椒烏梅狐惑久病精氣乏熱積本臟為蟲蟲食肛曰狐下唇生瘡蟲食臟曰惑上唇生瘡宜桃仁湯雄黃銳散或犀角地黃湯加黃連桃仁咳逆即呃䭇吃忒才發聲於喉間而遽止者是也陽證失下火熱內郁少與承氣下因汗吐下太過虛氣衝逆脈微橘皮半夏生薑湯加竹茹虛寒加桂附或柿蒂湯方見呃逆胃寒理中湯下利心煩呃導赤飲以雄黃一錢研極細末溫水下即止或灸期門穴渴渴者津液為裡熱耗涸也太陽無汗渴忌白虎宜小柴胡湯加減陽明多汗渴忌五苓宜竹葉石膏湯少陰自利而渴導赤飲汗後渴白虎加人參湯先嘔後渴為欲解可與水先渴後嘔為停水小半夏湯小便不利五苓散六一散戰慄六七日邪氣外與正爭為戰邪內與正氣爭為慄乃病欲解不必藥但宜厚蓋飲薑湯見用藥大法發狂熱毒在胃併入於心神不安而狂獨陽亢極所致非大下不止有失汗脈洪面赤微汗之熱瘀蓄血上犀角地黃下桃仁承氣熱極三黃石膏湯陽狂膽草一物湯與水飲水噀面厥逆初起手足冷從中寒治先微熱後寒亦有陰證先大熱後微寒乃陽邪傳入陰經四逆散冷厥四逆湯熱厥白虎湯若疑似難明先以小劑理中湯倍甘草試之汗初起無汗屬寒有汗屬風暑濕依主方服汗後惡寒黃耆建中湯大汗小便難五苓散汗多大便秘承氣湯下大汗脈洪渴人參白虎湯頭汗者邪搏諸陽則齊頸而還不可再汗熱鬱於內而上達或吐或下以去其邪如大便黑蓄血也手足汗者手足諸陽之本熱聚胃則津液旁連四肢承氣湯下盜汗者睡出醒收柴胡桂枝湯或當歸六黃湯方見盜汗大便秘經曰脈浮而數能食不大便為實名曰陽結大柴胡湯甚者承氣湯脈沉而遲身體重大便反硬名曰陰結金液丹甚者從陰證治發汗利小便津耗但宜蜜導或豬膽法多曰熱秘小承氣繞臍硬痛大承氣急下臟結而厥四逆湯冷服三下不通吐以提之虛者皂莢燒煙燻大便通棕櫚灰煎湯洗亦通或炒鹽熨臍下冷結不通先服理中湯次熨小便澀熱邪聚於下焦結而不散脈浮五苓散脈沉導赤飲不通五苓散合六一散加梔子汗後汗多戒利小便壞證十餘日猶大熱口燥舌苔諸藥不效謂之壞證不可治用藥全以苦寒清熱之餌殊不知陰氣愈泄熱可退乎蓋受病之始由寒傷榮當以調榮養血壯水滋陰之品大劑日數服乃安經曰壯水之主以制陽光宜鱉甲散未效歸地養榮湯更兼苦參湯百合謂百脈一宗病久臟腑不平也似寒非寒似熱非熱欲食不食欲臥不臥不知所以舉身俱痛柴胡百合湯瘥後昏沉初愈錯語少神屬氣血虛似瘧可微汗日輕夜重宜歸地芍參耆麥冬知母餘熱遺胞絡導赤各半湯勞復新瘥略有勞煩憂怒復病小柴胡湯加減復感風寒微汗之復見胸滿腹痛大便秘微下之犯房室方見陰陽易但初病易治病後元氣已虛易於感病而難治患人多壞於此食復臟腑受傷脾胃尚弱不能健運多食觸助餘熱仍以小柴胡加山楂神麯麥芽砂仁消食腹脹枳實厚朴陳皮白芍熱入血室婦人衝脈為血海得熱則妄行寒熱作而似瘧晝靜夜劇如見鬼祟小柴胡加丹皮赤芍合四物婦科未安針灸期門胎前血能養胎涼則固而熱則行熱邪傳裡護胎為主藥宜條芩白朮兼清涼毋活血毋耗氣則胎氣無犯外用井底泥靛青灶心土頻敷臍腹遇大滿大實證黃龍湯下大黃可芒硝禁產後雖云產後宜補如感冒風寒仍宜主方輕表微汗不可大汗食積遇下證大柴胡輕劑攻之邪去兼補產後風邪易侵謹防為要小兒傷寒治療悉與大人同法但劑輕小耳宜於幼科傷寒參酌傷寒陰陽表里虛實寒熱辯認不真慎勿妄治所謂不藥為中醫病邪傳盡自能氣復而安誤用藥必死矣聖人憫生民病苦而醫藥興若不能精明至理而妄治是不死於病而死於醫藥也辯證大要頭痛骨痛身熱惡寒屬太陽宜發散表邪按其胸腹脹滿兼消導食積如口燥鼻乾目痛不眠屬陽明宜解肌胸寬而大便秘宜攻下如寒熱口苦脅痛耳聾屬少陽宜和解如前一經之證未罷又見一經之證名併病如見兩經之證名二陽合病如手足冷脈沉乃陰證也尤宜驗舌色傷寒切要分別表裡陰陽寒熱虛實八字生死系焉舌色紅潤屬表屬陰屬寒屬虛舌乾有苔屬裡屬陽屬熱屬實如舌青紫陰寒也泥色虛極也舌乾白苔邪初入里也黃苔熱甚黑苔如芒刺或捲縮極熱也凡面赤病熾面目黃色病已舌無苔結成干赤光皮似煨熟豬腎乃陽中伏陰也舌苔黑而濕滑者臟結證也舌苔黃燥足冷脈沉亦非純陽證切忌硝黃察脈大要傷寒之脈浮大動滑數屬陽沉澀弱弦微屬陰陰證見陽脈者生陽證見陰脈者死外感內傷之脈最宜察人迎緊盛受風寒氣口緊盛傷飲食初病脈浮緊有力為傷寒初病脈浮緩無力為傷風有不浮者一手無脈曰單伏有不浮者兩手無脈曰雙伏略有頭疼發熱表證悉具即當主方發汗乃憑證不憑脈也有熱邪傳裡脈必沉沉滑有力為裡實沉滑無力為裡虛間有脈沉微無力者但口渴便秘身大熱手足溫實熱證悉具亦當大柴胡湯微下也陰證脈沉遲微細無力為虛為寒為臟病宜甘溫補益或辛熱溫散陽證脈浮洪實數有力為實為熱為胃腑病宜甘寒清解或苦寒下泄虛證脈浮芤細數無力為表虛宜參耆桂芍以實表沉澀微弱無力為裡寒宜參朮薑桂附子溫里實證脈洪大滑數有力如斑狂譫語之證為在經宜三黃石膏湯或白虎湯清利若便秘舌苔之證為在腑宜服大柴胡湯或承氣湯攻下用藥大法初感發熱頭疼骨痛項強拘急噁心有食積先宜淡鹽湯吐之不吐藥兼消導厚蓋臥腿足裹烘極暖次服藥主方羌活沖和湯羌活蒼朮各一錢半防風川芎白芷黃芩各一錢生地黃一錢甘草七分北細辛五分上加生薑三片蔥頭三個水煎二次熱服取汗出至足即愈天涼減生地黃黃芩加紫蘇一錢胸滿有食積加山楂二錢麥芽一錢神麯六分夏月大熱主方加石膏三錢知母一錢五分脈浮緊無汗惡寒屬寒傷榮宜發表散邪出汗安依主方脈浮緩有汗惡風屬風傷衛宜實表疏邪止汗安依加減減蒼朮蔥加白朮一錢半棗二枚微汗蒼白各一錢同用汗多去蒼加黃耆蜜炒錢半有食楂芽曲汗不止加桂枝五分芍藥一錢上二方春分後至霜降用如霜降後天暖亦用冬月正傷寒脈浮緊無汗惡寒頭疼骨痛發熱宜發汗麻黃湯減蒼朮生地黃芩細辛加麻黃二錢桂枝三分杏仁一錢升麻五分薑蔥楂茅曲食不消將所傷之物燒灰服更用蔥熨見後冬月正傷風脈浮緩有汗惡風頭痛脊強發熱宜止汗桂枝湯減蒼地芩辛蔥加桂枝五分赤芍一錢白朮一錢棗二枚楂芽曲上二方霜降後至春分用如春分後天寒及有微汗麻七分桂三分兩感傷寒因日傳陰陽兩經表裡俱病故為死證沖和靈寶飲主方減蒼朮蔥加柴胡葛根石膏棗二枚黑豆一撮煎服取微汗次依兩感論調治凡服麻黃桂枝藥面赤身癢汗不出者用紫蘇薑蔥煎湯熱飲助汗已有汗切勿過表前發表四方服後頭疼骨痛拘急皆減惟熱未盡退四時可接服柴葛解肌湯疏餘邪退熱則不傳陽明少陽也如再有餘熱宜小柴胡湯加減清之胸猶未寬加黃連枳實栝蔞仁兼薑蔥熨切勿早用大黃必待胸中食積消化俟下至臍腹間方可攻之如邪熱漸傳陽明口大渴熱不解如神白虎湯若胸寬惟臍腹硬痛大便秘宜大柴胡湯下之甚至熱邪傳入陽明之本大渴引飲舌上白苔漸變黃黑譫言狂亂揚手擲足揭去衣被唇焦睛紅小便赤短大便秘結或直泄清水乃協熱自利旁流穢汁腸中燥屎未下宜六一順氣湯小便不通五苓散合六一散加梔子燈心若燥硬宿糞以下熱雖減未清小柴胡加減熱甚者涼膈散黃連解毒湯之類退餘熱有伏陰證及婦人邪傳衝任血海舌如煨熟豬腰子服小柴胡涼膈散之類如不效宜歸地養榮湯滋養有虛人病至七八日忽發寒戰悚身大冷乃邪正相攻急宜厚蓋火烘極暖用生薑數兩搗細泡湯一壺放病人懷中頻飲以助正勝邪去汗出熱除如多日猶大熱大渴舌苔服諸退熱藥不效為過經不解名壞證宜鱉甲散歸地養榮湯調理如病已退神昏懶言短氣無力參耆歸地白朮茯苓麥冬五味棗仁遠志之類補益氣血安養心神健脾助胃隨餘證加減如暴感風寒輕淺之證以十神湯至參蘇飲八方採用亦可又有發表藥二三劑汗不出乃陽虛不能作勿強發宜再造飲有身熱頭疼不煩便躁面赤飲水不能入口名戴陽證宜益元湯無頭疼惡寒惟身熱渴大便黑口無倫邪傳心脾名挾血如見祟當歸活血湯有頭疼身熱惡寒微汗身痛腿腳痠疼無力沉倦脈空誤發大汗為害此名勞力感寒宜調榮養衛湯有因過發汗出不止宜溫經益元湯患人叉手冒胸尋衣摸床乃熱乘肺經宜升陽散火湯病後無熱二便清利神思漸昏不語或獨語目赤唇焦不飲水與稀粥則咽乃邪傳心經導赤各半湯傷寒方法通計一百二十主方總合七方治足太陽膀胱經初感春溫夏熱秋濕冬寒等證散邪發表隨證用大青龍湯加味麻黃湯加味桂枝湯羌活沖和湯桂麻各半湯沖和靈寶飲十神湯時令不正瘟疫妄行發熱頭疼咳嗽無汗陰陽兩感麻黃川芎甘草各八分乾薑紫蘇升麻赤芍各一錢白芷陳皮香附各六分姜五蔥三煎服取汗不換金正氣散傷寒嵐瘴商旅遠方不伏水土霍亂吐瀉諸證蒼朮陳皮藿香半夏厚朴制各一錢甘草五分上薑棗水煎服神朮散四時傷寒發熱頭疼項強咳嗽鼻塞等證蒼朮錢半羌活白芷川芎藁本各七分甘草北細辛各五分上加生薑三片蔥白三莖水煎熱服取汗香蘇飲傷寒疫癘時氣胸滿嘔逆紫蘇香附子陳皮各二錢甘草七分上加薑棗水煎服對金飲即平胃散風寒濕氣嵐瘴霧露霍亂吐瀉不服水土腹滿脹悶等證蒼朮八兩厚朴陳皮各六兩甘草四兩上加木香砂仁尤佳為末薑棗湯或煎服沖和散寒溫不常陰晴時作客途旅邸將理失常頭疼拘急蒼朮三兩荊芥甘草各七錢為末每三錢薑棗湯下煎亦可敗毒散四時不正之氣天行疫癘妊婦傷寒方見瘟疫主方參蘇飲感冒風寒發熱頭疼咳嗽聲重流涕有痰胸滿方見傷風大羌活湯治兩感傷寒防風羌活獨活防己黃芩黃連蒼朮白朮甘草炙細辛各五分知母川芎生地各錢半水煎熱服不解再服見效則止餘證依兩感論柴葛解肌湯服藥汗出表證已除熱猶未退四時可接服此湯柴胡二錢葛根黃芩各錢半羌活白芷芍藥桔梗各一錢甘草五分上加姜三片棗二枚水煎服口渴加石膏汗出不透徹猶頭疼骨痛冬春加麻黃夏秋加紫蘇胸滿加山楂麥芽小柴胡湯少陽寒熱往來口苦脅痛耳聾和解餘熱柴胡三錢黃芩二錢半夏人參甘草各一錢薑棗煎服柴胡桂枝湯本方加桂枝柴胡雙解散本方加芍藥陳皮小便澀加茯苓嘔加薑汁竹茹脅痛加青皮痰加栝蔞貝母似瘧加桂渴加天粉知母甚加石膏嗽加五味子金沸草胸滿未可下加枳實桔梗黃連栝蔞效少陽陽明合病加葛根芍藥如神白虎湯身熱大渴有汗不解或汗後舌乾脈微洪中暍石膏五錢知母二錢甘草一錢加麥冬三錢梔子錢半人參七分五味子十五粒打加姜一棗一竹葉二十片背寒去梔加天粉心煩竹茹三黃石膏湯傷寒汗不暢發熱脈大表裡皆實陽盛拂鬱或醫謂汗後不解復下之致大便頻小便澀目紅面赤齒黃大渴或以下脈數身熱拘急解表清裡石膏五錢黃連黃柏黃芩梔子各一錢豆豉半合麻黃冬一錢夏五分水煎服未效再服如神汗下誤治後三焦生熱脈洪諂語喘息鼻衄熱不懈身目黃狂叫欲走或過經壞證三黃巨勝湯陽毒斑狂渴目赤脈大氣喘便燥舌卷囊縮石膏湯去麻黃豆豉加大黃芒硝姜一棗一煎服入泥漬水二匙小陷胸湯小結胸脹悶按之而痛栝蔞