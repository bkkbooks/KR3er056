黃腫經曰溺黃赤安臥者疸病多由酒食過度臟腑不和水穀相併移於脾胃復為風濕所搏瘀結不散熱氣鬱蒸如食已即飢身體面目及爪甲小便盡黃時欲安臥乃其證也疸證有五曰黃谷酒女勞疸黃汗是也濕熱一同皆由濕生熱濕熱相黴為黃常多大小便澀專宜通利小便最為捷要但小便清長黃自退也近世多用草藥者取新鮮味涼氣悍而快利耳凡脈浮者吐之汗之脈沉者下之利之七八日口有血者亦宜下之主方茵陳鈴兒者梔子各一錢赤茯苓豬苓澤瀉黃連七分甘草梢三分上加燈心二十枝水煎空心服不通加車前草汁調滑石末服甚加葶藶枳實草龍膽茯苓滲濕湯治黃疸蒼朮白朮各二錢梔子黃芩各八分枳實黃連各七分茯苓澤瀉茵陳陳皮防己青皮各五分水煎服葛根湯治酒疸葛根六錢枳實麩炒山梔子豆豉各三錢甘草五分上水煎服茵陳石膏湯治黃汗石膏二錢茵陳赤芍藥黃耆麥冬各一錢豆豉一撮甘草炙五分上加姜三片水煎服理中湯方見中寒建中湯方見傷寒並治內傷勞役發黃之證簡便方治黃疸秦艽一兩作二服好酒煎空心服又蘿蔔子為末白湯下日三服或絲瓜連子燒灰因面病麵湯酒病酒調下黃疸無汗麻黃二錢春夏少用秋水煎冬酒煎亦治傷寒發黃皮膚眼目如金用青小麥或苗搗汁每用一盞空心溫服又野苧麻根煎服或乾葛酒煎研白豆蔻五粒服或桃枝柳枝研水服黑疸多死急以栝蔞根搗汁服急心黃疸百合蒸和蜜食又生茅根一握細切同豬肉煮汁飲勿食肉今用草藥治疸車前草平地木雪裡青荷包草仙人對坐草隨取一味搗細和生白酒絞汁飲黃腫即俗謂黃胖起於食積濕鬱傷脾脾氣虛敗色黃而腫主方白朮蒼朮各二兩厚朴薑汁拌炒陳皮各一兩甘草五錢砂仁五錢皂礬二兩粉炒上為末除皂礬另制用紅秈米粉一升先將皂礬砂鍋內炒至煙盡再下粉炒香熟為度取起和前末一處醋煮糊丸如桐子大每服五十丸日進二服薑湯送下忌麵食生冷油膩又方皂礬煅五兩棗肉三兩干蒸餅三兩上為末生薑自然汁為細丸每服二十丸米湯送下日進三服褪金啟脾丸治黃腫腹脹蒼朮香附制礬各四兩茵陳鈴兒白朮厚朴陳皮青皮各三兩乾漆炒煙盡蓬朮三稜各二兩川椒甘草各一兩上為末用大黑棗煮一滾去皮核搗爛和丸如干添棗湯勻丸桐子大每服五十丸空心米湯或薑棗湯下病去七分藥止制礬法綠礬十兩小麥一升淘淨曬燥入鍋內用好米醋五六碗煮半乾入礬在內煮乾炒黃色掐麥開看黃色急搶起勿焦棗礬丸治食癆疸身背皆黃色皂礬不拘多少砂鍋炒令通紅醋點赤色用紅棗煮熟取肉同礬搗勻為丸每五十丸米湯或薑湯下腳氣附足跟痛經曰濕甚則胕腫又曰當風取涼醉以入房多致腳氣腳為腎之外候司下體腎屬水主寒化暴寒傷人腎先受之水濕居下腳先受之飲食入胃脾濕下流注於足而不散風寒暑濕皆能患此而濕熱居多始覺惡寒發熱類傷寒但足脛紅光腫痛腿膝痠疼小便短澀惡聞食氣甚至衝心作痛吐綠色水勿誤作腫毒治腫者名濕腳氣宜滲濕清熱不腫而痛名乾腳氣宜養血潤燥初宜敗毒散發汗疏邪瘟疫主方冬月五積散方見中寒接本門主方次服當歸拈痛湯方見身痛脈浮風緊寒濡濕數熱若乍大小妄言不食危主方蒼朮羌活當歸各錢半防風防己澤瀉酒芩苡仁牛膝各一錢上加薑棗水煎服筋攣加木瓜靈仙大便秘枳實大黃小便澀豬苓茵陳或大腹皮檳榔荊芥烏藥陳皮紫蘇枳殼桑皮木瓜加姜煎檳榔湯治一切腳氣疏壅利膈香附陳皮紫蘇檳榔五加皮木瓜炙草各七分加生薑一片水煎服澹寮方腳氣入腹衝心大痛腫滿大小便秘蘇葉蘇子木瓜各七分羌活白芍藥檳榔枳殼各五分青皮甘草各三分加姜煎磨沉木香各五分調服雞鳴散男婦腳氣風濕流注筋脈腫大痛極第一效檳榔七枚陳皮木瓜各一兩吳茱萸二錢生薑桔梗各五錢紫蘇三錢上為粗末分四服隔宿用水三鍾煎鍾半渣再水二鍾煎一鍾並置床頭五更分數次冷服冬月略溫服後餅物壓天明大便黑糞愈加味二妙丸兩足感濕熱腫痛如火漸至胯腹或腳氣常發蒼朮四兩黃柏酒炒二兩牛膝防己當歸俱酒浸萆薢川龜板酥酒炙熟地搗各一兩上末酒糊丸桐子大每百丸空心鹽酒下當歸拈痛湯濕熱腳氣最效及肢節腫痛遍身大痛方見身痛簡便方腳氣必效蒼朮制黃柏制各四錢水煎空心服外包暖鹽炒熱熨或小便乘熱浸洗多食煮白蘿蔔下氣腳氣衝心白礬三兩用漿水一斗五升煎數沸浸腳良足跟痛有痰有濕熱有血熱察其兼證脈理推療如患風寒瘧邪等而足跟痛但宜清解足太陽經邪病痊自已主方蒼朮防風枳殼當歸各二錢防己錢半牛膝薏苡仁木瓜各一錢水煎服血熱四物加黃柏知母牛膝寒痰五積散加木瓜濕熱除濕湯加薏苡仁秘結經曰北方黑色通入於腎開竅於二陰藏精於腎又曰腎主五液故腎實則津液足而大便潤腎虛則津液竭而大便燥凡大便秘結皆由房勞過度或恣飲酒喜食辛熱飲食火起於脾胃淫欲火起於命門致陰虛血耗火盛水虧津液少生傳道失度有高年血少或脫血腸枯或新產血竭或虛人運滯皆成斯證惟當養血滋陰滑澀潤燥勿妄通利耗傷真元再發轉甚辨風秘氣秘熱秘寒秘濕秘之異酌治若日久幽門不通上衝吸門不開漸成噎膈者有矣脈沉伏而結自汗小便澀忌攻宜豬膽法潤主方熱秘當歸生地熟地麻仁桃仁杏仁枳殼厚朴條芩各七分大黃酒蒸五分水煎服或丸血虛加芍藥倍歸地桃仁風秘郁李仁羌活皂莢氣虛人參麥冬氣實檳榔枳實痰多栝蔞竹瀝老人天麥冬蔞仁倍歸地產後加人參紅花倍歸地玄苓桃幽門不通加檳榔脾約丸治腸胃燥熱大便不通宜兼燥證參酌大黃酒蒸厚朴枳實白芍各二兩杏仁麻仁各兩半上末煉蜜和丸桐子大每服三十丸空心白湯下常服寸丸潤腸丸治脾火腸燥秘結少食瓊脂膏潤燥通便二方並見燥證補中益氣湯方見虛損治氣虛秘加養血潤腸藥血虛四物吞脾約丸四物湯方見婦科治血燥秘加桃仁大黃等分為末蜜丸三十丸湯下搜風順氣丸能潤腸宣水久服諸病皆效方見中風掩臍法大小便秘蔥一枝姜一塊豉二十粒鹽一匙共搗掩臍帛縛自通蜜導豬膽香油灌等法見傷寒門簡便方便秘硃砂飛研一錢真蘆薈一錢四分細研滴好酒和丸作二次好酒下又黑醜半生半熟研末每服二錢熱茶下或麻子研和米煮粥又羊蹄根一兩水煎服常食豬油及雪梨妙又蓯蓉一個重三四兩者酒洗去鱗甲白酒三碗煎一碗服峻補精血便通積熱經曰諸病喘逆轉筋反戾小便渾濁癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼻丸衄血溢血泄淋閉身熱惡寒戰慄驚惑悲笑譫妄衄衊血汗皆屬於熱熱毒蘊積非朝夕之故人生陰平陽秘神氣以寧無熱可積徇情縱欲因致積熱皆出於心甚則傷血或在心肺之內令人口苦咽乾涎唾稠黏目澀多眵蓋心氣通於舌脾氣通於口故口舌生瘡便秘等證皆積熱所致也經曰𮕟粗大者陰不足陽有餘為熱中也治宜清熱降火養血滋陰主方黃連連翹黃芩梔子薄荷大黃甘草芒硝各七分加燈心水煎服咳嗽痰多胸膈脹滿大便利加桑皮杏仁枳殼桔梗去芒硝大黃清炎解毒湯長幼內熱痰盛腮腫項核口舌破爛生瘡牛蒡子三錢甘草錢半犀角防風荊芥各一錢水煎服既濟清神散益腎水降心火清上實下桔梗黃芩川芎山梔當歸羌活白朮茯苓各八分知母甘草薄荷各五分煎入蜜二匙神芎丸一切熱證常服清頭目利咽膈清痰利氣神強體健滑石黑醜各四兩大黃黃芩各二兩黃連薄荷川芎各五錢上末水疊丸桐子大每四十丸常服二十丸溫水下碧雪一切積熱喉閉口瘡發熱煩悶蜜丸頻噙喉閉蘆管吹入方見舌證簡便方熱煩不食豨薟草搗汁服或藍靛水調下熱毒雞子清三個蜜一杯和服或軟石膏煅研每服一錢水下熱渴葛粉四兩粟米半升水浸一宿拌煮粥食雪梨西瓜甘蔗可食熱攻心牛蒡子根搗汁飲諸熱用六月雪煎湯日三服補遺藿香正氣散傷寒頭痛發熱咳嗽痰飲霍亂嘔逆中脘疼藿香紫蘇桔梗各一錢白朮厚朴各八分前胡陳皮半夏茯苓甘草各六分腹皮白芷各五分上劑加生薑三片黑棗一枚水煎熱服蓋取微汗渣再煎補遺桂苓甘露飲清暑除熱利小便止煩渴霍亂吐瀉澤瀉一錢五分豬苓茯苓白朮各一錢肉桂五分滑石寒水石石膏各錢二分甘草四分水煎研末服亦可霍亂薑湯下發背方敗龜板去肋黃蠟炙透研末服外五倍子末二兩藤黃三錢醋化調敷疔瘡方露天鐵鏽研極細金銀簪甲挑破摻原皮蓋根出安下疳方小薊即小貝母土枸杞根皮各五兩煎濃汁頻浸三日痛止愈肺癰方魚腥草煮汁不住飲即痊或金絲荷葉白酒搗汁飲便毒方棉地榆四兩山甲二片炒研白酒三碗煎加甘草銀花白芷皂刺水煎早服妙梅瘡棉花子仁搗如泥槐花細末研勻丸服對口金銀花槿樹根皮各一兩水酒煎飽服
