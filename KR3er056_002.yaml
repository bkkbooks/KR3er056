為病則有陰陽動靜之殊如勞役辛苦之人於烈日酷暑中作勞奔走致之者是動而得之中熱之陽證也其病必苦頭眩煩躁惡熱齒燥舌乾捫之肌膚烙手大渴引飲汗大泄無氣以動乃暑熱外傷元氣也宜清涼之劑益元散黃連香薷飲虛者清暑益氣湯生脈散之類如富貴安逸之士於深堂廣廈中乘風取涼致之者是靜而得之傷暑之陰證也其病必頭疼骨痛惡寒形體拘急心煩胸滿發熱無汗乃陰寒閉塞陽氣也宜辛溫之劑藿香正氣散見二卷末縮脾飲甚者理中湯方見中寒加附子之類中熱脈虛大傷暑脈弦緊主方治傷暑陰寒乾薑厚朴蒼朮茯苓陳皮枳殼羌活白芷各一錢甘草五分加薑蔥煎服取汗頭痛加川芎一錢細辛五分食積加山楂麥芽十味香薷飲治中熱口渴或吐或瀉一切暑證香藿二錢厚朴扁豆人參白朮茯苓陳皮黃耆木瓜各一錢甘草五分上水煎冷服熱甚加黃連渴甚加石膏知母益元散即六一散天水散治中暑身熱煩渴泄瀉小便不利白濁痢疾能燥濕去熱利水實脾化食行滯逐凝血清火邪之聖藥夏月遠行不可缺小便赤少合五苓散方見便癃滑石水飛六兩甘草末一兩研勻每服二錢不拘時燈心湯調下熱渴新汲水下清暑益氣湯治中暑汗出喘急無氣以動懶言蒼朮黃耆升麻各一錢人參白朮陳皮麥冬神麯澤瀉各五分黃柏當歸青皮葛根甘草各三分五味子九粒上水煎服縮脾飲解伏暑除煩渴消暑毒止吐瀉霍亂乾葛白扁豆炒甘草各一錢烏梅肉砂仁草果各五分上劑水煎冷服生脈散生津益氣潤肺養心夏月陰內陽外煩渴宜服人參一錢麥門冬二錢五味子九粒上水煎不拘時服簡便方治中暑車輪上土水調澄飲或掘地坑注水攪澄取水飲又方大蒜熱土研爛水調去渣服又水蓼煮汁灌之又方絲瓜葉一片白鹽梅一個連仁共研細新汲水下亦治中暑霍亂法冒暑倒僕者若飲水即死宜移置陰涼處掬途熱土於臍上作窩眾人尿窩中更以童便灌之次以前地漿水飲徐徐扇之乃蘇中暍其證身熱頭痛微寒拘急舌燥生苔前板齒燥大渴煩躁乃熱傷膀胱經也主方石膏二錢知母一錢人參五分麥冬香薷梔子芍藥茯苓白朮扁豆各一錢陳皮八分甘草五分上加烏梅一個蓮肉七個水煎服腹痛胸滿吐瀉忌石膏暑風因火熱之氣剋制肺金不能平木搐搦卒倒不省人事名曰暑風亦有因痰火氣鬱而倒者宜吐痰法見中風清火主方羌活二錢黃連姜炒一錢香薷一錢扁豆厚朴陳皮茯苓各八分水煎服痰加南星半夏氣加枳殼桔梗注夏夏初頭眩身倦五心煩熱神昏多睡口苦舌乾飲食減少胸膈不利脈數無力乃陰虛血少元氣不足主方人參五分白朮茯苓當歸白芍熟地麥冬各一錢黃柏酒炒知母陳皮各七分甘草三分五味子十粒上加棗二枚烏梅一個水煎服少食嘔吐加藿香砂仁白蔻去當芍地柏知泄瀉加山藥澤瀉去當柏等行動無力加牛膝杜仲有汗少睡加黃耆棗仁煎成調硃砂一錢服濕證附身重經曰諸濕腫滿皆屬脾土又曰濕勝則濡泄又曰地之濕氣感則害人皮肉筋骨蓋濕氣侵人有從外入有自內生外入者感山嵐之瘴氣受陰雨之濕潤江海地卑居處泥地履之則濕氣客於腠理滲走皮膚泛溢經絡致頭痛目眩自汗拘急骨節痠疼四肢困倦其脈浮緩治宜滲濕為主而略兼發散內生者酒醪厚味瓜果生冷濕面乳酪多飲湯液留積於胃脾土虛弱土不制水浸漬肌肉致面目浮腫胸滿喘急大便溏泄小便短澀腿膝胕腫其脈沉緩治宜理脾為主而兼利水所謂治濕不利小便非其治也主方治外感蒼朮紫蘇羌活乾葛防風川芎藁本柴胡各八分升麻甘草各三分上加生薑三片黑棗一枚水煎服微散外邪有內邪後參用利水實脾湯治濕由內生通利小便蒼朮白朮茯苓陳皮豬苓澤瀉滑石香附撫芎厚朴砂仁各八分甘草三分上加生薑三片燈心二十枝水煎食前服發腫氣急加腹皮枳殼蘇子桑皮蘿蔔子去白朮甘草面目虛浮加山藥芍藥去撫芎實人先以神佑丸下之方見痰門二術四苓湯治諸濕腫滿一身盡痛發熱煩悶二便不利白朮蒼朮茯苓豬苓澤瀉羌活芍藥梔子各等分甘草減半上加姜三片燈心二十枝水煎服除濕湯治中濕身體重著腰腿痠疼大便溏小便或澀或利蒼朮半夏曲厚朴茯苓各錢半陳皮七分藿香炙甘草各五分上加姜七片棗二枚水二盞煎八分食遠服羌活勝濕湯治脊痛項強腰如折項如拔上衝頭痛乃足太陽經不行此藥主之羌活獨活各二錢藁本防風各錢半蔓荊子川芎炙甘草各四分上水二盞煎八分食後溫服滲濕湯治坐臥濕地雨露所襲身重腳弱關節疼痛發熱惡寒小便不利大便溏泄等證人參白朮茯苓甘草附子炮乾薑炮桂枝芍藥等分上加姜三片棗一枚水煎不拘時服簡便方感濕鼻塞腦痛黃腫甜瓜蒂為末口含水吹三分入鼻中流出黃水效又方治一切風濕痹四肢拘急疼痛蒼耳子去刺為末三兩水二鍾半煮二鍾去渣呷服又治風濕樟木皮屑煎水洗又小便不利茵陳蒿木通煎服又方煮赤小豆連汁吃一日勿飲食效又方寒濕疼痛用薑汁半碗米醋一盞水膠四兩熬稠用肉桂花椒皂角末各一兩攪成膏絹布攤貼患處包暖烘熱痛止身重經曰肝虛腎虛脾虛皆令體重煩冤由氣血不能克暢四肢沉重食後昏悶治宜補脾益腎理元氣主方黃耆二錢人參甘草炙陳皮青皮各五分當歸黃柏酒炒升麻柴胡各三分神麯七分上水煎加燈心燥證經曰諸澀枯涸幹勁揭皴皆屬於燥若皮膚裂屑乾疥爪枯之類為燥病之表證大便秘結消渴引飲之類為燥病之裡證脈芤而虛宜滋陰養血脈澀而弱宜益腎壯水更察表裡緩急分治如脈浮而弦乃風勝其濕潤兼治風脈洪而數乃火熯其津液兼治火臨證詳審主方黃芩黃耆各一錢天門冬麥門冬各一錢五分當歸三錢生地熟地各二錢蔞仁桃仁各五分五味子九粒紅花酒炒升麻各二分水煎服大便燥加麻仁郁李仁杏仁不通加酒煮大黃潤腸丸治脾胃伏火大便秘澀全不思食宜潤燥和血疏風麻仁郁李仁桃仁各一兩大黃酒煮當歸尾羌活防風秦艽山藥各五錢皂莢仁枳殼檳榔各三錢上為末煉蜜和丸桐子大每服三十丸空心白湯送下瓊脂膏治血虛皮膚枯燥消渴等證鮮地黃十斤洗淨搗絞清汁鹿肉膠真酥油白蜜各半斤生薑真汁一兩上以砂鍋慢火熬地黃汁減三之一下膠油蜜姜煎如飴傾瓷器中坐水內一日夜每服數匙溫酒或湯送頻服簡便方便秘豬油熬白蜜紅棗煮取肉各四兩上研勻任服又方治血燥四物湯方見婦科桃仁搗大黃等分上為末蜜丸如桐子大每服三十丸白湯送下又方諸燥山藥為末杏仁搗細各一斤牛乳二斤共入瓷瓶包固重湯煮一日任服火證經曰諸痛癢瘡瘍皆屬於心諸禁鼓慄如喪神守諸逆衝上諸躁狂越皆屬於火諸腹脹大諸病有聲鼓之如鼓諸病胕腫疼酸驚駭諸轉反戾水液渾濁諸嘔吐酸暴注下迫皆屬於熱又曰諸熱瞀瘈暴喑冒昧躁擾狂越罵詈駭驚嚏嘔喉痹耳鳴及聾嘔湧溢食不下目眛不明暴注瞤瘈暴病暴死皆屬於火又五火者喜動心火怒動肝火思動脾火憂動肺火恐動腎火兼以君相二火七火日熾左腎一水奚能勝之火邪燔爍則耗損元氣煎熬真陰陰血既虧則陽火愈盛津液枯涸諸火熱之證生焉治火之要微者涼藥清解甚者苦寒直折極者溫藥從治調酒炒薑製或少加薑桂為寒藥之嚮導三法不已當滋腎補血是壯水制火養陰抑陽之理經曰益火之源以消陰翳壯水之主以制陽光脈虛浮為虛火宜補洪大為實火宜瀉見於何部而於本經補瀉之細澀而急數者乃陰虛火動宜滋培之治肥人火兼清痰治瘦人火兼養血熱極生風防風通聖散方見中風主方治實火黃連黃柏黃芩梔子等分水煎熱服心小腸火倍黃連加木通生地甘草淡竹葉肝火加柴胡白芍膽火加龍膽草脾火倍梔子加滑石防風白芍枳殼胃火加石膏肺火倍枯片芩加桑皮地骨皮甘草大腸火條黃芩枳殼腎膀胱火黃柏知母鹽水炒又退骨蒸熱連翹散鬱火瀉諸經客熱玄參去上焦浮游之火除無根失守之火尤能壯水制火青黛瀉五臟鬱火又清肺肝火人中白瀉肝火療勞熱甘草緩急速之火人中黃清陰火理傷寒疫癘大熱薄荷葉祛上焦風火梔子去三焦屈曲之火從小便出大黃芒硝瀉有餘實火瀉實火藥中暫加酒煮大黃數分效速補中益氣湯治虛火最效方見虛損益元散瀉實火有功方見暑證升陽散火湯治男婦四肢筋骨肌表俱熱如火捫之烙手此因血虛或胃虛食生冷之物郁遏陽氣於脾土之中火鬱宜發之升麻葛根獨活羌活白芍人參各六分柴胡防風各三分甘草二分上加生薑三片水煎熱服滋陰降火湯治陰虛血少陽火妄動為骨蒸等證當歸地黃生涼血熱補血麥冬二錢天門冬二錢白芍甘草炙白朮各一錢知母黃柏蜜炒遠志陳皮川芎各七分上加生薑燈心水煎服氣虛加參耆嗽加五味阿膠痰加貝母栝蔞吐血加丹皮藕節汁焦荊芥焦蒲黃骨蒸熱加地骨皮甚者青蒿鱉甲胡黃連銀柴胡之類火盛者用涼藥少兼溫散麥門冬湯治病後火熱乘肺咳唾有血胸脅脹滿上氣喘急五心煩熱渴而躁悶等證麥冬七分天門冬七分桑白皮七分五味子九粒紫菀茸貝母各六分桔梗甘草各五分生地黃淡竹葉各一錢上加薑棗水煎服涼膈散瀉三焦六經諸火加黃連名清心湯大黃朴硝甘草各一錢連翹一錢五分梔子黃芩薄荷各五分上水盞半煎入蜜一匙和勻服三補丸瀉三焦火令元氣安故名加大黃去黃連名三黃丸黃芩黃柏黃連共為末滴水丸服加梔子名金花丸每百丸茶下生薑瀉腸湯治大陽實熱腹脹不通口舌生瘡生薑橘皮竹茹各五分生地黃錢半白朮茯苓黃芩梔子各一錢朴硝二錢桂心五分上加棗一枚水煎服黃連解毒湯三焦實火五臟積熱內外火熾口瘡煩渴便赤黃連黃芩黃柏梔子柴胡芍藥連翹等分上加燈心二十枝水煎服減柏柴芍翹余各二兩加黑醜為末滑石水飛各四兩共為末水疊丸桐子大每服五十丸白湯下治諸經火邪熱毒瘡腸癰腫筋脈拘攣咬牙驚悸淋濁痔漏簡便方清火扁柏葉泡湯飲或蓴或芹焯食皆去熱又方雪梨頻食大治火熱之病糞清大解熱毒又方童便以其出於二陰竅故性寒治火然而源從太陽經來不傷胃氣古人猶謂便溺及乳人有七情之火特取驢馬牛羊者厲風附癜風經曰衛氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉膹䐜而有瘍衛氣有所凝而不行故其肉不仁也厲者以其暴悍可畏之惡疾俗名大麻風癩風感天地殺物之氣而成雖然未有不由嗜欲作勞氣血鬱熱或汗泄不避風邪濕冷使濕淤熱蒸外則腐潰內則生蟲食肝眉脫食肺鼻崩食脾音變食腎耳聾食心足底穿而死間有傳染而成者亦必有風濕鬱熱之氣乃感千金方謂業報所招脈多浮而大治宜先服防風通聖散方見中風加苦參天麻蟬蛻百帖令臭汗常出大便微利更以瓜蒂散方見中風吐去腥涎穢沫外用七珍湯洗浴次以主方為丸久服最宜斷厚味五辛鹽醬清心絕欲十生一二主方苦參一斤防風荊芥蒼耳子胡麻子半生半熟皂角刺各十兩蛇床子何首烏各三兩白芷兩半蔓荊子牛蒡子生地枸杞子薄荷黃荊子各一兩末上末皂莢搗碎煎膏見製藥法和丸桐子大每服五十丸茶酒任下日三服醉仙散大風在上者乃遍身癮疹瘙癢麻木胡麻子牛蒡子枸杞子蔓荊子各一兩苦參白蒺藜防風天花粉各五錢上為末每一兩入輕粉七分和勻每服一錢茶調下早午晚各一服五七日先於牙縫出臭黃涎渾身疼痛昏悶如醉次利下膿血惡氣病根乃去止可食