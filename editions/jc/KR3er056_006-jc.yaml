body:
  text: 卷之六幼科總論附初生十則發蒸胎熱胎寒胎肥胎怯胎驚胎黃臍風撮口口噤鎖肛臍突眼閉黃帝曰吾不能察其幼小者為別是一家調理爾此不在黃帝圖經之論古來以嬰幼為啞科謂其不能體問病源極為疑難世以幼科為易者乖謬甚矣兒在母胎受其精氣十月百神滿而生六十日瞳子成識人學語笑百日任脈生能反覆一百八十日尻骨成能獨立二百一十日掌骨成能葡蔔三百日髕骨成能起立周滿膝骨成能行步否此者氣血之盛衰也或過重圍暖衣不見風日不著地氣致筋骨軟弱者有之鄉兒得地氣故幼兒能行初生十則拭口兒初生莫待聲出急以綿帛裹指蘸溫湯展去舌上穢血用手遲啼一出即入腹中斯為患矣兒口舌未堅無伶俐婦人恐傷兒但以後法解之用黃連甘草各煎汁少許滴口內硃砂大塊鮮紅明亮如雲母者水飛過曬燥重研萬下以二分蜜調抹兒口中以五七分蜜丸赤豆大每日甘草湯化服一丸去穢毒鎮心神回氣兒初生有不出聲者急灌溫水少許更以口頻進氣於兒口自啼有因難產受寒兒氣欲絕者急烘綿絮包裹懷中以胎衣置火上燒燃又以大紙捻清油點燒於臍帶上下使暖氣入腹須臾即回洗浴未可斷臍帶恐進濕氣臍風臍爛湯中切桃李梅柳枝去不祥取豬膽周身擦之不生㾩瘡月內浴皆可用背勿受風勿多浴勿久浴恐作風癇浴罷看口上齶有細白泡名七星銀簪挑破京墨塗有白膜名鵝口用軟絹裹指蘸湯絞去塗京墨舌下有亦絞去塗墨無重舌等證著衣男用父女用母舊衣綿改之切勿過厚貴乎適中恐動火生瘡痰熱發驚癇皆由此始周內造衣皆須故帛用新綿令兒壯熱發驚曬兒衣勿使過夜露濕之毒八邪之害兒黃瘦腹痛壯熱夜啼瘡疥又夜染無辜鳥屎令兒致病斷臍切忌用剪刀致兒內瘹切宜浴後用紙作大捻如指油點燒臍帶留六寸長則傷肌短則傷臟古用單衣隔咬呵入暖氣看臍帶中有蟲急剔去入腹內成疾裹臍古用白練新綿今以絹絲裹帶上滲枯礬合之緩急得中急則兒吐哯臍解貼膏藥臍上換衣俱宜閉戶下脹冬月宜火烘暖氣勿令水濕尿屎風寒入臍輕則腫爛重則臍風撮口鎖肛諸患服餌所落之臍帶宜炭火煅研每重幾何對稱硃砂和勻濃煎甘草汁陸續調與兒服解痘疹胎毒最效神方透肛罕有兒初生無穀道大便不能出者旬日必不救須速用細刀刺穿要對孔親切開通之後用絹帛卷如小指以香油浸透插入使不再合旁用生肌散敷之方見腫毒自愈如有孔不透者以金玉肥光簪腳透之銀簪腳亦可乳哺乳食以少為貴諺云忍三分寒吃七分飽又云小兒常病傷於飽多則傷脾胃初則吐瀉久成癖疾初生未有乳豬乳代之可免驚癇痘瘡月內常飲最佳取法豬兒吮乳時以鍾接定便提豬兒後腳口離乳藏胞胎衣盛於新瓶內以青布裹口紮緊用磚蓋好三日後依月吉地向陽高燥處埋入地三尺築實兒壽有志看囟頭頂前動處是顱囟者精神之門戶也開竅之槖籥也上下相貫百會相通七竅應透五臟所藉泥丸之宮魂魄之穴氣實則闔氣虛則開良由長大不可不合醫家看病切宜察之寬大者受病深重未合者怕熱怯寒成坑者滑泄突起者風疾久冷者吐瀉虛軟者癲癇連額者易驚動數者氣弱兒之致疾多由於此喜暖忌寒保固無病兒生冬月即做小帽如碗樣時時戴之兒在月內未宜抱出與生人見幼時勿令入廟登塚恐中惡氣夏月用色帛縫囊盛去皮尖杏仁七個與兒佩之聞雷不驚惺惺散方卷末變蒸初生小兒陰陽變蒸於氣血而使形體成就由五臟之變蒸而七情所以生也變者性情變易也蒸者身體蒸熱也兒當變蒸之候身熱目倦耳尻俱冷上唇白泡如珠微驚而不乳哺甚則躁渴夜啼傷寒相似或自汗盜汗先期發熱七日自安不必服藥反致驚恐但宜避風寒少乳食謹慎調護自初生三十二日為一變首生腎經天一生水六十四日二變兼蒸生膀胱九十六日三變生心地二生火一百二十八日並蒸生小腸五生肝六生膽七生肺八生大腸九生脾三百二十日十變並蒸生胃未滿此脾胃猶未成全而與難化之物食之安有不致傷而成病者譬如磨齒未鑿可能磨物乎每生一臟成一智慧過期不愈抱龍丸惺惺散治之方見後條如有雜證相仍隨病調理兒壯氣實不熱者名暗變若與傷寒疑似服後方或參蘇飲之類主方紫蘇羌活防風川芎白芷柴胡黃芩桔梗陳皮各五分甘草二分薑棗煎服胎熱胎熱者小兒在胎母食熱毒之物或服熱藥致兒生下身熱面赤眼合痰喘大便秘小便赤若不治則鵝口重舌赤瘤急驚等證生焉治宜先用木通湯煎與母服使通於乳令兒飲之通心氣解煩熱母忌辛辣酒面厚味兒服甘豆湯及古方化毒丹主方乳母與兒同服木通扁豆各一錢半赤茯苓甘草各一錢大黃五分滑石研梔子車前子黃芩瞿麥各八分燈心薄荷水煎服甘豆湯治胎熱黑豆二錢甘草一錢淡竹葉十片燈心七莖水煎化毒丹治熱邪蘊積口舌生瘡遍身㾩賴遊風丹毒瘡瘍疥癬初生一切胎中熱毒致病及痘疹後餘毒之患悉治玄參桔梗各一兩茯苓八錢青黛畫家用者甘草各三錢牙硝二錢上為末和黛硝蜜丸彈大金銀箔為衣每半丸薄荷泡湯調化抹兒口內上齶湯送下胎寒兒生百日內覺口冷腹痛身起寒粟時發戰慄曲足握拳日夜啼哭或口噤不開昏睡哯乳泄瀉母受寒濕過食生冷或服涼藥不治成慢驚治宜當歸散兒瀉服參苓白朮散方見泄瀉主方肉桂木香香附炮姜川芎當歸甘草等分上為末每服三分乳汁調抹兒口內日二服胎肥兒生下肌肉厚遍身紅如血色滿月後肌肉漸瘦目白睛紅筋五心熱大便難時吐涎沫治宜浴體法浴方天麻末一錢全蠍二個研細白礬蟬蛻各三錢青黛二錢麝香二分同青黛研勻水三碗桃枝一握前藥一半煎十沸調黛麝浴勿浴背胎怯兒生下面無精光肌肉薄弱大便白水身無血色時時哽氣多噦無神彩治宜前浴法泄瀉服參苓白朮散方見泄瀉胎驚兒在胎因母驚悸有所觸撲受驚子乘母氣生後精神不爽顏色虛白初則溫溫有熱其後頰赤多驚略動則恐聲響則悸印堂青色睡中驚跳手足抽掣身僵目反則成驚癇矣主方人參南星牛膽制天麻茯神白附炮各一兩硃砂水飛二錢甘草炙一錢半青黛一錢麝香五分上為細末煉蜜丸如芡實大用鉤藤皂莢子煎湯化服豬乳膏治胎驚諸癇證全蠍一個焙研琥珀一分硃砂二分上為極細末每服二分麥門冬泡湯調下加豬乳妙胎黃兒在胎受母熱毒生下遍身面目俱黃大便閉小便赤多啼不乳主方母子同服生地黃赤芍藥天花粉赤茯苓川芎當歸豬苓澤瀉茵陳甘草等分水煎臍風多因斷臍帶後風濕傷臍而成風入臍者令臍腫腹脹口撮多啼不能飲乳若入經絡多變為癇如臍邊青黑撮口不開為內搐爪甲黑者死如熱在胸臆伸縮努氣亦令臍腫治宜千金龍膽湯方見撮口稀涎散吐痰方見中風或降痰藥化服主方治臍風羌活防風白芷川芎當歸甘草等分上為細末每二分燈心湯調抹兒口內宣風散治斷臍後外傷風濕唇青不乳多喘臍風撮口全蠍二十一個頭足全者洗淨無灰酒拌炒研末麝香二分另研和勻為末每二分金銀煎湯或麥門冬湯調服撮口兒在母胎或於風熱生後血氣未調洗浴冒風而成口吐白沫四肢俱冷必難救矣此證最急雖有多種皆由內結鬱熱干於腸胃閉悶不通氣不得化腹中滿脹肚下青筋撮口不乳證候甚急若不速與氣通利下無可救療少緩即斃主方殭蠶直者去綿炒研一錢蛇蛻炒研一錢硃砂水飛五分麝香五釐和勻每二分蜜調服千金龍膽湯臍風撮口胎驚大黃濕紙包煨一錢桔梗柴胡龍膽草黃芩炒赤芍藥鉤藤甘草炙茯苓各八分上為細末每三分黑棗煎湯或防風麥門冬湯調服撮風散治撮口蜈蚣干赤足者半條炙研鉤藤五分麝香二分全蠍梢洗淨炙研硃砂水飛各一錢上為末每服二分竹瀝調下口噤兒在胎時母食熱物攻入臟腑則生後熱毒結聚於口舌上有形如粟口不能開但見不能吮乳啼聲漸小口吐涎沫須急看兒上胯如有白點先以指甲輕輕刮去次用藥初生臍風撮口口噤三證惟貴預防則不患若有患者多難救治主方治口噤不乳蟬蛻二十枚去嘴足全蠍七個洗炒輕粉少許上為末乳調服全蠍散全蠍二十個洗炒硃砂水飛五分硼砂冰片麝香各二分半上為末用乳母唾調塗兒口唇內及牙上或豬乳調入口內又方蜈蚣藥店乾者去足炙焦為末入麝少許豬乳調或豬乳獨用治兒口噤鎖肛由胎中受熱熱毒壅盛結於肛門而不通無復滋潤所以有此急令婦人以溫水漱口吸咂兒前後心並臍下手足心共七處凡四五次仍以輕粉五分蜜少許溫水化開時時些少服之以通為度如不通即是肛門內合當以物透之金簪為上須肥大光玉簪次之須插入二寸許以蘇合丸為條納入孔中糞出為快肚脹不乳至一七死或以豬膽導法見便秘蘇合丸方見中寒臍突初生兒有熱邪在胃及胸中則頻頻伸引呃呃作聲努掙其氣抑入臍腹之內臍腫赤大由母受驚熱勿外敷毒藥主方梔子仁炒白朮白茯苓豬苓澤瀉等分官桂減半上為末每服三分蜜湯或燈心湯調日二服二豆散赤小豆淡豆豉南星制白蘞各一錢上為末每服五分以芭蕉自然汁調敷四圍日一次小便白即愈眼閉初生眼閉不開者由產母食熱毒之物致成斯疾宜用熊膽少許以水一滴浸化點入眼中一日七八次主方當歸川芎赤芍藥生地黃天粉甘草各一錢上劑水煎服或為細末燈心湯調抹兒口中宜多服釀乳方澤瀉茵陳各三錢栝蔞根豬苓生地黃甘草各一錢上劑水煎食後服初用二服且捏去宿乳第三服兒吮論形色附手指脈紋八段錦手指訣額屬心色紅主火盛風熱煩躁青主驚左臉屬肝色赤主身熱拘急肝風青主驚黑腹痛右臉屬肺色赤主身熱氣粗壅嗽白主咳嗽痰氣青風入肺鼻屬脾色紅肺熱極衄血內燥孔干熱氣出或濁涕痰嗽內生風白色清涕外感傷風或泄瀉下頦屬腎色赤主膀胱熱小便不利顴色赤積熱痰盛身熱頰色赤內熱夜啼印堂青主驚紅火盛黑客忤邪祟山根紫傷乳食青驚黑危準頭黃吐瀉赤熱青驚紅紫痰氣黑危眉皺痢疾紅夜啼心煩躁熱眼黑睛黃傷寒白睛黃濕積赤心熱淡紅心虛熱青肝熱眼胞赤爛脾臟濕熱白睛黑死人中黑腹痛蟲動點點黑吐利口唇紅乾燥脾熱赤裂脾熱極紫風寒白虛弱承漿黃吐青驚面淡白噁心不食青白吐瀉欲發驚風面青唇白吐乳胃冷青黑吐沫不吐者蟲痛黃食積亦主驚或天瘹面青身熱發躁多變痢疾面青有汗口內氣熱必發瘹痛面黃盜汗面青有驚青黑或時吐沫者客忤天瘹啼哭凶面紅赤色傷寒發熱身躁不安心煩頭面青筋欲作驚搐或吐肚痛頭面大小青筋如綠繩透起者急治不爾發驚搐太陽紅血淋青驚赤傷寒風池紅熱多啼黃吐逆金匱青筋驚舌紅干燥熱白苔黃苔熱甚舌卷驚舌破裂有瘡心火赤腫大便秘小便不通或熱瀉舌黑如芒刺陽毒熱極久瀉痢舌黑及傷寒等證舌黑而濕滑者死耳微黃驚耳輪乾燥睡中咬牙主疳骨蒸熱耳尖冷耳後紅紋麻痘耳內膿外有瘡腎經積熱面部五臟色診圖面青屬肝病驚風面赤屬心病熱盛面黃屬脾病疳積面白屬肺病虛寒面黑屬腎病惡候四時面色順逆春肝木青夏心火赤秋肺金白冬腎水黑各七十二日四季月後各十八日脾土黃色為順春白夏黑秋赤冬黃四季月青色為逆總論主病赤熱盛面赤唇青傷寒青驚風白吐瀉黃積作瘧黑危候初生至半歲虎口紋未成額上候寒熱兼面色察病嬰幼初生至半周額聞眉際候因由醫家三指橫排定頭左須將右手