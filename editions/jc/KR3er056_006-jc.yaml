三十丸金銀薄荷煎湯送下安神丸治小兒驚悸渴悶面紅頰赤口燥脈實牙硝山藥麥門冬茯神甘草各五分硃砂水飛一錢上為細末蜜丸雞頭大每服半丸砂糖湯下鎮驚造命丹治胎驚急慢諸驚癲癇不省人事目直上視驚風痰壅睡中驚跳夜臥不安啼哭不止客忤內瘹凡一切驚疾初生至長及奇怪形狀不能辯名者並大人因驚憂勞損臥不安寐怔忡恍惚恐怖顛狂婦人產後不語昏憒啼笑神藥蛇含石微火煨熱炭火煅紅米醋淬再煅再淬七次研細水飛澄去水曬燥重研萬下四兩代赭石煅研如前辰砂水飛青礞石硝煅金色水飛重研南星牛膽制過茯神各五錢殭蠶洗炒蟬蛻去土白附子使君子天麻各末三錢牛黃陝西七分麝香五分冰片三分上研勻煉蜜和丸金箔為衣大人二錢小兒一錢嬰兒三五分燈心薄荷湯化服金銀煎湯尤好抱龍丸治傷風寒暑發熱變蒸驚風痰壅喘急咳嗽等證驚後調理初生至長微有不快即宜服及大人風痰等證悉效南星臘月牛膽制多次佳四兩天竺黃另研一兩硃砂水飛雄黃飛各五錢甘草七錢麝香五分未出痘不必加加牛黃陝西千層琥珀真者各五分尤效上和勻取臘雪水或早首汲井水另煎甘草汁和丸如芡實大每服一丸臨睡薄荷湯化下病急多服傷風感寒薑蔥紫蘇湯下取汗大人每服三五丸如風痰用竹瀝入薑汁數匙化服薑湯亦可慢驚是證非因急驚變成必因大病之後吐瀉之餘或久痢滑脫或氣虛暴吐或久嗽成癇或峻攻癖積感受之由不同無出脾胃虛損風邪相乘肺為脾子子母皆虛津液不運變為痰涎喉如鋸聲昏睡盜汗睛露唇掀煩躁引飲四肢浮腫大小便秘口鼻氣冷時復瘛瘲似搐搦而不甚胃痛啼叫哭如鴉聲若髮直睛定便溺自遺形骸似癱者並皆不治治宜回陽補氣理脾調中有驚造命丹有寒蘇合丸主方人參白朮茯苓甘草炙天麻殭蠶白附子木香另磨寒加乾薑甚加附子寒嘔加丁香藿香痰嘔加陳皮半夏久瀉加肉果訶子痰多加膽星上加薑棗水煎服或加全蠍洗焙共為細末調服夜啼有陰陽二證陰者臟冷也夜則陰盛與冷相搏陽者臟熱也夜則陽衰皆致腹病而啼先宜母吮咂眉心次服主方主方當歸赤芍五味子白朮各五分茯神陳皮官桂甘草各二分水煎服治一百二十日內啼蟬蛻四十九個只用下半截為細末鉤藤煎湯下又燈花七個硃砂二分為末蜜調兒睡抹唇內或乳頭上客忤小兒心虛神弱生人卒至或父母家人遠來未宜兒見恐經履神廟喪門墳塚病家有帶來穢惡之氣或飲酒騎馬汗氣觸犯於兒面變五色口吐涎沫喘急腹痛倒僕不省狀若驚癇脈來急數口中有懸壅左右有小泡即以竹刺潰之或銀簪刺或指甲摘破治宜辟邪氣扶正氣鎮心安神之藥如造命丹蘇合丸玉樞丹可服可燒或燒沉檀速降諸香或艾灸百會印堂二穴有因小兒心愛之物大人強取之則神逐物遷昏憒口噤宜先與其物次服安神鎮心之藥如無前項藥只用煎方百會穴頭頂心印堂穴眉中心主方人參茯神麥門冬天麻鉤藤藿香紫蘇遠志甘草煮剝甘草等分水煎成調硃砂又方灶心土二兩研雞子一枚和水少許調勻塗胸手足心頂門天瘹由乳母飲酒食肉房勞熱毒之氣流入乳中兒飲之傳其熱毒津液成痰蘊積於內外加風寒致壯熱驚悸眼白翻騰手足抽掣或啼或笑甚則爪甲皆青如祟之狀脈大而實宜解利風熱主方鉤藤人參各五分犀角三分另磨天麻全蠍洗焙甘草炙各二分加研細綠豆十四粒細茶三分水煎服風加荊芥有痰神昏天竺黃辰砂雄黃各一分枯礬半分研細調入煎藥服內瘹腹痛多啼汗出糞清咬乳睛慢流涎或唇焦黑囊腫傴僂眼內紅筋虎口脈紋侵入掌中治宜造命丹或利驚丸二方並見急驚主方桃符丸乳香研末一錢銀硃五分蒜一個煨熟去皮搗丸黍米大每服五丸薄荷湯下癇證經曰癇為神不守舍謂神亂也皆由驚動臟氣不平鬱而生涎閉塞諸經厥而乃成或母胎中受驚或感風寒暑濕或飲食不節逆於臟氣而成者有矣其癇有三曰驚曰風曰食驚癇起於驚駭風癇起於衣服過暖熱極生風初時曲指如數物而作食癇由於乳食太過吐而發熱其候瞪眼直視面目牽引口噤涎流肚腹作脹手足抽掣項背反張時作時止治宜順氣豁痰及平和氣血之藥調下蘇合丸或預服五癇丸以造命丹為主主方人參石菖蒲白蘚皮茯神各五分遠志肉五分麥冬五分犀角另研石膏研各三分甘草一分水煎服五癇丸治小兒諸癇及大人顛狂等證鉛一兩銅杓烊化水銀五錢和勻鉛內待冷同研極細珍珠水飛重研一兩雄黃一兩硃砂五錢俱水飛研萬下和前再研蜜丸麻子大每服一丸金與銀煎湯送下牛黃膏治風癇抽搐潮熱膽南星全蠍洗炒蟬蛻去足各二錢殭蠶去嘴炒二錢白附防風天麻煨各一錢牛黃二分上為細末棗肉丸如小豆大用荊芥姜泡湯調服傷寒小兒與大人無異初感畏寒宜散邪消化乳食如熱邪傳裡嬰兒亦舌上白苔揚手擲足怕熱不惡寒可與白虎湯大便閉結小便短赤承氣湯下之若手足涼口氣冷頭額冷汗面色黑暗大便瀉青此為陰證須用溫里之藥治方與大人相同但藥劑之分兩輕少耳凡天行痘疹時從痘疹門用藥微感風寒宜抱龍丸惺惺散治之如遇變蒸之期但宜調護不藥可也中暑小兒身熱汗出口渴吐瀉霍亂等證治宜辰砂五苓散五苓散加辰砂治伏暑吐瀉渴煩六和半夏湯霍亂痰嗽六一散加辰砂一切暑熱證三方見大人門濕證陰雨地濕坐臥感受或溺汙衣被皆能致之脈見沉緩身體煩痛發熱惡風而多汗小便不利大便溏泄日久則手垂足腫入臟則喑啞不言治宜疏利小便其濕自除兼健脾土不宜發汗及峻攻之主方白朮五分蒼朮五分豬苓五分澤瀉五分乾薑炮五分車前五分赤茯苓木通各一錢上加燈心十莖水煎服寒濕去木通加厚朴甘草嘔加陳皮半夏藿香腫脹加大腹皮諸熱小兒純陽臟腑易熱陰陽氣遷熏蒸於外致身熱也肝熱則眼腫翳瘴心熱則舌瘡溺赤肺熱則鼻衄便秘脾熱則唇燥流涎胃熱則口臭作渴腎熱則耳瘡膿出若夫五臟蘊熱面赤煩躁痰涎壅盛大抵小兒為病多因熱極生風風生驚故有熱即當清之此拔本塞源者也然小兒發熱更有多種患潮熱者發歇有時驚熱者顛叫恍惚夜熱者夕發旦止邪熱者晝夜熱盛實熱者壯盛壅滯虛熱者氣血俱虛食熱者乳食致傷疳熱者肚大形瘦煩熱者身躁心煩積熱者頰赤口瘡風熱者汗出惡風客熱者去來不定癖熱者腹中有塊痰熱者涎嗽喘急脈浮沉皆數治宜隨證用方幼科雖另門類方藥亦可與大方參用主方瀉肝火治目赤防風當歸川芎羌活薄荷大黃酒煮龍膽草梔子甘草等分水煎或為末茶調下心熱導赤散脾熱瀉黃散胃火加石膏肺熱瀉白散加芩天粉防風茯苓腎熱耳膿通聖散四方並見火門潮熱壯熱夜熱宜後方又方治三種熱柴胡骨皮知母麥門冬半夏赤茯苓黃芩甘草等分加薑棗水煎服燈心可加驚熱從驚風治邪熱從傷寒治實熱涼膈散方見火門虛熱四物湯加黃芩黃連人參黃耆甘草水煎食熱從傷食治疳熱從疳證治風熱從傷風治客熱甘露飲子方見火門煩熱生地木通當歸梔子黃芩甘草水煎積熱保和丸方見脾胃痰熱抱龍丸方見驚風小柴胡湯往來寒熱白虎湯治發熱渴參蘇飲方見傷風寒門牙疳走馬牙疳者多因氣虛受邪及有宿滯不去積濕成熱氣蒸斷齒或食甜酸咸膩或瘡疹餘毒不散致牙焦黑爛有潰穿腮頰傷人者治宜內服主方蘆薈丸外以敷藥細末淡鹽湯絞口淨敷主方蘆薈丸蘆薈龍膽草使君子去殼麥芽炒檳榔黃連酒炒蕪荑炒取仁人參木香各二錢胡黃連五錢上為末豬膽汁調糊丸如黍米大每服六十丸空心米湯下敷方雞肫內黃皮陰乾為末二錢白芷末一錢銅青二分麝香四釐敷患處又方雞肫皮燈上燒存性研細入黃柏末枯礬麝香少許和勻米泔攪淨口敷之又青黛黃柏五倍枯礬等分上為末米泔攪口淨敷又橡斗殼二個盛鹽對合炭火煅透放地上冷研細入麝少許米泔攪淨敷脾胃小兒臟腑怯弱乳食過度則脾胃受傷疾病生焉面黃肌瘦肚大青筋嘔吐瀉泄腹痛積滯皆所不免也其脈關部弦數治宜補脾益胃消食化積脾胃以消為補在小兒尤宜用之以助消導之力主方白朮一錢茯苓七分陳皮六分山楂一錢神麯五分麥芽炒研六分上水煎服或為末蜜丸彈大每服一丸米湯化下腹痛加木香砂仁厚朴虛加人參黃耆甘草去楂曲芽少加陳皮虛冷加乾薑炮瀉加豬苓澤瀉甚加肉果麵煨嘔加半夏藿香脹加香附腹皮積塊加三稜蓬朮檳榔熱加黃連濕加蒼朮疳疾小兒油膩生冷乳食太過則脾胃不能運行疳疾之證成矣或因缺乳飲食太早而成則腹大青筋大便溏泄小便白色上熱口臭發豎毛焦四肢瘦怯甚而項小腳弱目澀白膜耳鼻生瘡尤有丁奚哺露無辜等疳皆由微漸而起治宜消積除熱理脾主方胡黃連川黃連山楂麥芽神麯三稜蓬朮青皮陳皮檳榔各五錢木香蘆薈二錢使君子五錢上為細末煉蜜丸如彈大每服一丸空心米湯化下熱退去胡連瀉加肉果服至病去七分即止另以後方服白朮二兩白茯苓懷山藥山楂神麯麥芽各一兩黃連五錢龍膽草五錢虛加人參五錢制服法同嘔吐嘔者有聲吐者有物凡乳食不宜過飽飽則傷胃有感外邪而成者熱吐則頭額溫嘔黃涎唇乾口渴五心煩熱小便赤色多是得於暑月其脈洪數冷吐則清涎夾乳小便清長面色㿠白得於冒寒或乳母當風乳兒飲之則冷氣入胃而作其脈沉遲有因痰吐必夾痰涎因食吐必夾食治宜隨證用藥主方半夏陳皮茯苓厚朴藿香蒼朮山楂麥芽神麯加生薑煎入薑汁服寒吐木香砂仁甚加丁香白蔻熱吐黃連姜炒乾葛竹茹枇杷葉痰加南星枳實虛加人參白朮夏月香薷扁豆泄瀉此證有寒熱食驚風暑濕等多種冷瀉則肚痛谷完不化名飧泄熱瀉亦有不化者為邪熱不殺穀小便清長大便黃白手足厥冷與溫米湯薄粥全可方與乳熱瀉大便黃赤小便短澀或無口渴甚有舌苔頻與冷米湯飲傷食瀉腹脹噯噦不食先須消導去積次補脾胃驚瀉則大便菜色睡中驚跳當止瀉兼鎮驚之藥風瀉春月多兼傷風咳嗽暑瀉夏月口渴欲水小便澀少面垢煩躁濕瀉著冷腸鳴腹痛肢寒脈微緩順洪大逆治宜隨證加減脾虛參苓白朮散方見大人瀉主方白朮茯苓豬苓澤瀉厚朴陳皮甘草上加姜一棗一水煎服寒加木香砂仁乾薑藿香熱加車前黃連黃芩木通夏月口渴小便短赤加香薷煎成調六一散食積加山楂神麯麥芽久瀉加人參訶子粟殼肉果升麻蓮肉香橘餅治小兒泄瀉傷食冷積腹痛及痢疾厚朴姜炒神麯麥芽炒各一兩木香陳皮青皮各五錢上為細末煉蜜丸如彈大每服一丸空心姜米湯痢白湯服夏月水瀉滑石一錢香薷七分豬苓五分澤瀉五分車前五分益智六分白朮一錢茯苓七分升麻一分甘草二分水煎服熱瀉舌苔口渴小便全無茯苓一錢五分黃連七分肉果麵煨七分白朮一錢人參五分香附三分麥冬八分甘草三分加燈心煎服霍亂脾居中州乳食入胃脾主運化分其清濁乳食不節致傷脾胃不能運行則清濁相干或兼外邪吐瀉作矣先瀉後吐乃脾胃虛寒必先白水吐亦不多氣緩神倦額汗腹痛六脈沉濡先吐後瀉乃脾胃有熱氣促唇紅面赤脈洪渴飲水漿與冷米湯或兼吐痰有傷風吐瀉兼咳嗽者有暑月傷暑煩渴者有伏暑厥冷者大抵夏至後熱多大暑後相半立秋後寒漸多矣主方蒼朮制厚朴陳皮甘草熱生冷炙半夏藿香茯苓熱加白朮豬苓澤瀉去蒼朮虛寒厥冷加乾薑白朮桂去蒼虛加人參暑加香薷扁豆滑石風寒加紫蘇白芷食加神麯麥芽加薑棗水煎乾霍亂與淡鹽湯得吐瀉痛止痢疾多因夏月食生冷油膩難化之物或乳母縱食以敷之必先服通導之劑次及調理方與大人同但劑分輕重耳若謂小兒不敢用大黃等藥且以止澀之藥塞之誤兒性命矣但宜大人方減半量與服腹痛周內無故啼哭不止者腹痛也面慘唇青瀉利清白屬寒烘熱綿裹腹乳母多飲薑湯如面赤唇紅大便不通得暖啼甚者屬熱勿強就暖周外多因食積所致脈細小順實大逆主方蒼朮厚朴陳皮茯苓藿香半夏甘草薑棗煎服寒加乾薑炮肉桂熱加白芍黃芩去藿香大便不通少加大黃食積加山楂麥芽腫脹脾虛則土不能制水反得浸漬於土滲於皮膚注於肌肉而為腫脹也其狀目胞上下微起肢體重著小便澀黃大便溏泄皮薄而光手按成凹脈浮大者順沉細者逆主方赤茯苓白朮陳皮大腹皮澤瀉豬苓木通小便少加滑石車前子氣喘加麻子桑皮蘿蔔子枳殼甚加葶藶痰加半夏腹脹加厚朴草果木香氣滯加香附三稜蓬朮加生薑皮燈心水煎服蛔蟲臟腑虛弱或食肥甘因寒因熱皆能作痛高聲啼叫貫傷心者死只看人中鼻額唇口一時皆黑脈大者是主方烏梅乾薑炮黃連川椒細辛檳榔苦楝根皮腹痛加芍藥甚者加使君子水煎服咳嗽小兒之嗽多因感冒風邪傷於肺經或因衣衾太厚肺家壅熱或因過食鹹酸而致受病不外此三種最宜慎之蓋兒臟腑脆難於速效遷延日久變為頓嗽發則捏拳頓足面赤淚流飲食吐出甚至有血遂成頑疾或變肺風痰喘有至危殆者皆由微漸成外感宜參蘇飲壅熱宜芩連二陳湯之類主方嗽久者貝母天門冬麥門冬款冬花紫菀百部百合五味七粒打細栝蔞仁蘿蔔子炒研水煎服氣喘加桑皮蘇子炒研枳殼痰多天粉半夏南星海石潤肺加杏仁肺火黃芩枇杷葉刷去毛蜜炙煎竹瀝利肺桔梗赤苓止小兒嗽雪梨去皮心入蜜蒸食白蘿蔔白果水煮化入飴糖同食瘧疾小兒瘧疾緣乳母解脫冒風或感暑濕尤多因於傷食用藥必兼消導與大人同治法初患者俗名胎瘧始以散邪發表次清解表裡分利陰陽如下午夜間陰分發者加養陰藥提轉陽分令其漸輕自止尤無後患若驟截之即臍腹脹大而變諸患不可測度如微見腹脹仍服散邪之藥服神佑丸方見痰門二三分微利主方初起柴胡羌活蒼朮川芎白芷半夏陳皮防風紫蘇各六分細辛甘草各三分上加生薑三片蔥頭二個水煎熱服取微汗至足有食加山楂麥芽汗後熱多清脾飲加豬苓澤瀉寒多養胃湯方見大人瘧門黃疸凡皮膚面目俱黃者黃病也一身面目指甲皆黃大小便澀溺如屋塵色著物皆如染黃者黃疸也百日半歲身微黃者胃熱也脈多沉主方山茵陳梔子仁川大黃等分日進三服小便如皂莢汁赤色而安又服前方病減半後宜服此方澤瀉豬苓白朮茯苓茵陳黃連黃芩梔子等分水煎服陰腫疝氣多因居處近於濕地或坐於土石上致感風寒濕氣或內有濕熱常坐冷處寒濕凝結內熱為外寒所束濕熱相搏為腫為痛或啼叫怒氣閉擊抑遏不散聚於脬囊加以水竇不行即成是證主方澤瀉豬苓白朮茯苓牡丹皮防風等分官桂少許加生薑水煎服又防風丹皮為末調服又方牡蠣研極細末津唾調或雞子清調敷腫處盤腸氣小兒腹痛腰曲乾啼額上有汗口閉腳冷上唇乾燥是其候也主方烏藥當歸芍藥吳茱萸陳皮香附茴香等分上加生薑三片水煎服痛加玄胡索乳香木香二末調服或用乳香沒藥木香為末調服諸汗兒氣血嫩弱膚腠未密衣衾太厚臟腑生熱心為熱邪所勝津液不能內藏蒸出肌體而為汗也或傷冷熱陰陽不和津液外泄或諸病後虛汗宜養心氣實腠理如上至頭下至項謂六陽虛汗不須治主方黃耆生地黃當歸酸棗仁炒牡蠣茯神甘草炙上加燈心水煎調水飛硃砂臨睡服又方治虛汗人參當歸黃耆水煎服又方夜遍身汗龍膽草為末醋糊丸如桐子大每七丸米湯化下又方虛汗黃連牡蠣貝母各一兩末米粉半升和勻絹囊盛撲遍身汗出處又蒲扇燒灰撲又浮麥煎或黑豆煎飲遺尿由膀胱冷不能約於水故也尿床者膀胱與腎俱冷夜屬陰故自出也主方雞肫皮炙牡蠣茯苓肉桂桑螵蛸龍骨上為末每服二錢空心薑棗湯調下又方破故紙炒香研為末每服一錢熱湯調下又方益智仁白茯苓等分為末每服一錢米湯調下又方五倍子半生半炒熟為末米糊丸每服一錢白湯下脫肛痔證皆因久患瀉痢得之大腸頭自糞門出亦有因大腸熱而出者宜用蔥湯蒸洗令軟送上或五倍子煎湯入明礬熏洗而上主方龍骨訶子肉赤石脂粟殼水潤去筋醋炒各二錢沒石子二個上為末每服一錢空心米湯調下熱加芩連又方防風荊芥煎湯洗密陀僧白礬冰片為末敷又方蓖麻子研成膏貼頂上腸入即洗去或苦參煎湯洗又方腸頭作癢即有蟲以生艾川楝根煎湯洗痔方黃丹滑石上為細末水調日上五次托法見大人脫肛五軟五硬良由父精不足母血不充生後筋骨痿弱頭項手足身體軟弱名五軟有頭硬不能俯視氣壅胸膈手足心冷如石而硬名五硬又有肚大青筋而不寬宜去積之藥治之瀉青丸能治五硬五軟主方腳軟立不起虎脛骨生地黃酸棗仁茯苓防風川芎牛膝肉桂等分上為末蜜丸麻子大每二十丸酒下或木瓜湯又方五軟不起附子南星上為末薑汁調敷膝脛又方五加皮為細末酒調下仍以此末酒調敷頭骨上白虎證小兒病此如太歲在巳白虎在辰方余仿此觸犯之乍冷乍熱啼叫不息主方安息香白豆蔻代沉香降真香檀香乳香人參茯神酸棗仁甘草等分麝香少許為末每五分金銀湯調下龜胸龜背胸高腫突此肺家受邪喘久所致或乳母多受五辛者背高傴僂此為風寒入脊骨或坐早而然多成痼疾間有灼艾收功者主方百合天門冬杏仁木通桑皮石膏大黃煨甜葶藶隔紙炒上為末蜜丸綠豆大每服五丸臨睡時白湯下又方枳殼防風羌活前胡麻黃當歸大黃煨各一錢上為末酒糊丸如黍米大食後米湯送下語遲言乃心之聲兒在胎時母驚邪乘心兒感母氣心宮不守舌本不通故四五歲不言主方石菖蒲九節者妙人參麥門冬遠志當歸川芎各三錢乳香硃砂五錢上為末蜜丸麻子大每十丸臨臥米湯下齒遲齒乃骨之餘骨乃腎之候腎氣不足骨痿少力故齒遲生主方川芎五錢當歸白芍生地黃山藥甘草炙各二錢上為末每服一錢食前白湯調下更調敷齒根行遲周歲膝骨成乃行不能行者由父精母血虛弱胎氣不強骨髓軟弱主方五加皮川牛膝宣木瓜等分上為末每服一錢入好酒調空心米湯送下未效服大補氣血滋腎壯筋藥鶴膝稟受不足故肌肉瘦薄骨節呈露狀如鶴膝亦腎虛髓虧日乾枯悴主方熟地四兩山茱萸山藥各二兩白茯苓澤瀉各一兩丹皮一兩鹿茸一對川牛膝二兩上為末蜜丸空心酒或白湯下赤遊丹毒由乳母食酒面煎炙熱毒與夫烘衣兒穿或發於手足或發於頭面胸背令兒躁悶腹脹如火痛不可言入腹者死周內不可頻浴濕熱之氣鬱蒸不散而成或片片如胭脂塗染腫而壯熱急用蜞針法得生姑以法附後極危篤始用萬不可輕施主方防風荊芥牛蒡子犀角另磨梔子木通黃芩連翹玄參各等分甘草減半上加竹葉水煎空心服熱極加大黃少緩去之加麥冬天粉敷方大黃末二錢綠豆粉薑汁薄荷汁蜜調塗患處又方滑石寒水石等分為末水調塗或用大黃一錢土硝五分敷蜞針法先用濕紙搭毒上看腫處一點先干即是正頂以大筆管一個安於頂上以水蜞一條於管中頻以冷水灌之吮其膿血其毒自散如毒甚可再用若不去十無一生血出不止藕節泥塗之又以瓷器打碎鋒利去惡血亦妙又方灶心土研細末新汲水調塗干再敷癰毒腫節皆由氣血凝滯而蘊熱之氣乘之故結聚成毒凡始初微見細㿔起急用不語唾夜半頻塗即消不退用萬病解毒丸磨塗患處並以酒磨服立效化毒丹方見胎毒唾舐掌後多揉至散主方漏蘆麻黃連翹升麻黃芩甘草芒硝各二錢白蘞七錢大黃一兩上為末每二錢水煎服圍方塗一切腫毒南星草烏赤小豆黃柏等分上為末如紅腫以醋調白腫以薑汁調圍患處四畔解毒丸治兒一切瘡腫癤毒丹遊周身㾩瘡及痘疹餘毒玄參連翹升麻黃芩芍藥當歸羌活防風生地荊芥甘草等分上為末蜜丸如彈大每服一丸薄荷湯化下青解丸治兒五臟積熱毒氣上攻胸腫喉痛頭面瘍疹口唇乾燥面頰生瘡驚風潮熱痰壅陽明胃火渴等證寒水石煅石膏水飛各四兩青黛一兩上為極細末水浸蒸餅打糊丸如芡實大每一丸薄荷湯下又方大枳殼一枚去穰石上磨平以麵糊搭四圍黏在癤上自破膿出盡更無瘢痕又軟癤久不愈用新磚為末醋調敷懸癰初生口內上齶及舌上有泡如癤或如蘆籜有此急以針用綿裹留針尖如粟米許刺泡上出黃赤血汁用淡鹽湯拭淨次以硃砂硼砂各五分冰片少許研勻蜜調敷患處嚥下無妨若再發仍用刺法及敷藥即安矣更以涼膈散服之尤佳停耳耳者腎之候小兒腎氣實其熱上攻於耳由津液壅滯為膿汁出矣亦有沐浴水入耳中傳於氣血釀成有久不愈變成耳重主方防風荊芥薄荷梔子黃芩玄參黃柏蔓荊連翹甘草水煎服吹藥枯礬龍骨黃丹一錢干胭脂一錢麝香少許上研勻先用綿紙條捻滲膿水乾吹以蘆管或鵝毛管吹入耳內又方枯礬一錢干胭脂大紅膏子用粉吸者三分麝香少許研勻吹法同前耳內外爛黃連蛇床子各一錢上為末入輕粉二分研勻內吹入外油調白痜瘡胎中熱毒或生後感熱毒上攻頭額成瘡致白屑燥癢或黃汁流爛敷方瀝青一兩苦參末川椒末水銀各五錢杏仁研如泥百草霜各三錢先入柏油少許百草霜杏仁同水銀研不見星再入眾藥添柏油研如糊先以蔥椒煎米泔或濃茶洗剃髮搽之忌發氣熱毒之物諸瘡小兒㾩瘡皆因乳母飲食熱毒七情之火發於內為驚痰身熱發於外為瘡瘍疥癬必先令乳母服清火解毒煎餌小兒服解毒丸化毒丹之類方見前門次用敷藥二方見前月蝕瘡小兒指月耳前後瘡薔薇根四錢地榆皮二錢輕粉五分上研末敷眉瘡生眉上用傾銀罐研為極細末加輕粉少許麻油調敷鼻匿瘡鼻外四邊生瘡枯礬海螵蛸雄黃各一錢赤石脂鉛粉黃丹各二錢孩兒茶五分輕粉五分上研極細末濕者乾摻乾者油調搽鼻下爛鉛粉油敷澤瀉鬱金山梔甘草等分上水煎服火灼瘡小兒遍身赤爛如無皮木鱉子去殼封半切開用香油一鍾煎至木鱉焦切開無白心濾淨碗內坐水中過夜出火毒鵝毛搽患處魚臍瘡頭黑深黃水四畔流出蛇蛻燒存性為末雞子清調搽溜膿瘡膿流至即成瘡綠豆粉一兩黃丹三錢枯礬三錢輕粉一錢香油調搽賴頭瘡滿頭生瘡牛皮煙膠熏皮煙出口上颳起者為末一兩加黃丹枯礬各三錢輕粉香油調搽滿頭遍身瘡爛癢痛黃連末五錢蛇床子末二錢半五倍子末一錢輕粉三分上研勻先以荊芥蔥椒煎湯沖化白礬朴硝各一撮洗淨次將前末香油調搽又楝樹根皮炒研末豬油調搽頭瘡柏油山西來者搽或調苦杖根末搽前藥用柏油調尤效頭至足諸熱瘡滑石水飛一兩大黃末二錢大黃末黃柏末各一錢五分青黛二錢研勻冬青葉搗汁調搽周身有膿結靨諸瘡用外科萬靈膏加乳香銀朱等者攤貼即效且不汙衣諸瘡久不愈白膠香即楓樹脂五錢輕粉二錢上研勻細末豬骨髓或油調搽癬瘡羊蹄根明礬同搗絹包搽或川槿皮醋磨或馬鞭草葉搽漏疳松香蔥椒煮曬燥研末頭髮燒灰黃丹等分上研勻油調敷患處痘疹總要夫太極而生兩儀人道而有夫婦男女交合無欲不行無火不動恣情縱欲而火毒遺於精血之間小兒痘疹之毒由此而成然痘之與疹雖皆胎毒原同而證異孕成之初先有臟而後有腑腑屬陽而臟屬陰痘在裡從肌肉內起故難疹在表從皮膚間出故易痘屬陰陰主靜有形有汁顆粒不動而合偶數疹屬陽陽主動有形無汁乍出乍收一日三見三日九發而合奇數也其見證之不同者痘則首尾不可吐瀉能進飲食為吉如吐瀉乃毒火盛極而攻衝不食由毒火鬱遏而壅滯藥不可治疹則吐瀉並作飲食不進為吉得吐瀉則毒火由此而泄不食則空虛而毒火疏通痘宜益氣生血藥用補托而求內實疹宜養陰制陽藥用解散而忌內實痘則有平順有虛寒有實熱有血熱疹則皆屬實熱毒火一從清涼忌辛溫藥痘以頭面多為逆疹以頭面多為順皆宜房室固密衣衾厚覆常令和暖則腠理疏豁而易出又須嚴守禁戒如或風寒外襲觸犯避忌皆能以輕變重以安易危但疹之日數少痘之日數多若謂痘重而疹輕不知疹之變態作於頃刻危亡之機甚於痘也論痘即天瘡百歲瘡凡看痘之法治痘之方當知有順逆險三種之分順候但宜謹慎調理不必服藥如不宜表而表則成斑爛難收之患不須補而補則有助毒發癰之愆或痘未出而藥用清涼痘得寒而反為凝滯毒未解而妄行溫補毒得熱而反不化漿轉增他劇豈非藥之過歟設謂痘輕不加敬謹有犯禁戒變而為重誠非失藥之咎矣逆候服藥誠然無功若以仁術論之姑與立方勉強治療十中幸得生一寧非無量功德乎險證全籍藥餌合宜調理謹慎父母保護如法則從順不爾則從逆矣其始也必遇歲火太過熱毒流行則痘毒因之而發為證之初與傷寒相似發熱煩躁面赤唇紅頭疼身痛噴嚏呵欠咳嗽痰涎有因外感風寒有因傷食吐瀉有因時氣傳染有因跌撲驚恐致成蓋痘疹之毒伏於腎經痘毒既發腎經應無證矣故必預驗耳冷尻冷尻尾骶骨足冷是知腎經無證若三處熱而腰疼見痘必凶當知毒火極盛腎經傳之不出也中指冷鼻尖冷耳後筋紋淡紅少而輕深紅多而重眼目困倦而顴有紅紋皆出痘之候痘疹無醫若鄉居若宦邸無醫之處忽患痘與疹最宜房室固密謹避風寒衣衾溫厚懷抱和暖父母乳母須赤身與臥令患兒融和如春大助發生之力又不宜烈火熏蒸以助火毒經云寒主收引人之腠理即毛孔暖則疏通快暢在痘則易於發出起脹貫膿收斂結靨落痂無滯在疹則依時發出依時收斂三日毒盡疹散斑消寒則閉塞不通在痘則不能盡出有陷伏內攻倒靨等證作焉在疹則發不透徹有喘急腹脹昏亂等證生焉蓋痘之與疹內之本原雖有輕重寒熱之殊外之調護當知宜忌始終則一倘遇寒天和暖最為急務若逢暄日清涼必為要詮用意調理可保無虞今之變壞者原犯逆證者有之常因風寒觸犯而殀枉者亦多矣深可痛惜大凡兒至十歲外氣血壯盛飲食寒暖自知保護肯聽教戒保全為易所以嬰兒值遇痘疹天行勿令出外恐傳染流殃及避風寒節飲食更令歡悅勿焦煩怒哭致動心肝之火及跌撲驚恐庶可延免發熱三朝證治順身熱和緩不時發驚忽然跳動也神色清爽氣息和平睡臥安寧飲食不減二便如常不必服藥疑似難明通治方一劑略表微汗令痘易出若因風寒汗出即愈但令兩足暖微有汗出微有吐瀉痘出止險身體壯熱乍盛乍輕神昏汗出口渴嘔瀉飲食減少或二便秘澀宜服散邪發表之藥或發驚搐宜服平肝木利小水之劑勿服涼心藥恐寒閉腠理主方升麻乾葛前胡桔梗山楂陳皮枳殼川芎羌活等分甘草減半水煎服熱甚加木通防風聲音忽變倍甘草桔梗加玄參牛蒡荊芥或加清肺飲熱盛合導赤散或消毒飲方俱見後逆身發大熱絕不飲食但宜消毒火勿誤用養胃進食熱藥殺人腹脹啼叫喘急悶亂或飲食入口即大吐不止此乃毒火不能發越攻衝胃口故忌熱藥或泄瀉只宜升提發表亦忌止瀉熱藥或腰疼腹痛不能站立乃命門毒火盛不能傳出故極為惡候若能飲食有愈者大宜清涼解毒痘出痛止頭面一片如胭脂及照心胸肉裡或周身有紅塊者死頭溫足冷昏悶如癡凶報痘三朝證治順發熱始終溫和三日見痘標於年壽鼻準人中口角唇吻腮頰兩耳面之下部單粒圓綻如珠如粟陸續增出大小不等淡紅潤澤頂尖光彩礙手出快根窠紅活頭面稀少胸背全無乳食如常神氣清朗四肢溫和二便如前不必服藥嚴守禁忌依法調理胡荽懸床前並作湯飲泡酒噴房內切避風寒毋令痘兒怒氣助火飲食宜淡忌辛辣甘甜雞魚豬肉棗柿慄蔥蒜醋及荔枝與酒皆能發癢難化厚味房中宜燒乳香蒼朮大棗老幼伏侍戒少年男婦恐犯淫穢房事月經用東向土炒黃囊懸陰前生人家人遠歸糞穢氣腋臭瘡毒人蚊煙吹滅燈燭誤燒發骨煎炒氣蔥韭腥氣麝香叫罵梳頭瘙癢荒急言飲食歌樂掃地輕變重不忌口常泄瀉冒風寒犯房事過服涼藥穢氣相觸生人輒至重變輕節飲食避風寒常和暖嚴禁忌用藥得宜能戒煎炒調理謹慎險壯熱二日見痘氣粗胸滿煩躁不寧飲食減少口渴泄瀉痘標叢出見於頭額天庭山根印堂眉稜方廣兩顴耳後項頸面之上部心胸稀少痘粒雖多而成顆分頭雖瑣碎而陸續增出但乾枯而不紅潤或昏暗而帶滯澀或夾疹惟表痘出而疹自消或見乾紅紫黑大便秘結微下之不然恐毒火不暫泄而變黑陷痘色紅紫忌升麻但宜發表勿謂有火用芩連翹芥忌涼藥寒則凝滯難出或有虛候忌補氣藥參耆補則熱毒愈甚而腠理閉密痘難出或吐血者服藥可愈犀角地黃湯之類痘至腳底方為出齊主方川芎前胡桔梗山楂陳皮木通枳殼等分甘草減半水煎服大便不實去枳殼熱甚加乾葛根後劑加防風牛蒡蟬蛻色紅加生地酒洗紅花當歸小瀉去當歸生地如不甚熱面容青慘見㿠白精神懶怯痘出不振哯乳便溏瀉屬虛寒證前方去前胡木通枳殼加白芷瀉加白朮生薑煎如毒火壅遏身熱面赤毛焦皮燥睡臥不寧大便秘小便赤此屬實熱之證防風荊芥桔梗川芎連翹黃芩牛蒡子甘草生地葛根羌活木通燈心或升麻葛根湯合導赤散隨服羌活散郁湯方見後如初發壯熱腮紅臉赤毛焦色枯渴欲飲水日夜啼哭好睡冷處此屬血熱之證川芎桔梗木通連翹丹皮赤芍歸尾紅花酒洗大腹皮生地黃加燈心煎熱極便實暫加大黃渴不止加天粉滑石或退火回生丹但乾紅紫色二便不利即宜疏利導赤散加酒製芩連大黃或四順清涼飲不然後成黑陷出之太驟毒火極盛者用冰肌散一服略斂之輕者戒用逆大熱烙手一日見痘一齊壅出如㾦如麩如蠶種稠密成片不分顆粒紅紫焦枯報痘即叢出見於天庭方廣司空太陽毒邪太盛妄參於面之上截陽位頭額多謂之矇頭頸項多謂之瑣項兩腮多謂之託腮口唇多謂之攢口或隱隱不起或出而覆沒譫語狂言胸滿喘急飲食不進唇焦音啞不能言語眼目無神大小便秘大渴吐蛔舌卷囊縮痘色青干或紅紫黑陷或夾斑疔賊痘後各有條前證姑從實熱治起脹三朝證治順顆粒漸長粗肥圓綻高聳結實根窠紅潤一圈紅暈緊附痘根痘頂壯滿光澤明亮腳地疏朗內外平正漸至根紅項白毒化水色乃氣充血盛血氣歸附險痘雖起發昏滯枯澀或平塌灰白而頂不圓綻或根腳雖紅而暈不緊附蓋痘之形由氣根之色由血必賴氣血而始終其功然而解毒尤為急務痘於六日乃為界限六日前清盡毒火六日後溫補助漿至此失治欲溫補又助毒邪熾盛反不化漿欲清涼復恐漿滯不行遂成掣肘然臨證又不可固執六日前毒火已清即兼補益六日後熱邪未盛少兼清解如痘不光澤飽滿亦有二焉如花卉遇陰天則豔麗華美逢烈日則焦萎乾枯誠不繫於樹力之強弱耳痘不綻看餘證有躁煩熱渴二便秘澀等熱候宜清涼有體倦熱緩二便清利等虛候宜溫補最宜細察豈可概謂不綻便行補益而蹈實實虛虛殺人之罪乎凡口渴多飲急宜清胃火失治則外雖收斂胃受火毒爛潰內攻致穿胸背而死輕者遍身赤斑亦危主方當歸川芎芍藥酒炒蟬蛻殭蠶山楂牛蒡子白芷桔梗等分甘草減半上水煎服有虛寒證六日加人參黃耆肉桂糯米少加陳皮無則七日用又方治虛寒證川芎白芷山楂陳皮當歸桔梗甘草等分漸加溫補加棗水煎又方治實熱證川芎蟬蛻山楂牛蒡子桔梗木通防風加燈心大棗水煎服又方治血熱證歸尾生地木通桔梗連翹川芎蟬蛻殭蠶水煎服夾斑加黃芩黃連紅花丹皮酒炒生地小便清長去木通便澀腹脹加腹皮不潤加當歸不快加牛蒡陷塌黃耆痛加白芷不勻防風細斑難治大斑令人呼出毒血口渴服六一散甚白虎湯方見傷寒逆痘不起而平塌虛浮色不澤而根窠無暈腹脹不食氣促神昏或痘粒遍體過頭紅紫如胭脂或頭面紅腫而痘反退伏或痘中陷眼如針孔而黑紫或如粟粥皮面或口唇上下腫甚俗名判官嘴皆氣澀血凝或氣離血散為逆逆者交會不足致毒乘機而內攻也又邪視面如橘皮不分肉地或腰下有痘腰上無痘皆不治證貫漿三朝證治順痘初貫膿先作水色漸轉白亮濃厚飽滿變黃蠟色根圈紅活緊附痘腳飲食二便如常險痘雖行漿不濃厚滿足或皮薄嬌紅淡白闊塌必然發癢而有後患急宜保元湯溫補自然濃厚猶有熱毒略兼清涼或如白飯色平塌不起四圍淡白乾澀不紅活血虛頂不起氣虛保元湯加川芎當歸肉桂木香人乳好酒或見諸惡候煩躁不安但得痘色不變飲食如前不妨癢塌後另有條抓破有膿血吉空殼無膿血凶主方人參一錢黃耆一錢甘草四分肉桂三分當歸八分川芎七分白芍首尾酒炒糯米百粒水煎服如兼解毒加白芷防風牛蒡之類用人參少加山楂以消參耆之膩加木香行氣血之滯恐參作飽少加陳皮以制之如多用或再用枳殼青皮之類則人參無功矣脹痛雖為順候不止加木香山楂或行漿半足忽然乾紫腫消眼開名為倒靨後另有條或停食泄瀉等加消食止瀉隨證治之或過用涼藥遏而不進身不熱遂成冰伏之證大劑溫補異功散木香散之類或頂平腳闊漿清十全大補加木香乾薑痘毒盛者十日外漿未足大補氣血略兼解毒恐後有癰毒之患或上身成膿腿足成大水泡毒亦解矣逆痘色焦枯黑陷不得貫膿或紅色變紫紫變黑或如水晶全無紅色皆毒未盡氣血已竭死證或發驚寒戰咬牙不食等證惡候姑補氣血結靨三朝證治順飲食如常氣調血和毒解漿回老色收斂次轉黃蠟色漸變醬褐色結靨從口唇人中起頭面周身未至腿足紫黑色堅厚之痂惟宜節飲食慎風寒險氣血已竭未易收靨停漿不斂身重發熱補脾利水解毒凡曾經泄瀉後所見諸證皆作虛治十全大補異功木香參酌泄瀉而煩渴不止大用升提漿足難收大便結實略宜疏通或風冷入胃下利膿黏熱滲膀胱小便尿血並宜清利痘後發熱午前是陽盛宜清熱午後是陰虛宜滋陰大熱便實恐變急驚微熱便溏恐變慢驚主方當歸芍藥酒炒白朮茯苓山藥苡仁桔梗等分甘草減半蓮肉七個口渴加麥冬五味虛加人參不斂加木通水煎服逆氣滯而血凝毒留而漿薄不能回水結靨則為乾枯外剝落痂三朝證治順疤痕綻凸色見桃紅光澤鮮明神氣清爽險疤痕淡紅而不綻宜補氣血如全白者急用大補則數月猶危從發熱至此身常溫熱不熱為水伏證如大熱疤紫乾焦大宜清涼解熱如稠密危痘賴能飲食外收結靨成片落者切勿剝傷見風太早變成瘡瘍年年生髮若痂後身弱立則戰搖等證宜後方主方人參白朮茯苓當歸川芎白芍熟地黃耆知母麥冬等分甘草減半水煎服小便澀加木通大便瀉加肉果痂當落不落乃火盛也柴苓湯調辰砂六一散外以蜜水調滑石末敷之逆痂若竹衣大便膿血若發慢驚目無神而面青或發牙疳或生癰毒後另有條表裡虛實寒熱凡痘灰白不紅綻不起發昏暗頂陷為表寒而虛參耆補氣兼四物養血凡二便清利身涼口氣冷少食唇白涕清為裡寒而虛四物養血兼參耆補氣皆宜溫脾胃補氣血加木香肉桂之類助成漿收靨凡紅紫干滯黑陷焦枯屬表熱而實清涼兼解毒次分利小便導赤散之類凡二便秘澀身熱氣盛鼻乾燥渴屬裡熱而實解毒兼清涼微通利大便四順飲之類皆宜化毒湯六一散黃芩黃連丹皮紅花蟬蛻荊芥之類氣血虛實寒熱寒則虛實則熱虛寒溫補實熱清利氣虛補氣血虛補血氣熱則清涼血熱則解毒凡頂陷不起不堅實不礙手不起脹不行漿皆氣虛保元湯倍酒炒黃耆川芎肉桂木香人乳好酒漿同服凡根窠不紅或紅色不緊圈痘根而鋪散手摸過變白色痘上如寒毛豎起枯澀不紅潤皆血虛保元湯加歸芎酒洗紅花加山楂消參耆之滯加木香少許行氣活血凡用參耆在痘盡出之後凡用丁香木香桂在毒盡解之時凡用地黃薑製芍藥酒炒當歸酒洗泄瀉土炒其大黃車前滑石生地牛蒡枳殼過用則氣陷內攻麻黃乾葛升麻羌活防風荊芥蟬蛻穿山甲人牙火煅用一二釐過用則表虛癢塌血熱痘證初發壯熱腮紅面赤毛焦色枯煩躁渴欲飲水啼哭不寧喜臥涼處揭去衣被大便秘結小便赤澀宜升麻葛根湯合十神解毒湯服熱證悉平太乙保和湯助漿漿足後保嬰百補湯八九日紫黑干陷獨勝人牙之類惟泄瀉後熱證已除見虛寒證異功散木香散可用矣氣虛痘證凡兒久病之後或元氣極弱發熱和緩或乍熱乍涼手足時冷面青神倦食少昏睡二便清利輕用發表宜紫蘇川芎防風白芷桔梗大腹皮少加白朮茯苓甘草略佐升麻痘出齊後即加參耆芎桔之類如漿清痘灰白色自汗保元湯為主或十全大補去川芎加山楂如見泄瀉足冷寒戰咬牙虛寒證則異功木香可擇用實熱痘證初發壯熱猶如火烙紅赤毛焦氣粗燥渴腹脹怒哭狂言譫語二便秘澀面浮眼腫宜升麻葛根湯加發表藥一服隨用羌活散郁湯熱毒已平益元透肌湯保嬰百補湯後治法與血熱同表裡熱盛者但宜安表和中勻氣透肌解毒五者不失雖甚可痊咽啞水嗆音聲出於肺肺金為火所克毒壅氣道音不出也作痛者亦由此耳甘桔湯玄參牛蒡之類水嗆者蓋氣喉居前食喉在後氣喉有痘壅礙茶湯誤入故嗽也甘桔湯解毒為主加玄參牛蒡麥門冬杏仁荊芥之類但痘斂自安矣癢塌灰白是證由氣血兩虛也陽氣虛則陰血乘之血味鹹醃蜇肌肉故癢宜溫補兼芍藥酸斂陰血虛則陽氣乘之氣性熱猶灼火故痛養血兼清涼灰白者因氣虛故灰色而不光澤血虛故白色而不紅潤寒戰咬牙斯證見於七日之前寒戰者乃心火亢盛上熏肺金九竅閉塞火極之故宜解表諸熱咬牙者乃陽明熱甚宜清胃火七日之後皆屬虛寒寒戰者溫補陽氣兼養血咬牙者大培陰血兼補氣乾枯倒陷是證尤有陷伏倒靨之類形略似而證不同也痘色乾紅變紫紫變黑名曰乾枯熱極也當於乾紅時急宜清涼解毒防風白芷連翹荊芥牛蒡升麻乾葛之類兼利小便如胃虛不能納食副榮衛不能盡出雖出而覆沒故根暈白色或黑此內虛所致手足微冷或嘔或倦名曰陷伏宜辛溫之藥如理中湯之類甚則異功木香如被風寒所觸或香臭惡氣生人房事月經沖觸痘色忽變名曰倒陷風寒參蘇之類加羌防蠶蛻沖觸加味四聖飲如貫膿七八日間氣血兩虛不能漿老結靨或因泄瀉不食忽然痘色乾紫腫消開眼名曰倒靨毒伏內攻非結痂也急宜大補氣血倍用人參黃耆酒炒白朮當歸川芎肉桂炙甘草丁香木香二味為末加山甲炒研一錢人牙火煅研二釐攻補或得頭面數粒結靨或攻潰成外收或出細痘數粒或生癰毒皆生機矣口渴內潰口渴者因毒熱攻衝致胃火上炎口作大渴也內潰者胃脘潰爛穿出胸背而死慘傷莫此為甚群書皆謂風寒外襲腠理固密壅塞不通陽氣挾同毒火內攻而潰如無大渴有惡寒狀宜升麻葛根湯加羌防芎芷散風寒如見渴證即勿專於畏縮但用麥冬五味之類止渴則杯水之力豈能救車薪烈火也耶凡小渴六一散大渴大劑白虎湯大便秘兼涼膈散一劑必令渴止方免大害安可坐視生靈之斃乎如痘後渴不甚者保元湯加麥冬五味天粉或參苓白朮散之類口舌白色胸痘灰色乃內潰預驗煩躁啼叫心經有熱則煩躁蓋痘毒之熱蘊蓄於心所以煩躁啼叫悶亂狂言也宜解毒湯及辰砂六一散使二便清利火泄自可有因痛癢煩躁者隨證治之痘後煩躁虛而有餘毒也大補氣血為主兼解餘毒咳嗽痰涎是證由熱毒壅遏而克肺金或風邪乘虛而入或解毒或發散暫加止嗽清痰之藥桑皮杏仁枳殼桔梗前胡貝母陳皮茯苓之類半夏南星戒之有藥入口即嗽吐出者毒熱停積於肺胃也隨證治之痘內夾斑斑者血之餘也有點而無頭粒如筆尖點脂如蚊蟲所咬然痘隨臟而出其勢迅速如熱毒熾盛痘有太過之血夾毒上浮乘痘毒之熱而發為斑也如痘毒起齊內必虛矣內虛則斑從內解如不解當散其火邪涼血活血解毒之藥宜玄參升麻湯加黃芩黃連紅花三味酒炒丹皮荊芥當歸川芎白芍在初起宜用表散次宜解利如得斑退血附則當補益猶防損陷但痘中夾斑亦危惡之候十救一二紫斑不過三日青黑斑不出周時斑如錦紋六日而斃水泡失血水泡者毒盛之時火不能炎上水不能潤下搏激於皮膚之間而成者也宜理脾順氣然而起於腿足之處毒亦由此而化痘收泡亦斂帶紅紫色乃熱極也失血者毒火逼血妄行也鼻出易治口及大小便出者難治不食能食經曰得榖則昌絕榖則亡凡痘見危惡諸候但脾胃強健而能飲食從首至尾皆可扶持收功極篤者切勿棄捨用意作外收不過麻面而已如不食在一二日者痘出自食若在五六日不食乃危候也雖用補藥多不奏功有因唇口痘脹不能吮乳進食者可用糯粉作細圓拌砂糖少許逐粒喂之兼以湯送欲補者和人參於內亦可如能食太過乃胃火盛藥中加石膏之類以清胃火失治能為大害愈後能食者宜矣但勿過食餘毒癰腫險痘雖愈身熱不退發毒之預徵也急宜服大連翹飲作丸亦可如發出頭頂上或兩臂肘曲池穴或兩膝腕委中穴俱無妨害發於胸背者死切勿嚼生豆之類盦散則攻於內矣惟宜前方或真人活命飲治之甚而腫軟有膿不得穿破者以皂角刺針深入血出見膿為止以綿紙捻納孔內留出紙捻頭分開貼拔毒膏膿盡長肉如臂直不能曲日久自屈又氣急痰嗽毒在肺口臭泄瀉毒在脾胃盜汗熱渴毒在心睡中驚跳熱在肝耳䯌尚熱毒在腎藥中兼治之又眼合身熱不樂皆餘毒痘疔賊痘報痘之時如痘不出不長恐有痘疔遍身細照看獨大色黑者是疔貫漿之時留滯不行須防賊痘大而黃色者是二者皆以銀簪挑破口含清水吸去穢血珍珠研末頭髮燒灰蠟胭脂調勻填入破處無脂乾摻或後灸法亦可紙捻照法患痘疹房室門窗密閉小孔亦遮蔽之凡看時用草紅紙或用方高烘燥捻條如小指蘸油燈上烘乾勿令油滴兒身點火照頭面眼鼻口耳及遍身皮膚之內細加認辨曉然明白屢有看痘者要抱兒房外就天日光觸冒風寒痘疹由此隱沒為害多矣惟知痘之有變證豈知看誤之過若看婦人之痘額可驗胸鼻可驗腹兩顴臂兩腮驗腿徐體之皆應調護得宜兒出痘疹之時必服發表疏散之藥腠理開豁風寒易侵及飲食起居百凡嚴禁天寒被褥宜厚乳母當赤身伴臥不宜烈火烘蒸如過天暖被褥不宜太厚恐反助火毒如此則重痘可生否則輕痘變重悔恨何及乳母服藥蓋小兒都不肯服藥病值猖獗非藥不痊強之益增驚恐無法與服切勿惜藥但須大劑濃煎頭汁兒多寡服之余藥及渣再煎汁小兒吮乳時乳母服之如大劑藥於兒前煎熏有效諸證治方三豆湯治痘蘊熱煩躁以下十方可預服或天行時即服赤小豆出廣東黑豆即馬料豆綠豆加甘草煎熟令兒飲汁食豆四脫丹蟬蛻去土鳳凰蛻即抱出雞子殼神仙脫即父母爪甲火炙蛇蛻火焙上四味各為細末等分每服一錢煉蜜為丸如綠豆大每年除夜甘草湯服三年痘毒消玄菟丹玄參去蘆木杵石臼搗曬燥研細末四兩菟絲子絹袋水淘淨好酒浸二日煮絲出搗捏餅曬研八兩二味俱勿犯鐵器黑砂糖和丸如彈子大每日服三丸砂糖湯化下無時硃砂丹硃砂大塊如牆壁鮮紅光明似雲母色者細研水飛澄去水曬研萬下五錢牛黃陝西千層者二分勻每服五分蜜調服痘將發時用豬糞調水濾清汁調硃砂服大解痘毒甘草散預服消毒痘出不太盛大甘草炙為末每日食後白湯調下五分人中黃尤佳生油劑治小兒臟腑伏熱未成痘疹四肢頭額微熱用生油一小盞旋入鐵銚內用溫水一小盞傾和入以杖攪之煎令水盡更令攪勻如蜜則止夜臥時百日至三歲每服一蜆殼五七歲三蜆殼八歲至十五歲半合大人一合量增減服後良久令臥少時大小便通利熱毒退痘疹不生苦楝子湯取楝樹子煎湯浴兒痘疹不出出亦稀少麻油擦法痘發時每夜臨臥用手中三指蘸麻油擦兒頭至足遍身然後睡即可以使輕此亦暢達流通升脫凝滯之義也稀痘飲天行將發痘時預服山楂紫草牛蒡子各一錢防風荊芥各一錢二分甘草五分生薑一片水一鍾煎服瑣瑣葡萄出回回國進貢年陝西北京皆有小兒食之稀痘升麻葛根湯治初熱壯盛疑似難明服之末見痘表熱甚者升麻一錢葛根二錢甘草一錢白芍藥一錢加薑蔥煎服或加紫蘇山楂牛蒡子筍尖各一錢冬加麻黃一錢消毒飲治痘已出上焦壅熱胸膈不快荊芥二錢牛蒡子二錢甘草一錢姜二片水煎服清肺飲咽乾聲啞麻黃一錢二分麥門冬一錢五分知母天花粉荊芥各八分訶子取肉菖蒲各六分水煎加竹瀝小半鍾薑汁三匙服羌活散郁湯治實熱痘初發身熱壯盛腮紅面赤毛焦躁亂咳嗽喘急實熱等證防風羌活白芷荊芥桔梗地骨皮川芎連翹牛蒡子紫草大腹皮甘草等分上為粗末每五錢加燈心十四枝水煎服熱鬱難發加升麻渴加葛根天粉腹脹鼻塞面赤若怒毛直枯加麻黃大便秘加枳殼當歸甚不通加大黃嘔吐加陳皮豬苓澤瀉禁用生薑半夏丁香木香洞泄加升麻禁用白朮茯苓肉果咳嗽惡風加紫蘇桑皮失血加犀角地黃黃連發斑加黃連黃芩山梔小便赤加滑石梔子地黃芍藥鼻衄加犀角黃芩驚悸加木通山梔搐加青皮不食加山楂麥芽神麯出不快加牛蒡山楂蟬蛻痘紅赤色加生地紅花丹皮熱壯甚加葛根前胡見點三日內依方加減三日後另有方退火回生湯熱極枯澀滑石辰砂各一錢冰片三釐研勻每一分溫水調服四順清涼飲壯熱便閉當歸芍藥甘草大黃等分水煎服冰肌散治痘一齊湧出一服略斂熱極者用熱輕者戒之柴胡前胡黃芩梔子連翹澤瀉黃連黃柏犀角地骨皮牡丹皮為粗末每三錢水煎服保元湯即參耆飲治元氣虛弱精神倦怠肌肉柔慢飲食少進面青㿠白睡臥寧靜痘頂不起漿不足及有雜證皆屬虛弱宜服血熱毒壅火證禁用人參一錢黃耆二錢甘草五分前生用後炙用桂二分虛寒加用上加生薑一片水煎服初起的屬虛寒本方加川芎桔梗起脹便兼服漿足後助收斂方可加白朮茯苓白芍之類出不快加川芎官桂禁蟬蛻牛蒡人牙小便赤加木通腹皮茯苓禁車前滑石山梔泄瀉加白朮茯苓木香肉果禁豬苓訶子龍骨石脂大便秘加當歸禁大黃枳殼生地嘔吐加橘皮乾薑丁香禁半夏痰貝母杏仁減食加白朮人參神麯禁山楂砂仁傷食加山楂神麯麥芽禁枳實三稜蓬朮煩渴加麥冬五味子禁加山楂砂仁風則微散加紫蘇防風枳殼喘急三四日前加桔梗杏仁蟬蛻有虛證見者決非實喘乃毒不得外達上乘於肺禁麻黃蘿蔔子枳殼諸下氣藥喘嗽加麥冬杏仁五味禁天粉桑皮六七日間曾經泄瀉後氣喘乃短氣虛極加人參則喘自止腹脹加腹皮厚朴可兼發散有傷生冷寒氣鬱遏從內傷外感治內傷用丁香肉桂神麯木香外感用防風等藥四五日手足厥冷加丁香肉桂川芎倍用黃耆夏月去丁香四肢不起加防風減川芎漿不足加白朮當歸川芎發癢加川芎當歸白芍白朮茯苓禁殭蠶蒺藜癢甚燒茵陳熏禁沐浴發散異攻散治痘表虛癢塌裡虛泄瀉腹脹喘嗽悶亂煩渴寒戰咬牙頭溫足冷凡曾經泄瀉後見證皆屬虛寒宜急服之有始初血熱毒火證過服涼藥變虛寒者亦服木香官桂當歸人參茯苓陳皮厚朴丁香肉果各七分附子寒甚者加半夏各五分上為粗末每服五錢生薑三片棗二枚水一大鐘煎至六分服木香散治痘表虛灰白內虛泄瀉腹脹其效如神如無灰白泄瀉等證勿服木香人參肉桂赤茯苓大腹皮青皮前胡訶子取肉半夏丁香甘草各等分每服五錢生薑三片水一大鐘煎六分溫服四君子湯補元氣養脾胃人參白朮茯苓甘草薑棗煎服四物湯養血水方配四君子名八珍湯當歸白芍川芎熟地七日後酒炒水煎服十全大補湯大補血氣痘頂平腳闊漿不滿足即四君子四物名八珍湯更加黃耆肉桂化毒湯治痘已出清熱涼血毒一解不至黑陷血一涼不至紅紫紫草無真者不必用升麻蟬蛻地骨皮黃芩酒炒甘草加木通等分水煎服十神解毒湯治血熱痘證身如火烙腮紅臉赤毛焦色枯已出未出三日前痘點煩紅燥渴多飲睡臥不寧小便赤澀者此血熱也並宜服生地紅花當歸尾桔梗牡丹皮赤芍藥木通大腹皮連翹川芎等分上加燈心十枝水煎服身熱盛加葛根前胡毒盛綿密加荊芥牛蒡渴加天粉竹葉滑石嘔加橘皮瀉加豬苓澤瀉防風大便閉加枳殼前胡喘加蔞仁便黑加犀角黃連或桃仁小便短加木通澤瀉赤加梔子滑石發紅斑加犀角黃芩黃連山梔玄參煩渴狂亂譫語加知母石膏麥門冬天粉嘔瀉加黃連豬苓澤瀉咽痛加甘草牛蒡荊芥痘證屬血熱者多乃制前方此證認明只宜重用升提發散使毒得以達表而從外解引以滲泄使熱得以下行而從內消佐以清涼解毒行血涼血之劑則雖稠密亦能消散易漿易斂此方之功也用至痘頂白光接用太乙保和湯切勿誤用補藥熱藥及兜塞藥則變危急不救太乙保和湯治血熱痘服十神解毒湯熱證悉去三日之後不易長大用之成漿收靨桔梗川芎山楂木通人參紅花生地糯米五十粒燈心七枝生薑一片水煎服起不快加牛蒡子便澀腹脹加大腹皮繁紅不潤加當歸蟬蛻陷塌加黃耆痛加白芷不勻加防風嗽渴加麥門冬五味癢及水泡加白芷白芍藥七八日漿足接用保嬰百補湯益元透肌湯治實熱痘服羌活散郁湯後壅熱悉開三四日後不肥大用之成漿收靨即太乙保和湯去生地紅花加蟬蛻牛蒡陳皮煎服加減悉同七八日漿足接服保嬰百補湯保嬰百補湯治實熱血熱痘八九日無他證並以此方調理蓋痘證平順者不必藥惡逆者藥無功險證宜藥虛寒者少二熱證多特另出此五方此方後用當歸芍藥地黃白朮人參茯苓山藥甘草等分棗二枚水煎服氣虛加黃耆官桂有別證虛實加減加味四聖飲治痘出不快及變陷倒靨小便赤身熱未退或風吹覆冒者紫草黃耆人參川芎蟬蛻木通木香甘草大便秘加枳殼上加糯米百粒水煎服活血解毒湯解餘毒防風荊芥生地赤芍當歸連翹黃連牛蒡紫草白朮薄荷川芎木通甘草等分水煎服玄參升麻湯溫毒發斑玄參升麻甘草等分水煎服大連翹飲痘後一切熱毒癰腫連翹防風荊芥牛蒡當歸柴胡黃芩梔子蟬蛻赤芍木通玄參滑石甘草等分上加姜一片水煎服獨聖散發痘穿山甲炒研極細末每服五分兒大加服酒漿調人牙散痘不起發老人牙火煅研極細末每服二釐酒漿調下勿多服參蘇飲方見傷風犀角地黃湯方見血門六一散方見暑門白虎湯方見傷寒柴苓湯即小柴胡湯方見傷寒配四苓散方見便癃甘桔湯方見咽喉理中湯方見中寒真人活命飲方見癰毒論疹即麻痧瘄斑麻疹之發必在天行厲氣傳染之時沿門遍戶輕重不等其始也身體發熱面腫腮赤眼泡浮腫淚出汪汪鼻流清涕嘔吐噁心大便泄瀉即是疹候便宜發表散邪行氣解毒必兼泄火清肺之藥次清胃火次宜滋陰養血蓋疹乃陽毒火邪熾盛肺金受克所以疹證必有咳嗽痰涎胸滿喘急之患皆肺家之證也若見口乾作渴乃胃火也即宜白虎湯之類隨輕重用失治則陽明火盛後有走馬牙疳齒齦臭爛之證傷人最多滋陰者疹毒熱甚則陰血受其煎熬而虛耗也表發既出必子後出而午後收午後出而子後收以六小時為度此陽生陰成陰生陽成之妙也如吐瀉不食鼻衄滯下之證皆不必用藥諺云吐不殺瀉不殺餓不殺誠哉斯言也吐瀉則毒火得泄不食則內虛易出鼻衄滯下肺與大腸之火由此疏通惟宜表發疹出之後諸證可安飲食自進最宜避風寒忌腥酒厚味鹹酸生冷糟物海味守禁忌服藥所謂疹有六閉觸冒風寒毒火熾盛飲食填塞皮膚粗厚出而覆沒藥誤辛熱是也但宜古方防風通聖散方見中風通治有效世傳痘重而疹輕殊不知死生繫於反掌豈可忽諸發熱五朝證治發熱之初憎寒壯熱鼻流清涕嘔吐泄瀉咳嗽氣急腮紅眼倦即當解表得微汗則皮膚通暢腠理開豁麻疹易出寧有閉悶腹脹喘急之患哉初起全似傷寒但面赤中指冷為異主方次劑依後加減升麻葛根防風荊芥桔梗枳殼前胡桑皮杏仁等分甘草減半加連須蔥頭水煎服暄熱加黃芩黃連梔子玄參木通石膏知母減升麻葛根入淡竹葉燈心煎和暖加石膏知母牛蒡薄荷連翹木通減升麻葛根燈心十枝水煎時暖時寒加羌活牛蒡連翹赤芍減枳殼水煎服大寒加麻黃酒炒羌活川芎少加桂枝去升麻葛根水煎服四方加桑皮杏仁凡吐瀉不食不必治惟發散表疹出透諸證自安如大便秘加大黃五七分以通為度見疹三朝證治疹之初出多於耳後項上及腰腿先見其頂尖而不長其形小而勻淨者吉既出之時色宜淡紅疏朗如深紅紫色兼火化也若紫紅乾燥昏暗無光乃火盛毒熾也服表藥後紙捻照之紅影出於肌膚成片而將起切戒風寒生冷及諸禁忌一有觸犯即反收沒多致不救遇此急宜表出如不出猛加發藥外用擦法若毒內攻則致癢塌難救或皮膚閉塞毒氣壅滯遂變為渾身青紫煩躁腹痛喘急悶亂而死若自利不止或小便頻數雖為惡候如疹稠密深紅紫色則又無妨但至三日後熱不退疹不收者毒火太盛餘邪未盡也宜服清火解毒之藥自收依後方輕或熱或退五六日後出疹色淡紅滋潤頭面勻淨而多依時發透三日漸收重頭面不出紅紫黯燥咽喉腫痛不能食冒風寒沒早移熱變痢主方防風前胡川芎枳殼桔梗桑皮杏仁陳皮等分甘草減半水煎服發未透加升麻麻黃夏少用出透加連翹牛蒡毒火渴甚加石膏知母玄參黃連黃芩梔子喘嗽加蘇子栝蔞仁蘿蔔子火閉加大黃色白加紅花酒炒赤芍藥酒炒疹色深紅而渴石膏二錢知母一錢牛蒡連翹升麻地骨皮淡竹葉甘草各七分上加糯米百粒水煎服天熱大渴引飲不止加梔子麥冬天粉與綠豆燈心湯飲風寒閉塞疹出不透麻黃酒洗一錢或二錢發為度升麻酒洗一錢人中黃如無用童便拌甘草蟬蛻牛蒡子各一錢薑蔥煎服外用胡荽同酒糟蒸熱於無風暖處周身頭至足擦令熱汗出為度紫赤乾燥川芎生地紅花酒洗乾葛黃芩連翹牛蒡子上水煎成調六一散服將出覆沒麻黃酒洗二錢升麻葛根羌活防風荊芥牛蒡子前胡桔梗甘草水煎服孕婦出疹主方加川芎生地條芩艾葉安胎為主兼解毒藥宜多服如胎氣上衝急用苧根艾葉煎湯磨生檳榔服熱毒蒸胎胎多受傷內服藥外用護胎法保全倘失治胎墜母可無恙蓋痘宜內實胎落母亡疹宜內虛故母可安必宜母子俱生護胎法靛青灶心土井底泥研勻塗臍腹寸厚頻敷不治證黑黯焦枯忽見紫點一出即沒鼻扇口張目直無神鼻青糞黑氣喘前心吸疹後牙疳臭爛疹後餘毒證治疹屬陽毒感之則暴悍酷烈為害匪細變態頃刻所以發熱時最宜解表散邪必令發出透徹乃無餘毒蘊熱之患或表發不透或風寒阻塞或誤飲食或犯禁忌疹雖收而餘證作者多矣疹後自宜熱退若拂熱猶在隨證詳審如嘔吐仍用前方便秘加製大黃若胸高如圭肩聳而喘口鼻出血面紅或青枯黯皆為惡候然亦有肺虛為毒所遏而發喘連聲不已用止嗽清肺方參酌如日夜煩躁譫語狂亂主方調六一散方見暑門加辰砂燈心湯下小便赤短五苓散方見便癃加芩連煎調辰砂服煩躁譫語升麻葛根湯辰砂六一散服隨所見證以後方酌用止嗽清肺知母貝母天門冬麥冬桔梗軟石膏杏仁馬兜鈴等分糯米百粒水煎服熱加連翹氣熱鼻燥毛焦咳嗽麥門冬桔梗各二錢知母一錢荊芥取穗一錢天粉石菖蒲一寸九節者訶子肉各四分水煎服餘毒不盡加防風牛蒡甘草熱乘肺金聲啞咳喘當歸酒洗白芍酒炒生地黃酒洗陳皮貝母栝蔞仁白茯苓片黃芩酒炒梔子炒天門冬玄參麥門冬桑皮杏仁熱加黃連石膏蘇梗甘草水煎服嗽不止陳皮半夏茯苓黃連姜炒甘草竹茹水煎服瀉不止豬苓澤瀉滑石赤芍黃連姜炒升麻甘草水煎服未止加止瀉藥痢不止黃芩芍藥各一錢半黃連枳殼當歸木通生地各七分不通加酒大黃後重木香另磨檳榔水煎汗不止黃耆黃連黃柏黃芩生地熟地黃酸棗仁當歸加浮小麥一撮水煎服鼻衄出血玄參丹皮生地茅花無用根汁片黃芩梔子石膏等分甘草減半水煎調百草霜服咽喉腫痛黃連二錢黃芩二錢黃柏一錢五分苦參一錢玄胡索乳香各三分雄黃孩兒茶各五分上各為細末研勻蘆管吹入喉中心神恍惚夜臥不安黃連二錢當歸生地遠志甘草煮剝茯神人參酸棗仁炒丹參柏子仁石菖蒲麥冬甘草炙各一錢上為末入金箔三張山藥糊丸硃砂為衣每服一錢燈心竹葉湯送下疹後癰毒肢節腫痛羌活穿山甲炒研末各一兩金銀花白芷梢大黃各五錢甘草節一錢乳香制研二錢上為末每服一錢用牙皂角刺同煎酒調下發汗出為度咽喉腫痛不能飲食甘草桔梗各二錢玄參一錢連翹牛蒡子射干山豆根各五分上水煎服前吹葉入薄荷甘草桔梗玄參山根末蜜丸噙化效走馬牙疳齦肉黑爛人中白蘆薈使君子肉龍膽草胡黃連五靈脂等分上為末蒸餅糊丸黍米大每服一錢臨睡白湯下敷方牙疳黑爛雄黃水飛一錢黃柏研末二錢麝香五釐上研勻先用艾煎湯洗淨次敷藥又方五倍子研末二錢雄黃水飛五錢枯礬八分蠶蛻紙燒灰一錢上研勻先溫米泔亂髮洗淨敷藥痘前後牙疳急宜敷服有傳於兩頰浮腫穿潰死者疹後水蓄證因渴時多飲所致水停於胃為嘔噦入脾為腫脹宜利水實脾豬苓澤瀉茯苓白朮入肺為喘咳加葶藶入心驚悸宜赤苓木通入肝脅痛加芫花入腎膀胱小便不利車前子疹後晝夜發熱毛髮焦枯皮膚乾槁肌肉羸瘦清熱丸方見牙疳門主方如忽然心腹絞痛汗出乃元氣虧損失於補養外雖似安內虛未實偶中惡氣多致不救及睡中露睛手足厥冷欲作慢脾風不救之證熱甚失血犀角地黃湯方見血門加三黃梔子茵陳木通小便泄火疹時食雞魚終身皮膚粟起天行疹時重出食豬肉每歲出疹之月下痢食鹽醋每歲月咳嗽食五辛則生驚熱不時必四十九日或百日無忌賀千秋傳痘癢或痛樺皮乳香茵陳和勻燒熏及熏被蓋立止痘瀉三日前毒火發藥重加黃連愈三日無功痘疹後餘毒瀉干柯根即刀茅煎汁服安痘喘白花地丁煎服愈火痘毒盛搗絞汁和白酒漿少許服效稀痘神方金銀花為末砂糖調經年服或再花連藤煎湯作飲痧疹喘急悶亂西河柳研末四錢水調服愈發疹藥中重加大效疹後痢砂糖調柳服補遺惺惺散小兒變蒸發熱痰嗽風寒時疫痘疹大行氣不和人參白朮茯苓芍藥桔梗天粉細辛甘草等分為末二錢生薑薄荷煎熱柴胡隨證加
