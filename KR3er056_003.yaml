飲噁心無物無聲欲吐不吐氣至咽而復入心中兀兀不寧主方半夏茯苓陳皮各二錢生薑七片煎成加薑汁熱服有痰而虛加參朮草胃寒丁香理中湯方見寒門火姜連之類吞酸吐酸附吐清水經曰諸嘔吐酸皆屬於熱或以吐酸為寒者蓋胃傷生冷硬物則發殊不知寒涼抑遏腸胃陽氣怫鬱而為熱也吞酸與吐酸不同吐酸是濕熱鬱於肝出於胃隨氣上升而吐出也吞酸乃氣鬱日久不能發越伏於肺胃之間咯不出咽不下肌表復因風寒外束則內郁愈甚而酸味刺心肌表得溫暖則腠理開豁而略解或有用辛香燥熱湯丸而暫愈者因本熱標寒辛以散表故也如過服溫熱之藥致津液涸竭反成噎膈翻胃之證久病必宜散鬱火少佐辛溫脈遲寒數熱浮緊熱內郁寒外束主方陳皮蒼朮茯苓半夏泡梔子姜炒黃連姜炒香附童便炒紅豆蔻研神麯各一錢吳茱萸八分甘草三分上加生薑煎服寒加丁香藿香熱加黃芩酒炒吐酸加山楂扁豆木香砂仁痰加南星吞酸用生料蒼陳朴草曲芽加姜水煎服治酸必用吳茱萸泡過蒼朮神麯紅豆之類連芩茱萸丸治濕熱吐酸黃連一兩陳土炒蒼朮七錢半黃芩土炒陳皮吳茱萸各五分上為末神麯糊丸緑豆大津液咽下神橘丸治中脘宿食留飲酸蜇心痛口吐酸水神麯炒橘皮蒼朮等分共為細末神麯糊丸每百丸薑湯下加味二陳湯方見痰門痰飲吐酸頭眩或食生冷脾胃不和加丁香九粒吐清水是證忽作清水如從齒縫中出源源而來吐至碗許感受之由種種不同因寒因濕因蟲痰飲食積因醉飽房勞者居多治亦小異諸方與吐酸參用皆宜戒厚味主方益智滑石各錢二分蒼朮土炒白朮土炒半夏制陳皮去白茯苓各一錢吳萸五分甘草二分加薑棗煎熱服虛寒加人參乾薑炮痰加南星宿食加神麯砂仁蟲加烏梅嘈雜經曰胃為水穀之海無物不受若恣食濕曲魚腥生冷及烹飪厚味朝傷暮損食積痰飲留滯中宮兼七情鬱熱故為嘈雜噯氣吞酸痞滿等證蘊久失治則為翻胃噎膈之漸蓋嘈雜為病倏而腹中如火發於腔內空空若無一物似痛非痛似飢非飢懊憹熱辣得食暫止者是也乃痰動其火有兼噯氣噁心胃脘痛者兩寸脈弦滑胸有留飲關脈弦急將成翻胃沉澀為郁總不外痰火二字主方橘紅半夏南星黃連姜炒梔子姜炒黃芩酒炒茯苓各等分上加生薑五片水煎服痰多加蒼白朮郁加香附撫芎熱加青黛黃柏軟石膏煅從治加紅豆蔻三聖丸治嘈雜白朮四兩橘紅一兩黃芩炒五錢共末神麯糊丸緑豆大每五十丸薑湯下益君湯治心血少而嘈者當歸白芍藥生地黃熟地各二錢人參五分白朮茯苓麥冬梔子陳皮各八分甘草三分烏梅一個上加炒米百粒水煎成調辰砂水飛五分臨睡服和中湯治虛火嘈雜人參白朮陳皮半夏茯苓各一錢甘草五分黃連姜炒錢半加棗二枚粳米百粒水煎服噯氣經曰太陽所謂上走心為噫者噯氣也陰盛而上走陽明陽明絡屬心為噫又曰胃中伏火膈上停痰令人噯氣是證多因胃氣不和窒塞不通脈右關弱短左關弦大肝盛脾虛治宜健胃消滯清痰降火主方陳皮半夏茯苓白朮香附各一錢藿香黃連姜炒砂仁各六分木香炙草各三分加薑棗煎寒加白蔻益智厚朴熱加梔子炒石膏煅虛人參氣實枳實檳榔半夏丸治痰火噯氣半夏南星並薑製軟石膏香附子梔子等分上為末神麯糊和丸桐子大每服七十丸食遠白湯送下咳逆經曰歲金太過咳逆余郁之發咳逆若胃火上衝而逆隨口應起於上膈者易治若臍下上衝直出於口者陰火上衝難治俗名打厄是也脈浮緩者順弦急者逆治宜順氣為先久者清火主方冷厄丁香柿蒂良薑官桂半夏姜炒陳皮木香磨藿香沉香磨茴香厚朴薑汁炒砂仁乳香另研等分甘草減半上加枇杷葉三片姜三片水煎成調木沉乳香服寒極脈沉肢冷加附子乾薑去良薑官桂熱逆湯治發熱煩渴便祕脈數熱厄黃芩梔子柿蒂陳皮香附鹽水炒連翹白芍藥半夏各一錢砂仁藿香各六分甘草三分加蓮肉七個烏梅一個竹茹一團水煎服痰加茯苓貝母氣虛並久痢加人參白朮茯苓陰火黃連黃柏滑石藍玉散治火邪上炎肺金受克欲悲而厄六一散方見暑門加青黛薄荷末燈心湯調下或黃連解毒湯方見火門簡便方雄黃末一錢溫水服即止或柿蒂十五個白鹽梅半個水煎服寒厄丁香柿蒂各二錢煎服厄嘔噦半夏半兩生薑一兩水煎作二服又吳萸泡青橘葉各二錢姜三片煎服或陳皮枳殼半夏煎服又川椒末麵糊丸桐子大二十丸白湯下傷寒厄見本門痰厄半夏十四枚豬牙皂角一條炙研姜五片煎服得吐痰出妙又食鹽一兩濕草紙包煨紅去紙以河水三碗入鹽滾數沸溫飲探吐灸法男左乳下一寸余動處灸女右乳下起肉處艾炷麥大三壯氣海臍下寸半眩運經曰諸風掉眩皆屬肝木夫眩運之始必因火克肺金金衰不能制木故木旺而生風肝木既旺復能生火風火二氣屬陽陽主動性同上升兩動相搏則為旋轉猶焰得風然而未有不兼四氣七情者七情相感臟氣不平鬱而生涎積而為飲煎熬成痰火動其痰令人眩運又挾於疲勞過度血液耗損精髓虧傷皆能致此發則頭運目眩耳鳴身轉昏憒欲倒如立舟車乃上實下虛也脈浮有汗屬風脈緊無汗屬寒脈虛煩悶屬暑脈沉吐逆屬濕左關弦數肝火右寸滑大多痰治痰為主降火驅風補養血氣主方天麻明實荊芥穗橘紅半夏各二錢茯苓錢半枳實川芎各一錢酒芩羌活防風南星各七分甘草三分加生薑三片水煎入竹瀝薑汁服火盛加黃連酒炒梔子肥人及病後氣虛加人參白朮去枳實瘦人血虛有火及婦人産後當歸熟地去南星風熱上攻防風通聖散滋補正元湯治氣血兩虛心脾耗損神昏有痰眩運一服安當歸黃耆白朮各錢半白芍酒炒茯苓茯神生地麥冬一錢人參遠志陳皮半夏川芎各七分炙草五分上加生薑三片黑棗一枚水煎早晚服運倒肢冷虛極人參五錢附子三錢加姜煎勞苦人眩補中益氣湯見虛損眩運甚者火極大黃酒煮炒乾研末三錢茶下有痰人眩半術天麻湯見頭痛痿證經曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虛弱急薄著則生痿躄也蓋痿之始必因縱欲傷精腎水虛敗不能制火火克肺金致肺熱葉焦也又曰治痿獨取陽明陽明者五臟六腑之海主潤宗筋宗筋能束骨而利機關陽明熱宗筋失養故足痿水竭火盈必兼唇燥小便澀雖遺如豚膏漿糊之狀脈浮大洪數宜壯水制火補氣血健筋骨足常熱者火起湧泉穴防痿證主方黃柏鹽酒炒知母鹽水炒當歸生地白芍藥石斛麥門冬山茱萸等分水煎空心服虛加人參黃耆補腎加枸杞龜膠補脾加白朮山藥小水不利茯苓萆薢滑石車前石蓮地膚子海金砂火盛芩連梔翹玄參氣下陷升麻柴胡渴五味天粉壯筋骨杜仲牛膝故紙鹿角膠丸治血氣兩虛腿足痿弱久臥不起鹿角膠一斤鹿角霜熟地各半斤當歸身四兩牛膝白茯苓菟絲子餅人參各三兩白朮杜仲各二兩虎脛骨一對龜膠一兩上為末入制虎骨以無灰酒二盞溶化角膠和丸桐子大每服百丸空心鹽湯下萆薢丸治痿躄不起萆薢杜仲薑汁炒肉蓯蓉酒洗菟絲子煮餅上末蜜丸桐子大每服三錢空心鹽酒下後再服健步丸虎潛丸方見虛損尤佳健步丸治膝軟無力屈伸不便腿腳沉重行動艱難歸尾白芍酒炒陳皮蒼朮牛膝酒各一兩條芩吳茱萸生地各五錢桂枝二錢大腹子三個即扁檳榔上為細末酒煮蒸餅糊丸桐子大每百丸空心白朮木通湯下風濕加防己風羌澤濕熱滑石寒濕川烏隨證加減痹證附麻木經曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹五痹者冬為骨痹春筋痹夏脈痹季夏肌痹秋皮痹又曰血凝於膚者為痹又周痹者在身上下移徙隨脈左右相應間不容空也衆痹者各有其處更發更止也按風寒濕氣客於分肉之間迫切而為沫沫得寒則聚聚則排分肉作痛此內不在臟外不在皮獨居分肉之間如痹不已在骨則重而不舉在筋則屈而不伸在肉則不仁在脈則血凝在皮則寒悚皆不痛也凡痹逢寒則急逢熱則縱治宜先攻風濕定痛次養血潤燥滋陰脈澀而緊為痹主方羌活蒼朮白朮酒芩防己當歸片薑黃溫州防風各一錢甘草七分生薑五片水煎食前服寒勝痛甚倍羌加麻黃桂枝風勝加獨活藁本白芷濕勝倍蒼白朮加豬苓澤瀉茵陳當歸拈痛湯效方見身重定痛丸治諸痹風濕流注骨節疼痛麻痹乳香兩半另研沒藥並出汗羌活歸尾各一兩兩頭尖去皮生用五錢上各為末酒糊丸如桐子大每服三十丸煮酒送下蒼朮薏苡湯治手足流注作痛麻木不仁難以屈伸蒼朮制二錢薏苡仁炒當歸芍藥桂心麻黃各一錢甘草五分上加生薑五片水煎服有汗去麻熱去桂芎附湯寒濕痹痛甚五痹從腿臂間發撫芎附子炮去皮臍黃耆防風白朮當歸熟地桂心柴胡炙草等分加薑棗水煎服三邪飲風寒濕邪成痹痛甚四肢麻木不舉麻黃蒼朮浮萍七月半採白芷苦參桑皮川芎甘松各一錢水酒煎服暖室出汗三日再服祕傳藥酒方男婦風濕相搏腰膝及遍身骨節痛甚麻黃白芷當歸芍藥肉桂桔梗半夏防己甘草各一兩杜仲牛膝烏藥枳殼厚朴陳皮各二兩蒼朮木瓜羌活檳榔各兩半無灰酒三壇藥盛三袋懸壇心重湯煮二時或煨過三日取飲日三次渣為末酒糊丸桐子大每百丸早酒下痛寧酒治風寒濕火相乘遍身筋骨走痛白虎歷節諸風痛當歸秦艽各二兩川芎白芍藥生地黃蒼朮羌活黃芩各一兩豬苓澤瀉防風茵陳鈴兒苦參虎骨打細酒煮上身痛靈仙升麻下身痛牛膝黃柏臂痛桂枝冬加麻黃痛甚乳香研末調將藥絹袋盛內封固十四日取酒飲渣曬為末米糊丸桐子大每服八十丸空心酒下忌發風動火物烏頭粥風寒濕痹麻木不仁如四肢腫痛加苡仁末煮啜烏頭生研為末每四錢入白米二合砂鍋煮稀粥入薑汁一匙白蜜三匙尉汗法治風寒濕痹遍身大痛不可忍者醇酒二十斤川椒乾薑桂心各一斤為粗末同棉絮一斤白布四丈併入酒中用馬糞或礱糠煨三日夜取布絮曬乾復漬酒盡為度椒藥為末布縫如夾復藥絮填入復內復用炭火炙熱裹痛處冷再炙尉數十遍汗出復拭乾勿見風病輕者制半料熏蒸法風寒濕停於腿膝痛甚者川椒一把蔥一握俱打細鹽一把小麥麩約四五升酒醋各碗許拌潤銅器內炒極熱熏蒸痛處上厚蓋臥一時要汗出冷再炒避風簡便方痹痛布絮包緊烘極熱痛減又治一切痹痛癢五加皮五兩南木香二兩好酒一罈絹袋盛浸箬包煮一時過七日開飲麻木經曰不痛不仁為麻痹即麻木證又曰麻屬氣虛木者屬死血此證由氣血兩虛風寒濕乘之病邪入深榮衛之行既澀經絡時疏故不痛皮膚不榮故不仁如繩扎縛初解之狀也治宜先汗後補或痰滯四肢或手指麻木脈浮澀而濡防為類中風之徵宜預調之主方蒼朮羌活川芎白芷陳皮半夏茯苓各八分桂枝麻黃升麻附子制甘草各三分上加薑棗水煎服補氣養榮湯氣血虛而邪乘先散邪後用此補養兼清濕熱人參黃耆天麻當歸芍藥茯苓黃連黃柏俱酒炒蒼朮牛膝澤瀉等分薑棗煎服溫經丸治遍身麻木附子一個制去皮臍黃耆一兩人參當歸白芍酒炒各五錢上為細末煉蜜丸如桐子大每服五十丸酒下早晚服十指疼麻附子一錢煎成調木香末一錢服有痰常服滾痰丸厥證黃帝問曰厥之為寒熱者何也岐伯對曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥又曰厥令人腹滿或暴不知人或半日一日知人者何也伯曰陰氣盛於上則下虛腹滿陽氣盛於上則邪氣逆陽氣亂暴不知人也名曰尸厥氣復則生不復則死皆因斫喪傷精致陽氣日損陰氣獨盛邪在三陰則為寒厥身冷脈沉面慘唇青眼反蜷臥若醉飽入房致陰精日竭陽火獨熾邪在三陽則為熱厥身熱脈數便祕煩渴甚至昏僕又有氣血兩虛痰鬱暴怒及弔喪入廟登冢夜行飛尸鬼擊忽然厥冷神昏妄言者先掐人中兩人分提頂發噀面用皂莢末搐鼻取嚏或針入人中至齒灸關元臍下三寸百壯鼻尖有汗蘇為度婦人灸乳下主方陽厥大黃黃芩白芍厚朴枳殼柴胡甘草各一錢水煎成化入芒硝一錢熱服或六一散暑門白虎湯傷寒附子理中湯方見中寒治陰厥冷甚重用附子肉桂腹痛吳茱萸異香平胃散治尸厥中惡邪氣蒼朮二兩陳皮厚朴兩半甘草白豆蔻丁香檀香木香砂仁藿香各一兩為末二錢棗湯少入鹽調下減桂麻黃湯治卒厥暴死攝生飲可服類中風門麻黃三錢杏仁十五粒研炙草一錢水煎灌下即蘇提發引肩臂返魂湯血逆卒厥併産後血厥昏暈目閉口噤婦人多患此當歸酒洗川芎肉桂乾薑炮赤芍藥甘草黑豆炒去殼紫蘇等分上水煎服或為細末每服二錢酒調下八味順氣散方見中風治氣厥導痰湯方見痰門治痰厥酒厥生薑汁灌四物湯方見婦科治失血發厥蛔厥烏梅川椒煎服加黃連楝樹根皮尤效蘇合香丸方見中寒玉樞丹方見蠱毒諸厥效更以菖蒲末枯礬雄黃吹鼻痙證俗作痓經曰諸痙項強皆屬於濕又曰諸暴強直皆屬於風劉河間曰諸痙強直乃筋徑而不柔和也蓋脾土主安靜濕勝過極則反兼風化亢則害承乃制實非風也身熱足冷頸項強急惡寒口噤頭搖面赤背反張如弓者痙證也陰痙曰柔陽痙曰剛如傷寒太陽發汗過多或瘡家過汗或大發濕家汗亦有氣血內虛風濕外襲有火熱傷肺金不平木有産後血枯有破傷風皆能致此脈浮緩有汗為柔浮緊無汗為剛治宜養血為主分虛實主方當歸川芎芍藥熟地白朮茯苓等分甘草減半加薑棗煎無汗加羌活防風蒼朮柴胡葛根冬加麻黃去芍地白朮有汗加桂枝黃耆去川芎厥冷加熟附羌活虛加人參煩渴麥冬知母乾葛黃芩去白朮川芎身熱煩渴臥不著席大便祕大黃枳實厚朴黃芩去白朮川芎茯苓汗吐下後發者重加參耆歸地羌荊痰火發痓二陳蔞貝枳桔參麥梔芩當歸蘇子加姜煎入竹瀝薑汁服栝蔞桂枝湯太陽病其證備身體強𠘧𠘧然脈反沉遲痓病栝蔞根桂枝芍藥各錢半甘草五分姜五片棗二枚煎疝氣經曰任脈為病男子內結七疝女子帶下瘕聚夫疝者少腹控引睪丸脹急而腫痛也由鬱熱內積抑遏至久寒濕外侵收引拘縮相搏而痛衝上則面黑口噤墜下則仆地昏沉甚至絶者亦為頑證有七種之別水疝腫脹明亮瘙癢水出得之醉酒飲冷汗泄當風宜逐水寒疝囊冷結硬陰莖不睪得之坐臥濕處子嗣艱難宜溫經㿗疝大如升斗不癢不痛得之地卑土薄江淮多感宜滲濕血疝小腹之旁橫骨中腫俗名便毒得之氣血凝滯留結為癰宜攻散氣疝狀連腎區下及陰囊得之號哭忿怒氣鬱而成宜散滯狐疝臥入晝出往來有聲今鐵圈托得之鬱怒憤氣抑遏不舒宜逐氣筋疝陰腫潰痛挺縱溲濁得之房欲之傷邪術所感宜制火經曰肝脈急大沉為疝牢急者順弱急者逆治宜除內熱祛外邪兼疏利行氣後補逐並施治宜龍膽瀉肝湯兼主方主方烏藥陳皮蒼朮茴香酒炒香附各一錢當歸玄胡索木香川烏各五分甘草三分加姜煎服囊熱加梔子去川烏冷濕加吳萸諸疝定痛山楂枳實橘核荔核青皮膽草川楝子三稜蓬朮檳榔撫芎柴胡山甲砂仁益智等酌用痛甚調乳香沒藥有痰加海石半夏小便澀配五苓散茱萸內消丸腎經虛弱膀胱為邪氣所搏結成寒疝偏大吳茱萸山茱萸肉肉桂馬藺花陳皮木香山藥川楝子青皮茴香鹽炒研等分上為末酒糊丸桐子大每服五十丸空心溫酒送下保命丹遠年近日小腸疝氣偏墜臍下搐痛以致悶亂陰間癢瘡吳茱萸揀淨一斤分四分煮酒米醋鹽水童便各浸一宿曬焙乾澤瀉二兩上為末酒煮薄麵糊丸桐子大每五十丸空心鹽湯下硫黃丸疝氣甚至手足厥冷上衝心腹欲死者數服愈硫黃溶化即投水中去毒研細末陳皮荔枝核打碎炒黃各等分研細末上飯丸桐子大每服五丸酒下勿多用蒼附湯治諸疝痛或加破故紙葫蘆巴蒼朮香附俱鹽水炒黃柏酒炒各一錢青皮玄胡索益智桃仁研各七分茴香炒附子鹽水炒甘草三分水煎服或為末湯下楂橘丸治諸疝痛山楂四兩橘核炒山梔炒二兩柴胡牡丹皮桃仁炒大小茴香俱鹽炒各一兩吳茱萸炮半兩為末酒糊丸桐子大十丸鹽湯下簡便方寒疝玄胡索胡椒小茴香等分為末每二錢酒調下或桂心末一錢或靈脂蒲黃末二錢或苦楝子末二錢或丹參末一錢並酒下諸疝小茴穿山甲全蠍洗炒木香等分為末每服二錢空心酒下又茴香豬苓木通甘草等分燈心淡竹葉煎調乳香服又枇杷葉野蘇葉椒葉蒼耳葉葡萄葉煎洗或炒鹽包尉又柏香五錢好酒煎去渣服再飲酒至醉三服安血疝四物湯加大黃枳實厚朴水煎入芒硝服偏墜牡蠣粉良薑末等分津調敷或槐子炒研入鹽少許酒下或五倍子研末酒下至醉小腸氣小茴香鹽炒枳殼末各一兩沒藥末五錢勻每一錢酒下或荔核末酒下或烏藥酒浸一宿良薑茴香青皮等分為末每二錢酒下或乾絲瓜燒灰研末酒下法兩手合搓熱掌揉數百回痛止久可消小兒偏墜用雙蒂茄懸房門上出入令兒視之茄干愈或釘釘日視多次諸痔附脫肛經曰因而飽食筋脈橫解腸癖為痔多由飽食用力或恣厚味醉飽房勞熱毒蘊蓄或強忍敗精及過服固精藥餌停積歸注或怒動肝火火侮燥金毒聚肛門或脾胃濕熱下迫大腸不勝枚舉更兼六淫七情而成痔有七種肛邊肉珠時出膿血名牡痔肛瘡腫突如㿔出血名牝痔瘡血淋漓痛而復癢名脈痔腫核脫肛往來寒熱名腸痔始如腸風清血時下名血痔並酷飲而成名酒痔憂怒則發名氣痔也破潰日久膿血水出名痔漏欲調治須斷房室戒厚味怒氣脈沉小實易治洪大軟弱難治主方諸痔當歸連翹生地芍藥防風梢荊芥白芷梔子條芩地榆等分甘草減半上加棗烏梅各一枚水煎空心服熱加連柏瀉加白朮祕加大黃麻仁濕加蒼朮豬苓澤瀉酒痔葛根枳殼半夏秦艽蒼朮湯諸痔痔漏大便祕澀大痛一服安秦艽桃仁研皂莢仁燒研蒼朮制各一錢防風七分黃柏酒浸歸尾青皮各五分澤瀉檳榔大黃木香各三分上除桃皂檳木另研外水煎成調入四末煎一沸服少時以乾物壓之有膿加白葵花五朵去萼心忌熱毒物羌活秦艽湯痔漏下垂不勝其癢羌活秦艽黃耆防風各八分升麻炙草麻黃柴胡各五分藁本三分細辛紅花各二分水煎服臟連丸治諸痔及腸風下血黃連川者去須蘆研末六兩槐角子末二兩獖豬大腸去頭梢將連槐末裝入半空勿脹腸破砂鍋水煮爛待乾連臟搗若濕加炒黃米粉少許丸如桐子大每服百丸空心白湯下蝟皮丸諸痔漏下血遠年近日皆效蝟皮一個火炙槐角防風當歸貫衆枳殼黃耆枯礬發灰各一兩豬懸蹄小甲十個炙上為末蜜丸或醋糊丸如桐子大每服百丸空心白湯送下收痔丸理諸痔通用或服槐榆丸諸痔有效方見血門真阿膠黃連貫衆各半兩蝟皮炙蜂房炒焦蛇蛻炙黃皂角刺炒穿山甲炙黃當歸川芎槐花發灰豬後蹄垂甲燒各三錢半皂莢長尺者醋炙去弦為末醋糊丸桐子大服如前黑丸子年久痔漏纍效百草霜乾薑炮各一兩木饅頭生牆頭者二兩烏梅肉白芷敗棕扁柏葉油發俱燒焦研各半兩桂心三錢上為末醋糊丸桐子大服如前敷痔硼砂一錢透明硃砂水飛五分冰片二分研勻熊膽調敷豬膽亦可又乳香沒藥輕粉黃柏末軟石膏煅龍骨等分研極細摻之枯痔用五倍子一個尖上開孔掃淨蛀屑入輕粉滿孔糊好外用濕草紙包數層微火煨令燥去紙研細入冰片少許濕者乾摻乾者膽調敷下疳臁瘡等亦收水結靨簡便方馬齒莧煎湯熏洗肛門腫加皮硝再以熊膽水研化敷尤妙痔血東行臭椿根皮為末醋糊丸桐子大每百丸空心米湯下諸痔腸風扁柏四兩白礬五錢研末拌柏炒乾敗棕燒灰一兩槐花四兩炒共末每服三錢酒調下洗痔韭菜煮汁置壇中先坐熏次傾盆中將韭蘸洗日三次又茄柯槐花冬瓜皮陳香圓煎湯入壇患人坐熏次傾出洗又用干蓮房荊芥各一兩枳殼薄荷各半兩水煎入朴硝五錢洗又槐花艾葉荊殼水煎入白礬洗或冬瓜或五倍子洗痛甚用枸杞根煎洗或水楊柳根上赤須煎洗羊蹄根葉油蒸食枳殼末蜜丸服蒼耳子末白湯調服痔癢甘草白芷荊芥槐花煎湯熏洗更以布鞋底烘熱尉脫肛經曰下者舉之滑者澀之先哲皆謂氣虛有熱或謂大腸熱甚故出或謂大腸與肺為表裡肺經蘊熱則肛門閉結虛寒則滑出不收或因用力或因痢後細推寒熱治理小兒患多主方白朮茯苓當歸川芎芍藥酒炒生地升麻各一錢桔梗炙草各五分加薑棗水煎空心服虛加參耆熱加芩連滑脫倍升麻加訶子五倍子醋糊丸服補中益氣湯方見虛損治瀉痢大病及産後槐榆丸方見血門治脫肛簡便方老幼脫肛香附子荊芥穗或蓮蓬殼橡斗殼煎洗又用朴硝湯洗次魚腥草搗爛坐肛門下或石灰炒熟包坐肛下或五倍子明礬煎洗或桑葉桃葉湯洗萆麻仁搗塗頂心又赤石脂或五倍子或龍骨木賊燒或黃柏軟石膏滑石皆可研末摻草紙上烘熱托上或梁上塵鼠糞桶內燒熏自上體氣附腋漏證屬足厥陰肝經鬱熱而成腋下有竅泄臭氣以枯礬麝香之類搓擦僅止一時必久服疏肝藥乃愈關脈弦急實大主腋氣主方龍膽草生地黃當歸木通車前子澤瀉柴胡黃芩青皮等分水煎服或當歸龍蒼丸驅穢散治體氣外用除根法內以此藥每五分薑湯調下瀉穢毒出為度大黃三錢檀香末一錢檳榔八分青木香丁香各三分共末入麝二分服除根法先剃去腋毛用鉛粉水調塗之數日後看有一小孔即出氣處也以艾炷如米大灸七壯孔實愈簡便方密陀僧入麝研末水調塗用熱蒸餅急夾腋下一時擲之又五更用精豬肉二大片拌甘遂末一兩挾腋下天明甘草一兩煎汁飲瀉穢物地上即埋恐傳入或白芷枯礬黃丹花椒末擦或夜明砂薑汁研敷腋漏兩腋下並手足心陰股及囊常有汗濕汙衣故名主方枸杞根薔薇根甘草各一兩商陸鉛粉滑石各五錢上為細末醋少許和頻塗諸處愈為度簡便方木饅頭生牆頭煎湯洗各處再以密陀僧研敷瘴氣瘴出閩廣嶺南山嵐致濕金石生水霧多風少鬱蒸為熱冬不甚寒腠開汗出夏月連雨伏暑冷侵寒熱不齊陰陽相搏遷客羈士飲食乖常崎嶇勞損氣虛感受輕者惡寒戰栗類瘧謂之冷瘴重者蘊熱昏沉如臥灰火中謂之熱瘴其最重者得病便失音謂之啞瘴有歸路復感謂之回頭瘴相類傷寒但不宜大汗吐下可依傷寒法治有發黃者依傷寒發黃治俗云莫飲卯時酒莫食申時飯又云瘴染勞力體虛人飲酒勿多飽食卻無事患愈七日洗面二七梳頭三七酒腥絶戒房室治法悉備萬病玉樞丹方見蠱毒初覺水磨湯服或頻咬咽並蘇合香丸方見中寒若畏寒飲熱酒薑湯滾水冷瘴正氣散暑月六和湯熱瘴啞瘴草子法身熱頭痛和解散有先受冷而病後變身熱煩渴雖思水而不能入口仍宜附子湯生煎冷服類陰證似陽煩甚加竹茹渴甚加人參五味子厄加丁香淡竹葉煩渴大作竹葉石膏湯減石膏加熟附子或冷湯足冷頭額虛汗姜附湯並灸氣海臍下二寸若非上熱下冷未可用附子之類預服及初感用主方次和解散若有傷寒頭痛發熱證即服羌活沖和湯如寒熱往來且與小柴胡湯辨認的確屬寒方服附子等熱藥欲散血黑神散方見産後主方預服不染半夏制一錢陳皮厚朴姜炒茯苓各七分枳殼人參感病禁用砂仁研各五分甘草三分加生薑三片棗二枚水煎服和解散瘴初作胸滿頭弦發熱及中風感寒諸病皆效蒼朮制六兩厚朴陳皮甘草各四兩藁本桔梗各三兩上咀每服五錢姜三棗二水煎日再服夜一服生薑附子湯冷瘴手足冷內虛發熱痰嘔吐逆頭疼身痛附子一枚制熟分四服每服加生薑十片水一鍾煎六分溫服乾薑附子湯瘴毒陰候發熱或煩躁肢冷舌苔引飲附子配乾薑附子湯瘴瘧寒振熱微面色青白食少手足冷大小便清利附子一枚依前製藥法制草果仁二十粒分四服加生薑水煎非寒甚勿用奪命散傷寒瘴證陰陽不明或誤投藥致病重煩渴婦人胎産感瘴人參七錢水二鍾煎一鍾去渣連罐沉新汲水取冷一服完六和湯廣南夏月瘴疾冷熱未分煩躁口渴方見霍亂椒囊法闢瘴氣風寒時疫絳紗囊兩許佩身內衣諸邪不侵降椒酒降香二兩銼川椒一兩去閉口者絹囊貯無灰酒二斗中浸飲闢瘴氣檳榔煎治瘴氣寒熱嘔吐腹滿檳榔蒼朮厚朴陳皮草果各五分甘草一寸生薑一塊濕紙包煨搗加棗二枚水煎服寒熱作瘧四獸飲小便短赤五苓散冷湯人參一錢大附子一錢炙草三寸淡竹葉十四片棗五枚水煎服啞瘴銅青五錢石緑三錢研末水調生面糊丸芡實大每服一丸汲水化服草子法飲酒太過多食煎炒腥膻熱毒感瘴熱甚晝夜不安遲三日血凝不救用針刺頭額及上下唇仍以楮葉擦舌皆令出血次以草藥解其內熱即愈南方有土人專刺者不換金正氣散方見傷寒一切嵐瘴傷寒頭痛風濕諸瘧吐瀉霍亂膈脹腹疼吞酸痰飲不伏水土胎前産後加草果佳預研末常服羌活沖和湯小柴胡湯並見傷寒五苓散方見便癃四獸飲方見瘧門蠱毒世傳閩廣有人造毒密藏飲食害人中者面目青黃躁悶胸滿吐血腹痛如蟲齧吐下皆如爛絮小便淋瀝不急治即死亦有緩者經年而死有傳他人名曰蠱疰有客彼娶妻欲歸婦人下定年蠱違期則死試法一唾津清水中沉者是浮者非一口含大豆豆脹皮脫嚼之不腥氣是一煮雞蛋去殼簪腳插入口含一飲時看簪蛋俱黑是一噙白礬不澀反甜者蠱也一閩有石首魚腦骨為器置食有蠱即暴裂倘已中蠱於某物能終身不再食亦安切忌食冷若至蠱鄉看其門窗滿屋無塵者有蠱食第一箸捏手中出門埋十字路口安或先問主人云恐有蠱麼說破無害脈洪大生微細死治法服解毒玉樞丹不及磨嚼細咽下多服即吐下毒物未吐用白礬一錢配膽礬五分或配皂莢末五分滾水調服或鵝毛蘸桐油探吐毒物盡出如臍腹痛再以鬱金末二錢空心白湯調下瀉毒物地上愈本日忌甜物次日服四君子湯主方萬病解毒丹即玉樞丹紫金錠神仙追毒丸治一切嵐瘴霧露寒暑曠野邪魅蠱毒誤食諸般菌鱉禽獸毒疫癘蛇虺凡遠行賁帶時臭藥氣稍覺不快嚼咽少許安川文蛤即五倍子打碎取淨日色曬研細末山慈茹處州遂昌者佳淨研細末各四兩續隨子即千金子取白仁四兩研細竹紙包加草紙裹琉璃店冷鐵板打頻換紙油盡研篩淨末二兩紅芽大戟勿誤用柴大戟取鮮者水洗冷曬乾去骨剝皮切片勿近眼鼻曬研細末二兩五錢真麝香極香雄黃透明硃砂鮮紅牆壁劈砂俱水飛澄去水曬燥重研二萬下各六錢上研勻端午為上七夕重陽天月二德亦可預齊戒獨宿及期宜神前香燭供藥末包乃沐浴更衣拜禱於淨室不見婦女孝服生人雞犬腥酒每末一兩熟糯米粉團七錢和勻太乾入團湯二錢入臼杵千餘下搓條印錠欲便佩帶穿眼陰乾後略曬密藏一切癰疽發背疔腫癤毒水磨頻塗蔥酒服厚蓋出汗凡蛇蠍蜈蚣諸蟲顛犬傷楊梅風濕癧核乳蛾丹毒等水磨塗患處酒服凡中風中氣中惡卒倒不省噎膈腫脹酒下傷寒疫癘乾霍亂赤白痢喉風諸食毒小兒驚疳薄荷湯下心腹痛諸氣積聚蠱脹薑湯下自縊溺水跌打損傷酒下諸頭痛薑蔥汁磨塗太陽川芎湯下牙痛酒塗瘧發時東流水磨桃柳枝煎湯下婦人月閉腹痛紅花酒下孕婦勿服鬼怪酒服更燒數錠六畜疫毒磨灌忌諸甜物醫家大宅皆宜制遠行佩帶諸邪不侵尤便濟人功德無量簡便方蠱毒白礬甘草等分為末每二錢白湯下吐瀉妙又雄黃白礬等分端午溶黃臘和衆手丸桐子大念藥王菩薩七遍湯吞七丸又平胃散生料為末用生漆和丸桐子大每七十丸酒下漸加服解諸毒附藥毒飲食中毒獸蟲傷毒藥毒中砒信毒躁狂腹痛眩嘔面青肢冷宜地漿水淨地掘坑入水攪澄清取多飲藍根汁砂糖和服凡解毒藥或煎汁皆宜冷服忌熱飲緑豆半升擂水飲白扁豆為末水下青靛花水下糞清一鍾灌下效干犬糞尖研水多服附子毒防風甘草煎服或豆汁飴糖童便皆可效巴豆毒芭蕉根葉搗汁或黃連甘草煎汁冷服丹毒地漿水見砒毒下菌毒金銀花葉生啖或煎汁服斑蝥毒豬油和大豆汁飲烏頭毒甘草煎汁服諸藥出毒皆效射工毒溪澗中蟲射人影則病似傷寒俗名沙發失治者死淡豆豉半合葛根升麻各二錢加蔥水煎服或白礬甘草煎服箭藥毒交廣人以焦銅作箭中人即死急飲糞清以糞塗患處一切藥毒薺苨汁扁豆汁緑豆汁甘草汁飴糖隨取一味服藥相反毒面青脈絶腹娠吐血蠶蛻紙燒灰服或甘草煎飲食中毒飲麻油一鍾吐或鹽湯吐玉樞丹諸毒宜服方見蠱毒禽獸魚鱉諸毒豆豉一合煎汁飲或蘆根搗汁乾者煎亦可蟹毒紫蘇或藕汁酒毒黑豆煮汁飲或橘皮葛根皆可禽獸自死魚無鱗腮鱉下有文蟹腹有毛煮酒新出夏月飲食經宿酒貯錫壺過夜銅器蓋熱食桃李雙仁果熟自落皆勿飲食獸蟲傷毒虎傷飲香油一碗葛根湯洗香油塗傷處青布作條燃火入竹筒放煙熏傷處口乾砂糖調水飲顛犬傷斑蝥二十一個去頭足翅糯米一撮同蝥七個炒米黃去蝥又七個同米炒赤去