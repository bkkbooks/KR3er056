body:
  text: 卷之三諸氣經曰怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結此九氣之為病也夫怒則氣逆甚則嘔血及飧泄喜則笑不休為毛革焦甚為狂悲則陰縮筋攣女人血崩恐則肉脫骨酸痿厥寒則水液澄徹清冷炅則嘔逆吐酸暴注驚則潮涎口噤癇癡勞則喘息汗出氣竭思則氣鬱不眠中痞不食等證內經治七情九氣之法皆以五行五志之理制而勝之深中痛情之至治也夫怒動肝火喜動心火思動脾火憂動肺火恐動腎火凡一經氣盛則病如怒甚者病屬肝木宜肺金勝之當以悲憂苦楚之言感之故悲可以治怒如喜甚病屬心火宜腎水勝之當以恐懼死亡之言怖之故悲可以治喜如悲甚屬肺金宜心火勝之當以謔浪褻狎之言娛之恐甚屬腎水宜脾土勝之當以慮彼忘此之言奮之思甚屬脾土宜肝木勝之當以汙辱誣罔之言怒之夫何今人不諳此理徒以方藥治之與情志之病殊不相通鬱結諸病必令自遣但以藥餌助之氣無補法誠為大敝如邪氣壅盛必宜驅散病去五則中和病去七則漸兼補益矣氣脈必沉沉極則伏澀弱難治主方陳皮半夏茯苓枳殼神麯青皮厚朴各八分蘿蔔子炒研撫芎桔梗蘇子研香附各一錢上加姜三片水煎成磨木香汁五匙服鬱怒痞脹作痛加檳榔三稜木通蓬朮氣急加蔞仁面目浮腫加豬苓澤瀉葶藶兼外邪加紫蘇前胡羌活蒼朮甘草血瘀腹痛加赤芍玄胡鬱金脅痛加柴胡膽草黃連胃脘痛加草豆蔻不食加藿香砂仁麥芽山楂氣閉加烏藥蘇梗久變成熱者加薑製黃連山梔初起兼寒凝者宜溫散加吳茱萸小茴香木香檳榔丸一切滯氣痞塊心腹脹痛脅滿吐酸痰涎食積酒毒及痢疾便閉不通積熱口乾煩躁能推陳致新滋陰抑火活血通經大黃二兩黑醜頭末二兩香附醋炒四兩木香檳榔枳殼青皮當歸陳皮三稜蓬朮黃連木通蘿蔔子各二兩鬱金甘草各一兩上為末水法丸如緑豆大每服百丸薑湯送下蘇子降氣湯治心腹脹滿喘促短急蘇子半夏曲前胡當歸陳皮厚朴制各八分官桂甘草各三分上咀水二鍾姜三片煎七分不拘時服常服消痰飲散滯進食升陽順氣湯治七情所傷及勞役飲食不節滿悶短氣人參一錢黃耆二錢陳皮半夏升麻柴胡當歸黃柏各七分草豆蔻四分神麯炒一錢甘草五分加姜水煎服分消導氣湯治氣痰壅盛二便不利桔梗枳殼麩炒厚朴姜炒青皮香附子制茯苓半夏各八分栝蔞黃連川貝母檳榔澤瀉川芎麥芽木通各五分甘草梢三分水煎服或神麯糊丸復元通氣散治氣不宣通腹脅刺痛或成瘡癤並閃挫腰脅作痛舶上茴香炒穿山甲蛤粉炒去粉各二兩玄胡索兩半白牽牛炒甘草炒陳皮去白一兩木香七錢白芷天粉青皮各二兩貝母一兩上為末每服一錢熱酒調下病在上食後服病在下食前服四磨飲理諸氣真沉香烏藥枳殼檳榔等分水磨服蘇合香丸一切鬱氣壅滯等證方見中寒參蘇飲發散諸氣方見傷風簡便方快氣除脹黑醜頭末木香檳榔蘿蔔子等分為末白湯下暫用又陳香丸蘿蔔子炒研等分為末服或陳皮蘇梗水煎服又烏藥香附為末服或陳香丸木香一味湯服或薑蔥尉法見傷寒郁證經曰治五郁者木鬱達之謂吐之令其調達火鬱發之謂汗之令其疏散土鬱奪之謂下之令無壅礙金鬱泄之謂滲泄解表利小便水鬱折之謂抑之制其沖逆六郁者氣血濕熱痰食也郁者結滯而不得發越也人之氣血沖和百病不生一有凝聚諸病生焉在婦人尤有貪戀慈愛妒嫉憂患八者染一則堅牢不破無論富貴貧賤感此最多氣鬱胸脅脹痛脈沉而澀濕鬱周身走痛陰雨則發脈沉細熱鬱瞀悶煩心小便赤脈沉數痰鬱行動喘急脈沉而滑血鬱四肢無力能食便血脈沉而芤食鬱噯酸腹飽惡食氣口脈緊治宜發散鞠郁詳審其由凡久病必開鬱破滯令氣血調和始愈主方香附童便或醋炒撫芎蒼朮神麯陳皮桔梗上加生薑水煎服氣加木香青皮蘇子厚朴枳殼濕加羌活白芷澤瀉熱加梔子連翹痰加貝母茯苓半夏海石血加桃仁牡丹皮紅花食加山楂麥芽厚朴砂仁檳榔痰鬱不能吐咯氣鬱不舒先用稀涎散吐之方見中風越鞠丸治諸郁香附制蒼朮制神麯炒梔子炒撫芎等分上為末水法丸緑豆大每服百丸白湯送下加貝母尤效六郁湯能解諸郁陳皮去白貝母連翹蒼朮枳殼撫芎各一錢梔子炒赤茯苓各七分香附子二錢蘇子砂仁研各五分上水二盞姜三片煎一盞溫服氣鬱加木香檳榔蘿蔔子倍香附砂仁濕鬱加白朮倍蒼朮熱鬱加芩連倍梔子痰鬱加南星半夏血鬱加桃仁紅花赤芍食鬱加山楂神麯麥芽木香檳榔丸治氣鬱食鬱胸膈痞滿大便結滯方見諸氣生韭飲治食鬱久則胃脘有瘀血作痛大能開提氣血生韭搗自然汁一碗溫加酒一二杯同服右先以桃仁連皮細嚼數十枚後以韭汁送下簡便方治諸郁木香砂仁白豆蔻等分研末每五分不拘時白湯下或木香酒磨下或砂仁白蔻常嚼一粒佳鬱金酒磨服效又枇杷葉刷去毛蘭香葉二味煎湯時時啜之或貝母嚼細白湯送下梅核氣是證因七情之氣鬱結不舒或因飲食之時觸犯惱怒婦人患此最多總由痰與氣結狀如梅核或如破絮停於咽嗌之間咯之不出咽之不下或中脘痞滿氣不舒快或痰壅熱盛上氣喘急或留飲噁心嘔吐涎沫久久不已則為噎膈關格之漸治宜開鬱順氣利膈化痰清肺為主主方陳皮半夏薑製白茯苓各一錢枳實青皮南星薑製蘿蔔子蘇子神麯炒砂仁炒研白豆蔻研益智仁檳榔各五分上姜五片水煎成調砂蔻末臥床慢服氣鬱加香附撫芎厚朴脹加青皮腹皮火加梔子黃芩七氣湯一名四七湯治七情九氣結滯成痰狀如破絮或如梅核在咽喉之間咯不出咽不下中脘痞滿氣不舒快或痰飲嘔逆等證並皆治之神效半夏茯苓各三錢紫蘇葉厚朴姜炒各二錢上水二盞姜三片煎一盞食遠服簡便方用臘糟不下水者一斤朴硝淨者半斤和勻新瓷壇收貯封置淨處每取三匙煎湯一盞臥床慢飲關格經曰陰陽不相應病名曰關格難經曰五臟不和則九竅不通六腑不和則留結為癰邪在六腑則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣邪在五臟則陰脈不和陰脈不和則血留之血留之則陰脈盛矣陰氣太盛則陽氣不得相榮也故曰格陽氣太盛則陰氣不得相榮也故曰關陰陽俱盛不得相榮也故曰關格關格者不得盡其正命而死是證膈中覺有所礙欲升而不升欲降而不降欲食不能食此謂氣之橫格也關者則不得大小便甚熱之氣在於下焦填塞不通無出之由故曰關也格者則吐逆不能食甚寒之氣在於胸中遏絶不納無入之理故曰格也胸中有寒者當以熱藥治之丹田有熱者當以寒藥治之胸中之寒丹田之熱上下治法主當緩治客當急治經曰陽盛陰不得榮故人迎大三倍於寸口曰關陰盛陽不得榮故氣口大四倍於人迎曰格主方陳皮白茯苓貝母枳實麩炒一錢蘇子炒研栝蔞仁香附童便炒撫芎厚朴各七分木香沉香各五分俱另磨甘草三分上生薑三片水煎加燈心竹瀝磨沉香木香調服利格湯治關格陳皮滑石木通各一錢半夏茯苓各八分人參蘆錢半甘草四分上薑棗煎服再煎探吐如氣虛脾弱治宜吐法以提其氣之橫格不在痰也有痰者二陳湯吐之如中氣不運者利格湯去滑石木通參蘆加人參白朮升麻枳實栝蔞如胃寒不納以沉木香砂仁白蔻為末不時舐咽下焦大便不通以承氣湯為末糊丸曬燥湯下或以大黃末布條圈臍中作窩朴硝湯逐匙漬之大便通痰多二陳湯加木通之類噎膈經曰三陽結謂之膈又曰少陽所致為嘔湧溢食不下食不得入是有火也是證因七情過極房室勞役致五臟火熾血液枯涸煎熬成痰漸致胃脘乾槁近咽嗌間則水飲可行食物難入名之曰噎槁在胃脘食雖可下不能運行良久復出不出則脹滿難當名之曰膈既無穀味生養氣血自然衰憊或因病起微漸之時惟欲速效過用香燥辛熱之藥損傷陰血而致者然去死不遠也脈寸緊而尺微澀浮弱氣虛澀小血弱治宜補氣養血順氣消痰清熱五噎者憂思氣勞食也五膈者思憂喜怒悲也此神思間病惟內觀自養神靜陰生陰生則血生火降而腸胃滋潤能斷厚味庶不助火若吐白沫糞如羊屎者不治主方人參五分白朮茯苓當歸陳皮半夏薑製黃連各八分甘草三分上加薑棗煎磨入沉香汁三匙服氣虛加黃耆嘔加霍香砂仁助胃加山藥蓮肉消食山楂麥芽開鬱香附神麯撫芎山梔氣脹不舒加木香蘿蔔子大便祕加酒煮大黃肥人多痰加二陳製半夏貝母蔞仁藥中入竹瀝薑汁少許韭汁童便驢尿服瘦人四物養血少加桃仁紅花常宜人乳牛羊乳少入薑汁蜂蜜砂糖甘蔗汁梨汁作飲枇杷葉青橘葉蘭葉煎湯飲御米粟米煎粥入竹瀝食此證有干食糯米飯絶不飲茶湯而安者五噎五膈散治膈噎等證人參半夏桔梗白朮白豆蔻木香沉香乾薑䕸頭糠蓽𤃥茄甘草各三分枇杷葉五片刷去毛蜜炙上加生薑七片水一盞煎服生薑汁煎治噎食不下咽喉壅塞胸膈煩悶等證生薑汁白蜜牛酥各五兩人參百合各二兩上藥入銅銚中以慢火熬膏不拘時每用三匙用人參百合湯調下枇杷葉煎治五噎立效枇杷葉刷去毛炙陳皮去白各三錢生薑五錢水盞半煎七分作二次溫服嘉禾散治脾胃不利胸膈痞悶氣逆生痰不進飲食五噎五膈砂仁白茯苓薏苡仁炒枇杷葉刷去毛薑汁炙桑白皮炒沉香磨汁五味子甘草炙各五分木香磨汁青皮榖芽炒藿香隨風子石斛酒炒大腹皮洗陳皮半夏曲炒神麯炒檳榔杜仲薑汁炒斷絲各三分白豆蔻丁香人參白朮各五分上水二盞姜三片棗二枚煎八分食遠服五噎入柿幹一枚膈氣吐逆入韭白三寸棗五枚同煎人參利膈丸治胸中不利痰逆喘滿利脾胃壅滯膈噎聖藥人參當歸藿香各一兩木香檳榔各七錢枳實炒甘草各八錢厚朴姜炒大黃酒浸各二兩上為末滴水丸桐子大溫水下三十丸翻胃經曰濁氣在上則生䐜脹邪氣逆上則嘔而吐是證由榮衛俱虛氣血不足停水積飲於胃則臟冷而脾不運行氣逆而成翻胃也故朝食暮吐心下牢大如杯甚則食已即吐經曰得谷則昌絶谷則亡穀味難進去死不遠患者知此萬緣屏息澄心靜養參酌方藥尤宜食乾飯以陳年醬姜下之渴以甘蔗汁少入薑汁為飲能飲驢尿最佳切忌羹湯生冷硬物近世多以辛香燥熱之藥治之間有虛寒者取效若食已即吐屬實熱者用之因辛能行氣破滯雖然暫可由是五臟之火反熾脾胃之陰愈傷病轉甚矣尤有藥餌將養得宜遂獲小愈則百念復生飲食雜進病加不能生全理當預知如有痰熱大便燥祕日服滾痰丸數分方見痰門脈緊而弦為虛寒浮緊滑數皆為熱小弱遲澀為寒而正氣虛兼助元健脾和胃為本主方半夏制厚朴梔子炒黑黃連薑製陳皮各八分茯苓蒼朮米泔浸炒竹茹枳殼各八分香附子神麯澤瀉當歸白豆蔻各五分甘草二分上生薑三片水二鍾煎八分入磨沉香汁服和中桔梗湯治上焦氣熱上衝食已即吐脈浮而洪桔梗兩半半夏曲二兩陳皮去白一兩白朮一兩五錢枳實炒白茯苓厚朴姜炒一兩上咀每服一兩煎取清汁調木香散二錢隔夜空腹服三服之後氣漸下吐漸止然後去木香末每料中加芍藥二兩黃耆一兩五錢服之便愈如大便燥硬食不能下以小承氣湯微下之少利為度再服前藥補之木香散木香檳榔各等分為末小承氣見傷寒茯苓澤瀉湯治翻胃吐而渴欲飲水澤瀉四兩白茯苓半斤甘草桂枝各二兩白朮三兩生薑四兩上水一斗煮取三升納澤瀉再煮取二升半溫服三合日三服一方有小麥一升青金丹治翻胃及一切寒熱嘔吐百藥不效者一服即止水銀一兩硫黃五錢上同研至不見星每服一錢濃生薑陳皮湯調下未止再服或姜糊丸緑豆大薑湯下屬寒者二錢薑汁酒熱調服厚被蓋出汗小兒量服更以半夏三錢陳皮二錢茯苓厚朴藿香蒼朮各一錢生薑七片搗入水煎成調砂仁炒研一錢服另取薑汁半杯和湯一杯熱而辣者每進藥一口薑湯一口送服完頻飲熱薑湯垂死者用人參二錢水煎頓服日再進以人參煮粥食未安再服滾痰丸治痰熱吐方見痰門荊黃湯熱氣衝逆食已即吐方見嘔吐簡便方平胃散依方製成薑汁紅棗丸鹽湯下或姜棗同研服又六一散生薑自然汁澄下稠者糖果店柞薑絲最多和丸緑豆大湯下又白粱米汁二合生薑汁一合和服又乾柿餅燒灰一錢酒下又米粉搜和成劑丸如桐子大煮熟點鹽少許空心和汁吞又大附子一個薑汁一碗浸透煮乾母丁香十個共為末以少許安掌中不時舐服又蚯蚓屎一兩木香五錢共為末神麯糊為丸陳皮薑湯送下痞滿經曰太陰所至為積飲痞膈痞不通之謂精神榮衛氣血津液出入流行之紋理悶密而為痞也有傷寒下早邪氣攻上而痞者有雜病下多亡陰血虛而痞者有中氣虛弱不能運化精微而痞者有飲食痰積窒塞而痞者有濕熱太甚而痞者蓋痞與脹不同脹滿則內空虛而外有形痞滿則內悶實而外無狀脈宜浮滑忌短澀治宜察其虛實而行攻補實人略與疏通隨宜調補不可專於通利暫得寬舒再作益甚主方陳皮半夏茯苓枳實黃連姜炒厚朴姜炒各八分草豆蔻木香益智青皮柴胡各五分乾薑吳茱萸各三分上水煎服脾虛無血加當歸芍藥川芎白朮郁加香附神麯中氣虛痞加人參白朮蒼朮痰積加貝母山楂麥芽濕熱加酒炒黃芩梔子蒼朮肥人濕痰半夏茯苓蒼朮滑石瘦人枳實黃連芍藥升麻痰挾血成窠囊桃仁紅花香附大黃鬱金黃連消痞丸治心下痞滿小便不利有熱者黃連炒兩半黃芩炒乾薑各三錢茯苓白朮炒甘草炙厚朴制豬苓各五錢枳實一兩陳皮七錢五分澤瀉薑黃各三錢半砂仁三錢五分半夏制一兩三錢上為末蒸餅丸桐子大每服百丸白湯送下開結枳實丸一名木香利膈丸治濕痰留滯胸膈痞悶時作鳴聲枳實炒白朮半夏制南星泡枯礬大黃青皮木香各五錢牽牛頭末二兩皂角炙去皮弦子旋覆花各一兩上為末麵糊丸如桐子大每服三十五丸米飲下香砂枳實丸治痞保和丸並見飲食簡便方痰食積痞半夏為末薑汁和作餅子用濕紙包慢火煨香熟水二鍾餅一個鹽五分煎至一鍾服又涼物過飽不消遂成痞用馬牙硝一兩以陳年吳茱萸半升煮濃汁入硝乘熱服良久未轉更服又用枳實麩炒為末每服二錢清粥湯送下又卒得胸痛薤根搗自然汁飲薑蔥尉法見傷寒腹脹經曰諸腹脹大鼓之如鼓皆屬於熱又曰腹滿䐜脹肢膈胠脅下厥上冒過在太陰陽明乃寒濕鬱遏也是證雖因七情勞役飲食失節房室斫喪及風寒暑濕皆能致此然怒氣抑遏而成者多蓋鬱怒日積則肝木氣盛而脾土受克脾能生養萬物為一身之主雖具坤靜之德而有干健之造脾土既虛胃雖納受水榖而轉輸之官失職不能司消化之令運行精微分布灌溉致使心肺之陽不降腎肝之陰不升而成天地不交之否清濁混淆而成壅塞濕氣不流鬱而為熱濕熱留積因成脹滿若四肢齊腫是為水腫治之尚易如單腹脹膠固難除脈盛而堅遲而滑者為脹浮大順虛小逆治宜和中順氣健脾利水主方陳皮茯苓蒼朮厚朴枳實香附各一錢豬苓澤瀉大腹皮木通各八分木香五分另磨砂仁七分另研加生薑燈心水煎調木香砂仁服如腫甚兼用神佑丸二服方見痰門以指按之有凹不起者屬虛加扁豆白朮當歸各八分以手按之隨手凸起者屬實加三稜蓬朮檳榔青皮益智便祕加大黃酒煮邪去正虛加人參氣下陷加升麻柴胡各三分不食而嘔加藿香先脹而後喘者治在脾加扁豆麥芽葶藶少許先喘而後脹者治在肺加黃連黃芩麥門冬痰加南星半夏曲朝寬暮急屬血虛加當歸紅花酒洗少許去脹草果熱加梔子黃連暮寬朝急屬氣虛加人參白朮寒加乾薑肉桂藿香丁香茴香吳茱萸腰以上腫宜發微汗參蘇飲方見傷風之類郁加撫芎神麯益智草豆蔻烏藥腰以下腫宜利小便加石蓮子滑石下氣加沉香蘇梗痛加薑黃玄胡五子五皮飲治壯實人初感可用病略減止服梔子皮大腹皮生薑皮茯苓皮陳皮蘿蔔子香附子車前子葶藶子蘇子上水煎服蘇子湯憂思過度致傷心脾腹脹喘促嘔逆腸鳴二便不利紫蘇子一兩大腹皮草果半夏厚朴木香陳皮木通白朮枳實人參甘草各五錢上每服五錢水盞半姜三片棗一枚煎七分服木香順氣湯治濁氣在上則生䐜脹木香草蔻麵包煨蒼朮制各三分厚朴制四分當歸五分升麻柴胡各二分上咀作一服水二盞煎服忌生冷硬物惱怒房勞雞屎醴散治心腹脹滿旦食不能暮食致成嘔逆鼓脹雞屎醴雞屎炒極熱入好酒沃之陰乾大黃桃仁各等分上為末每服二錢水盞半姜三片煎七分食前服簡便方治腹脹草豆蔻為末每服五分木瓜煎湯下又檳榔為末每二錢水煎服又獨蒜煨熟去皮棉裹納下部中冷即易又治關格腹脹大小便祕又用葶藶炒紫色酒浸七日研爛每服三匙好酒送下蠱證經曰病久則傳化上下不並不通也易以上下乖隔不通為蠱其證乃陰陽氣血皆虛出入升降違度先由大怒致肝木盛極剋制脾土運行失職遂成中滿痞塞諸疾漸而正虛邪實以成膠固難起之疴至此欲攻恐正氣愈虛欲補恐邪氣轉熾謹可中和調之此際猶有恣食縱怒者自速死耳欲行治理必絶怒氣斷鹽醬遠音樂戒鵝鴨惹濕諸物循序服藥十生一二脈浮大順虛細逆或患人急脹痛苦之甚姑以腹脹痞滿水腫諸方及三花神佑丸方見痰門暫用數服次以主方接服消補兼行主方人參五分白朮茯苓豬苓澤瀉各一錢木香另磨白豆菀另研陳皮木通各七分上水煎服分消丸治氣蠱腹脹如鼓俗名單腹脹臍突堅硬如石厚朴一兩半夏枳實各五分黃連乾薑知母各四錢澤瀉海金砂陳皮各三錢豬苓人參薑黃黃芩白朮甘草各一錢上為末水丸緑豆大每二錢炒熱湯下經驗桃奴丸治血蠱腹上有血絲婦女月經不通腹中有塊脹痛及男子墜馬跌撲瘀血留積脹痛等證桃奴冬月樹上小干桃猳鼠糞雄鼠也兩頭尖者是玄胡索香附子肉桂五靈脂桃仁去皮尖搗如泥砂仁等分上為末水法丸如緑豆大每服三錢空心溫酒送下利水益元散治濕熱為病二便不利正氣虧虛等證茯苓白朮人參豬苓澤瀉各半兩滑石水飛六兩甘草三錢上為末每服三錢食遠燈心湯調下簡便方蠱脹用馬鞭草銼曬勿見火或酒或水煎服又初感氣實有痰陳葫蘆一枚去頂入酒竹箸松其籽仍用頂封固重湯煮數沸去子飲酒盡一吐幾危吐後腹漸寬調理而愈水腫附陰腫經曰肺移寒於腎名曰湧水如溢囊裹漿或遍身腫滿疾行則濯濯有聲諸有水氣者微腫見於目下也身浮而光手按成窟舉手即滿上則喘咳氣急下則足膝皆腫大小便短澀不利皆因脾虛不能制其腎水水氣妄行漬於肌肉蓋以脾虛則肺金既不得母氣之養又肝木無所畏更來侮土此脾所以益虛也土弱則水愈強故腫不易消古方多用攻下之劑特攻其標耳治法必養脾土上輸精氣以全運化之職保肺氣以下降滲道開通敗濁之邪其稍清者復回而為氣為血為津液其敗濁者在上為汗在下為溺而分消矣脈洪數為熱沉遲為寒浮大則順沉細則逆主方香薷大葉者赤小豆桑白皮白醜白朮蒼朮各一錢豬苓澤瀉赤茯苓連皮大腹皮防己厚朴各八分滑石一錢五分上加椒目燈心水煎服加減法與前腹脹相類五子五皮飲神佑丸可以兼用茯苓散治諸般氣腫澤瀉莞花醋拌炒郁李仁甜葶藶漢防己藁本各三錢半陳皮去白白茯苓白檳榔瞿麥各五錢滑石大戟各七錢半上為細末每服二錢桑白皮煎湯空心調服取下碧緑水如爛羊脂為度忌鹽醬百日不可多服當歸散水腫多由腎水不能攝養心火土無所滋水溢泛濫滲透經絡發為浮腫當歸木香肉桂赤茯苓白朮陳皮木通赤芍藥檳榔牡丹皮紫蘇等分水煎服簡便方治水腫香薷為末更以香薷煎汁熬膏為細丸日三服又黃瓜一根切開勿去子醋煮一半水煮一半空心食又棗子一斤放鍋入水淹四指以大戟根苗一兩鋪上煮乾去戟食棗又苦葫蘆子炒為末每服二錢陳皮木通湯或酒下又豬腰子一個分七片甘遂末一分摻入濕紙包煨熟頓食又瓜蒂末二分吹鼻內日三次未愈黃芩末五錢煎湯服又香附醋煮研末醋糊丸服又馬齒莧少入粳米醬汁煮食陰腫是證由膀胱蘊熱風濕相乘或因濕熱水腫流注或疝氣攻作或暴風客熱及小兒啼叫怒氣結聚或坐濕地冷石或蟲蟻吹毒所致詳其所因而施治之主方白朮桑皮木通陳皮各半兩白醜二兩共為末每服二錢小兒止服五分空心薑湯調下治小兒啼叫成者桃仁去皮尖官桂黑醜炒白蒺藜牡丹皮大黃各三錢為末蜜丸桐子大每五十丸青皮木通蔥白鹽少許煎湯下治小兒陰腫牡蠣煅研粉津調服次以粉擦之五苓散加丹皮防風服或桃仁研膏津唾調敷又蟬蛻五錢煎水頻洗仍以五苓散加燈心煎服簡便方治外腎腫小茴香穿山甲炒木香各等分為末每二錢酒下男婦陰腫馬鞭草搗爛絞汁塗小兒用老杉木燒灰入膩粉油調敷又荊芥一兩朴硝二兩蘿蔔子一兩五錢蔥白同煎洗又蔥圍蚯蚓糞甘草煎汁調塗或生薄荷汁敷亦可外腎腫大黃末醋調塗干再塗或加牛糞燒灰等分積聚難經曰積者陰氣也聚者陽氣也故陽浮而動陰沉而伏氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚也蓋五積之名肝之積名曰肥氣在左脅下如覆杯心之積名曰伏梁在心下如臂脾之積名曰痞氣在胃脘如覆盤肺之積名曰息賁在右脅下大如杯腎之積名曰奔豚在少腹上若豚狀尤有癥者腹中堅硬有形可徵瘕者假物而結推移可動痃者氣血凝聚肌肉之間癖者飲食凝滯外無形跡及痞塊多證皆不外乎七情鬱結痰食氣血而成凡積聚脈多沉伏或附骨癥瘕多弦實強順微弱逆治宜消積為標次兼養正為本服藥最忌厚味發氣之物主方陳皮厚朴枳實青皮香附山楂肉各八分三稜醋炒蓬朮醋炒砂仁檳榔各六分木香五分上加生薑水煎服痰積加半夏貝母海石芒硝去山楂血積加桃仁紅花官桂當歸尾食積加神麯麥芽痛加玄胡索撫芎五靈脂草豆蔻甚者加乳香沒藥痞加黃連姜炒脹加蘿蔔子不消加黑醜良薑吐酸加紅豆蔻上方五丸治五積群書具載依法服亦多效但五方中皆有巴豆霜近世鮮用今另考五方於下用者酌之伏梁丸治心積茯苓去皮厚朴炒人參枳殼炒三稜煨半夏泡白朮各等分上為末薄糊丸桐子大每五十丸食遠米湯送下痞氣丸治脾積大烏頭一兩炮去皮臍附子同川椒炒出汗乾薑桂心赤石脂火煅醋淬各半兩上為末煉蜜丸桐子大硃砂為衣每服五丸米湯下肥氣丸治肝積青皮陳皮三稜蓬朮醋炒黃連枳實厚朴各一兩檳榔蘿蔔子炒穿山甲肉桂乾薑炮各五錢上為末入炒鹽三錢醋糊和丸桐子大每五十丸食遠米湯送下息賁丸治肺積半夏炮桂心人參吳茱萸泡桑白皮炙葶藶甘草各一錢半上水二盞姜五片棗一枚煎至一盞服作丸亦可奔豚丸治腎積乾葛川芎當歸桑白皮炙黃芩甘草炙甘李根皮焙各一錢五分半夏泡二錢加生薑三片水煎食遠服作丸亦可香稜丸治五積六聚二焦痞塞痃癖諸積三稜四兩醋炒青皮陳皮蓬朮煨枳實蘿蔔子香附子厚朴各二兩黃連肉桂神麯麥芽山楂肉檳榔益智各一兩干添炒煙盡木香砂仁桃仁各五分上為末醋糊丸桐子大每服七十丸空心薑湯下玄白丸治五積六聚胸膈脹滿痞悶吞酸心疼腹痛脅下刺痛遇風寒怒氣食生冷發氣之物勞碌憂愁則積攻動大痛得熱尉暖氣痛減者宜服此黑醜白醜良薑各四兩砂仁紅豆蔻陳皮三稜蓬朮乾薑各二兩青皮草豆蔻肉桂玄胡索五靈脂各一兩上為末用真阿魏五錢銼細米醋浸研化拌入末內醋煮麵糊丸桐子大每服百丸空心薑湯下簡便方治諸積瓦楞子火煉七次為末酒調服即蚶殼酒食積平胃散加丁香神麯麥芽香附砂仁共研末每二錢薑湯下酒積酸嘔神麯麥芽各一兩黃連五錢巴豆霜一錢同研為末湯丸每一錢薑湯下魚蟹積紫蘇陳皮山楂香附煎服粉面積蘿蔔子炒研煎服痃癖癥結及諸蟲馬齒莧和鹽醋煮一碗食有蟲盡出膜外癥及氣塊玄胡索為末豬胰一具切碎炙熟拌食痰食積塊風化石灰丸服陳者尤妙食膾成瘕馬鞭草搗汁入薑汁服尉癥法吳茱萸一斤擂碎酒煮乾布包尉冷再煮炒至移動血證吐衄咳咯唾便溺血等經曰心出血肝納血又曰臥則血歸肝目受血而能視足受血而能步掌受血而能握指受血而能攝所以動言視聽無非血養又曰怒則氣逆甚則嘔血夫吐血者多因大怒傷肝憂愁思慮傷心酒色過度陽盛陰虛水不制火或厚味醇酒以動胃火感受之由不同無出於火載血上錯經妄行凡榮衛太虛腑臟易損血脈空竭因而恚怒驚忿暴氣逆溢不循經絡血脈流散是證作矣諸失血多屬於君相二火諸經之熱煎逼其血而出諸竅也色赤紫為熱極凡血上行者為逆復而下行變痢為順藥兼降氣則血歸經脈多芤澀沉細者順洪大者逆身涼脈靜者易治身熱脈盛者難治主方犀角磨汁或鎊牡丹皮赤芍各錢半生地黃二錢黃連一錢五分上水一盞童便一鍾煎服如血不止加茅根汁磨京墨汁各半鍾和服吐血出於胃加天門冬黑山梔阿膠焦荊芥蒲黃厚味動胃火加石膏枳殼衄血鼻出咳血痰中血絲皆肺火加黃芩連翹玄參唾血咯血皆出於腎加黃柏知母熟地黑山梔凡血紫黑成塊胸中氣塞加大黃桃仁大便血臟氣傷風邪入下血面黃時熱加防風枳殼柴胡升麻槐角地榆小便血小腸與心為表裡心熱則尿血兼有膀胱火山梔滑石瞿麥木通諸見血藥中可用藕節汁扁柏葉山茶花大小薊甚不止暫用廣西三七真花蕊石發灰白芨可以為末調服三錢止後多用鬱金山茶桃仁以清瘀血心無後患有吐多神昏不省者乃陰氣暴絶孤陽欲飛越而去不能獨存急用人參一兩煎濃汁半鍾灌下氣復則蘇如血止火降胸寬氣和止是虛弱無力參耆白朮歸身之類補之地黃飲子治吐血衄血下血溺血等證皆屬於熱生地熟地枸杞子地骨皮黃芩天門冬芍藥黃耆甘草等分上咀每服七錢水二鍾煎八分去渣食遠服如脈微身涼惡風者加桂二分必勝散治男婦錯經妄行流溢或咳或衄血並治小薊人參肺熱減去蒲黃炒黑熟地黃酒洗當歸烏梅川芎各一錢上咀作一服水二鍾煎一鍾不拘時服麥門冬湯治思慮傷心吐血衄血麥冬天門冬遠志當歸白芍藥生地黃人參黃耆牡丹皮阿膠藕節炙草各一錢上作一服每服水二鍾姜一片煎一鍾不拘時服刺薊散治衄血諸血經日不止刺薊苦參黃連梔子仁生地黃側柏葉大黃炒各一兩上咀每服五錢水二鍾入竹茹五分煎八分溫服槐榆丸治大便下血諸痔及脫肛槐角子地榆枳殼黃芩條防風當歸頭等分上為末水法丸桐子大每服二錢空心白湯送下四生丸治吐衄血陽乘於陰血熱妄行等證生艾葉生薄荷葉側柏葉生地黃等分上俱搗爛丸如雞子大每用一丸煎去渣服十灰散治癆證諸失血嗽血先服此大薊小薊荷葉側柏葉茅根茜根山梔大黃牡丹皮棕櫚皮各燒灰紙包蓋地下過宿等分配研勻先以藕節汁或蘿蔔汁磨京墨調末五錢服甚有去升斗不能止者花蕊石發灰三七白芨研末暫服神昏服獨參湯簡便方治吐血藕節荷葉頂各七個水煎入蜜一匙服又鮮地黃汁一升薑汁半合和服或生地酒煎服或生蜜湯服又百合搗汁飲煮食亦可又熟豬肝蘸白芨末食或單白芨又生藕生地黃大薊各搗汁三合入蜜一匙服又蘿蔔搗汁和童便或鹽少許或酒同服舌上無故出血槐花末敷止吐衄血白芨末涼水調鹽花貼鼻窊中或貼印堂及鼻紙封頻以涼水潤之或濕紙搭頸項或頂心頻以涼水潤之茅根煎京墨磨藕萱草馬鞭草車前草並搗汁百草霜或鍋煤梔子炒研黃葵子炒黃糯米發灰並可研末涼水調下皆效隨用一味止衄血槐花末蓮房燒灰發燒灰鸕鷀糞燒灰梔子燒灰皆可吹入鼻蘿蔔汁車前汁蔥汁皆可滴入鼻內石榴花瓣牆頭苔蘚皆可塞入鼻咯血疙瘩杏仁研細青黛作餅以柿合濕紙裹煨慢嚼米湯下大便下血烏梅五倍子炒焦白芷研末等分米糊丸桐子大每服百丸白湯送下又臭椿根皮為末醋糊丸湯下或殭蠶末烏梅肉蒸搗丸服或苦楝子炒黃為末蜜和丸服又茄科燒灰三錢米湯下或木槿煎服或山楂末或五倍子末皆可湯服小便出血蒲黃炒破故紙炒陳石灰炒等分研末湯服又辰砂五苓散燈心湯下或柿餅燒灰米湯調下或車前子水煎服或車前草搗汁服又蒲黃炒研末服後四物湯加木通車前子煎調玄明粉服全止小便血條當歸白芷為末二錢淡豆豉煎湯下或黃連黃柏末二錢車前子煎湯調下又五倍子末烏梅搗丸服或鬱金為末蔥湯調下或扁柏葉為末酒調下傷食經曰飲食自倍腸胃乃傷又曰飲食勞倦則傷脾脾傷則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也又曰安穀則昌絶谷則亡蓋脾